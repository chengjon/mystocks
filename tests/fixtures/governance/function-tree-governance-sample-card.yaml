  delivery:
    six_line_summary_required: true
    six_line_summary:
      change_purpose: "align market task card with function-tree IDs"
      modified_scope: "market api + tests"
      dependency_changes: "none"
      legacy_logic_impact: "none"
      rollback_ready: "yes"
      risk_and_rollback_point: "revert market governance-only diff"
  governance:
    phase: "phase_a_pr_hard_gate"
    mainline_drift_threshold_percent: 5
    stop_rule_owner: "mystocks_spec1"
    stop_rule_sla_hours: 24
    approval:
      required: false
      approved_by: "main"
      approved_at: "2026-03-14T00:00:00Z"
      approval_note: "approved"
      secondary_approved: false

