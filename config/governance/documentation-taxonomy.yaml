      - docs/guides/data-source/**/*.md
      - docs/guides/features/**/*.md
      - docs/guides/frontend/**/*.md
      - docs/guides/hooks/**/*.md
      - docs/guides/mock-data/**/*.md
      - docs/guides/multi-cli-tasks/**/*.md
      - docs/guides/onboarding/**/*.md
      - docs/guides/openspec-cmd/**/*.md
      - docs/guides/pm2/**/*.md
      - docs/guides/quant-trading/**/*.md
      - docs/guides/superpowers/**/*.md
      - docs/guides/tdx-integration/**/*.md
      - docs/guides/templates/**/*.md
      - docs/guides/typescript/**/*.md
      - docs/guides/ui-ux-pro-max/**/*.md
      - docs/guides/web/**/*.md
      - docs/guides/wencai/**/*.md
    lifecycle: supporting
    canonical_trunk_id: docs-entrypoint
    decision_status: keep-supporting
  - id: guides-root-compatibility
    concern: guide-routing
    match_paths:
      - docs/guides/*.md
    exclude_paths:
      - docs/guides/README.md
      - docs/guides/INDEX.md
    lifecycle: supporting
    canonical_trunk_id: docs-entrypoint
    decision_status: keep-supporting
  - id: openspec-conventions-guide
    concern: openspec-governance
    match_paths:
      - openspec/OPENSPEC_CONVENTIONS.md
    lifecycle: supporting
    canonical_trunk_id: documentation-governance-trunk
