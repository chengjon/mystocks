# Prometheus 配置文件
# 用于抓取 MyStocks FastAPI 后端的监控指标

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

  # 外部标签
  external_labels:
    cluster: 'mystocks-monitoring'
    environment: 'production'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# 告警规则文件
rule_files:
  - '/etc/prometheus/rules/*.yml'

# 抓取配置
scrape_configs:
  # ==================== MyStocks FastAPI 后端 ====================
  # 注意: 根据Docker环境选择正确的target:
  #   - Docker Desktop/Mac/Windows: 使用 host.docker.internal:8020
  #   - Linux Docker: 通过 compose extra_hosts 映射 host.docker.internal -> host-gateway
  - job_name: 'mystocks-backend'
    static_configs:
      - targets:
          - 'host.docker.internal:8020'
        labels:
          service: 'mystocks-api'
          component: 'backend'

    metrics_path: '/metrics'
    scrape_interval: 15s

    # 健康检查端点
    params:
      format: ['prometheus']

  # 历史上的 /health 与 /api/*/health 端点返回 JSON，不是 Prometheus exposition。
  # 这些 job 会在 targets 页长期呈现为 parse-error/down，因此当前配置只保留
  # 实际可抓取的 metrics 端点；若后续需要 HTTP 健康探测，应接入 blackbox exporter。

  # ==================== 数据源监控指标 ====================
  # 监控 DataSourceManager V2 的数据源调用和健康状态
  - job_name: 'mystocks-data-sources'
    static_configs:
      - targets:
          - 'host.docker.internal:8001'
        labels:
          service: 'mystocks-data-sources'
          component: 'data-source-manager'

    metrics_path: '/metrics'
    scrape_interval: 30s

  # ==================== Prometheus 自身监控 ====================
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          service: 'prometheus'

  # ==================== Node Exporter (系统指标) ====================
  - job_name: 'node'
    static_configs:
      - targets:
          - 'node_exporter:9100'
        labels:
          service: 'node-exporter'

  # ==================== Tempo Metrics (服务依赖图和RED指标) ====================
  # 从 Tempo metrics generator 获取服务依赖图和 RED 方法指标
  - job_name: 'tempo-metrics'
    static_configs:
      - targets:
          - 'tempo:3200'
        labels:
          service: 'tempo-metrics'
          component: 'tracing'

    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 15s

    # 只抓取 Tempo 生成的指标，排除 Tempo 自身指标
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'traces_.*|tempo_.*'
        action: keep
