groups:
- name: datasource_alerts
  rules:
  # 1. Success Rate < 95%
  - alert: DataSourceSuccessRateLow
    expr: |
      (
        sum(rate(datasource_api_calls_total{status="success"}[5m])) by (endpoint)
        /
        clamp_min(sum(rate(datasource_api_calls_total[5m])) by (endpoint), 1e-9)
      ) < 0.95
    for: 2m
    labels:
      severity: warning
      service: datasource-monitoring
    annotations:
      summary: "Low success rate for data source {{ $labels.endpoint }}"
      description: "Data source {{ $labels.endpoint }} success rate is below 95% for more than 2 minutes."

  # 2. P95 Latency > 500ms
  - alert: DataSourceHighLatency
    expr: |
      histogram_quantile(0.95, sum(rate(datasource_api_latency_seconds_bucket[5m])) by (le, endpoint)) > 0.5
    for: 5m
    labels:
      severity: warning
      service: datasource-monitoring
    annotations:
      summary: "High latency for data source {{ $labels.endpoint }}"
      description: "Data source {{ $labels.endpoint }} P95 latency is above 500ms for more than 5 minutes."

  # 3. Circuit Breaker OPEN
  - alert: DataSourceCircuitBreakerOpen
    expr: datasource_circuit_breaker_state == 1
    for: 1m
    labels:
      severity: critical
      service: datasource-monitoring
    annotations:
      summary: "Circuit breaker OPEN for {{ $labels.endpoint }}"
      description: "Circuit breaker for {{ $labels.endpoint }} is in OPEN state, rejecting all requests."

  # 4. Cache Hit Rate < 50%
  - alert: DataSourceLowCacheHitRate
    expr: |
      (
        sum(rate(datasource_cache_hits_total[10m])) by (endpoint)
        /
        clamp_min(
          sum(rate(datasource_cache_hits_total[10m])) by (endpoint)
          + sum(rate(datasource_cache_misses_total[10m])) by (endpoint),
          1e-9
        )
      ) < 0.5
    for: 15m
    labels:
      severity: warning
      service: datasource-monitoring
    annotations:
      summary: "Low cache hit rate for {{ $labels.endpoint }}"
      description: "Cache hit rate for {{ $labels.endpoint }} is below 50% for 15 minutes."
