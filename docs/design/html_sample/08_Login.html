<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - MyStocks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 登录卡片 */
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 400px;
        }

        /* Logo区域 */
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 48px; margin-bottom: 10px; }
        .app-name { font-size: 24px; font-weight: bold; color: #333; }
        .app-slogan { font-size: 14px; color: #666; margin-top: 5px; }

        /* 表单 */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 记住我 & 忘记密码 */
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .checkbox-label { display: flex; align-items: center; font-size: 14px; color: #666; cursor: pointer; }
        .checkbox-label input { margin-right: 6px; }
        .forgot-link { font-size: 14px; color: #667eea; text-decoration: none; }
        .forgot-link:hover { text-decoration: underline; }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .login-btn:active { transform: translateY(0); }

        /* 分隔线 */
        .divider { text-align: center; margin: 24px 0; position: relative; }
        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #ddd;
        }
        .divider-text {
            background: white;
            padding: 0 16px;
            position: relative;
            font-size: 14px;
            color: #999;
        }

        /* 社交登录 */
        .social-login { display: flex; justify-content: center; gap: 16px; }
        .social-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid #ddd;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .social-btn:hover { background: #f5f5f5; border-color: #667eea; }

        /* API标签 */
        .api-tag { display: inline-block; background: #67C23A; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Logo区域 -->
        <div class="logo-area">
            <div class="logo">📈</div>
            <div class="app-name">MyStocks</div>
            <div class="app-slogan">专业量化交易数据管理系统</div>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">用户名或邮箱</label>
                <input type="text" class="form-input" id="username" placeholder="请输入用户名或邮箱" required>
            </div>

            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
            </div>

            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe">
                    <span>记住我</span>
                </label>
                <a href="#" class="forgot-link">忘记密码?</a>
            </div>

            <button type="submit" class="login-btn">登录</button>
        </form>

        <!-- 分隔线 -->
        <div class="divider">
            <span class="divider-text">或使用以下方式登录</span>
        </div>

        <!-- 社交登录 -->
        <div class="social-login">
            <button class="social-btn" title="微信登录">💬</button>
            <button class="social-btn" title="QQ登录">🐧</button>
            <button class="social-btn" title="GitHub登录">🐙</button>
        </div>

        <!-- 注册提示 -->
        <div style="text-align: center; margin-top: 24px; font-size: 14px; color: #666;">
            还没有账号? <a href="#" style="color: #667eea; text-decoration: none;">立即注册</a>
        </div>

        <!-- API说明 -->
        <div style="text-align: center; margin-top: 20px; font-size: 12px; color: #999;">
            <span class="api-tag">POST /api/auth/login</span>
        </div>
    </div>

    <script>
        // API调用示例
        console.log('=== Login API调用示例 ===');

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberMeCheckbox = document.getElementById('rememberMe');

        // 1. 用户登录
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const rememberMe = rememberMeCheckbox.checked;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        remember_me: rememberMe
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    console.log('登录成功:', data);

                    // 保存JWT token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // 保存用户名（如果勾选了记住我）
                    if (rememberMe) {
                        localStorage.setItem('rememberedUsername', username);
                    } else {
                        localStorage.removeItem('rememberedUsername');
                    }

                    // 跳转到首页
                    window.location.href = '/dashboard';
                } else {
                    console.error('登录失败:', data);
                    alert(data.message || '登录失败，请检查用户名和密码');
                }
            } catch (error) {
                console.error('登录请求失败:', error);
                alert('登录失败，请稍后重试');
            }
        });

        // 2. 微信登录
        async function loginWithWechat() {
            // 跳转到微信授权页面
            window.location.href = '/api/auth/wechat';
        }

        // 3. 刷新Token
        async function refreshToken() {
            const currentToken = localStorage.getItem('token');
            if (!currentToken) return;

            try {
                const response = await fetch('/api/auth/refresh', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    console.log('Token刷新成功');
                }
            } catch (error) {
                console.error('Token刷新失败:', error);
                // 跳转到登录页
                window.location.href = '/login';
            }
        }

        // 4. 登出
        async function logout() {
            try {
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
            } catch (error) {
                console.error('登出请求失败:', error);
            } finally {
                // 清除本地存储
                localStorage.removeItem('token');
                localStorage.removeItem('user');

                // 跳转到登录页
                window.location.href = '/login';
            }
        }

        // 页面加载时检查是否有记住的用户名
        window.addEventListener('DOMContentLoaded', () => {
            const rememberedUsername = localStorage.getItem('rememberedUsername');
            if (rememberedUsername) {
                usernameInput.value = rememberedUsername;
                rememberMeCheckbox.checked = true;
            }
        });
    </script>
</body>
</html>
