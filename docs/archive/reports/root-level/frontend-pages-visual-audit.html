<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>前端页面审计报告（简化版）</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #334155;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --gray: #6b7280;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .container { max-width: 1800px; margin: 0 auto; padding: 16px 20px 32px; }
    h1 { margin: 0 0 8px; font-size: 26px; }
    .subtitle { color: var(--muted); margin-bottom: 14px; font-size: 13px; }
    .stats { display: grid; grid-template-columns: repeat(5, minmax(140px, 1fr)); gap: 10px; margin-bottom: 12px; }
    .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
    .stat .label { color: var(--muted); font-size: 12px; }
    .stat .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .controls { display: grid; grid-template-columns: 1.5fr repeat(4, minmax(140px, 0.6fr)); gap: 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 14px; }
    input, select { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; background: var(--panel-2); color: var(--text); }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; }
    .card:hover { border-color: var(--blue); transform: translateY(-1px); }
    .card h3 { margin: 0 0 8px; font-size: 16px; }
    .desc { margin: 0 0 10px; color: var(--muted); font-size: 13px; min-height: 34px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--text); }
    .status-connected { background: rgba(34,197,94,.18); border-color: rgba(34,197,94,.45); color: #86efac; }
    .status-unconnected { background: rgba(245,158,11,.18); border-color: rgba(245,158,11,.45); color: #fcd34d; }
    .health-clean { background: rgba(34,197,94,.18); border-color: rgba(34,197,94,.45); color: #86efac; }
    .health-warning { background: rgba(245,158,11,.18); border-color: rgba(245,158,11,.45); color: #fcd34d; }
    .health-error { background: rgba(239,68,68,.18); border-color: rgba(239,68,68,.45); color: #fca5a5; }
    .quality-high { background: rgba(59,130,246,.18); border-color: rgba(59,130,246,.45); color: #93c5fd; }
    .quality-medium { background: rgba(107,114,128,.2); border-color: rgba(107,114,128,.45); color: #d1d5db; }
    .metrics { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .advice { font-size: 12px; color: #cbd5e1; border-top: 1px dashed var(--border); padding-top: 8px; }
    .empty { color: var(--muted); text-align: center; padding: 24px; }

    .modal { position: fixed; inset: 0; background: rgba(2,6,23,.75); display: none; align-items: center; justify-content: center; padding: 18px; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-content { width: min(860px, 96vw); background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .modal-head { display: flex; justify-content: space-between; align-items: start; gap: 10px; margin-bottom: 10px; }
    .modal-head h2 { margin: 0; font-size: 20px; }
    .close-btn { border: 1px solid var(--border); background: var(--panel-2); color: var(--text); border-radius: 8px; padding: 6px 10px; cursor: pointer; }
    .detail-grid { display: grid; grid-template-columns: 120px 1fr; gap: 8px 10px; font-size: 13px; }
    .detail-grid .k { color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>前端页面审计报告（简化版）</h1>
      <div class="subtitle" id="subtitle"></div>
      <div class="stats" id="stats"></div>
      <div class="controls">
        <input type="text" id="search" placeholder="搜索页面名称 / 描述 / 路径..." />
        <select id="filterDomain"><option value="all">全部功能域</option></select>
        <select id="filterStatus"><option value="all">全部状态</option><option value="connected">已接入</option><option value="unconnected">未接入</option></select>
        <select id="sortBy"><option value="name">按名称排序</option><option value="lines_desc">按行数(高→低)</option><option value="lines_asc">按行数(低→高)</option></select>
        <select id="filterHealth"><option value="all">全部健康</option><option value="clean">clean</option><option value="warning">warning</option><option value="error">error</option></select>
      </div>
    </header>

    <main id="cards" class="cards"></main>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-head">
        <h2 id="m-name">详情</h2>
        <button id="closeModal" class="close-btn" type="button">关闭</button>
      </div>
      <div class="detail-grid" id="modalBody"></div>
    </div>
  </div>

    const SUMMARY = {"total":252,"connected":35,"unconnected":217,"errors":23,"warnings":3};

    const state = { search: '', domain: 'all', status: 'all', health: 'all', sortBy: 'name' };

    const el = {
      subtitle: document.getElementById('subtitle'),
      stats: document.getElementById('stats'),
      cards: document.getElementById('cards'),
      search: document.getElementById('search'),
      filterDomain: document.getElementById('filterDomain'),
      filterStatus: document.getElementById('filterStatus'),
      filterHealth: document.getElementById('filterHealth'),
      sortBy: document.getElementById('sortBy'),
      modal: document.getElementById('modal'),
      modalBody: document.getElementById('modalBody'),
      mName: document.getElementById('m-name'),
      closeModal: document.getElementById('closeModal'),
    };

    function esc(v) {
      return String(v ?? '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
    }

    function buildDomainOptions() {
      const domains = Array.from(new Set(DATA.map(x => x.domain))).sort((a, b) => a.localeCompare(b, 'zh-CN'));
      const options = ['<option value="all">全部功能域</option>'];
      for (const d of domains) options.push(`<option value="${esc(d)}">${esc(d)}</option>`);
      el.filterDomain.innerHTML = options.join('');
    }

    function filteredData() {
      const q = state.search.trim().toLowerCase();
      let list = DATA.filter(item => {
        if (state.domain !== 'all' && item.domain !== state.domain) return false;
        if (state.status !== 'all' && item.status !== state.status) return false;
        if (state.health !== 'all' && item.health !== state.health) return false;
        if (!q) return true;
        const text = `${item.name} ${item.desc} ${item.path}`.toLowerCase();
        return text.includes(q);
      });

      if (state.sortBy === 'name') list.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
      if (state.sortBy === 'lines_desc') list.sort((a, b) => b.lines - a.lines);
      if (state.sortBy === 'lines_asc') list.sort((a, b) => a.lines - b.lines);

      return list;
    }

    function renderStats(viewCount) {
      const stats = [
        ['总页面数', SUMMARY.total],
        ['已接入', SUMMARY.connected],
        ['未接入', SUMMARY.unconnected],
        ['错误页', SUMMARY.errors],
        ['当前显示', viewCount],
      ];
      el.stats.innerHTML = stats.map(([k,v]) => `<div class="stat"><div class="label">${k}</div><div class="value">${v}</div></div>`).join('');
    }

    function cardHTML(item) {
      return `
        <article class="card" data-id="${item.id}">
          <h3>${esc(item.name)}</h3>
          <p class="desc">${esc(item.desc)}</p>
          <div class="tags">
            <span class="tag status-${esc(item.status)}">${item.status === 'connected' ? '已接入' : '未接入'}</span>
            <span class="tag health-${esc(item.health)}">${esc(item.health)}</span>
            <span class="tag quality-${esc(item.quality)}">${esc(item.quality)}</span>
            <span class="tag">${esc(item.domain)}</span>
          </div>
          <div class="metrics">
            <span>行数: ${item.lines}</span>
            <span>错误: ${item.errors}</span>
          </div>
          <div class="advice">建议: ${esc(item.advice)}</div>
        </article>
      `;
    }

    function render() {
      const list = filteredData();
      renderStats(list.length);
      el.cards.innerHTML = list.length ? list.map(cardHTML).join('') : '<div class="empty">没有匹配结果</div>';
    }

    function openModal(item) {
      el.mName.textContent = item.name;
      el.modalBody.innerHTML = `
        <div class="k">描述</div><div>${esc(item.desc)}</div>
        <div class="k">状态</div><div>${esc(item.status)}</div>
        <div class="k">健康</div><div>${esc(item.health)}</div>
        <div class="k">质量</div><div>${esc(item.quality)}</div>
        <div class="k">功能域</div><div>${esc(item.domain)}</div>
        <div class="k">组件类型</div><div>${esc(item.type)}</div>
        <div class="k">目录</div><div>${esc(item.directory)}</div>
        <div class="k">行数</div><div>${item.lines}</div>
        <div class="k">错误数</div><div>${item.errors}</div>
        <div class="k">建议</div><div>${esc(item.advice)}</div>
        <div class="k">路径</div><div class="mono">${esc(item.path)}</div>
      `;
      el.modal.classList.add('show');
    }

    function bindEvents() {
      el.search.addEventListener('input', (e) => { state.search = e.target.value; render(); });
      el.filterDomain.addEventListener('change', (e) => { state.domain = e.target.value; render(); });
      el.filterStatus.addEventListener('change', (e) => { state.status = e.target.value; render(); });
      el.filterHealth.addEventListener('change', (e) => { state.health = e.target.value; render(); });
      el.sortBy.addEventListener('change', (e) => { state.sortBy = e.target.value; render(); });

      el.cards.addEventListener('click', (e) => {
        const card = e.target.closest('.card');
        if (!card) return;
        const id = Number(card.dataset.id);
        const item = DATA.find(x => x.id === id);
        if (item) openModal(item);
      });

      el.closeModal.addEventListener('click', () => el.modal.classList.remove('show'));
      el.modal.addEventListener('click', (e) => { if (e.target === el.modal) el.modal.classList.remove('show'); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') el.modal.classList.remove('show'); });
    }

    function init() {
      el.subtitle.textContent = `数据时间：2026-03-02 11:57:32 ｜ 总计 ${SUMMARY.total} 个页面（数据内联，离线可用）`;
      buildDomainOptions();
      bindEvents();
      render();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
