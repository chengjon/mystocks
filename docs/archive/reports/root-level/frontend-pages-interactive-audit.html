    const state = { expandedDirs: new Set(), activeId: null };

    function groupByDir(entries) {
      const map = new Map();
      for (const e of entries) {
        const dir = e.directory || '.';
        if (!map.has(dir)) map.set(dir, []);
        map.get(dir).push(e);
      }
      return [...map.entries()].sort((a, b) => a[0].localeCompare(b[0]));
    }

    function renderTree() {
      const root = document.getElementById('tree');
      const groups = groupByDir(DATA.entries);
      root.innerHTML = '';
      for (const [dir, list] of groups) {
        const box = document.createElement('div');
        box.className = 'dir';
        const btn = document.createElement('button');
        btn.className = 'dir-btn';
        const open = state.expandedDirs.has(dir);
        btn.textContent = `${open ? '▼' : '▶'} ${dir} (${list.length})`;
        btn.onclick = () => {
          if (state.expandedDirs.has(dir)) state.expandedDirs.delete(dir);
          else state.expandedDirs.add(dir);
          renderTree();
        };
        box.appendChild(btn);

        if (open) {
          const ul = document.createElement('ul');
          ul.className = 'pages';
          for (const item of list) {
            const li = document.createElement('li');
            li.className = 'page' + (state.activeId === item.id ? ' active' : '');
            li.textContent = item.filename;
            li.title = item.relative_path;
            li.onclick = () => {
              state.activeId = item.id;
              renderTree();
              renderDetail(item);
            };
            ul.appendChild(li);
          }
          box.appendChild(ul);
        }
        root.appendChild(box);
      }
    }

    function esc(s) { return String(s ?? '').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

    function renderDetail(item) {
      const el = document.getElementById('detail');
      if (!item) {
        el.innerHTML = '<p class="muted">请选择左侧页面查看详情</p>';
        return;
      }
      const imports = (item.imports_top10 || []).map(x => `<li>${esc(x)}</li>`).join('');
      const tags = (item.tags || []).map(t => `<span class="chip">${esc(t)}</span>`).join('');
      el.innerHTML = `
        <h2>${esc(item.filename)}</h2>
        <p class="muted">${esc(item.relative_path)}</p>
        <div class="chips">${tags}</div>
        <table>
          <tr><td>id</td><td>${esc(item.id)}</td></tr>
          <tr><td>directory</td><td>${esc(item.directory)}</td></tr>
          <tr><td>functional_domain</td><td>${esc(item.functional_domain)}</td></tr>
          <tr><td>status</td><td>${esc(item.status)}</td></tr>
          <tr><td>quality_tier</td><td>${esc(item.quality_tier)}</td></tr>
          <tr><td>health</td><td>${esc(item.health)}</td></tr>
          <tr><td>line_count</td><td>${esc(item.line_count)}</td></tr>
          <tr><td>diagnostic_count</td><td>${esc(item.diagnostic_count)}</td></tr>
          <tr><td>description</td><td>${esc(item.description)}</td></tr>
        </table>
        <h3>imports_top10</h3>
        <ul>${imports || '<li class="muted">(none)</li>'}</ul>
        <h3>code_snippet</h3>
        <pre>${esc(item.code_snippet || '')}</pre>
      `;
    }

    function init() {
      const count = DATA.entries.length;
      document.getElementById('count').textContent = `Loaded ${count} pages`;
      console.log(`Loaded ${count} pages`);

      const dirs = [...new Set(DATA.entries.map(e => e.directory || '.'))].sort((a,b)=>a.localeCompare(b));
      if (dirs.length > 0) state.expandedDirs.add(dirs[0]);

      renderTree();

      if (dirs.length > 0) {
        const firstDir = dirs[0];
        const firstItem = DATA.entries.find(e => (e.directory || '.') === firstDir);
        if (firstItem) {
          state.activeId = firstItem.id;
          renderTree();
          renderDetail(firstItem);
        }
      }
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
