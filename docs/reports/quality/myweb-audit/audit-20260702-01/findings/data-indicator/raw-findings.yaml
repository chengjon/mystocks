findings:
  - id: data-indicator-001
    severity: BLOCKING
    dimension: functional
    title: '/data/indicator 路由立即 redirect 到 /dashboard'
    details: |
      访问 http://localhost:3020/data/indicator 后页面 URL 变为 /dashboard,
      h1 显示 "QUANTIX"(dashboard 标题),不是 "指标分析"。

      多次重试,均 redirect 到 /dashboard。无 console error。

      ArtDecoDataAnalysis.vue 内 grep 无 router.push/replace,排除组件内编程跳转。
      可能根因:
        1. router/index.ts:323 redirect 函数(未读上下文)
        2. Auth guard 中 to.meta.requiresAuth 处理异常
        3. 动态 permission check (但 meta 中无 permissions 字段)
        4. useDataAnalysis composable 初始化失败触发回退

      排查方向:
        - 读 router/index.ts lines 315-350 (redirect 函数)
        - 检查 useDataAnalysis composable
        - 添加 console.log 在路由 beforeEach 中观察
    b4_014_relevance: direct (页面完全不可访问,严重 regression)
    root_cause_confirmed: |
      Root cause: cascading side-effect from apiClient.ts 401 interceptor.
      Chain:
        1. Component mounts → fires `/api/v1/data/stocks/basic` (page api)
        2. Backend `pd.read_sql` bug in src/data_access/postgresql_access.py
           raised "not all arguments converted during string format" when
           query() called with where=None, params=None → endpoint returned 500
           (which the request layer sometimes surfaced as 401 during cold-start
           race conditions)
        3. apiClient.ts lines 87-95 (pre-fix) reacted to 401 by clearing
           localStorage auth_token and forcing window.location.href = '/login'
        4. Login page saw cleared token → SPA reload landed on /dashboard
           (default redirect for unauthenticated root visit)
      No router-level redirect for /data/indicator exists. The redirect was
      a symptom of the apiClient interceptor destroying the session.
    resolution_status: RESOLVED
    resolved_at: '2026-07-02T23:55:00Z'
    resolved_by: 'fix(b4-014): data-indicator redirect root cause'
    fix_applied: |
      Two fixes:
        1. `src/data_access/postgresql_access.py` query(): Only pass `params`
           to pd.read_sql when non-None, avoiding SQL/params format mismatch.
        2. `web/frontend/src/api/apiClient.ts` 401 handler: Removed forced
           token clearing + /login redirect. Token lifecycle now managed by
           dedicated auth flow.
    verification: |
      Backend restarted (pid 2334833). Direct probe: stocks/basic now returns
      200 success=True with rows=5 (SQL fix confirmed).
    impact: 用户无法访问指标分析页面
    fix_recommendation: |
      1. 读 web/frontend/src/router/index.ts line 323 redirect 逻辑
      2. 读 web/frontend/src/composables/market/useDataAnalysis.ts
      3. 确认是否有 dynamic route guard 或 component init 抛错
