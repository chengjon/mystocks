      - H1 + H3 层级正确
      - 表格无数据时显示 "暂无数据" 段落,a11y 友好
      - 榜单切换按钮 (买入榜/卖出榜/机构榜) 有文本标签
      - combobox 可聚焦
    warnings:
      - 4 个状态卡均 "+0%" 同 market-technical 问题 (变化指标无 aria-label 区分)
      - 空表区域未使用 role="status" 或 aria-live,SR 用户不会感知加载完成
findings:
  - id: market-lhb-001
    severity: blocking
    dimension: functional-audit
    title: 前端调 /api/v2/market/lhb 但后端只提供 v1,页面永远 empty
    description: |
      前端 LHB.vue 请求 /api/v2/market/lhb?limit=100,后端 500;
      后端 /api/v1/market/lhb?limit=100 200 OK 返真实数据 (603903 中持股份等)。
      router meta.api 声明的是 v1,但前端代码用 v2,失配。
      B4.014 未改动 LHB.vue,但这是 baseline 失效,影响 market 模块整体观感。
    recommendation:
      primary: 前端 LHB.vue 改用 /api/v1/market/lhb (与 router meta.api 一致)
      alternative: 后端补 v2 路由或修 v2 500
    fix_complexity: low
    b4_014_relevance: 边缘 (B4.014 未改 LHB,但同属 market module)
    resolution_status: RESOLVED
    resolved_at: '2026-07-02T21:18:00Z'
    resolved_by: 'af29d15d6 (B4.014-M1p: myweb-audit market-batch-01 frontend fixes)'
    fix_applied: |
      LHB.vue bypassed useArtDecoApi.exec() (which expected UnifiedResponse.success
      envelope and returned null for bare-array /v1 response), switched to direct
      apiClient.get('/v1/market/lhb') with payload extraction.
    verification: |
      Browser smoke (2026-07-02): /market/lhb renders 44 real rows
      (山子高科 000981, 利欧股份 002131, 金风科技 002202, 航天电子 600879, etc.)
  - id: market-lhb-002
    severity: high
    dimension: data-state-audit
    title: 前端吞 500 错误降级为 empty,无任何错误提示
    description: |
      后端返 500 时,前端不显示错误状态,直接渲染 empty (暂无数据)。
      用户无法区分 "真的没数据" vs "API 挂了"。
    recommendation: 加 try/catch + error 状态 UI,显示 "加载失败,请重试"
    fix_complexity: medium
    resolution_status: RESOLVED
    resolved_at: '2026-07-03T03:00:00Z'
    resolved_by: 'fix(b4-014): LHB shows error banner on fetch failure'
    fix_applied: |
      LHB.vue: Added `fetchErrorMessage` ref. Catch branch now extracts HTTP
      status and surfaces a user-visible error banner (401 vs generic). Added
      `<div class="lhb-error-banner" role="alert">` below ArtDecoTable with
      ArtDecoIcon + scoped styles. Banner clears on successful refetch.
  - id: market-lhb-003
    severity: low
    dimension: responsive-a11y-audit
    title: 状态卡 +0% 无 aria-label 区分 (与 market-technical 同款问题)
    description: 4 个状态卡都显示 "变化: +0%",SR 读出 "+0%" 四次,无法区分
    recommendation: 加 aria-label
    fix_complexity: low
