  functional-audit:
    verdict: fail
    blocking_findings:
      - id: market-lhb-001
        severity: blocking
        title: 前端调 /api/v2/market/lhb 但后端只有 v1 → 页面空数据
        description: |
          前端 LHB.vue 通过 /api/v2/market/lhb?limit=100 拉取数据,后端 500(实际 v2 路由存在但内部错误);
          后端 /api/v1/market/lhb?limit=100 200 OK 返真实数据(603903 中持股份等)。
          前端面板显示"暂无数据"/"暂无上榜",所有状态卡 +0%(因为前端没拿到数据)。
          这是 B4.014 之前就存在的失配 (B4.014 未改动 LHB.vue / lhb route),
          但属于本次 batch 的 baseline 失效。
        evidence:
          - frontend_request: GET /api/v2/market/lhb?limit=100
          - frontend_status: 500 Internal Server Error
          - backend_v1: GET /api/v1/market/lhb?limit=100 → 200 OK with real data
          - response_data_sample: |
              [{"id":531,"symbol":"603903","name":"中持股份","trade_date":"2026-01-06",
                "reason":"普通席位卖出，成功率28.80%","buy_amount":23813707.4,
                "sell_amount":43890122.53,"net_amount":-20076415.13,
                "turnover_rate":8.707,"institution_buy":null,"institution_sell":null}]
        recommendation: 改前端 LHB.vue 调 /api/v1/market/lhb (与 router meta.api 一致),或后端补 v2 路由
        fix_complexity: low
    interactions:
      - name: "刷新榜单" 按钮
        expected: 重新 fetch
        actual: 按钮 enabled,但因路由错位,刷新仍 500 → 仍空
