                  example: "已查看VaR指标，已采取减仓措施"
                action_taken:
                  type: string
                  maxLength: 200
                  description: 采取的行动
                  example: "减仓20%，设置更严格的止损"
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  alert_id:
                    type: integer
                    example: 123
                  status:
                    type: string
                    example: "acknowledged"
                  acknowledged_by:
                    type: string
                    example: "user123"
                  acknowledged_at:
                    type: string
                    format: date-time
                    example: "2024-01-01T10:15:00Z"
                  notes:
                    type: string
                    example: "已查看VaR指标，已采取减仓措施"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v31/health:
    get:
      summary: 风险管理系统健康检查
      description: |
        检查风险管理系统的整体健康状态
        
        **权限**: 无需认证
        **监控**: 系统状态、服务可用性、性能指标
        **诊断**: 自动检测和报告问题
      responses:
        '200':
          description: 系统健康
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, unhealthy]
                    example: "healthy"
                  uptime:
                    type: string
                    example: "7d 4h 23m"
                  version:
                    type: string
                    example: "3.1.0"
                  services:
                    type: object
                    properties:
                      database:
                        type: string
                        enum: [up, down, degraded]
                        example: "up"
                      gpu_acceleration:
                        type: string
                        enum: [up, down, degraded]
                        example: "up"
                      notification_system:
                        type: string
                        enum: [up, down, degraded]
                        example: "up"
                      websocket_service:
                        type: string
                        enum: [up, down, degraded]
                        example: "up"
                  metrics:
                    type: object
                    properties:
                      active_alerts:
                        type: integer
                        example: 5
                      active_stop_loss_positions:
                        type: integer
                        example: 23
                      active_risk_rules:
                        type: integer
                        example: 18
                      avg_response_time:
                        type: number
                        example: 45.2
                  last_updated:
                    type: string
                    format: date-time
                    example: "2024-01-01T10:00:00Z"
        '503':
          description: 系统不健康
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "unhealthy"
                  issues:
                    type: array
                    items:
                      type: string
                    example: [
                      "Database connection failed",
                      "GPU service unavailable"
                    ]
                  timestamp:
                    type: string
                    format: date-time

  /v31/ws/risk-updates:
    get:
      summary: WebSocket风险实时更新
      description: |
        建立WebSocket连接，接收实时风险指标更新
        
        **协议**: WebSocket
        **认证**: 通过URL参数或初始消息
        **主题**: 支持订阅不同类型的风险更新
      parameters:
        - name: topics
          in: query
          schema:
            type: string
            default: "portfolio_risk,stock_risk,alerts"
          description: 订阅主题，逗号分隔
      responses:
        '101':
          description: WebSocket连接建立成功
          content:
            text/plain:
              schema:
                type: string
                example: "WebSocket connection established"

  /v31/ws/broadcast/{topic}:
    post:
      summary: 广播风险更新
      description: |
        向所有订阅指定主题的WebSocket客户端广播风险更新
        
        **权限**: 需要管理员权限
        **实时**: 即时推送给所有连接的客户端
        **主题**: portfolio_risk, stock_risk, alerts等
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
          description: 广播主题
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: object
                  additionalProperties: true
                  example: {
                    "type": "risk_alert",
                    "symbol": "600519",
                    "alert": {
                      "type": "var_threshold",
                      "severity": "high",
                      "message": "VaR超过阈值"
                    }
                  }
                priority:
                  type: string
                  enum: [low, normal, high, urgent]
                  default: "normal"
                  description: 消息优先级
      responses:
        '200':
          description: 广播成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  topic:
                    type: string
                    example: "alerts"
                  recipients:
                    type: integer
                    example: 15
                  message_id:
                    type: string
                    example: "msg_123456"
                  broadcast_at:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v31/ws/connections:
    get:
      summary: 获取WebSocket连接状态
      description: |
        获取当前活跃的WebSocket连接统计信息
        
        **权限**: 需要管理员权限
        **监控**: 连接数量、主题订阅、性能指标
        **诊断**: 连接健康状态和潜在问题
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_connections:
                    type: integer
                    example: 45
                  connections_by_topic:
                    type: object
                    additionalProperties:
                      type: integer
                    example: {
                      "portfolio_risk": 12,
                      "stock_risk": 25,
                      "alerts": 8
                    }
                  uptime_stats:
                    type: object
                    properties:
                      avg_connection_time:
                        type: string
                        example: "2h 15m"
                      max_connection_time:
                        type: string
                        example: "8h 30m"
                      total_messages_sent:
                        type: integer
                        example: 15420
                  health_status:
                    type: string
                    enum: [healthy, warning, critical]
                    example: "healthy"
                  last_updated:
                    type: string
                    format: date-time
                    example: "2024-01-01T10:00:00Z"
        '500':
          $ref: '#/components/responses/InternalServerError'