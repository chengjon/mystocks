openapi: 3.1.0
info:
  title: MyStocks Web API
  description: '

    # MyStocks 量化交易数据管理系统 Web API


    MyStocks是一个专业的量化交易数据管理系统，提供全面的股票市场数据获取、分析和管理功能。


    ## 主要功能模块


    ### 📊 市场数据 (Market Data)

    - 实时行情数据获取

    - 历史K线数据查询

    - 资金流向分析

    - ETF数据分析

    - 筹码分布数据


    ### 💾 缓存管理 (Cache Management)

    - TDengine时序数据库缓存

    - 缓存统计和监控

    - 缓存淘汰策略

    - 缓存预热功能


    ### 📈 技术指标 (Technical Indicators)

    - 常用技术指标计算

    - 自定义指标支持

    - 实时指标推送


    ### 🤖 机器学习 (Machine Learning)

    - 股票预测模型

    - 特征工程

    - 模型训练和评估


    ### 📋 策略管理 (Strategy Management)

    - 策略创建和配置

    - 回测系统

    - 风险管理


    ### 🔔 实时推送 (Real-time Push)

    - WebSocket实时数据推送

    - SSE (Server-Sent Events) 流式推送

    - 告警通知


    ### 🔐 认证授权 (Authentication)

    - JWT Token认证

    - CSRF保护

    - 权限管理


    ## 架构特点


    - **双数据库架构**: TDengine (时序数据) + PostgreSQL (关系数据)

    - **统一响应格式**: 所有API遵循标准化响应结构

    - **完整监控体系**: 性能监控、数据质量监控、告警系统

    - **配置驱动**: YAML配置驱动的表管理和自动化


    ## 技术栈


    - **后端框架**: FastAPI 0.104+ (Python 3.9+)

    - **数据库**: TDengine 3.x, PostgreSQL 15+

    - **缓存**: TDengine 时序缓存

    - **异步**: asyncio, httpx

    - **数据验证**: Pydantic v2

    - **日志**: structlog


    ## 联系方式


    - 项目文档: `/api/docs` (Swagger UI)

    - 备用文档: `/api/redoc` (ReDoc)

    - 健康检查: `/health`


    ---


    **Version**: 2.0.0

    **Last Updated**: 2025-11-06

    **Environment**: Production

    '
  version: 2.0.0
