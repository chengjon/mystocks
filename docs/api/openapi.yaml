openapi: 3.0.3
info:
  title: MyStocks API
  version: 2.1.0
  description: |
    MyStocks 专业量化交易平台 API 规范。
    包含核心行情数据、技术分析、V3.1 风险管理系统及 Phase 2 信号监控模块。
  contact:
    name: 架构组
    email: arch@mystocks.com
servers:
  - url: http://localhost:8000
    description: 本地开发服务器

tags:
  - name: Auth
    description: 用户认证与权限管理
  - name: MarketData
    description: 核心行情与基础数据
  - name: RiskManagement
    description: V3.1 全球风险管理系统 (VaR, 止损, 预警)
  - name: SignalMonitoring
    description: Phase 2 信号记录与执行追踪
  - name: Technical
    description: 技术指标计算 (V2 引擎)

paths:
  # --- 认证模块 ---
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  # --- 行情模块 ---
  /api/data/stocks/basic:
    get:
      tags: [MarketData]
      summary: 获取股票列表
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: industry
          in: query
          schema: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockListResponse'

  /api/data/stocks/kline:
    get:
      tags: [MarketData]
      summary: 获取K线数据
      parameters:
        - name: symbol
          in: query
          required: true
          schema: { type: string }
        - name: period
          in: query
          schema: { type: string, enum: [1m, 5m, 15m, 1d] }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KlineResponse'

  # --- 风险管理模块 (V3.1) ---
  /api/v1/risk/overview:
    get:
      tags: [RiskManagement]
      summary: 获取全局风险概览
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 返回五维雷达分及 VaR 指标
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskOverviewResponse'

  /api/v31/stop-loss/overview:
    get:
      tags: [RiskManagement]
      summary: 止损执行概览
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StopLossOverview'

  # --- 信号监控模块 (Phase 2) ---
  /api/signals/statistics:
    get:
      tags: [SignalMonitoring]
      summary: 获取小时级信号统计
      parameters:
        - name: strategy_id
          in: query
          schema: { type: string }
        - name: hours
          in: query
          schema: { type: integer, default: 24 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalStatsList'

  /api/signals/active:
    get:
      tags: [SignalMonitoring]
      summary: 获取当前活跃信号
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveSignalsResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # --- 基础响应 ---
    UnifiedResponse:
      type: object
      properties:
        code: { type: integer, example: 200 }
        message: { type: string, example: "success" }
        data: { type: object }

    # --- 认证模型 ---
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string, example: "bearer" }

    # --- 行情模型 ---
    StockListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              symbol: { type: string }
              name: { type: string }
              price: { type: number }

    KlineResponse:
      type: object
      properties:
        symbol: { type: string }
        data:
          type: array
          items:
            type: object
            properties:
              t: { type: integer, description: "Timestamp" }
              o: { type: number, description: "Open" }
              c: { type: number, description: "Close" }
              v: { type: number, description: "Volume" }

    # --- 风险模型 (V3.1) ---
    RiskOverviewResponse:
      type: object
      properties:
        health_score: { type: number, example: 85.5 }
        var_95: { type: number, description: "95% VaR" }
        radar_scores:
          type: object
          properties:
            trend: { type: integer }
            volatility: { type: integer }
            liquidity: { type: integer }
            sentiment: { type: integer }
            leverage: { type: integer }

    StopLossOverview:
      type: object
      properties:
        active_protections: { type: integer }
        protected_capital: { type: number }
        win_rate: { type: number }

    # --- 信号模型 (Phase 2) ---
    SignalStatsList:
      type: array
      items:
        type: object
        properties:
          hour: { type: string, format: "date-time" }
          signal_count: { type: integer }
          success_rate: { type: number }
          avg_profit: { type: number }

    ActiveSignalsResponse:
      type: object
      properties:
        count: { type: integer }
        signals:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              symbol: { type: string }
              side: { type: string, enum: [BUY, SELL] }
              price: { type: number }
              timestamp: { type: string, format: "date-time" }
