version: '3.8'

services:
  # TDengine - 时序数据库
  tdengine:
    image: tdengine/tdengine:3.0.4.0
    ports:
      - "6030:6030"
    environment:
      TZ: "Asia/Shanghai"
    volumes:
      - tdengine_data:/var/lib/taos
    restart: unless-stopped

  # PostgreSQL - 关系型数据库
  postgresql:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your-postgresql-password
      POSTGRES_DB: mystocks
      TZ: "Asia/Shanghai"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8020}:${BACKEND_PORT:-8020}"
    environment:
      ENVIRONMENT: development
      DEBUG: False
      BACKEND_PORT: "${BACKEND_PORT:-8020}"
      POSTGRESQL_HOST: postgresql
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USER: postgres
      POSTGRESQL_PASSWORD: your-postgresql-password
      POSTGRESQL_DATABASE: mystocks
      TDENGINE_HOST: tdengine
      TDENGINE_PORT: 6030
      TDENGINE_USER: root
      TDENGINE_PASSWORD: taosdata
      TDENGINE_DATABASE: market_data
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8020}
    volumes:
      - ./backend:/app
    depends_on:
      - tdengine
      - postgresql
    restart: unless-stopped

  # Vue3 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-3020}:${FRONTEND_PORT:-3020}"
    environment:
      FRONTEND_PORT: "${FRONTEND_PORT:-3020}"
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8020}
      NODE_ENV: development
    command: >
      npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-3020}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  tdengine_data:
  postgres_data:
