mainline:
  id: "L1-dashboard-tdx-design-authorization"
  objective: "authorize a verification-first Dashboard/TDX lane after G2.155 selected the next high-risk service getter track"
  milestone_id: "L2-architecture-governance-continuation"
  slice_id: "L3-g2-service-lifecycle-routing"

classification:
  task_type: "cleanup"
  secondary_type: "none"
  secondary_change_budget_percent: 0
  secondary_allowed_paths: []

openspec:
  change_id: "not-required-dashboard-tdx-design-authorization"
  approval_status: "not_required"

function_tree:
  domain_id: "meta-governance"
  node_id: "meta-governance-mainline"
  affected_entrypoints:
    - "operations"
  update_status: "not-needed"
  secondary_domains: []
  exemption_reason: "Design authorization governance package; no runtime entrypoint, route, service symbol, public API surface, OpenAPI exposure, PM2 workflow, or frontend behavior is changed"

scope:
  allowed_paths:
    - ".planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md"
    - ".planning/codebase/generated/dashboard-tdx-design-authorization-2026-05-26.json"
    - "docs/reports/quality/backend-dashboard-tdx-design-authorization-2026-05-26.md"
    - "governance/mainline/task-cards/pr-309.yaml"
  forbidden_paths:
    - "web/backend/**"
    - "web/frontend/**"
    - "src/**"
    - "tests/**"
    - "docs/api/**"
    - "docs/guides/**"
    - "config/**"
    - "scripts/**"
    - "openspec/changes/**"
    - "openspec/specs/**"

acceptance:
  checks:
    - id: "parent-pr-state"
      command: "gh pr view 308 --json number,state,mergedAt,mergeCommit,url,title"
      required: true
    - id: "openspec-context"
      command: "openspec list && openspec list --specs"
      required: true
    - id: "gitnexus-impact"
      command: "GitNexus impact for get_tdx_service, _get_major_index_quotes, _get_tdx_live_market_snapshot, and prewarm_dashboard_market_overview_cache"
      required: true
    - id: "dashboard-source-shape"
      command: "classify current dashboard_data_source.py get_tdx_service textual hits as import, fallback provider, private helper definition, or private helper call"
      required: true
    - id: "markdown-governance"
      command: "python scripts/compliance/markdown_governance_gate.py --root-dir . --format json .planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md docs/reports/quality/backend-dashboard-tdx-design-authorization-2026-05-26.md"
      required: true
    - id: "json-parse"
      command: "python -m json.tool .planning/codebase/generated/dashboard-tdx-design-authorization-2026-05-26.json >/dev/null"
      required: true
    - id: "yaml-parse"
      command: "python - <<'PY'\nimport yaml\nwith open('governance/mainline/task-cards/pr-309.yaml', encoding='utf-8') as f:\n    yaml.safe_load(f)\nPY"
      required: true

non_goals:
  - "Do not edit backend source or tests in this design authorization package."
  - "Do not perform G2.157 implementation from this package."
  - "Do not edit web/backend/app/api/tdx.py or web/backend/app/services/tdx_service.py."
  - "Do not delete, privatize, or change public compatibility behavior of get_tdx_service()."
  - "Do not change route/API, OpenAPI, PM2, frontend, OpenSpec, config, scripts, or issue-label state."

risk_and_rollback:
  risks:
    - "If this package is treated as source authorization without G2.157 review, Dashboard/TDX code could be edited even though current HEAD may already have no residual direct helper getter debt."
    - "If graph impact is mistaken for direct body-call debt, fallback compatibility could be removed unnecessarily."
  rollback_plan: "revert this decision PR to remove only the design report, generated artifact, task card, and steward-tree update"

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "authorize a verification-first Dashboard/TDX follow-up lane"
    modified_scope: "steward tree, design report, generated artifact, and task card"
    dependency_changes: "none"
    legacy_logic_impact: "none; source and tests are not edited"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert this PR if parent state, GitNexus impact evidence, source-shape classification, markdown governance, JSON/YAML parsing, staged GitNexus, mainline scope, or diff checks fail"

governance:
  phase: "phase_a_pr_hard_gate"
  mainline_drift_threshold_percent: 5
  stop_rule_owner: "main"
  stop_rule_sla_hours: 24
  approval:
    required: false
    approved_by: "main"
    approved_at: "2026-05-26T22:04:45+08:00"
    approval_note: "Design authorization package after PR #308 selected Dashboard/TDX as the next high-risk service getter track."
    secondary_approved: false

