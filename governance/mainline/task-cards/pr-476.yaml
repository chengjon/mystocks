    - "The smoke script could be misread as still AkShare-only if reviewers miss the new provider-neutral environment variable"
    - "The archived OpenSpec change could be confused with a new active extraction proposal rather than closure evidence"
    - "The GitNexus index is stale relative to the current base branch, so graph impact analysis is advisory"
  rollback_plan: "Revert PR #476; PR #475 remains merged and OpenStock-owned runtime hardening remains independently managed in the OpenStock repository."

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "close the MyStocks-side OpenStock runtime boundary handoff after OpenStock-owned hardening completed"
    modified_scope: "runtime smoke script, env example, OpenSpec archive/spec updates, handoff worklog, integration smoke-script tests, and this PR task card"
    dependency_changes: "none in MyStocks; OpenStock validation is consumed through REST/WebSocket boundary smoke checks only"
    legacy_logic_impact: "legacy MyStocks data-source adapters and existing frontend/API contracts remain unchanged"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert PR #476 if provider-neutral smoke validation, OpenSpec strict validation, or mainline scope governance regresses"

governance:
