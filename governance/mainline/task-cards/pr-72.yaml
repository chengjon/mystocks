version: "v0.2"

task:
  id: "pr-72"
  title: "close tech debt governance follow-through tasks"
  owner: "main"
  created_at: "2026-04-08"

mainline:
  id: "L1-tech-debt-governance-followthrough-closeout"
  objective: "close T06/T07/T08 of the technical-debt governance board using already-landed governance evidence and keep the canonical governance records synchronized on main"
  milestone_id: "L2-governance-closeout"
  slice_id: "L3-tech-debt-governance-followthrough"

classification:
  task_type: "cleanup"
  secondary_type: "none"
  secondary_change_budget_percent: 0
  secondary_allowed_paths: []

openspec:
  change_id: "not-required"
  approval_status: "not_required"

function_tree:
  domain_id: "meta-governance"
  node_id: "meta-governance-mainline"
  affected_entrypoints:
    - "governance"
  update_status: "required"
  secondary_domains: []
  exemption_reason: "governance-closeout-docs-only"

scope:
  allowed_paths:
    - "governance/mainline/task-cards/pr-72.yaml"
    - "governance/function-tree/catalog.yaml"
    - "governance/technical-debt/DEBT_REGISTER.md"
    - "governance/technical-debt/SPEC_CONFLICT_MATRIX.md"
    - "governance/technical-debt/TASK-REPORT.md"
    - "governance/technical-debt/TASK-T06-REPORT.md"
    - "governance/technical-debt/TASK-T07-REPORT.md"
    - "governance/technical-debt/TASK-T08-REPORT.md"
    - "governance/technical-debt/TASK.md"
    - "governance/technical-debt/WEEKLY_GOVERNANCE_CADENCE.md"
    - "tests/unit/governance/test_mainline_scope_gate_function_tree.py"
  forbidden_paths:
    - ".github/workflows/**"
    - "openspec/**"
    - "scripts/**"
    - "web/frontend/**"
    - "web/backend/**"
    - "src/**"

non_goals:
  - "No runtime behavior change outside governance mapping and guardrail coverage"
  - "No new governance capability or new OpenSpec proposal"
  - "No unrelated frontend, Mongo, watchlist, or deletion-engine work"

acceptance:
  checks:
    - id: "diff-check"
      command: "git diff --check"
      required: true
    - id: "mainline-gate"
      command: "python governance/mainline/scripts/mainline_scope_gate.py --task-card governance/mainline/task-cards/pr-72.yaml --schema governance/mainline/schemas/ai-task-card.schema.json --base-sha origin/main --head-sha HEAD --report /tmp/pr72-mainline-gate.json"
      required: true

risk_and_rollback:
  risks:
    - "If the closeout status is updated without real evidence, governance truth will become overstated"
    - "If the task card omits any touched governance document, Mainline Governance Gate will fail"
  rollback_plan: "git revert <merge-commit-sha> if any closed governance item is found to lack supporting evidence after merge"

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "close the remaining technical-debt governance follow-through tasks using already-landed governance evidence and synchronize the canonical records"
    modified_scope: "the canonical technical-debt governance board, rollup, T06-T08 task reports, debt/conflict ledgers, cadence guide, and this PR-72 task card only"
    dependency_changes: "none"
    legacy_logic_impact: "no runtime or workflow behavior changes; only governance closeout state and templates are updated"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert the merge if any T06/T07/T08 closeout claim or supporting evidence path is inaccurate"

governance:
  phase: "phase_a_pr_hard_gate"
  mainline_drift_threshold_percent: 5
  stop_rule_owner: "main"
  stop_rule_sla_hours: 24
  approval:
    required: false
    approved_by: "main"
    approved_at: "2026-04-08T00:00:00Z"
    approval_note: "this PR only closes already-landed governance follow-through items and keeps canonical governance truth aligned"
    secondary_approved: false
