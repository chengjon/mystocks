      command: "pytest --no-cov -m integration web/backend/tests/test_openstock_real_integration.py"
      required: true
    - id: "route-integration"
      command: "pytest --no-cov web/backend/tests/test_openstock_market_routes_integration.py"
      required: true
    - id: "regression"
      command: "pytest --no-cov web/backend/tests/test_openstock_market_data_adapter.py web/backend/tests/test_openstock_market_routes_integration.py web/backend/tests/test_market_api.py"
      required: true
    - id: "openspec-validate-parent"
      command: "openspec validate externalize-data-source-provider-to-openstock --strict"
      required: true
    - id: "mainline-scope-gate"
      command: "python governance/mainline/scripts/mainline_scope_gate.py --task-card governance/mainline/task-cards/pr-490.yaml --base-sha 3b649352afc1823399ec01fa77e141380c28b1a1 --head-sha HEAD --report /tmp/pr490-mainline-governance-report.json"
      required: true

risk_and_rollback:
  risks:
    - "Adapter field-shape drift between OpenStock normalized fields and frontend Chinese wide-table expectations; mitigated by _transform_quote_row / _transform_kline_row mapping units with unit tests."
    - "DataSourceFactory primary/backup switch could regress existing akshare chain if factory wiring drifts; mitigated by akshare fallback retained as secondary provider."
    - "Real OpenStock integration tests depend on 192.168.123.104:8040 reachability plus OPENSTOCK_API_KEY env; tests are marked @pytest.mark.integration and skipped in offline CI."
    - "Source implementation PR; human review required before merge."
  rollback_plan: "Revert PR #490; this restores the prior akshare-direct /quotes and /kline route handlers and removes the OpenStockMarketDataSourceAdapter registration from DataSourceFactory."

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "Migrate /quotes and /kline onto OpenStockMarketDataSourceAdapter via DataSourceFactory, with API-key header injection, real-environment smoke fixes, and myweb-audit market module baseline."
    modified_scope: "web/backend services + market API + 8 test files; web/frontend data-shape fixes in 8 vue/ts files; config/data_sources.json; openspec proposals + playbook; audit reports and worklogs."
    dependency_changes: "No package dependency changes."
    legacy_logic_impact: "Route paths, response envelopes (UnifiedResponse), and validation preserved; akshare retained as DataSourceFactory fallback."
    rollback_ready: "Revert PR #490."
    risk_and_rollback_point: "Source implementation PR; human review required before merge."

