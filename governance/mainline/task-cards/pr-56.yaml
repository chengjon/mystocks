    - "docs/reports/tasks/2026-04-03-maestro-local-acceptance-report.md"
    - "docs/reports/tasks/INDEX.md"
    - "governance/mainline/task-cards/pr-56.yaml"
    - "scripts/runtime/export_collab_snapshots.py"
    - "scripts/runtime/maestro_collab.py"
    - "scripts/runtime/migrate_collab_to_mongo.py"
    - "scripts/runtime/migrate_transcript_legacy_indexes.py"
