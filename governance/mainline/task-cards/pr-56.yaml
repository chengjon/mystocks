version: "v0.2"

task:
  id: "pr-56"
  title: "land the verified runtime truth and maestro docs sync line on main with governance coverage"
  owner: "main"
  created_at: "2026-04-05"

mainline:
  id: "L1-runtime-truth-and-maestro-docs"
  objective: "land the Mongo-backed maestro runtime truth, transcript archive flow, and local acceptance documentation updates on top of origin/main without bringing unrelated frontend work into the PR"
  milestone_id: "L2-runtime-maestro"
  slice_id: "L3-runtime-truth-and-docs-alignment"

classification:
  task_type: "cleanup"
  secondary_type: "none"
  secondary_change_budget_percent: 0
  secondary_allowed_paths: []

openspec:
  change_id: "not-required"
  approval_status: "not_required"

function_tree:
  domain_id: "meta-governance"
  node_id: "meta-governance-mainline"
  affected_entrypoints:
    - "governance"
    - "core"
    - "tests"
    - "operations"
  update_status: "not-needed"
  secondary_domains: []
  exemption_reason: "this PR aligns an already-implemented runtime and documentation convergence slice onto mainline and adds only the narrow CI/governance repair files needed to merge it cleanly"

