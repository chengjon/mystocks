risk_and_rollback:
  risks:
    - "get_config_manager is HIGH risk, but direct impact is limited to 9 active route handlers in one module."
    - "Dependency injection must preserve default backing getter behavior and auth dependency order."
    - "data_source_config.old.py must remain out of scope as a legacy false-positive surface."
  rollback_plan: "Revert this PR; active handlers return to direct get_config_manager() calls and the focused guard test is removed."

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "Move 9 active data-source config route-body manager lookups into FastAPI dependency injection."
    modified_scope: "One active route module, two focused test files, generated evidence, steward tree, and task card."
    dependency_changes: "No new package dependency; route handlers use a route-local get_config_manager_dependency wrapper around the existing backing getter."
    legacy_logic_impact: "Preserves route paths, OpenAPI exposure, response shape, auth/current_user behavior, backing getter behavior, and leaves data_source_config.old.py untouched."
    rollback_ready: "Yes; revert the PR."
    risk_and_rollback_point: "If focused tests, app.main/OpenAPI smoke, or direct-getter scan regresses, revert before G2.234 closeout."

