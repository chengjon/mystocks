acceptance:
  checks:
    - id: openspec-change-valid
      command: openspec validate inject-technical-pattern-detection-service-di --strict
      required: true
    - id: proposal-review-recorded
      command: proposal-review.md is tracked under the OpenSpec change
      required: true
    - id: review-suggestion-absorbed
      command: design/tasks require exact async detect_for_symbol test-double signature matching
      required: true
    - id: implementation-boundary-preserved
      command: proposal, review, and task tree state that backend implementation remains locked pending human approval
      required: true
    - id: markdown-governance
      command: python scripts/compliance/markdown_governance_gate.py --root-dir . --format json .planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md openspec/changes/inject-technical-pattern-detection-service-di/proposal.md openspec/changes/inject-technical-pattern-detection-service-di/design.md openspec/changes/inject-technical-pattern-detection-service-di/tasks.md openspec/changes/inject-technical-pattern-detection-service-di/proposal-review.md
      required: true
    - id: mainline-scope-gate
      command: python governance/mainline/scripts/mainline_scope_gate.py --task-card governance/mainline/task-cards/pr-111.yaml
      required: true
    - id: cached-diff-check
      command: git diff --cached --check
      required: true

risk_and_rollback:
  risks:
    - Proposal review approval could be mistaken for implementation approval
    - Future implementation could ignore the production async service signature when writing a test double
  rollback_plan: "revert the proposal review artifact, D2.1a review-alignment edits, task-tree update, and this task card"

delivery:
  six_line_summary_required: true
  six_line_summary:
