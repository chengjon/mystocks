    modified_scope: proposal review artifact, design/tasks wording, steward task tree, and this PR task card
    dependency_changes: none
    legacy_logic_impact: no runtime, route, docs/api, PM2, or service behavior changes
    rollback_ready: "yes"
    risk_and_rollback_point: proposal-review-only rollback by reverting this PR

governance:
