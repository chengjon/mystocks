version: "v0.2"

task:
  id: "pr-296"
  title: "Decide high-risk service getter strategy"
  owner: "main"
  created_at: "2026-05-26"

mainline:
  id: "L1-high-risk-service-getter-strategy-decision"
  objective: "split the remaining HIGH/CRITICAL service getter seams into explicit decision tracks before any source implementation lane"
  milestone_id: "L2-architecture-governance-continuation"
  slice_id: "L3-g2-service-lifecycle-strategy"

classification:
  task_type: "cleanup"
  secondary_type: "none"
  secondary_change_budget_percent: 0
  secondary_allowed_paths: []

openspec:
  change_id: "not-required-high-risk-service-getter-strategy-decision"
  approval_status: "not_required"

function_tree:
  domain_id: "meta-governance"
  node_id: "meta-governance-mainline"
  affected_entrypoints:
    - "operations"
  update_status: "not-needed"
  secondary_domains: []
  exemption_reason: "Decision-only package; no runtime entrypoint, route, service symbol, public API surface, OpenAPI exposure, PM2 workflow, or frontend behavior is changed"

scope:
  allowed_paths:
    - ".planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md"
    - ".planning/codebase/generated/high-risk-service-getter-strategy-decision-2026-05-26.json"
    - "docs/reports/quality/backend-high-risk-service-getter-strategy-decision-2026-05-26.md"
    - "governance/mainline/task-cards/pr-296.yaml"
  forbidden_paths:
    - "web/backend/**"
    - "web/frontend/**"
    - "src/**"
    - "tests/**"
    - "docs/api/**"
    - "docs/guides/**"
    - "config/**"
    - "scripts/**"
    - "openspec/changes/**"
    - "openspec/specs/**"

acceptance:
  checks:
    - id: "parent-pr-state"
      command: "gh pr view 295 --json number,state,mergedAt,mergeCommit,url,title"
      required: true
    - id: "current-head-inventory"
      command: "scripted current service getter inventory under web/backend/app/services"
      required: true
    - id: "high-risk-impacts"
      command: "GitNexus impact for get_tdx_service, get_data_service, get_strategy_service, and get_streaming_service"
      required: true
    - id: "markdown-governance"
      command: "python scripts/compliance/markdown_governance_gate.py --root-dir . --format json .planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md docs/reports/quality/backend-high-risk-service-getter-strategy-decision-2026-05-26.md"
      required: true
    - id: "json-parse"
      command: "python -m json.tool .planning/codebase/generated/high-risk-service-getter-strategy-decision-2026-05-26.json >/dev/null"
      required: true
    - id: "yaml-parse"
      command: "python - <<'PY'\nimport yaml\nwith open('governance/mainline/task-cards/pr-296.yaml', encoding='utf-8') as f:\n    yaml.safe_load(f)\nPY"
      required: true

non_goals:
  - "Do not edit backend source or tests."
  - "Do not delete, rename, or alter any getter in this lane."
  - "Do not change route/API, OpenAPI, PM2, frontend, OpenSpec, or issue-label state."
  - "Do not open a source implementation lane from this package."
  - "Do not classify root facade getters or FastAPI dependency/provider getters as unused cleanup candidates."

risk_and_rollback:
  risks:
    - "If this decision package is treated as implementation authorization, a later worker could edit HIGH/CRITICAL runtime seams without a single-track design gate"
    - "If provider getters are misclassified as dead code, route dependency contracts could be damaged"
  rollback_plan: "revert this decision PR to remove only the decision report, generated artifact, task card, and steward-tree update"

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "split remaining high-risk service getter work into explicit design tracks"
    modified_scope: "steward tree, decision report, generated artifact, and task card"
    dependency_changes: "none"
    legacy_logic_impact: "none; decision package records evidence and blocks source implementation until later approval"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert this PR if markdown governance, JSON/YAML parsing, GitNexus staged scope, mainline scope, or diff checks fail"

governance:
  phase: "phase_a_pr_hard_gate"
  mainline_drift_threshold_percent: 5
  stop_rule_owner: "main"
  stop_rule_sla_hours: 24
  approval:
    required: false
    approved_by: "main"
    approved_at: "2026-05-26T13:59:35+08:00"
    approval_note: "User approved entering G2.143 as design-decision-only; no source implementation authorized"
    secondary_approved: false

