non_goals:
  - "No runtime or hook-engine behavior change"
  - "No new governance capability or OpenSpec proposal"
  - "No unrelated frontend, Mongo, watchlist, or deletion-engine implementation work"

acceptance:
  checks:
    - id: "diff-check"
      command: "git diff --check"
      required: true
    - id: "mainline-gate"
      command: "python governance/mainline/scripts/mainline_scope_gate.py --task-card governance/mainline/task-cards/pr-73.yaml --schema governance/mainline/schemas/ai-task-card.schema.json --base-sha origin/main --head-sha HEAD --report /tmp/pr73-mainline-gate.json"
      required: true

risk_and_rollback:
  risks:
    - "If any touched governance document is omitted from the task card, Mainline Governance Gate will fail"
    - "If any closeout line overstates canonical truth, the cumulative branch would merge stale governance state onto main"
  rollback_plan: "git revert <merge-commit-sha> if any closeout record or bridge note is found to misstate the canonical governance truth after merge"

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "finish the remaining technical-debt governance follow-through closeout on one cumulative branch and remove the last canonical-governance documentation drift"
    modified_scope: "canonical technical-debt governance records, historical task-sidecar bridge notes, deletion-governance runbook bridge text, retirement-readiness reports, and this PR-73 task card only"
    dependency_changes: "none"
    legacy_logic_impact: "no runtime, hook, or workflow logic change; only governance documentation truth and closeout status are synchronized"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert the merge if any TD-011/014/015 or SC-008/018 closeout claim, registry-path bridge, or canonical-reference note is inaccurate"

governance:
  phase: "phase_a_pr_hard_gate"
  mainline_drift_threshold_percent: 5
  stop_rule_owner: "main"
  stop_rule_sla_hours: 24
  approval:
    required: false
    approved_by: "main"
    approved_at: "2026-04-09T00:00:00Z"
    approval_note: "this PR only closes already-implemented governance follow-through items and synchronizes canonical governance truth on main"
    secondary_approved: false
