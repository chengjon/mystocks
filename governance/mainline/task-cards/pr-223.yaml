      required: true
    - id: "mainline-scope"
      command: "python governance/mainline/scripts/mainline_scope_gate.py --task-card governance/mainline/task-cards/pr-223.yaml"
      required: true
    - id: "cached-diff-check"
      command: "git diff --cached --check"
