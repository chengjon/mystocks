  objective: "prepare an evidence-only planning package for control-plane OpenAPI docs stabilization"
  milestone_id: "L2-architecture-governance-closeout"
  slice_id: "L3-control-plane-openapi-docs-planning"

classification:
  task_type: "cleanup"
  secondary_type: "none"
  secondary_change_budget_percent: 0
  secondary_allowed_paths: []

openspec:
  change_id: "not-required-d2-5-planning-package"
  approval_status: "not_required"

function_tree:
  domain_id: "meta-governance"
  node_id: "meta-governance-mainline"
  affected_entrypoints:
    - "governance"
    - "api"
  update_status: "not-needed"
  secondary_domains: []
  exemption_reason: "Evidence-only control-plane OpenAPI docs planning package; no backend source, frontend, tests, docs/api, OpenSpec, PM2, or route behavior changes are introduced"

scope:
  allowed_paths:
    - ".planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md"
    - "docs/reports/quality/backend-control-plane-openapi-docs-planning-package-2026-05-21.md"
    - "governance/mainline/task-cards/pr-105.yaml"
  forbidden_paths:
    - "web/backend/app/**"
    - "web/frontend/**"
    - "tests/**"
    - "src/**"
    - "docs/api/**"
    - "openspec/changes/**"
    - "openspec/specs/**"

non_goals:
  - "No backend route module modification"
  - "No route registration change"
  - "No OpenAPI schema exposure or operationId change"
  - "No frontend consumer modification"
  - "No test or fixture modification"
  - "No docs/api modification"
  - "No OpenSpec change/spec creation or modification"
  - "No PM2 or runtime stateful gate execution"
  - "No creation of stabilize-backend-control-plane-openapi-docs as a git branch"
  - "No movement of issue #92 or any downstream item to ready-for-agent"

acceptance:
  checks:
    - id: "control-plane-route-evidence-recorded"
      command: "report records current route/OpenAPI smoke totals and focused control-plane route snapshot"
      required: true
    - id: "taxonomy-recorded"
      command: "report records liveness, readiness, service health, detailed health, status, metrics, docs UI, schema, and compat redirect taxonomy"
      required: true
    - id: "consumer-matrix-recorded"
      command: "report records tracked-file consumer matrix for probe/docs/control-plane path patterns"
      required: true
    - id: "candidate-track-not-branch"
      command: "report and task tree state that stabilize-backend-control-plane-openapi-docs is a candidate track or future change-id placeholder, not an existing git branch"
      required: true
    - id: "markdown-governance"
      command: "python scripts/compliance/markdown_governance_gate.py --root-dir . --format json .planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md docs/reports/quality/backend-control-plane-openapi-docs-planning-package-2026-05-21.md"
      required: true
    - id: "mainline-scope-gate"
      command: "python governance/mainline/scripts/mainline_scope_gate.py --task-card governance/mainline/task-cards/pr-105.yaml"
      required: true
    - id: "cached-diff-check"
      command: "git diff --cached --check"
      required: true

risk_and_rollback:
  risks:
    - "A planning package could be misread as permission to add, remove, or rename control-plane routes"
    - "Docs/API stabilization could be mistaken for permission to edit generated docs/api artifacts"
  rollback_plan: "revert the D2.5 planning report, task-tree update, and this task card"

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "prepare control-plane OpenAPI docs planning package"
    modified_scope: "one evidence report, steward task tree, and this PR task card"
    dependency_changes: "none"
    legacy_logic_impact: "no control-plane route or docs/api behavior changes; taxonomy remains planning-only"
    rollback_ready: "yes"
    risk_and_rollback_point: "decision-only rollback by reverting this PR"

governance:
  phase: "phase_a_pr_hard_gate"
  mainline_drift_threshold_percent: 5
  stop_rule_owner: "main"
  stop_rule_sla_hours: 24
  approval:
    required: false
    approved_by: "main"
    approved_at: "2026-05-21T04:32:05Z"
    approval_note: "human maintainer fully accepted the recommendation to start D2.5 as control-plane OpenAPI docs stabilization residual closeout with evidence-only and no-runtime-mutation boundaries"
    secondary_approved: false
