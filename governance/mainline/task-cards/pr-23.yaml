    - "tests/unit/runtime/test_smoke_graphiti_preflight.py"
    - "tests/unit/runtime/test_smoke_mongo_multicli.py"
    - "tests/unit/services/symphony/test_run_symphony_cli.py"
  forbidden_paths:
