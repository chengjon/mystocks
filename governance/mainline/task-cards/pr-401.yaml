scope:
  allowed_paths:
    - ".planning/codebase/generated/postgres-async-provider-closeout-refresh-2026-05-30.json"
    - ".planning/codebase/steward-tree/current-next-gates.md"
    - ".planning/codebase/steward-tree/steward-index.json"
