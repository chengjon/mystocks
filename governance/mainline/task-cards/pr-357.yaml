acceptance:
  checks:
    - id: "focused-pytest"
      command: "env PYTHONPATH=web/backend pytest -o addopts= web/backend/tests/test_data_quality_legacy_data_adapter_compat.py web/backend/tests/test_data_quality_canonical_service_adapter_provider.py tests/backend/test_data_adapter_regression.py web/backend/tests/test_logging_noise_regressions.py -q --no-cov"
      required: true
    - id: "ruff-authorized-files"
      command: "ruff check web/backend/app/services/data_adapters/dashboard.py web/backend/app/services/data_adapters/data_source.py web/backend/tests/test_data_quality_legacy_data_adapter_compat.py"
      required: true
    - id: "import-smoke"
      command: "env PYTHONPATH=web/backend python - <<'PY'\nfrom app.services.adapters.dashboard_adapter import DashboardDataSourceAdapter as CanonicalDashboard\nfrom app.services.adapters.data_adapter import DataDataSourceAdapter as CanonicalData\nfrom app.services.data_adapters.dashboard import DashboardDataSourceAdapter as LegacyDashboard\nfrom app.services.data_adapters.data_source import DataDataSourceAdapter as LegacyData\nfrom app.services.data_adapter import DashboardDataSourceAdapter as FacadeDashboard, DataDataSourceAdapter as FacadeData\nfrom app.services.data_source_factory import data_source_factory\nassert LegacyDashboard is CanonicalDashboard\nassert LegacyData is CanonicalData\nassert FacadeDashboard is CanonicalDashboard\nassert FacadeData is CanonicalData\nassert data_source_factory is not None\nprint('import smoke ok')\nPY"
      required: true
    - id: "legacy-getter-scan"
      command: "python - <<'PY'\nfrom pathlib import Path\ntargets = [Path('web/backend/app/services/data_adapters/dashboard.py'), Path('web/backend/app/services/data_adapters/data_source.py')]\nfor target in targets:\n    text = target.read_text(encoding='utf-8')\n    assert 'get_data_quality_monitor(' not in text, target\nprint('legacy getter scan ok')\nPY"
      required: true
    - id: "json-parse"
      command: "python -m json.tool .planning/codebase/steward-tree/steward-index.json >/dev/null && python -m json.tool .planning/codebase/generated/data-quality-legacy-adapter-compatibility-wrapper-implementation-2026-05-28.json >/dev/null"
      required: true
    - id: "yaml-parse"
      command: "python - <<'PY'\nimport yaml\nwith open('governance/mainline/task-cards/pr-357.yaml', encoding='utf-8') as f:\n    yaml.safe_load(f)\nPY"
      required: true
    - id: "markdown-governance"
      command: "python scripts/compliance/markdown_governance_gate.py --root-dir . --format json docs/reports/quality/backend-data-quality-legacy-adapter-compatibility-wrapper-implementation-2026-05-28.md .planning/codebase/steward-tree/current-next-gates.md .planning/codebase/steward-tree/branch-register.md .planning/codebase/steward-tree/evidence-index.md .planning/codebase/steward-tree/completed-ledger.md .planning/codebase/steward-tree/tracks/service-lifecycle-di.md"
      required: true
    - id: "openspec-validate"
      command: "openspec validate migrate-backend-singletons-to-lifecycle-di --strict"
      required: true
    - id: "diff-check"
      command: "git diff --check"
      required: true
    - id: "cached-diff-check"
      command: "git diff --cached --check"
      required: true
    - id: "mainline-scope-gate"
      command: "python governance/mainline/scripts/mainline_scope_gate.py --task-card governance/mainline/task-cards/pr-357.yaml --schema governance/mainline/schemas/ai-task-card.schema.json --base-sha 142a2bf1c0c5f979cf9c32415d2f25832e7e62cd --head-sha HEAD --report /tmp/pr357-mainline-governance-report.json"
      required: true

risk_and_rollback:
