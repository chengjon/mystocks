    - "Old module paths must continue importing the canonical adapter classes."
    - "Deleting legacy modules would exceed G2.203 authorization; wrappers must remain present."
  rollback_plan: "revert this PR to restore the post-#356 legacy adapter modules and rerun G2.204 authorization before retrying."

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "implement thin compatibility wrappers for two legacy data-quality adapter modules"
    modified_scope: "two legacy data adapter source files, one focused test, governance evidence, function-tree mapping, steward tree files, and one task card"
    dependency_changes: "none"
    legacy_logic_impact: "old import paths remain compatible and now resolve to canonical adapter classes"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert this PR if compatibility imports, focused tests, or scope gates fail"

