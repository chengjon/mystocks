    dependency_changes: "none"
    legacy_logic_impact: "no runtime behavior changes; only documentation governance and generated evidence metadata are adjusted"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert the PR if governance checks or evidence metadata regress"

governance:
