non_goals:
  - "No unrelated CI workflow redesign outside contract validation, directory compliance, and governance gate unblockers"
  - "No new product surface beyond restoring the clean migration branch and its readiness/test stability"

acceptance:
  checks:
    - id: "frontend-type-check"
      command: "./node_modules/.bin/vue-tsc --noEmit --pretty false"
      required: true
    - id: "frontend-regression-suite"
      command: "npm -s run test -- --run src/composables/__tests__/useBackendReadiness.spec.ts src/components/artdeco/business/__tests__/ArtDecoFilterBar.spec.ts tests/unit/Stocks.spec.ts src/api/__tests__/monitoringApi.spec.ts src/views/artdeco-pages/system-tabs/__tests__/ArtDecoDataManagement.spec.ts tests/unit/dashboard-service.spec.ts tests/unit/data-fund-flow-service.spec.ts tests/unit/market-lhb-service.spec.ts tests/unit/strategy-position-service.spec.ts tests/unit/watchlist-management-service.spec.ts tests/unit/config/dashboard-page-config.spec.ts tests/unit/config/data-concept-page-config.spec.ts tests/unit/config/data-fund-flow-page-config.spec.ts tests/unit/config/market-lhb-page-config.spec.ts tests/unit/config/strategy-pos-page-config.spec.ts tests/unit/config/watchlist-manage-page-config.spec.ts tests/unit/use-strategy.spec.ts"
      required: true
    - id: "market-e2e-regression"
      command: "npx playwright test --config playwright.config.js --project=chromium tests/e2e/market-data.spec.ts tests/e2e/kline-chart.spec.ts tests/e2e/critical/menu-navigation-fixed.spec.ts"
      required: true

risk_and_rollback:
  risks:
    - "Contract validation workflow may reveal additional missing Python dependencies after the first import blocker is fixed"
    - "Governance task-card scope may still need refinement if PR scope changes again"
    - "Directory compliance threshold remains baseline-aware rather than an architectural reduction in root files"
  rollback_plan: "git revert <merge-commit-sha> for the workflow/task-card fixes if governance or CI regress unexpectedly"

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "restore the clean migration branch and unblock readiness, type-safety, and CI governance around it"
    modified_scope: "migration slice frontend/backend files, focused CI workflows, governance task card, and verification reporting"
    dependency_changes: "contract validation workflow now installs backend requirements before importing backend contract modules"
    legacy_logic_impact: "existing routes and readiness gate remain in place, but readiness now tolerates transient abort races and tests wait for the gate explicitly"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert the workflow and governance commits if CI gating behavior regresses or PR scope must be re-cut"

governance:
  phase: "phase_a_pr_hard_gate"
  mainline_drift_threshold_percent: 5
  stop_rule_owner: "main"
  stop_rule_sla_hours: 24
  approval:
    required: false
    approved_by: "main"
    approved_at: "2026-03-18T00:00:00Z"
    approval_note: "approved"
    secondary_approved: false
