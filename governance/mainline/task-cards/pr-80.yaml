non_goals:
  - "不迁移 efinance_adapter/** (2.3.2) — 999 行 / 25+ 方法,跨 FINANCIAL_STATEMENTS + CONVERTIBLE_BONDS + FUTURES + FUNDS + DRAGON_TIGER + FUND_FLOW,推迟到单独 PR"
  - "不迁移 web/backend 入口层 — Phase 3"
  - "不删除 requirements.txt 中的 akshare/efinance 依赖 — Phase 6"
  - "不为 OpenStock 上游盲区(FORECAST_DATA 返空、STOCK_NEWS 不接受 symbol=None、技术指标/账户统计未覆盖)写 mock — 已登记在 docs/reports/openstock-coverage-gaps.md,待上游修复后无感切换"

acceptance:
  checks:
    - id: "openspec-validate-strict"
      command: "openspec validate migrate-data-sources-to-openstock --strict"
      required: true
    - id: "phase1-client-tests"
      command: "pytest tests/unit/services/openstock/test_client.py -x -q --no-cov"
      required: true
    - id: "phase2-3-smoke-tests"
      command: "OPENSTOCK_BASE_URL=http://192.168.123.104:8040 OPENSTOCK_API_KEY=$OPENSTOCK_API_KEY pytest -m integration tests/integration/test_openstock_phase2_3_smoke.py -v --no-cov"
      required: true
    - id: "diff-check"
      command: "git diff --check"
      required: true
    - id: "mainline-gate"
      command: "python governance/mainline/scripts/mainline_scope_gate.py --task-card governance/mainline/task-cards/pr-80.yaml --schema governance/mainline/schemas/ai-task-card.schema.json --base-sha f5f36096b --head-sha HEAD --report /tmp/pr80-mainline-gate.json"
      required: true

risk_and_rollback:
  risks:
    - "FORECAST_DATA 上游 OpenStock 当前返空:facade 返空 DataFrame + warning。Mitigation: smoke test 验证返空不抛异常,coverage-gaps.md 已记录。"
    - "STOCK_NEWS 后端要求 symbol 参数必填:market-news (symbol=None) 路径返空 + warning。Mitigation: facade 显式拦截 symbol=None,coverage-gaps.md 已记录。"
    - "技术指标(stock_technical_indicator_em)/账户统计(stock_account_statistics_em)OpenStock 暂未覆盖:返空 + warning。Mitigation: 同上。"
  rollback_plan: "git revert <merge-commit-sha>。两个 Adapter 文件互相独立,revert 不影响 Phase 1 client 或 Phase 2.1a/2.1b/2.2 PR。"

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "完成 Phase 2.3 (部分):把 domain-03 两个 Adapter (akshare/financial_data + akshare/market_adapter/forecast_analysis) 改写为 OpenStock 网关 facade,消除 akshare SDK 直接调用。efinance_adapter 推迟到单独 PR。"
    modified_scope: "重写 src/adapters/akshare/{financial_data,market_adapter/forecast_analysis}.py;新增 tests/integration/test_openstock_phase2_3_smoke.py (8 tests);勾选 openspec tasks.md 2.3.1 与 2.3.3。"
    dependency_changes: "无新增依赖。Phase 1 引入的 httpx 已足够;本 PR 删除了对 akshare 的直接调用(stock_financial_abstract / stock_news_em / stock_profit_forecast_em/ths / stock_technical_indicator_em / stock_account_statistics_em),但 requirements.txt 保留(Phase 6 统一清理)。"
    legacy_logic_impact: "get_financial_data/get_news_data 走 OpenStock FINANCIAL_DATA / STOCK_NEWS;ForecastAnalysisMixin 4 个 async 方法走 FORECAST_DATA + 上游盲区返空。消费端(AkshareDataSource 混入、AkshareMarketDataAdapter 多继承)接口签名不变。"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert 本 commit;OpenStock 配置可保留在 .env,facade 不能 fallback 到原 SDK — revert 后必须恢复 akshare SDK 调用或保持 Phase 2.2 状态。"

