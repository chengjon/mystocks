acceptance:
  checks:
    - id: "focused-pytest"
      command: "env PYTHONPATH=web/backend pytest -o addopts= web/backend/tests/test_dashboard_data_source.py web/backend/tests/test_logging_noise_regressions.py web/backend/tests/test_health_route_conflicts.py -q --no-cov --tb=short"
      required: true
    - id: "ruff-touched"
      command: "ruff check web/backend/app/services/tdx_service.py web/backend/app/api/dashboard_data_source.py web/backend/app/main.py web/backend/tests/test_dashboard_data_source.py web/backend/tests/test_logging_noise_regressions.py web/backend/tests/test_health_route_conflicts.py"
      required: true
    - id: "black-check-touched"
      command: "black --check web/backend/app/services/tdx_service.py web/backend/app/api/dashboard_data_source.py web/backend/app/main.py web/backend/tests/test_dashboard_data_source.py"
      required: true
    - id: "app-main-import"
      command: "env PYTHONPATH=web/backend BACKEND_PORT=8020 BACKEND_BACKUP_PORT=8021 POSTGRESQL_HOST=localhost POSTGRESQL_USER=test POSTGRESQL_PASSWORD=test JWT_SECRET_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef python -c 'from app.main import app; print(len(app.routes))'"
      required: true
    - id: "openapi-smoke"
      command: "env PYTHONPATH=web/backend BACKEND_PORT=8020 BACKEND_BACKUP_PORT=8021 POSTGRESQL_HOST=localhost POSTGRESQL_USER=test POSTGRESQL_PASSWORD=test JWT_SECRET_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef python -c 'from app.main import app; schema=app.openapi(); print(len(schema.get(\"paths\", {})))'"
      required: true
    - id: "text-guards"
      command: "verify dashboard_data_source.py direct get_tdx_service() calls are 0, tdx_service.py still defines get_tdx_service, and web/backend/app/api/tdx.py is unchanged"
      required: true
    - id: "markdown-governance"
      command: "python scripts/compliance/markdown_governance_gate.py --root-dir . --format json .planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md docs/reports/quality/backend-tdx-dashboard-helper-provider-migration-implementation-2026-05-23.md"
      required: true
    - id: "mainline-scope"
      command: "python governance/mainline/scripts/mainline_scope_gate.py --task-card governance/mainline/task-cards/pr-175.yaml"
      required: true
    - id: "staged-gitnexus"
      command: "gitnexus_detect_changes(scope=staged)"
      required: true
    - id: "cached-diff-check"
      command: "git diff --cached --check"
      required: true

risk_and_rollback:
  risks:
    - "If web/backend/app/api/tdx.py is edited, the PR exceeds the G2.34 authorization boundary"
    - "If get_tdx_service is removed or privatized, /api/tdx and installer fallback compatibility can break"
    - "If route paths or response contracts change, this PR becomes route/OpenAPI governance work instead of lifecycle DI work"
  rollback_plan: "revert this PR; restore dashboard helper direct getter calls, startup prewarm without explicit TDX service passing, and the focused tests/report/task-card as one unit"

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "implement approved TDX dashboard helper provider migration"
    modified_scope: "tdx_service.py, dashboard_data_source.py, main.py, focused tests, implementation report, steward tree, and this task card"
    dependency_changes: "none"
    legacy_logic_impact: "get_tdx_service remains public fallback; dashboard helper direct getter calls become 0"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert this PR if focused tests, ruff, black check, app/OpenAPI smoke, text guards, mainline scope, staged GitNexus, or diff checks fail"

governance:
  phase: "phase_a_pr_hard_gate"
  mainline_drift_threshold_percent: 5
  stop_rule_owner: "main"
  stop_rule_sla_hours: 24
  approval:
    required: false
    approved_by: "main"
    approved_at: "2026-05-23T20:35:00+08:00"
