acceptance:
  checks:
    - id: "json-index-valid"
      command: "python -m json.tool .planning/codebase/steward-tree/steward-index.json >/dev/null"
      required: true
    - id: "split-files-exist"
      command: "python - <<'PY'\nfrom pathlib import Path\nrequired = [\n'.planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md',\n'.planning/codebase/steward-tree/README.md',\n'.planning/codebase/steward-tree/steward-index.json',\n'.planning/codebase/steward-tree/current-next-gates.md',\n'.planning/codebase/steward-tree/branch-register.md',\n'.planning/codebase/steward-tree/evidence-index.md',\n'.planning/codebase/steward-tree/completed-ledger.md',\n'.planning/codebase/steward-tree/freshness-matrix.md',\n'.planning/codebase/steward-tree/archive/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.full-2026-05-27.md',\n]\nmissing = [p for p in required if not Path(p).exists()]\nif missing:\n    raise SystemExit('missing: ' + ', '.join(missing))\nprint('split_files_ok')\nPY"
      required: true
    - id: "markdown-governance"
      command: "python scripts/compliance/markdown_governance_gate.py --root-dir . --format json .planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md .planning/codebase/steward-tree/README.md .planning/codebase/steward-tree/current-next-gates.md .planning/codebase/steward-tree/branch-register.md .planning/codebase/steward-tree/evidence-index.md .planning/codebase/steward-tree/completed-ledger.md .planning/codebase/steward-tree/freshness-matrix.md .planning/codebase/steward-tree/tracks/service-lifecycle-di.md .planning/codebase/steward-tree/tracks/route-openapi-governance.md .planning/codebase/steward-tree/tracks/core-split-and-compatibility.md docs/reports/quality/steward-tree-governance-split-2026-05-27.md"
      required: true
    - id: "diff-check"
      command: "git diff --check"
      required: true
    - id: "cached-diff-check"
      command: "git diff --cached --check"
      required: true

risk_and_rollback:
  risks:
    - "PR #331 may also edit the root steward tree; merge order may require path-limited documentation reconciliation."
    - "Automation that expects the old single huge file must switch to steward-index.json or the archived snapshot."
  rollback_plan: "Revert this PR to restore the previous single-file steward tree path and remove the split steward-tree directory."

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "split the CODEBASE-MAP steward tree into a short entrypoint, purpose-specific files, and a JSON steward index"
    modified_scope: "planning docs, steward-tree split files, governance report, and task card only"
    dependency_changes: "none"
    legacy_logic_impact: "full historical tree preserved in archive"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert the governance-only PR if consumers still require the previous single-file layout"

governance:
  phase: "phase_a_pr_hard_gate"
  mainline_drift_threshold_percent: 5
  stop_rule_owner: "main"
  stop_rule_sla_hours: 24
  approval:
