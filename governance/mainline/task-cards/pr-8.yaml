version: "v0.2"

task:
  id: "pr-8"
  title: "upgrade deprecated GitHub artifact actions to v4"
  owner: "main"
  created_at: "2026-03-17"

mainline:
  id: "L1-governance"
  objective: "remove deprecated GitHub artifact action versions so CI can fail on real workflow logic instead of setup-time action deprecations"
  milestone_id: "L2-ci-hygiene"
  slice_id: "L3-artifact-actions-v4"

classification:
  task_type: "fix"
  secondary_type: "none"
  secondary_change_budget_percent: 0
  secondary_allowed_paths: []

openspec:
  change_id: "not-required"
  approval_status: "not_required"

function_tree:
  domain_id: "meta-governance"
  node_id: "meta-governance-mainline"
  affected_entrypoints:
    - "governance"
    - "tests"
  update_status: "not-needed"
  secondary_domains: []
  exemption_reason: "workflow maintenance change under governance/CI policy surface"

scope:
  allowed_paths:
    - ".github/workflows/**"
    - "tests/unit/scripts/test_github_actions_artifact_versions.py"
  forbidden_paths:
    - "web/frontend/src/App.vue"

non_goals:
  - "No workflow logic redesign beyond artifact action version upgrades"
  - "No broad CI policy reduction in this PR"

acceptance:
  checks:
    - id: "artifact-version-guard"
      command: "PYTHONPATH=. pytest -o addopts='' --no-cov tests/unit/scripts/test_github_actions_artifact_versions.py -q"
      required: true

risk_and_rollback:
  risks:
    - "A workflow may rely on deprecated artifact action behavior not visible in local static replacement"
  rollback_plan: "git revert <merge-commit-sha>"

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "restore GitHub Actions compatibility by replacing deprecated artifact action versions"
    modified_scope: "18 workflow files under .github/workflows plus one regression test"
    dependency_changes: "none"
    legacy_logic_impact: "workflow behavior should stay the same apart from artifact action version"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert if any workflow shows v4-specific artifact behavior regressions"

governance:
  phase: "phase_a_pr_hard_gate"
  mainline_drift_threshold_percent: 5
  stop_rule_owner: "main"
  stop_rule_sla_hours: 24
  approval:
    required: false
    approved_by: "main"
    approved_at: "2026-03-17T00:00:00Z"
    approval_note: "approved"
    secondary_approved: false
