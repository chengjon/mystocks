      command: "gh pr view 326 --repo chengjon/mystocks --json number,state,mergedAt,title,url"
      required: true
    - id: "adapter-fallback-tests"
      command: "env PYTHONPATH=web/backend pytest -o addopts= web/backend/tests/test_adapter_mock_fallback_controls.py -q --no-cov --tb=short"
      required: true
    - id: "logging-noise-tests"
      command: "env PYTHONPATH=web/backend pytest -o addopts= web/backend/tests/test_logging_noise_regressions.py -q --no-cov --tb=short"
      required: true
    - id: "strategy-route-backtest-sanity"
      command: "env PYTHONPATH=web/backend pytest -o addopts= web/backend/tests/test_strategy_management_route_provider.py web/backend/tests/test_backtest_tasks_regressions.py -q --no-cov --tb=short"
      required: true
    - id: "ruff"
      command: "ruff check web/backend/app/services/data_adapters/strategy.py web/backend/tests/test_adapter_mock_fallback_controls.py"
      required: true
    - id: "black-check"
      command: "black --check web/backend/app/services/data_adapters/strategy.py web/backend/tests/test_adapter_mock_fallback_controls.py"
      required: true
    - id: "markdown-governance"
      command: "python scripts/compliance/markdown_governance_gate.py --root-dir . --format json .planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md docs/reports/quality/backend-strategy-adapter-wrapper-implementation-2026-05-27.md"
      required: true
    - id: "json-parse"
      command: "python -m json.tool .planning/codebase/generated/strategy-adapter-wrapper-implementation-2026-05-27.json >/dev/null"
      required: true
    - id: "yaml-parse"
      command: "python - <<'PY'\nimport yaml\nwith open('governance/mainline/task-cards/pr-327.yaml', encoding='utf-8') as f:\n    yaml.safe_load(f)\nPY"
      required: true

