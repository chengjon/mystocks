    - id: "post-archive-specs"
      command: "openspec validate --specs --strict"
      required: true
    - id: "post-archive-changes"
      command: "openspec validate --changes --strict"
      required: true
    - id: "candidate-active-list-absence"
      command: "openspec list does not include the five archived change IDs as active changes"
      required: true
    - id: "markdown-governance"
      command: "python scripts/compliance/markdown_governance_gate.py --root-dir . --format json .planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md docs/reports/quality/backend-openspec-issue92-archive-execution-2026-05-22.md"
      required: true
    - id: "json-validity"
      command: "python -m json.tool .planning/codebase/generated/issue92-openspec-archive-2026-05-22.json"
      required: true
    - id: "mainline-scope"
      command: "python governance/mainline/scripts/mainline_scope_gate.py --task-card governance/mainline/task-cards/pr-133.yaml"
      required: true
    - id: "cached-diff-check"
      command: "git diff --cached --check"
      required: true

