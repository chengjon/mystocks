      command: "ruff check src/monitoring/infrastructure/_postgresql_async_v3_singleton.py src/monitoring/infrastructure/postgresql_async_v3.py tests/unit/monitoring/test_postgres_async_provider.py"
      required: true
    - id: "app-openapi-smoke"
      command: "python -c import app.main and app.openapi() with transient runtime environment"
      required: true
    - id: "markdown-governance"
      command: "python scripts/compliance/markdown_governance_gate.py --root-dir . --format json docs/reports/quality/backend-postgres-async-provider-reset-seam-2026-05-30.md .planning/codebase/steward-tree/current-next-gates.md .planning/codebase/steward-tree/branch-register.md .planning/codebase/steward-tree/evidence-index.md .planning/codebase/steward-tree/completed-ledger.md .planning/codebase/steward-tree/tracks/service-lifecycle-di.md"
