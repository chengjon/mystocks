    modified_scope: "Two monitoring infrastructure files, one focused test file, and governance evidence updates."
    dependency_changes: "No dependency changes."
    legacy_logic_impact: "Existing lazy singleton fallback, lifecycle helpers, and public re-export imports are preserved."
    rollback_ready: "Revert PR #400."
    risk_and_rollback_point: "Provider seam only; rollback is single-PR revert and no route consumer migration is included."

