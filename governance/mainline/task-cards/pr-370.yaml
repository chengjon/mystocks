risk_and_rollback:
  risks:
    - "get_data_service is a shared singleton backing API; this PR adds only an optional provider hook and preserves default fallback behavior."
    - "Provider override could leak between tests; reset_data_service_provider clears both provider and cached singleton."
    - "Route provider compatibility could regress; indicator route provider and v1 indicator regressions are required."
    - "GitNexus staged scope reports high risk because data_service.py file-level attribution marks existing methods as modified; cached source diff is localized to typing import, provider/reset helpers, and get_data_service provider branch."
  rollback_plan: "Revert this PR; get_data_service returns to the previous lazy singleton implementation."

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "Add a provider/reset seam to the DataService singleton backing API."
    modified_scope: "One source file, one focused test, and governance evidence files."
    dependency_changes: "None."
    legacy_logic_impact: "Default get_data_service singleton fallback and existing route provider wrappers are preserved."
    rollback_ready: "Yes; revert the PR."
    risk_and_rollback_point: "Do not start another source lane until G2.218 closeout / residual refresh classifies remaining residuals."

