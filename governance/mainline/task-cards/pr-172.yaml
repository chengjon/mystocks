    - id: "focused-pytest"
      command: "env PYTHONPATH=web/backend pytest -o addopts= web/backend/tests/test_dashboard_data_source.py web/backend/tests/test_market_data_service_v2_lifecycle_di.py -q --no-cov --tb=short"
