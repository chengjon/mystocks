version: "v0.2"

task:
  id: "pr-187"
  title: "Document steward tree practice guide"
  owner: "main"
  created_at: "2026-05-24"

mainline:
  id: "L1-steward-tree-practice-guide"
  objective: "record the reusable steward-tree operating model and improvement recommendations for cross-project adoption"
  milestone_id: "L2-architecture-governance-continuation"
  slice_id: "L3-steward-tree-practice-guide"

classification:
  task_type: "cleanup"
  secondary_type: "none"
  secondary_change_budget_percent: 0
  secondary_allowed_paths: []

openspec:
  change_id: "not-required-steward-tree-practice-guide"
  approval_status: "not_required"

function_tree:
  domain_id: "meta-governance"
  node_id: "meta-governance-mainline"
  affected_entrypoints:
    - "operations"
  update_status: "not-needed"
  secondary_domains: []
  exemption_reason: "Practice guide records governance operating lessons only and does not change runtime code, route paths, OpenAPI behavior, or product surface"

scope:
  allowed_paths:
    - ".planning/codebase/CODEBASE-MAP-STEWARD-TREE-PRACTICE-GUIDE-2026-05-24.md"
    - "governance/mainline/task-cards/pr-187.yaml"
  forbidden_paths:
    - "web/backend/**"
    - "web/frontend/**"
    - "src/**"
    - "tests/**"
    - "docs/api/**"
    - "docs/guides/**"
    - "config/**"
    - "scripts/**"
    - "openspec/changes/**"
    - "openspec/specs/**"

non_goals:
  - "No backend source, frontend source, tests, generated clients, docs/API, OpenSpec, PM2, route, OpenAPI, or runtime behavior changes"
  - "No GitHub issue state, label, or ready-for-agent movement"
  - "No new service lifecycle DI implementation target selection"
  - "No compatibility getter, wrapper, or route cleanup authorization"
  - "No modification of PR #186 or the G2.46 closeout packet"

acceptance:
  checks:
    - id: "markdown-governance"
      command: "python scripts/compliance/markdown_governance_gate.py --root-dir . --format json .planning/codebase/CODEBASE-MAP-STEWARD-TREE-PRACTICE-GUIDE-2026-05-24.md"
      required: true
    - id: "yaml-parse"
      command: "python -c \"import pathlib, yaml; yaml.safe_load(pathlib.Path('governance/mainline/task-cards/pr-187.yaml').read_text())\""
      required: true
    - id: "mainline-scope"
      command: "python governance/mainline/scripts/mainline_scope_gate.py --task-card governance/mainline/task-cards/pr-187.yaml"
      required: true
    - id: "cached-diff-check"
      command: "git diff --cached --check"
      required: true
    - id: "staged-gitnexus-scope"
      command: "python -c \"print('staged-gitnexus-scope: docs-only governance guide; no source symbols changed')\""
      required: true

risk_and_rollback:
  risks:
    - "If source, tests, OpenSpec, docs/API, or runtime files are edited, the PR exceeds the practice-guide boundary"
    - "If this guide is treated as implementation authority, it contradicts its historical/governance-only boundary"
    - "If this PR is merged into PR #186 scope, it broadens the G2.46 closeout packet"
  rollback_plan: "revert this docs-only practice-guide PR; prior steward tree and G2.46 state remain unchanged unless separately modified"

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "document the reusable steward-tree operating model and improvement recommendations"
    modified_scope: "one planning guide and this task card"
    dependency_changes: "none"
    legacy_logic_impact: "none"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert this docs-only guide PR if governance validation fails"

governance:
  phase: "phase_a_pr_hard_gate"
  mainline_drift_threshold_percent: 5
  stop_rule_owner: "main"
  stop_rule_sla_hours: 24
  approval:
    required: false
    approved_by: "main"
    approved_at: "2026-05-24T03:25:00+08:00"
    approval_note: "human maintainer approved continuing with an independent steward-tree practice guide PR"
    secondary_approved: false
