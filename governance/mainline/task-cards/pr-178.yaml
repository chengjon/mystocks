    - id: "json-parse"
      command: "python -m json.tool .planning/codebase/generated/tdx-route-dependency-consumer-matrix-2026-05-23.json >/dev/null"
      required: true
    - id: "mainline-scope"
      command: "python governance/mainline/scripts/mainline_scope_gate.py --task-card governance/mainline/task-cards/pr-178.yaml"
      required: true
    - id: "cached-diff-check"
      command: "git diff --cached --check"
      required: true
    - id: "staged-gitnexus-scope"
      command: "gitnexus detect-changes --scope staged"
      required: true

risk_and_rollback:
  risks:
    - "If backend source or tests are edited, the PR exceeds the consumer-matrix boundary"
    - "If this PR removes get_tdx_service or rewires /api/v1/tdx dependencies, it bypasses the separate authorization gate"
    - "If /api/ml/tdx is treated as the same service lifecycle seam, the matrix will conflate unrelated TDX-named API code"
  rollback_plan: "revert this governance-only PR; prior G2.35-G2.37 results remain merged unless separately reverted"

delivery:
  six_line_summary_required: true
  six_line_summary:
    change_purpose: "record the TDX route dependency consumer matrix after G2.37"
    modified_scope: "consumer matrix report, generated artifact, steward tree, and this task card"
    dependency_changes: "none"
    legacy_logic_impact: "none; get_tdx_service remains active and /api/v1/tdx remains unchanged"
    rollback_ready: "yes"
    risk_and_rollback_point: "revert this docs-only matrix PR if governance validation fails"

governance:
  phase: "phase_a_pr_hard_gate"
  mainline_drift_threshold_percent: 5
  stop_rule_owner: "main"
  stop_rule_sla_hours: 24
  approval:
    required: false
    approved_by: "main"
    approved_at: "2026-05-23T22:49:36+08:00"
    approval_note: "human maintainer approved continuing after PR #177; this matrix only records current-head consumer evidence and next-gate boundary"
    secondary_approved: false
