  - "No implementation target selection beyond recommending a separate future authorization packet if desired"

acceptance:
  checks:
    - id: "markdown-governance"
      command: "python scripts/compliance/markdown_governance_gate.py --root-dir . --format json .planning/codebase/CODEBASE-MAP-OPENSPEC-TASK-TREE-2026-05-20.md docs/reports/quality/backend-tdx-route-dependency-consumer-matrix-2026-05-23.md"
