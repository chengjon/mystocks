  title: "Correct baseline_failures.md root cause from PostgreSQL-role-root to numpy/scipy version drift"
  owner: "main"
  created_at: "2026-07-07"

mainline:
  id: "L1-b4-016-ci-baseline-failures-registry-correction"
  objective: "correct the two baseline_failures.md entries: real root cause is numpy/scipy version drift, not PostgreSQL service container role root"
  milestone_id: "L2-b4-015-quality-baseline-tracking"
  slice_id: "L3-baseline-failures-md-correction"

classification:
  task_type: "cleanup"
  secondary_type: "none"
  secondary_change_budget_percent: 0
  secondary_allowed_paths: []

openspec:
  change_id: "not-required"
  approval_status: "not_required"

