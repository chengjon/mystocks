# MyStocks 自动化测试 tmux 会话配置文件
# 用法: tmux source-file /opt/claude/mystocks_spec/scripts/tmux/mystocks-test.conf
# 说明: 创建测试专用会话，包含服务管理、测试执行、日志监控三个窗格

# 创建新的测试会话
new-session -d -s mystocks-test

# 设置会话选项
set-option -g status on
set-option -g status-bg black
set-option -g status-fg green
set-option -g status-left ' MyStocks Test '
set-option -g status-right ' %Y-%m-%d %H:%M:%S '

# 窗格1: 服务管理区 (左侧，占比40%)
select-pane -t 0
split-window -h -p 60
send-keys -t 0 'cd /opt/claude/mystocks_spec' C-m
send-keys -t 0 'echo "🔧 MyStocks 服务管理面板"' C-m
send-keys -t 0 'echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"' C-m
send-keys -t 0 'echo "1. 查看PM2进程状态: pm2 status"' C-m
send-keys -t 0 'echo "2. 启动服务: pm2 start mystocks.config.js"' C-m
send-keys -t 0 'echo "3. 停止服务: pm2 stop all"' C-m
send-keys -t 0 'echo "4. 查看服务日志: pm2 logs"' C-m
send-keys -t 0 'echo "5. 重启服务: pm2 restart all"' C-m
send-keys -t 0 'echo ""' C-m

# 窗格2: 测试执行区 (右上，占比30%)
select-pane -t 1
split-window -v -p 50
send-keys -t 1 'cd /opt/claude/mystocks_spec/tests' C-m
send-keys -t 1 'echo "🧪 MyStocks 测试执行面板"' C-m
send-keys -t 1 'echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"' C-m
send-keys -t 1 'echo "可用测试命令:"' C-m
send-keys -t 1 'echo "- 全量测试: npx playwright test"' C-m
send-keys -t 1 'echo "- 用户认证: npx playwright test tests/e2e/login.spec.js"' C-m
send-keys -t 1 'echo "- API测试: npx playwright test tests/e2e/api-endpoints.spec.js"' C-m
send-keys -t 1 'echo "- 生成报告: npx playwright show-report"' C-m
send-keys -t 1 'echo ""' C-m

# 窗格3: 日志监控区 (右下，占比30%)
select-pane -t 2
send-keys -t 2 'cd /opt/claude/mystocks_spec' C-m
send-keys -t 2 'echo "📊 MyStocks 日志监控面板 (lnav)"' C-m
send-keys -t 2 'echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"' C-m
send-keys -t 2 'echo "启动日志监控命令:"' C-m
send-keys -t 2 'echo "lnav var/log/*.log tests/logs/*.log"' C-m
send-keys -t 2 'echo ""' C-m
send-keys -t 2 'echo "日志文件位置:"' C-m
send-keys -t 2 'echo "- 服务日志: var/log/backend-access.log, var/log/backend-error.log"' C-m
send-keys -t 2 'echo "- 测试日志: tests/logs/playwright-*.log"' C-m
send-keys -t 2 'echo "- 前端日志: var/log/frontend*.log, var/log/pm2-*.log"' C-m
send-keys -t 2 'echo "- 后端日志: var/log/backend*.log"' C-m
send-keys -t 2 'echo ""' C-m

# 窗格4: 数据库连接监控 (新增窗格)
select-pane -t 2
split-window -v -p 33
send-keys -t 3 'cd /opt/claude/mystocks_spec' C-m
send-keys -t 3 'echo "🗄️ MyStocks 数据库监控面板"' C-m
send-keys -t 3 'echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"' C-m
send-keys -t 3 'echo "数据库连接检查:"' C-m
send-keys -t 3 'echo "- PostgreSQL: curl -s http://localhost:${BACKEND_PORT:-8020}/api/system/database/health"' C-m
send-keys -t 3 'echo "- TDengine: curl -s http://localhost:${BACKEND_PORT:-8020}/api/cache/monitoring/health"' C-m
send-keys -t 3 'echo "- 缓存状态: curl -s http://localhost:${BACKEND_PORT:-8020}/api/cache/status"' C-m
send-keys -t 3 'echo ""' C-m

# 选择服务管理窗格作为默认窗格
select-pane -t 0

# 设置窗格标题
set-window-option -g window-status-current-format ' #[fg=white,bg=blue] #I #W #[fg=blue,bg=default]#[default] '
rename-window -t 0 "ServiceManager"
rename-window -t 1 "TestExecutor"
rename-window -t 2 "LogMonitor"
rename-window -t 3 "DatabaseMonitor"

# 显示会话信息
display-message "✅ MyStocks 测试环境已准备完成"
display-message "📍 窗格说明: [0]服务管理 [1]测试执行 [2]日志监控 [3]数据库监控"
display-message "🚀 快速开始: 窗格0执行 'pm2 start mystocks.config.js' 启动服务"
