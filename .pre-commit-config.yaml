# Pre-commit configuration for MyStocks project
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# 维护要点：Black 负责格式化，Ruff 负责 lint，local hooks 负责治理门禁
# 执行顺序：Black → Ruff selective fix → Ruff final check → MyPy → Bandit → Safety

repos:
  # ============================================================================
  # 第一步：Black 格式化
  # ============================================================================
  # Black 的优势：
  #   - 非常固执的格式化规则（团队统一风格保证）
  #   - 完全不可配置的格式（避免格式战争）
  #   - 处理所有格式问题（缩进、空格、换行等）
  # ============================================================================
  - repo: https://github.com/psf/black
    rev: 25.12.0
    hooks:
      - id: black
        name: Black (Formatter)
        files: ^(src/|tests/|web/backend/)
        # 统一行长度为 120 字符
        args: [--line-length=120]

  # ============================================================================
  # 第二步：Ruff 选择性修复
  # ============================================================================
  # Ruff 的优势：
  #   - 快速的 linter（比 Flake8 快 30-100x）
  #   - 可配置的规则（选择性修复）
  #   - 轻量级修复（未使用的导入、简单的语法问题）
  #
  # 避坑点：
  #   ❌ 不使用 ruff format（避免与 Black 冲突）
  #   ❌ 不使用 --fix 无差别修复（可能回退 Black 的格式）
  #   ✅ 使用 --select 选择性修复（只修复特定问题）
  # ============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        name: Ruff (Selective Fix)
        files: ^(web/backend/|docs/api/|docs/reports/|docs/guides/)
        # ⚠️  关键：只修复未使用的导入和变量，避免格式冲突
        # F401: unused-import (未使用的导入)
        # F841: unused-variable (未使用的变量)
        args: [--select, F401,F841, --fix]

  # ============================================================================
  # 第三步：Ruff 最终检查
  # ============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        name: Ruff (Final Check)
        files: ^(web/backend/|docs/api/|docs/reports/|docs/guides/)
        # ✅ 只检查，不修复（避免在最终阶段修改代码）
        args: [--no-fix]

  # ============================================================================
  # 第四步：类型检查
  # ============================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        name: MyPy (Type Check)
        args: ['--ignore-missing-imports', '--no-error-summary']
        files: ^(web/backend/|docs/api/)
        additional_dependencies:
          - types-requests
          - types-PyYAML

  # ============================================================================
  # 第五步：安全扫描
  # ============================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        name: Bandit (Security Scan)
        args: ['-c', 'config/.security.yml', '-ll']
        files: ^(src/|web/backend/)
        exclude: ^(tests/|test_|.*_test\.py)

  # ============================================================================
  # 第六步：依赖安全检查
  # ============================================================================
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.4.2
    hooks:
      - id: python-safety-dependencies-check
        name: Safety (Dependency Check)
        files: ^(requirements\.txt|pyproject\.toml|Pipfile)$

  # ============================================================================
  # 第七步：通用文件检查
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Trailing Whitespace
        exclude: ^(temp/|.archive/)
      - id: end-of-file-fixer
        name: End of File Fixer
        exclude: ^(temp/|.archive/)
      - id: check-yaml
        name: Check YAML
        exclude: ^(temp/|.archive/)
      - id: check-json
        name: Check JSON
        exclude: ^(temp/|.archive/)
      - id: check-added-large-files
        name: Check Large Files
        args: ['--maxkb=1000']
      - id: detect-private-key
        name: Detect Private Key
        exclude: ^(\.env\.example|docs/guides/|CLAUDE\.md|scripts/)
      - id: check-merge-conflict
        name: Check Merge Conflict

  # ============================================================================
  # 第八步：密钥检测
  # ============================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect Secrets
        exclude: ^(\.env\.example|docs/guides/|CLAUDE\.md|\.archive/|web/backend/app/core/config\.py)

  # ============================================================================
  # 第九步：Python 语法检查
  # ============================================================================
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
        name: Check Blanket NOQA
      - id: python-check-blanket-type-ignore
        name: Check Blanket Type Ignore
      - id: python-no-eval
        name: No Eval
        exclude: ^(web/backend/app/api/tasks\.py)
      - id: python-no-log-warn
        name: No Log Warn

  # ============================================================================
  # 第十步：文档治理与主线提醒
  # ============================================================================
  # 检查文档是否放在了正确的位置
  # - 检测根目录下的.md文件（应移到docs/子目录）
  # - 检测docs/根目录下的.md文件（应移到8大分类）
  # - 检测中文文件名（建议使用英文或拼音）
  # - 检测临时文件（TEMP、TMP、DRAFT等）
  # - 检测深层嵌套（>3层）
  # ============================================================================
  - repo: local
    hooks:
      - id: documentation-placement
        name: Documentation Placement Check
        entry: scripts/hooks/check-documentation-placement.sh
        language: script
        pass_filenames: false
        always_run: true

      - id: markdown-governance-gate
        name: Markdown Governance Gate
        entry: >-
          bash -lc 'args=(--format text); for file in "$@"; do args+=(--path "$file"); done;
          python scripts/compliance/markdown_governance_gate.py "${args[@]}"' --
        language: system
        files: \.md$
        pass_filenames: true
        stages: [pre-commit]

      - id: mainline-governance-reminder
        name: Mainline Governance Reminder (non-blocking)
        entry: scripts/hooks/mainline-governance-reminder.sh
        language: script
        pass_filenames: false
        always_run: true

  # ============================================================================
  # 第十一步：目录结构与生产 Python 门禁
  # ============================================================================
  - repo: local
    hooks:
      - id: directory-governance
        name: Directory Governance Check
        entry: bash scripts/maintenance/check-structure.sh --staged
        language: script
        pass_filenames: false
        always_run: true

      - id: production-python-guardrails
        name: Production Python Guardrails
        entry: >-
          bash -lc 'args=(--format text); for file in "$@"; do args+=(--path "$file"); done;
          python scripts/compliance/production_python_guardrails.py "${args[@]}"' --
        language: system
        files: ^((src/)|(web/backend/app/)).*\.py$
        pass_filenames: true
        stages: [pre-commit]

  # ============================================================================
  # 第十二步：前端质量与配置门禁
  # ============================================================================
  # 覆盖两类前端提交前校验：
  # - TypeScript 类型质量检查
  # - 路由与 pageConfig.ts 的一致性检查
  # - ArtDeco token 使用合规检查
  - repo: local
    hooks:
      - id: typescript-check
        name: TypeScript Quality Guard
        # 使用 vue-tsc 检查前端代码质量
        entry: bash -c "cd web/frontend && npx vue-tsc --noEmit"
        language: system
        files: ^web/frontend/.*\.(ts|tsx|vue)$
        pass_filenames: false

      - id: page-config-validator
        name: Page Configuration Validator
        # 运行配置验证（不阻塞提交，仅警告）
        entry: bash -c "cd web/frontend && node ../../scripts/hooks/check-page-config.mjs --warn || true"
        language: system
        files: ^web/frontend/src/(router/|config/)
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

      - id: artdeco-token-lint
        name: ArtDeco Token Lint
        entry: bash -c "cd web/frontend && npm run lint:artdeco"
        language: system
        files: ^web/frontend/src/.*\.(vue|scss|css)$
        pass_filenames: false
        stages: [pre-commit]

  # ============================================================================
  # 第十三步：硬编码与迁移门禁
  # ============================================================================
  - repo: local
    hooks:
      - id: hardcoding-runtime-scan
        name: Hardcoding Runtime Scan (P0/P1)
        entry: python scripts/security/hardcoding_scan.py --scope runtime --severity P0,P1
        language: system
        pass_filenames: false
        always_run: true

      - id: hardcoding-exception-validator
        name: Hardcoding Exception Validator
        entry: python scripts/security/validate_hardcoding_exceptions.py --file config/security/hardcoding_exceptions.yml
        language: system
        pass_filenames: false
        always_run: true

      - id: views-migration-gate
        name: Views Migration Table Gate
        entry: python scripts/hooks/check-views-migration-table.py
        language: system
        pass_filenames: false
        always_run: true

  # ============================================================================
  # 第十四步：Readiness 与可观测性门禁
  # ============================================================================
  - repo: local
    hooks:
      - id: observability-readiness-gate
        name: Observability Readiness Gate
        entry: python scripts/compliance/readiness_contract_gate.py --format text
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # ============================================================================
  # 第十五步：App 路由纯净度门禁
  # ============================================================================
  - repo: local
    hooks:
      - id: app-route-purity-gate
        name: App Route Purity Gate
        entry: python scripts/compliance/app_route_purity_gate.py --format text
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # ============================================================================
  # 第十六步：业务 Tab Request ID 显位门禁
  # ============================================================================
  - repo: local
    hooks:
      - id: request-id-visibility-gate
        name: Request ID Visibility Gate
        entry: python scripts/compliance/request_id_visibility_gate.py --format text
        language: system
        files: ^web/frontend/src/views/artdeco-pages/[^/]+-tabs/[^/]+\.vue$
        pass_filenames: true
        stages: [pre-commit]

  # ============================================================================
  # 第十七步：后端单例 None 初始化门禁
  # ============================================================================
  - repo: local
    hooks:
      - id: backend-singleton-none-guard
        name: Backend Singleton None Guard
        entry: python scripts/compliance/backend_singleton_none_guard.py --format text --root-dir .
        language: system
        files: ^((src/)|(web/backend/app/)).*\.py$
        pass_filenames: true
        stages: [pre-commit]

  # ============================================================================
  # 第十八步：UnifiedResponse 响应契约门禁
  # ============================================================================
  - repo: local
    hooks:
      - id: unified-response-contract-guard
        name: UnifiedResponse Contract Guard
        entry: python scripts/compliance/unified_response_contract_guard.py --format text --root-dir .
        language: system
        files: ^web/backend/app/api/.*\.py$
        pass_filenames: true
        stages: [pre-commit]

  # ============================================================================
  # 第十九步：前端 / 测试文件大小门禁
  # ============================================================================
  - repo: local
    hooks:
      - id: frontend-test-file-size-guard
        name: Frontend/Test File Size Guard
        entry: python scripts/compliance/file_size_guardrail.py --format text --root-dir . --scope-root web/frontend --scope-root tests
        language: system
        files: ^((web/frontend/.*\.(vue|ts|js))|(tests/.*\.(ts|js)))$
        pass_filenames: true
        stages: [pre-commit]

  # ============================================================================
  # 第二十步：PM2 一等公民门禁
  # ============================================================================
  - repo: local
    hooks:
      - id: pm2-first-class-gate
        name: PM2 First-Class Gate
        entry: python scripts/compliance/pm2_first_class_gate.py --format text --root-dir .
        language: system
        files: ^((\.github/workflows/.*\.(yml|yaml))|(scripts/.*\.(sh|py))|(config/.*\.(js|json))|(ecosystem\.test\.config\.js)|(web/backend/ecosystem\.config\.js)|(web/frontend/ecosystem\.config\.js)|(web/backend/pm2\.config\.json))$
        pass_filenames: true
        stages: [pre-commit]

# CI 配置
# ============================================================================
ci:
  autofix_prs: false          # 不自动创建 PR 修复问题
  autoupdate_schedule: monthly  # 每月自动更新 hooks
  skip:
    # CI 环境中可以跳过的 hooks（可选）
    - python-safety-dependencies-check  # 依赖检查可以只在本地运行
