apiVersion: 1

datasources:
  - name: MyStocks-Monitoring
    type: postgres
    access: proxy
    url: localhost:5438
    database: mystocks_monitoring
    user: postgres
    secureJsonData:
      password: 'your-postgresql-password'
    jsonData:
      sslmode: 'disable'
      postgresVersion: 1500
      timescaledb: false
    editable: true
    isDefault: true
