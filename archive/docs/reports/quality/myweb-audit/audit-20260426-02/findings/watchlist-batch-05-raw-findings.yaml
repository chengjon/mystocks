- finding_id: watchlist-manage-data-state-01
  batch_id: watchlist-batch-05
  page:
    route: /watchlist/manage
    page_key: watchlist-manage
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/watchlist/Manage.vue
  source_role: data-state-audit
  severity: High
  issue_type: data-state
  title: Watchlist manage collapsed resolved first-load failure into fake empty success instead of surfacing an error shell
  trigger:
    steps:
      - "Open `/watchlist/manage`."
      - "Let `/api/v1/monitoring/watchlists` resolve `success: false` while the route has no previously verified watchlist snapshot."
      - "Inspect the top summary strip and the primary state panel."
  expected: "A resolved first-load failure for the canonical watchlist list must preserve explicit failure truth. The route should render `-- / -- / -- / --` in the summary strip and show `自选列表加载失败`, rather than falling through to a fake empty-success shell."
  actual: "Before repair, the shared watchlist extractor collapsed resolved `success: false` payloads into an empty array, and the route-local `hasLoaded` flag never flipped when the thrown failure path aborted `refreshWatchlistState()`. The page therefore rendered a fake empty-success shell such as `0 / 0 / 0 / 0` plus `暂无自选组合`, or could strand itself between loading and empty semantics without a visible error surface."
  evidence:
    kind: live-observation
    note: "Controlled Playwright-library verification with system `google-chrome` reproduced the real browser path before repair: a resolved `success: false` first-load watchlist payload rendered `0 / 0 / 0 / 0` and `暂无自选组合`. After repair, the same path renders `-- / -- / -- / --` together with `自选列表加载失败`."
  repair_target:
    files:
      - web/frontend/src/views/artdeco-pages/stock-management-tabs/WatchlistManager.vue
      - web/frontend/src/views/artdeco-pages/stock-management-tabs/stockManagementRouteData.ts
      - web/frontend/src/views/watchlist/__tests__/Manage.spec.ts
      - web/frontend/src/views/artdeco-pages/stock-management-tabs/__node_tests__/stockManagementRouteData.test.ts
      - web/frontend/tests/e2e/phase2-mainline-matrix.spec.ts
    primary_owner: web/frontend/src/views/artdeco-pages/stock-management-tabs/WatchlistManager.vue
  can_fix_frontend: true
  shared_impact_candidate: true
  cross_page_impact:
    - /dashboard
  status: open
  dependency: null
  dedupe_key: /watchlist/manage:data-state:firstLoadEnvelopeAndCompletionTruth
  verification_surface: live-audit
  verification:
    required: true
    complete: false
    notes: "Re-check the canonical route after repair and confirm that a resolved first-load failure now renders `-- / -- / -- / --` and the visible `自选列表加载失败` shell."
- finding_id: watchlist-manage-data-state-02
  batch_id: watchlist-batch-05
  page:
    route: /watchlist/manage
    page_key: watchlist-manage
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/watchlist/Manage.vue
  source_role: data-state-audit
  severity: High
  issue_type: data-state
  title: Watchlist manage promoted unresolved stock-summary siblings to faux zero truth once watchlist counts verified
  trigger:
    steps:
      - "Open `/watchlist/manage`."
      - "Let `/api/v1/monitoring/watchlists` verify successfully while `/api/v1/monitoring/watchlists/:watchlistId/stocks` is still unresolved."
      - "Inspect the four top summary cards while the loading panel remains visible."
  expected: "The routed summary strip must derive per-card truth from each backing slice. `组合数量` may render the verified watchlist count, but `当前股票数` / `上涨家数` / `下跌家数` must stay on `--` until the stock slice itself verifies."
  actual: "Before repair, one verified watchlist slice promoted the entire summary strip into verified mode. The route therefore rendered `2 / 0 / 0 / 0` or natural live `18 / 0 / 0 / 0` while the stock slice was still unresolved and the page still showed `自选列表同步中`."
  evidence:
    kind: live-observation
    note: "A new component RED test and controlled Playwright-library verification reproduced the issue before repair. After repair, the same route now renders `2 / -- / -- / --` under a controlled hanging stock-slice proof and natural PM2 no longer leaks faux zero stock-summary truth while the stock detail slice is still unresolved."
  repair_target:
    files:
      - web/frontend/src/views/artdeco-pages/stock-management-tabs/WatchlistManager.vue
      - web/frontend/src/views/watchlist/__tests__/Manage.spec.ts
      - web/frontend/tests/e2e/phase2-mainline-matrix.spec.ts
    primary_owner: web/frontend/src/views/artdeco-pages/stock-management-tabs/WatchlistManager.vue
  can_fix_frontend: true
  shared_impact_candidate: false
  cross_page_impact:
    - /watchlist/manage
  status: open
  dependency: null
  dedupe_key: /watchlist/manage:data-state:sliceLocalSummaryTruth
  verification_surface: live-audit
  verification:
    required: true
    complete: false
    notes: "Re-check the canonical route after repair and confirm that verified watchlist counts no longer promote unresolved stock-summary siblings from `--` to `0` while the loading panel is still visible."
