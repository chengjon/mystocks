- consolidated_issue_id: dashboard-home-issue-09
  severity: High
  title: Dashboard capital-flow ranking now keeps tab-owned rows scoped to the active flow tab
  pages:
    - /dashboard
  source_roles:
    - data-state-audit
  why_consolidated: "The canonical dashboard route had one selector-truth defect: the local capital-flow ranking tabs still shared one route-global verified row set, so a same-instance switch from `1day` to another unresolved tab could keep old rows visible under the new tab shell."
  primary_owner: web/frontend/src/views/artdeco-pages/composables/useArtDecoDashboard.ts
  repair_bucket: fix-now
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: false
  cross_page_impact: []
  dedupe_keys:
    - /dashboard:data-state:capitalFlowTabSelectorSnapshotTruth
  verification_scope:
    routes:
      - /dashboard
    states:
      - default
      - selector-switch-first-load-pending
    breakpoints:
      - 1440
  repair_summary:
    files:
      - web/frontend/src/views/artdeco-pages/composables/useArtDecoDashboard.ts
      - web/frontend/src/views/artdeco-pages/ArtDecoDashboard.vue
      - web/frontend/tests/unit/components/ArtDecoDashboardLogic.spec.ts
      - web/frontend/tests/e2e/phase1-mainline-matrix.spec.ts
    notes:
      - "the dashboard composable now captures `requestTab` at fetch start and stores verified capital-flow rows per flow tab instead of one route-global ranking array"
      - "visible ranking rows, heatmap input, and degraded-state copy now resolve from the active tab's own verified snapshot"
      - "a newly requested tab without its own verified snapshot now renders pending skeletons instead of leaking the previous tab's rows"
      - "this batch reuses existing `myweb-audit v1.71` and `v1.68` selector-scoped verified-snapshot guidance; no new skill version was required"
  verification_surface: code-review-plus-targeted-live-verification
