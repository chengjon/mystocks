- finding_id: trade-reconciliation-data-state-002
  batch_id: trade-batch-16
  page:
    route: /trade/reconciliation
    page_key: trade-reconciliation
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/trade/Reconciliation.vue
  source_role: data-state-audit
  severity: High
  issue_type: data-state
  title: Trade reconciliation leaked previous account import-batch metadata while a newly selected account snapshot was still unresolved
  trigger:
    steps:
      - "Open `/trade/reconciliation`"
      - "Import a CSV so account `backtest:7` has a verified local import batch and visible reconciliation results"
      - "Switch the same page instance to account `backtest:8` while its first `/api/trade/reconciliation/statements` request is still unresolved"
      - "Inspect the hero metadata under the new account shell"
  expected: "When the newly selected account has no verified snapshot yet, selector-owned import metadata should reset immediately so the hero no longer presents the previous account's import batch id or imported row count as current-account truth."
  actual: "Before repair, the hero changed to `ACCOUNT: backtest:8` but still rendered `IMPORT_BATCH: batch-7` and `ROWS: 3` until the new account request resolved."
  evidence:
    kind: live-observation
    note: "A new owner red test first reproduced the same-instance account-switch metadata leak, then a routed Phase 3 Chromium proof confirmed the unresolved `backtest:8` shell now clears old import metadata immediately."
  repair_target:
    files:
      - web/frontend/src/views/trade/composables/useTradeReconciliation.ts
      - web/frontend/src/views/trade/__tests__/Reconciliation.spec.ts
      - web/frontend/tests/e2e/phase3-mainline-matrix.spec.ts
      - .claude/skills/myweb-audit/references/route-truth-casebook.md
      - .claude/skills/myweb-audit/references/route-truth-coverage-matrix.md
    primary_owner: web/frontend/src/views/trade/composables/useTradeReconciliation.ts
  can_fix_frontend: true
  shared_impact_candidate: false
  cross_page_impact:
    - /watchlist/manage
    - /strategy/backtest
    - /risk/stop-loss
  status: open
  dependency: null
  dedupe_key: /trade/reconciliation:data-state:accountSelectorPendingImportContext
