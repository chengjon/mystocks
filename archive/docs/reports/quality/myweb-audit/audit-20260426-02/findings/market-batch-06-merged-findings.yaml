- consolidated_issue_id: market-lhb-issue-03
  severity: High
  title: LHB routed hero request metadata now tracks verified leaderboard provenance instead of failed retry ids
  pages:
    - /market/lhb
  source_roles:
    - data-state-audit
  why_consolidated: "The first-load failure request-id leak and the stale-refresh request-id overwrite were two manifestations of the same routed request-provenance cluster: the canonical LHB route treated `useArtDecoApi.lastRequestId` as if it always represented the currently visible leaderboard snapshot."
  primary_owner: web/frontend/src/views/market/LHB.vue
  repair_bucket: fix-now
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: false
  cross_page_impact:
    - /market/technical
    - /data/concept
    - /stocks/screener
  dedupe_keys:
    - /market/lhb:data-state:leaderboardRequestProvenanceTruth
  verification_scope:
    routes:
      - /market/lhb
    states:
      - first-load-failure
      - stale-refresh-failure
      - default
    breakpoints:
      - 1440
  repair_summary:
    files:
      - web/frontend/src/views/market/LHB.vue
      - web/frontend/src/views/market/__tests__/LHB.spec.ts
      - web/frontend/tests/e2e/phase1-mainline-matrix.spec.ts
    notes:
      - "the canonical LHB route now derives `REQ` from page-local verified-snapshot truth, so first-load failure renders `REQ: N/A / ROWS: --` instead of leaking a failed request id as if a leaderboard snapshot had resolved"
      - "the same route now retains the last verified request id during stale-refresh failure, so visible rows and hero metadata stay aligned when a failed retry occurs after a successful sync"
      - "the strengthened routed regressions now cover first-load failure and refresh-after-success failure, closing the exact `lastRequestId` provenance regression on both component and Phase 1 routed surfaces"
      - "this batch intentionally reuses existing `myweb-audit v1.41` first-load/envelope truth and `v1.39` browser-context interception guidance instead of introducing a new skill version"
  verification_surface: code-review-plus-targeted-live-verification
