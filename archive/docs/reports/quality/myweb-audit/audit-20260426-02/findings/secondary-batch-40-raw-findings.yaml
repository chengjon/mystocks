  title: Orphan advanced-analysis child pages still exposed local pseudo-analysis state without a verified owner
  trigger:
    steps:
      - "Open the high-priority secondary inventory entries under `web/frontend/src/views/advanced-analysis/`"
      - "Inspect `FundamentalAnalysisView.vue`, `TechnicalAnalysisView.vue`, `RadarAnalysisView.vue`, and `TradingSignalsView.vue` for local fallback values, default scores, or default signal state"
      - "Confirm the current router does not expose these child pages as independent canonical route entries"
  expected: "Orphan advanced-analysis child pages with no verified canonical owner should degrade to honest static shells and should not preserve local default metrics, ratings, signals, or fallback literals."
  actual: "Before repair, the child pages still rendered local financial ratios, indicator cards, radar scores, investment advice, and signal counts from component-local props/default state even though the parent advanced-analysis workbench had already been degraded to a static shell."
