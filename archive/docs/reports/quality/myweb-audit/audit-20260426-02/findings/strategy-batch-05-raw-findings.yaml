  title: Strategy parameters route presented count-only summary cards as faux delta metrics and rendered failed first-load tallies as resolved zero values
  trigger:
    steps:
      - Open `/strategy/parameters?strategyId=101`
      - Inspect the top summary cards after a verified strategy payload resolves
      - Re-run the same route with the first `/api/v1/strategy/strategies` request failing before any verified strategy payload exists
  expected: "Count-only strategy summary cards should render plain strings without shared delta chrome or pseudo-decimal precision, and failed first-load tallies should degrade to placeholders such as `-- / -- / -- / 101` until verified strategy summary evidence exists."
  actual: "Before repair, the route rendered verified count-only tallies as `1.00 / 2.00 / 0.00` with shared `● +0%` chrome, and a failed first `/api/v1/strategy/strategies` request still left the same summary strip at `0.00 / 0.00 / 0.00 / 101`."
  evidence:
    kind: live-observation
    note: "System-`google-chrome` verification with browser-context fulfillment reproduced both states before repair: a verified success path showing `1.00 / 2.00 / 0.00` plus `+0%`, and a first-load failure path showing `0.00 / 0.00 / 0.00 / 101` instead of placeholders."
  repair_target:
