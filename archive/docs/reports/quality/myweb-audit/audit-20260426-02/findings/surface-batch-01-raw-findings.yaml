- finding_id: risk-alerts-data-state-005
  batch_id: surface-batch-01
  page:
    route: /risk/alerts
    page_key: risk-alerts
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/risk/Alerts.vue
  source_role: data-state-audit
  severity: High
  issue_type: data-state
  title: Risk alerts count-only KPI cards inherited fabricated delta chrome and decimal precision from shared stat-card defaults
  trigger:
    steps:
      - Open `/risk/alerts`
      - Inspect the routed KPI strip for `规则总数`, `启用规则`, `未读告警`, and `高优先级`
      - Compare the visible stat-card presentation with the actual routed payload, which only proves integer counts and no comparison baseline
  expected: "The routed KPI strip should render honest plain counts with no delta affordance because the page does not expose a verified comparison baseline for these cards."
  actual: "Before repair, the count-only stat cards rendered exact-decimal values such as `2.00` and fabricated flat delta chrome such as `● +0%`, implying unsupported movement semantics on a plain count surface."
  evidence:
    kind: live-observation
    note: Targeted PM2 browser verification and the new routed regression test both showed `.artdeco-stat-change` chrome and decimal-formatted count values on the canonical `/risk/alerts` KPI strip before the page-local opt-out landed.
  repair_target:
    files:
      - web/frontend/src/views/risk/Alerts.vue
    primary_owner: web/frontend/src/views/risk/Alerts.vue
  can_fix_frontend: true
  shared_impact_candidate: true
  cross_page_impact:
    - /risk/news
    - /watchlist/manage
  status: open
  dependency: null
  dedupe_key: /risk/alerts:data-state:count-kpi-delta-truth
  verification_surface: live-audit
  verification:
    required: true
    complete: false
    notes: Re-check the routed KPI strip after repair and confirm the same shared pattern no longer appears on the other selected count-only routes in this batch.

