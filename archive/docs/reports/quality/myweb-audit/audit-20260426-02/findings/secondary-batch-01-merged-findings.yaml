- consolidated_issue_id: secondary-shell-issue-01
  severity: Medium
  title: Secondary embedded trading shell now delegates live truth to canonical /trade pages
  pages:
    - /secondary/artdeco-trading-management
  source_roles:
    - data-state-audit
  why_consolidated: "The fake shell-level REQ/SYNC summary strip and the local mock trade panels were two surfaces of the same secondary-owner truth defect: `ArtDecoTradingManagement.vue` did not own a verified runtime snapshot contract, so all supported tabs needed to delegate to canonical `/trade/*` pages while unsupported tabs degraded to static shell copy."
  primary_owner: web/frontend/src/views/artdeco-pages/ArtDecoTradingManagement.vue
  repair_bucket: fix-now
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: false
  cross_page_impact:
    - /trade/portfolio
    - /trade/signals
    - /trade/positions
    - /trade/history
  dedupe_keys:
    - /secondary/artdeco-trading-management:data-state:fakeShellLiveTruth
  verification_scope:
    routes:
      - /secondary/artdeco-trading-management
    states:
      - default
      - loading
      - empty
      - error
      - disabled
    breakpoints:
      - 1440
  repair_summary:
    files:
      - web/frontend/src/views/artdeco-pages/ArtDecoTradingManagement.vue
      - web/frontend/src/views/artdeco-pages/__tests__/ArtDecoTradingManagement.spec.ts
      - web/frontend/src/views/trade/Portfolio.vue
      - web/frontend/src/views/trade/__tests__/Portfolio.spec.ts
      - .claude/skills/myweb-audit/references/route-truth-operations.md
      - .claude/skills/myweb-audit/references/route-truth-casebook.md
    notes:
      - "the secondary owner no longer renders shell-level REQ_ID, SYNC, market status, or P&L copy"
      - "overview/signals/positions/history now reuse canonical `/trade/*` pages directly"
      - "unsupported attribution now degrades to a static explanatory shell instead of fake local live data"
      - "canonical `Portfolio.vue` now supports embedded reuse without duplicating its own route-level hero and stats strip"
  verification_surface: code-review-only
