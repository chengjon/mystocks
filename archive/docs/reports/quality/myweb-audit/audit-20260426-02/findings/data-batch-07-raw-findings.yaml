  issue_type: data-state
  title: Routed industry KPI strip inherited shared stat-card delta chrome and decimal precision for plain board tallies
  trigger:
    steps:
      - Open `/data/industry`
      - Wait for the canonical route to finish loading live industry rows
      - Inspect the top KPI strip
  expected: "Plain board tallies should render as honest count or label values such as `10`, `10`, `3.56%`, and `0` without fabricated flat-change dots, `+0%`, or exact-decimal count formatting."
  actual: "Before repair, the routed KPI strip rendered board tallies as `10.00`, `10.00`, and `0.00` with shared flat-change chrome and `+0%`, implying unsupported delta semantics and pseudo precision."
  evidence:
    kind: live-observation
    note: "System-`google-chrome` verification of the real PM2 route showed the top strip rendering `10.00 / ● +0%` style count cards even though the page only had current board tallies and no comparison baseline."
  repair_target:
