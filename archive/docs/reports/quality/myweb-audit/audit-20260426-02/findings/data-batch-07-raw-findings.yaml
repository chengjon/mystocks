    route_class: canonical-page
    canonical_entry: web/frontend/src/views/data/Industry.vue
  source_role: data-state-audit
  severity: Medium
  issue_type: data-state
  title: Routed industry rank column inherited shared exact-decimal table formatting and rendered ordinal rows as faux metrics
  trigger:
    steps:
      - Open `/data/industry`
      - Wait for the canonical route to finish loading live industry rows
      - Inspect the `排名` column in the routed board table
  expected: "The `排名` column should render live ordinal values as plain whole numbers such as `1`, `2`, and `3`, because board rank is an ordering field rather than a fractional metric."
  actual: "Before repair, the routed board table passed rank values through shared exact-decimal table formatting and rendered `1.00`, `2.00`, and `3.00`, implying unsupported fractional precision."
  evidence:
    kind: live-observation
    note: "System-`google-chrome` verification of the real PM2 route showed the live industry table rendering `1.00 / 2.00 / 3.00` in the first column; source review confirmed the page delegated `rank` to `ArtDecoTable`'s generic numeric formatter."
  repair_target:
    files:
      - web/frontend/src/views/data/Industry.vue
    primary_owner: web/frontend/src/views/data/Industry.vue
  can_fix_frontend: true
  shared_impact_candidate: true
  cross_page_impact:
    - /data/fund-flow
    - /market/lhb
  status: open
  dependency: null
  dedupe_key: /data/industry:data-state:industryRankOrdinalPrecision
  verification_surface: live-audit
  verification:
    required: true
    complete: false
    notes: Re-check that the live board table still renders real rows and now shows ordinal ranks without `x.00` precision.
