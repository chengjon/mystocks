- consolidated_issue_id: detail-news-issue-05
  severity: High
  title: Detail news route now makes auxiliary rules and trigger slices honest when they fail independently of the verified announcement list
  pages:
    - /detail/news/:symbol
  source_roles:
    - data-state-audit
  why_consolidated: "The monitor-rules and triggered-records cards were two instances of the same routed truth defect: auxiliary table slices on the canonical detail/news route silently collapsed into empty-success or unlabeled stale tables even when the announcement list itself remained the verified primary slice."
  primary_owner: web/frontend/src/views/announcement/composables/useAnnouncementMonitor.ts
  repair_bucket: fix-now
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: false
  cross_page_impact: []
  dedupe_keys:
    - /detail/news/:symbol:data-state:auxiliaryTableSliceRefreshTruth
  verification_scope:
    routes:
      - /detail/news/:symbol
    states:
      - default
      - auxiliary-first-load-failure
      - auxiliary-refresh-failure
    breakpoints:
      - 1440
  repair_summary:
    files:
      - web/frontend/src/views/announcement/composables/useAnnouncementMonitor.ts
      - web/frontend/src/views/announcement/AnnouncementMonitor.vue
      - web/frontend/src/views/announcement/styles/AnnouncementMonitor.scss
      - web/frontend/src/views/announcement/__tests__/AnnouncementMonitor.spec.ts
      - web/frontend/src/views/announcement/__tests__/useAnnouncementMonitor.spec.ts
      - web/frontend/tests/e2e/phase4-mainline-matrix.spec.ts
    notes:
      - "the detail/news composable now tracks `monitorRulesSliceState` and `triggeredRecordsSliceState` separately from the verified announcement list"
      - "first auxiliary slice failures now degrade to explicit unavailable notes instead of presenting silent empty tables"
      - "later auxiliary refresh failures now retain the last verified rule or trigger rows and pair them with slice-local stale notes"
      - "the canonical announcement list remains the verified primary slice and is no longer conflated with auxiliary rules or triggered-records failures"
      - "this batch reuses existing `myweb-audit v1.65 + v1.60` auxiliary-slice truth rules and does not introduce a new skill version"
  verification_surface: code-review-plus-targeted-live-verification
