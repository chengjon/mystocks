  source_role: data-state-audit
  severity: Medium
  issue_type: data-state
  title: Routed fund-flow rank column inherited shared exact-decimal table formatting and rendered ordinal rows as faux metrics
  trigger:
    steps:
      - Open `/data/fund-flow`
      - Wait for a resolved ranking surface under routed mock or regression coverage
      - Inspect the `排名` column in the routed ranking table
  expected: "The `排名` column should render ordinal values as plain whole numbers such as `1` and `2`, because ranking order is discrete rather than fractional."
  actual: "Before repair, the routed table delegated `rank` to the shared exact-decimal formatter and therefore rendered `1.00` and `2.00`, implying unsupported fractional precision."
  evidence:
    kind: code-path-review
    note: "Source review confirmed `FundFlow.vue` passed `rank` through the generic shared numeric formatter before the fix, and the routed component regression failed red on `1.00 / 2.00` until the page-local ordinal formatter landed."
  repair_target:
    files:
      - web/frontend/src/views/data/FundFlow.vue
    primary_owner: web/frontend/src/views/data/FundFlow.vue
  can_fix_frontend: true
  shared_impact_candidate: true
  cross_page_impact:
    - /market/lhb
  status: open
  dependency: null
  dedupe_key: /data/fund-flow:data-state:fundFlowRankOrdinalPrecision
  verification_surface: code-review-only
  verification:
    required: true
    complete: false
    notes: Re-check that the routed ranking surface shows ordinal ranks without `1.00` or `2.00` when the resolved table path is exercised.
