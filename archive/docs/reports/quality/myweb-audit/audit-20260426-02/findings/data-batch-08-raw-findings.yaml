    note: "System-`google-chrome` verification of the real PM2 route showed the page still on `资金流向同步中` while the top strip rendered faux zero metrics before the repair. Post-fix live verification now shows `-- / -- / -- / --` with zero `.artdeco-stat-change` nodes."
