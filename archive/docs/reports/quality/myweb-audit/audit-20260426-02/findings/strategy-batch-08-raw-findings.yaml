  title: Strategy repository route presented count-only summary cards and sibling count meta as faux delta metrics and reused zero or real-empty semantics before verified inventory existed
  trigger:
    steps:
      - Open `/strategy/repo`
      - Inspect the top summary cards and sibling `MATCHED / PAGE` meta after a verified strategy payload resolves
      - Re-run the same route while the first `/api/v1/strategy/strategies` request is still unresolved before any verified repository inventory exists
  expected: "Count-only repository summary cards should render plain strings without shared delta chrome or pseudo-decimal precision, and unresolved or failed first-load summary surfaces should degrade to placeholders such as `-- / -- / -- / 全部状态` plus `MATCHED: -- / PAGE: -- / --` until verified inventory evidence exists."
  actual: "Before repair, the route delegated verified count-only tallies directly into shared stat-card defaults, and the same route reused zero-valued counts plus a false `REAL 数据为空，请先创建策略。` empty-state message while the first strategy payload was still unresolved."
  evidence:
    kind: code-review-plus-targeted-verification
    note: "Code review of the pre-repair `ArtDecoStrategyManagement.vue` showed raw numeric counts, raw `MATCHED / PAGE` meta, and empty-state derivation from unresolved empty arrays, while targeted routed regression and browser-context verification confirmed the repaired states."
  repair_target:
