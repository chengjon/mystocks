- consolidated_issue_id: market-realtime-issue-02
  severity: High
  title: Market realtime routed hero request metadata now tracks verified quote provenance instead of failed retry ids
  pages:
    - /market/realtime
  source_roles:
    - data-state-audit
  why_consolidated: "The first-load failure trace-id leak, the faux 'retained snapshot' copy, and the stale-refresh trace-id overwrite were three manifestations of the same routed request-provenance cluster: the canonical realtime route treated `useArtDecoApi.lastRequestId` as if it always represented the currently visible verified quote snapshot."
  primary_owner: web/frontend/src/views/market/Realtime.vue
  repair_bucket: fix-now
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: false
  cross_page_impact:
    - /market/technical
    - /market/lhb
    - /data/concept
    - /trade/portfolio
  dedupe_keys:
    - /market/realtime:data-state:quoteRequestProvenanceTruth
  verification_scope:
    routes:
      - /market/realtime
    states:
      - first-load-failure
      - stale-refresh-failure
      - default
    breakpoints:
      - 1440
  repair_summary:
    files:
      - web/frontend/src/views/market/Realtime.vue
      - web/frontend/src/views/market/__tests__/Realtime.spec.ts
      - web/frontend/tests/e2e/phase1-mainline-matrix.spec.ts
    notes:
      - "the canonical realtime route now derives `TRACE_ID` from page-local verified-snapshot truth, so first-load failure renders `TRACE_ID: N/A / SAMPLE: --` instead of leaking a failed request id as if a quote snapshot had resolved"
      - "the same route now distinguishes first-load failure from stale-refresh failure in its error banner, so the first-load path no longer claims it preserved a previous verified quote snapshot when none existed"
      - "the same route now retains the last verified request id during stale-refresh failure, so visible rows and hero metadata stay aligned when a failed retry occurs after a successful sync"
      - "the strengthened routed regressions now cover first-load failure and refresh-after-success failure, closing the exact `lastRequestId` provenance regression on both component and Phase 1 routed surfaces without changing shared ArtDeco primitives"
      - "this batch intentionally reuses existing `myweb-audit v1.41`, `v1.39`, and `v1.38` guidance instead of introducing a new skill version"
  verification_surface: code-review-plus-targeted-live-verification
