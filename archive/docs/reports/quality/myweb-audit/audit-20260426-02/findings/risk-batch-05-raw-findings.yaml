  issue_type: data-state
  title: Risk stop-loss KPI strip inherited fabricated delta chrome and decimal precision on tally and label-only cards
  trigger:
    steps:
      - Open `/risk/stop-loss`
      - Inspect the routed KPI strip for `观察标的`, `已触发`, `临界标的`, and `最近距离`
      - Compare the visible stat-card presentation with the actual routed surface, which exposes counts and a nearest-distance label but no verified delta baseline
  expected: "The routed KPI strip should render honest count or label values only, with no flat-change chrome or pseudo precision when the page lacks comparison-baseline truth."
  actual: "Before repair, the canonical route rendered exact-decimal count values such as `1.00` or `0.00` plus fabricated flat-change chrome such as `● +0%`, even on honest empty or pending-policy states."
  evidence:
    kind: live-observation
    note: The new routed regression reproduced four `.artdeco-stat-change` nodes on the stop-loss KPI strip before repair, and targeted PM2 verification confirmed the natural route still showed the same shared-card chrome on honest empty-state data.
