- finding_id: system-health-data-state-001
  batch_id: system-batch-05
  page:
    route: /system/health
    page_key: system-health
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/system/Health.vue
  source_role: data-state-audit
  severity: Medium
  issue_type: data-state
  title: Routed system-health page treated successful plain `/api/health` payloads as unavailable runtime state
  trigger:
    steps:
      - Open `/system/health`
      - Allow the routed page to fetch the live `/api/health` probe
      - Inspect the hero status and top KPI strip on the routed surface
  expected: "A successful health probe should render live status and version truth even when the endpoint returns a plain object rather than a `UnifiedResponse` envelope."
  actual: "Before repair, `/system/health` hit `200` on `/api/health` but still rendered `UNKNOWN / N/A / N/A / 3` because the page's wrapper path discarded plain probe payloads."
  evidence:
    kind: live-observation
    note: "Targeted browser verification recorded successful `/api/health` responses while the routed page still showed unknown health state until a page-local contract adapter was added."
  repair_target:
    files:
      - web/frontend/src/views/system/Health.vue
      - web/frontend/src/views/system/healthProbeContract.ts
      - web/frontend/src/views/system/__tests__/Health.spec.ts
    primary_owner: web/frontend/src/views/system/healthProbeContract.ts
  can_fix_frontend: true
  shared_impact_candidate: false
  cross_page_impact:
    - /system/api
  status: open
  dependency: null
  dedupe_key: /system/health:data-state:health-probe-contract
  verification_surface: live-audit
  verification:
    required: true
    complete: false
    notes: Re-check that the routed page renders `HEALTHY` and the live `version` field after normalizing plain probe payloads.

- finding_id: system-health-data-state-002
  batch_id: system-batch-05
  page:
    route: /system/health
    page_key: system-health
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/system/Health.vue
  source_role: data-state-audit
  severity: Medium
  issue_type: data-state
  title: Routed system-health KPI strip leaked fabricated delta chrome and pseudo precision for count-or-label cards
  trigger:
    steps:
      - Open `/system/health`
      - Inspect the top `.stats-strip` stat cards
  expected: "Status, service, version, and middleware-count cards should render as plain labels or integers without `+0%`, flat dots, or `3.00`-style pseudo precision when no real comparison baseline exists."
  actual: "Before repair, the shared stat-card default added four flat-change chips and decimalized the middleware count on the routed KPI strip."
  evidence:
    kind: code-path-review
    note: "The canonical page passed raw numeric or label values to `ArtDecoStatCard` without overriding the component's default `showChange` and numeric formatting behavior."
  repair_target:
    files:
      - web/frontend/src/views/system/Health.vue
      - web/frontend/src/views/system/__tests__/Health.spec.ts
      - web/frontend/tests/e2e/phase4-mainline-matrix.spec.ts
    primary_owner: web/frontend/src/views/system/Health.vue
  can_fix_frontend: true
  shared_impact_candidate: false
  cross_page_impact:
    - /system/api
    - /system/data
  status: open
  dependency: null
  dedupe_key: /system/health:data-state:stats-strip-count-kpi-truth
  verification_surface: live-audit
  verification:
    required: true
    complete: false
    notes: Re-check that the routed KPI strip has zero `.artdeco-stat-change` nodes and no fake precision strings.

