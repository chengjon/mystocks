- finding_id: system-config-data-state-001
  batch_id: system-batch-05
  page:
    route: /system/config
    page_key: system-config
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/system/Settings.vue
  source_role: data-state-audit
  severity: Medium
  issue_type: data-state
  title: Routed system-config monitor fallback would collapse a successful plain health summary to unavailable
  trigger:
    steps:
      - Open `/system/config`
      - Let the detailed monitor path fail or return no usable rows
      - Allow the routed fallback path to call `/api/health`
  expected: "A successful plain health summary should downgrade the monitor tab to `SUMMARY` with `/api/health`-level truth instead of collapsing the routed surface to `UNAVAILABLE`."
  actual: "Before repair, the fallback path passed a plain `/api/health` payload through a generic wrapper that treated it as missing `success/data`, so the page would skip the summary fallback and mark the monitor tab unavailable."
  evidence:
    kind: code-path-review
    note: "A faithful `useArtDecoApi` test double reproduced the wrapper mismatch and proved the routed fallback path needed a page-family probe-envelope adapter."
  repair_target:
    files:
      - web/frontend/src/views/system/Settings.vue
      - web/frontend/src/views/system/healthProbeContract.ts
      - web/frontend/src/views/system/__tests__/Settings.spec.ts
    primary_owner: web/frontend/src/views/system/healthProbeContract.ts
  can_fix_frontend: true
  shared_impact_candidate: false
  cross_page_impact: []
  status: open
  dependency: null
  dedupe_key: /system/config:data-state:health-summary-fallback-contract
  verification_surface: code-review-only
  verification:
    required: true
    complete: false
    notes: Re-check the summary fallback path with a faithful wrapper contract and confirm the monitor tab prefers `SUMMARY` over `UNAVAILABLE`.
