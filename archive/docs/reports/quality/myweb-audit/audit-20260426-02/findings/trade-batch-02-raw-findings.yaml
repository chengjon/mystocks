  title: Routed signal workspace fabricated per-row signal detail and execution analytics from a signals-only payload
  trigger:
    steps:
      - Open `/trade/signals`
      - Let the route load a live or intercepted `/api/v1/trade/signals` payload that contains only current signal rows and includes a `HOLD` row
      - Inspect the primary list plus the quality and history panels
  expected: "The routed page should preserve only the signal fields actually present in the current payload; missing row IDs, reasons, confidence, strength, or execution analytics should degrade to explicit source-only, observation, or unverified states, and `HOLD` rows should stay non-executable."
  actual: "Before repair, the canonical trade signals page generated synthetic IDs such as `1000`, local reasons such as `${strategy} 信号触发`, confidence values `88%` or `76%`, star-based strength labels, rendered `HOLD` rows as `卖出`, and fabricated win-loss history plus quality metrics from the current signal list alone."
  evidence:
    kind: live-observation
    note: "Targeted browser verification with a controlled signals-only route fulfillment showed `/trade/signals` treating a `HOLD` row as a sell action and presenting synthetic confidence, reason, and execution-analytics surfaces even though the payload only carried current signal rows."
