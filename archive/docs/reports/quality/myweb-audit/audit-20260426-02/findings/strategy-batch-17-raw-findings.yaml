  title: Strategy GPU route presented performance-only or status-only partial refreshes as a full recent-sync runtime banner
  trigger:
    steps:
      - "Open `/strategy/gpu` with a controlled successful `/api/gpu/performance` response but no valid `/api/gpu/status` snapshot, or the inverse status-only path."
      - "Allow the route to complete its first visible refresh and inspect the top runtime banner."
      - "Compare the banner wording with the actually verified primary slices on the page."
  expected: "When only one primary slice verifies, the route-level runtime banner should explicitly degrade to partial-sync wording that identifies the missing or retained slice instead of presenting a generic full `最近同步` route sync."
  actual: "Before repair, the route stamped `最近同步 <time>` as soon as either primary slice produced a partial success and set `lastUpdatedAt`, even when the other primary slice was still unresolved. Controlled live proof reproduced `banner: 最近同步 8:20:44 PM`, `statusTag: 待同步`, and `perf: 当前加速倍数64x...` on the same shell."
  evidence:
    kind: live-observation
    note: "The new owner regression reproduced both performance-only and status-only partial first-load paths. After repair, targeted system-Chrome verification confirmed `banner: 部分同步 9:04:55 PM · GPU 状态待同步` on the performance-only path, while a full-success route still shows `最近同步 9:46:10 PM`."
