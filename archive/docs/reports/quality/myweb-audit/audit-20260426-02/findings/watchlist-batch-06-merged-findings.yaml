- consolidated_issue_id: watchlist-manage-issue-06
  severity: High
  title: Watchlist manage now preserves selector-to-row provenance when a later watchlist-stock refresh fails
  pages:
    - /watchlist/manage
  source_roles:
    - data-state-audit
  why_consolidated: "The stale-tab switch and the missing stale-refresh shell were two aspects of the same routed truth defect: the canonical watchlist-manage route kept the last verified stock rows visible after a later watchlist-stock refresh failed, but it rebound those rows to the newly requested watchlist instead of preserving selector-local provenance."
  primary_owner: web/frontend/src/views/artdeco-pages/stock-management-tabs/WatchlistManager.vue
  repair_bucket: fix-now
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: false
  cross_page_impact: []
  dedupe_keys:
    - /watchlist/manage:data-state:selectorScopedRowProvenanceTruth
  verification_scope:
    routes:
      - /watchlist/manage
    states:
      - default
      - watchlist-stock-refresh-failure
    breakpoints:
      - 1440
  repair_summary:
    files:
      - web/frontend/src/views/artdeco-pages/stock-management-tabs/WatchlistManager.vue
      - web/frontend/src/views/watchlist/__tests__/Manage.spec.ts
      - web/frontend/tests/e2e/phase2-mainline-matrix.spec.ts
      - .claude/skills/myweb-audit/SKILL.md
      - .claude/skills/myweb-audit/references/CHANGELOG.md
      - .claude/skills/myweb-audit/references/audit-checklist.md
      - .claude/agents/myweb-audit-data-state-audit.md
    notes:
      - "the route now treats store-backed watchlist selection as selector-scoped provenance instead of flipping the visible active tab before the new stock slice verifies"
      - "a failed later stock refresh now rolls the active watchlist chrome back to the last verified selector snapshot while preserving the previously verified rows"
      - "the route also promotes that later-failure path into explicit stale-refresh copy `自选列表刷新异常` instead of reusing the first-load failure shell"
      - "component regression coverage now locks the stale selector path, and the Phase 2 route matrix now pins the same `success -> selector-refresh-fail` behavior at the routed browser level"
      - "this batch introduces `myweb-audit v1.66` selector-scoped row-provenance guidance for tab, watchlist, and similar selector-owned row sets"
  verification_surface: code-review-plus-targeted-live-verification
