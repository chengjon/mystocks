- finding_id: strategy-signals-data-state-003
  batch_id: strategy-batch-20
  page:
    route: /strategy/signals
    page_key: strategy-signals
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/artdeco-pages/strategy-tabs/StrategySignalsTab.vue
  source_role: data-state-audit
  severity: High
  issue_type: data-state
  title: Strategy signals leaked the previous strategy snapshot after the route query switched to a new strategy without its own verified signal context
  trigger:
    steps:
      - "Open `/strategy/signals?strategyId=101` with a controlled successful signal response for strategy `101`."
      - "Confirm the route shows `FOCUS: 101`, `REQ_ID: req-live-strategy-signals-101`, and two signal rows such as `贵州茅台` and `比亚迪`."
      - "Switch the same routed page instance to `/strategy/signals?strategyId=202` before strategy `202` has any verified signal snapshot."
      - "Resolve the new selector request as `success: false` and inspect the hero meta, `COUNT`, and visible signal rows."
  expected: "Query-scoped signal rows, counts, and request provenance should belong only to the current `strategyId`. If the new selector has no verified snapshot, the route should degrade to `REQ_ID: N/A`, `COUNT: --`, and zero visible signal rows until the new selector verifies."
  actual: "Before repair, the route treated the global verified-snapshot flag as proof for every strategy query. After switching to `strategyId=202`, `/strategy/signals` could still show the old `REQ_ID`, counts, and rows from strategy `101` even though strategy `202` had no verified signal snapshot of its own."
  evidence:
    kind: live-observation
    note: "The owner red-green regression first reproduced `FOCUS: 202` with leaked `REQ_ID: req-strategy-signals-101` after the same mounted route instance switched queries. After repair, targeted system-Chrome verification with `serviceWorkers: block` confirmed `FOCUS: 202`, `REQ_ID: N/A`, `COUNT: --`, and zero visible rows while the route showed `strategy 202 signals unavailable`."
  repair_target:
    files:
      - web/frontend/src/views/artdeco-pages/strategy-tabs/StrategySignalsTab.vue
      - web/frontend/src/views/artdeco-pages/strategy-tabs/__tests__/StrategySignalsTab.spec.ts
      - web/frontend/tests/e2e/phase3-mainline-matrix.spec.ts
    primary_owner: web/frontend/src/views/artdeco-pages/strategy-tabs/StrategySignalsTab.vue
  can_fix_frontend: true
  shared_impact_candidate: true
  cross_page_impact:
    - /strategy/signals
    - /watchlist/signals
  status: open
  dependency: null
  dedupe_key: /strategy/signals:data-state:selectorScopedVerifiedSnapshotTruth
  verification_surface: live-audit
  verification:
    required: true
    complete: false
    notes: "Re-check the same `/strategy/signals` page instance after repair and confirm that switching from `strategyId=101` to `202` degrades the new selector shell to `N/A/--/0 rows` rather than leaking the earlier verified snapshot."
