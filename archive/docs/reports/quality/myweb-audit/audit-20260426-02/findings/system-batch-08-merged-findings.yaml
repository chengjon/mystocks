    - /system/api
  source_roles:
    - data-state-audit
  why_consolidated: "The first-load failure request-id leak and the stale-refresh request-id overwrite were two manifestations of the same routed request-provenance cluster: the canonical system API route treated `useArtDecoApi.lastRequestId` as if it always represented the currently visible verified system probe snapshot."
  primary_owner: web/frontend/src/views/system/API.vue
