- consolidated_issue_id: strategy-backtest-issue-01
  severity: Medium
  title: Strategy backtest execution rail now avoids false action buttons and makes derived backtest context explicit
  pages:
    - /strategy/backtest
  source_roles:
    - functional-audit
    - data-state-audit
  why_consolidated: The execution rail exposed pseudo-actions while the surrounding REAL context also overstated the truth of list-derived task and KPI panels; both defects stem from the same backtest workbench action/state boundary.
  primary_owner: web/frontend/src/views/artdeco-pages/strategy-tabs/backtestAnalysisViewModel.ts
  repair_bucket: fix-with-shared-impact-review
  repair_decision: approval-pending
  deferred_reason: null
  shared_impact_candidate: true
  cross_page_impact:
    - /strategy/backtest
  dedupe_keys:
    - /strategy/backtest:interaction:ArtDecoBacktestAnalysis
    - /strategy/backtest:data-state:backtestAnalysisViewModel
  verification_scope:
    routes:
      - /strategy/backtest
    states:
      - default
      - loading
      - error
      - disabled
    breakpoints:
      - 1920
      - 1440
      - 1280
  repair_summary:
    files:
      - web/frontend/src/views/artdeco-pages/strategy-tabs/ArtDecoBacktestAnalysis.vue
      - web/frontend/src/views/artdeco-pages/strategy-tabs/backtestAnalysisViewModel.ts
      - web/frontend/src/mock/backtestWorkbenchMock.ts
    notes:
      - "execution rail should not present unbound action buttons as runnable controls"
      - "REAL labeling should clearly distinguish strategy-list-derived summaries from true backtest task runtime state"
  verification_surface: code-review-only

