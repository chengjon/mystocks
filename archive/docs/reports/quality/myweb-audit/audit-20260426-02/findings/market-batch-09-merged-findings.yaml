- consolidated_issue_id: market-realtime-issue-03
  severity: High
  title: Market realtime now scopes verified quote rows and hero provenance to the active preset
  pages:
    - /market/realtime
  source_roles:
    - data-state-audit
  why_consolidated: "The canonical realtime route already had a local preset selector, but it still treated one route-global verified quote snapshot as truth for all presets. The stale row leak and stale `TRACE_ID` leak were both manifestations of the same selector-scoped verified-snapshot defect."
  primary_owner: web/frontend/src/views/market/Realtime.vue
  repair_bucket: fix-now
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: false
  cross_page_impact:
    - /dashboard
    - /detail/graphics/:symbol
  dedupe_keys:
    - /market/realtime:data-state:presetSelectorSnapshotTruth
  verification_scope:
    routes:
      - /market/realtime
    states:
      - default
      - preset-switch-first-load-pending
    breakpoints:
      - 1440
  repair_summary:
    files:
      - web/frontend/src/views/market/Realtime.vue
      - web/frontend/src/views/market/__tests__/Realtime.spec.ts
      - web/frontend/tests/e2e/phase1-mainline-matrix.spec.ts
    notes:
      - "the route now stores verified quote snapshots by preset instead of one route-global `overview`"
      - "hero `TRACE_ID` now resolves from the active preset's verified request provenance instead of the last verified request from any preset"
      - "switching to a new preset without its own verified snapshot now clears the old preset rows and shows the pending selector-local shell"
      - "owner and Phase 1 routed regressions now lock the same-instance `核心蓝筹样本 -> 金融权重样本` unresolved-switch proof"
      - "this batch reuses existing `myweb-audit v1.71` and `v1.68` selector-scoped verified-snapshot guidance; no new skill version was required"
  verification_surface: code-review-plus-targeted-live-verification
