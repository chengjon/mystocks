- finding_id: data-indicator-data-state-006
  batch_id: data-batch-19
  page:
    route: /data/indicator
    page_key: data-indicator
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/data/Advanced.vue
  source_role: data-state-audit
  severity: High
  issue_type: data-state
  title: Data indicator selected-indicator context leaked the previous verified registry entry after a verified refresh replaced the indicator universe
  trigger:
    steps:
      - "Open `/data/indicator` and let the indicator registry plus stock universe verify successfully."
      - "Click the `移动平均线` indicator card so the `selected indicator` detail workspace mounts."
      - "Trigger a later verified refresh whose refreshed `/api/v1/indicators/registry` payload no longer contains `MA` and instead returns a different verified registry such as only `RSI`."
      - "Inspect the `指标详情` workspace after the refresh completes."
  expected: "A selector-owned selected-indicator context on the canonical data-indicator route must stay aligned with the current verified indicator registry. If the refreshed registry no longer contains the previously selected indicator, the detail workspace should clear or degrade to neutral baseline truth instead of keeping the old indicator context visible."
  actual: "Before repair, `refreshData()` rebuilt `indicators` but never reconciled `selectedIndicator`, so a verified refresh could leave `selected indicator / 移动平均线 / MA` visible even after the current verified registry had already been replaced by a different universe."
  evidence:
    kind: live-observation
    note: "The new RED owner regression reproduced an editor workspace that still rendered `selected indicator / 移动平均线` after the refreshed registry had already replaced the available indicator universe. The controlled browser proof then confirmed the same same-instance refresh path until the fix cleared the stale detail workspace."
  repair_target:
    files:
      - web/frontend/src/composables/market/useDataAnalysis.ts
      - web/frontend/tests/unit/views/data-advanced-screening-truth.spec.ts
      - web/frontend/tests/e2e/phase2-mainline-matrix.spec.ts
    primary_owner: web/frontend/src/composables/market/useDataAnalysis.ts
  can_fix_frontend: true
  shared_impact_candidate: false
  cross_page_impact:
    - /data/indicator
  status: open
  dependency: null
  dedupe_key: /data/indicator:data-state:selectedIndicatorContextAfterVerifiedRegistryRefresh
  verification_surface: live-audit
  verification:
    required: true
    complete: false
    notes: "Re-check that `/data/indicator` clears the old `selected indicator` detail workspace after a verified refresh replaces the current indicator registry and no longer contains the previously selected indicator."
