  source_role: data-state-audit
  severity: Medium
  issue_type: data-state
  title: Routed industry page lost its refresh-truth contract by clearing or replacing last-known-good surfaces after a manual refresh failure
  trigger:
    steps:
      - Open `/data/industry`
      - Allow the initial industry request to succeed
      - Click `刷新板块`
      - Force the second industry request to fail
  expected: "A failed manual refresh should keep the last successful board table and rotation snapshot visible and explicitly warn that the page is showing stale data."
  actual: "Before repair, the page treated a refresh failure like a broader failure reset, so the stale-data contract for retained board and rotation content was missing."
  evidence:
    kind: live-observation
    note: "Unit reproduction and targeted system-Chrome verification both confirmed that `/data/industry` needed a page-local stale-refresh warning path that coexists with the retained board and rotation surfaces."
