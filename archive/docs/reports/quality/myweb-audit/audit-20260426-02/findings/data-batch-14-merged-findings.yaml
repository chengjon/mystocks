- consolidated_issue_id: data-industry-issue-03
  severity: High
  title: Industry routed hero request metadata now tracks verified board provenance instead of failed retry ids
  pages:
    - /data/industry
  source_roles:
    - data-state-audit
  why_consolidated: "The first-load failure request-id leak and the stale-refresh request-id overwrite were two manifestations of the same routed request-provenance cluster: the canonical industry route treated `useArtDecoApi.lastRequestId` as if it always represented the currently visible verified board snapshot."
  primary_owner: web/frontend/src/views/data/Industry.vue
  repair_bucket: fix-now
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: false
  cross_page_impact:
    - /data/concept
    - /data/fund-flow
    - /market/realtime
    - /trade/history
  dedupe_keys:
    - /data/industry:data-state:boardRequestProvenanceTruth
  verification_scope:
    routes:
      - /data/industry
    states:
      - first-load-failure
      - stale-refresh-failure
      - default
    breakpoints:
      - 1440
  repair_summary:
    files:
      - web/frontend/src/views/data/Industry.vue
      - web/frontend/src/views/data/__tests__/Industry.spec.ts
      - web/frontend/tests/e2e/phase1-mainline-matrix.spec.ts
    notes:
      - "the canonical industry route now derives `REQ_ID` from page-local verified-snapshot truth, so first-load failure renders `REQ_ID: N/A` instead of leaking a failed request id as if a board snapshot had resolved"
      - "the same route now retains the last verified request id during stale-refresh failure, so visible rows and hero metadata stay aligned when a failed retry occurs after a successful sync"
      - "the strengthened routed regressions now cover first-load failure and refresh-after-success failure, closing the exact `lastRequestId` provenance regression on both component and Phase 1 routed surfaces"
      - "this batch intentionally reuses existing `myweb-audit v1.41`, `v1.40`, and `v1.39` guidance instead of introducing a new skill version"
  verification_surface: code-review-plus-targeted-live-verification
