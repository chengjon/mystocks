- finding_id: detail-graphics-data-state-07
  batch_id: detail-batch-07
  page:
    route: /detail/graphics/:symbol
    page_key: stock-graphics
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/artdeco-pages/analysis-tabs/KLineAnalysis.vue
  source_role: data-state-audit
  severity: High
  issue_type: data-state
  title: Detail graphics route could leak the previous symbol k-line or indicator snapshot into a new detail symbol before the new symbol established its own verified snapshot
  trigger:
    steps:
      - "Open `/detail/graphics/600519` and let the route-owned K-line analysis snapshot verify successfully."
      - "Switch the same routed page instance to `/detail/graphics/000001`."
      - "Force the new `000001` K-line first load to fail before any verified `000001` snapshot exists, or let the new `000001` K-line succeed while the new indicator slice fails."
      - "Inspect `.module-meta`, `.trend-card`, and `.indicators-card` together."
  expected: "The canonical detail graphics route must treat the current route symbol as part of primary snapshot provenance. A new symbol with no verified K-line snapshot must not inherit the previous symbol trend points or request metadata, and a new symbol with only K-line success must not inherit the previous symbol indicators."
  actual: "Before repair, the route-owned detail graphics page tracked verified K-line and indicator state without symbol scoping. A route change from `600519` to `000001` could therefore leave the previous symbol snapshot visible until the new symbol established its own verified slices."
  evidence:
    kind: code-path-review
    note: "New RED regressions reproduced that selector switching reused the old verified route snapshot instead of enforcing symbol-scoped primary and enrichment truth."
  repair_target:
    files:
      - web/frontend/src/views/artdeco-pages/analysis-tabs/KLineAnalysis.vue
      - web/frontend/src/views/artdeco-pages/analysis-tabs/__tests__/KLineAnalysis.spec.ts
      - web/frontend/tests/e2e/phase1-mainline-matrix.spec.ts
    primary_owner: web/frontend/src/views/artdeco-pages/analysis-tabs/KLineAnalysis.vue
  can_fix_frontend: true
  shared_impact_candidate: false
  cross_page_impact:
    - /detail/graphics/:symbol
  status: open
  dependency: null
  dedupe_key: /detail/graphics/:symbol:data-state:selectorScopedPrimarySnapshotProvenance
  verification_surface: live-audit
  verification:
    required: true
    complete: false
    notes: "Re-check the canonical detail graphics route after repair and confirm that route switching to a new symbol no longer leaks the previous verified K-line or indicator snapshot into the current symbol surface."
