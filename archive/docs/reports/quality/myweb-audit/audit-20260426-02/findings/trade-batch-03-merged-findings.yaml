    routes:
      - /trade/history
    states:
      - default
      - empty
      - error
    breakpoints:
      - 1920
      - 1440
      - 1280
  repair_summary:
    files:
      - web/frontend/src/views/trade/History.vue
      - web/frontend/src/views/trade/__tests__/History.spec.ts
      - web/frontend/tests/e2e/phase3-mainline-matrix.spec.ts
    notes:
      - "removed the branch that wiped `internalHistory` after a failed refresh so last-known-good ledger rows stay mounted"
