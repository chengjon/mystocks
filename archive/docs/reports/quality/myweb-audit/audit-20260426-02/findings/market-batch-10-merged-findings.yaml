- consolidated_issue_id: market-lhb-issue-04
  severity: High
  title: Market LHB now scopes verified leaderboard rows and hero provenance to the active trade-date selector
  pages:
    - /market/lhb
  source_roles:
    - data-state-audit
  why_consolidated: "The canonical LHB route already owned a local trade-date selector, but it still treated one route-global verified leaderboard snapshot as truth for every date shell. The stale row leak and stale hero provenance leak were both manifestations of the same trade-date selector snapshot defect."
  primary_owner: web/frontend/src/views/market/LHB.vue
  repair_bucket: fix-now
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: false
  cross_page_impact:
    - /market/realtime
    - /detail/graphics/:symbol
  dedupe_keys:
    - /market/lhb:data-state:tradeDateSelectorSnapshotTruth
  verification_scope:
    routes:
      - /market/lhb
    states:
      - default
      - trade-date-switch-first-load-failure
    breakpoints:
      - 1440
  repair_summary:
    files:
      - web/frontend/src/views/market/LHB.vue
      - web/frontend/src/views/market/__tests__/LHB.spec.ts
      - web/frontend/tests/e2e/phase1-mainline-matrix.spec.ts
    notes:
      - "the route now stores verified leaderboard snapshots by `currentDate` selector key instead of one route-global payload"
      - "hero `REQ` now resolves from the active trade-date selector's verified request provenance"
      - "switching to a new trade-date without its own verified snapshot now clears the old rows and falls back to selector-local placeholders"
      - "owner and Phase 1 routed regressions now lock the same-instance `今日 -> 前日` failure proof"
      - "this batch reuses existing `myweb-audit v1.71` / `v1.68` selector-scoped guidance; no new skill version was required"
  verification_surface: code-review-plus-targeted-live-verification
