- consolidated_issue_id: detail-graphics-issue-07
  severity: High
  title: Detail graphics route now keeps selector-scoped K-line and indicator snapshots aligned with the current detail symbol
  pages:
    - /detail/graphics/:symbol
  source_roles:
    - data-state-audit
  why_consolidated: "The canonical detail graphics route had one routed truth cluster: its primary K-line and indicator slices were not selector-scoped, so a new symbol could inherit the previous verified symbol snapshot under the same routed page instance."
  primary_owner: web/frontend/src/views/artdeco-pages/analysis-tabs/KLineAnalysis.vue
  repair_bucket: fix-now
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: false
  cross_page_impact: []
  dedupe_keys:
    - /detail/graphics/:symbol:data-state:selectorScopedPrimarySnapshotProvenance
  verification_scope:
    routes:
      - /detail/graphics/:symbol
    states:
      - default
      - selector-switch-first-load-failure
      - selector-switch-enrichment-first-load-failure
    breakpoints:
      - 1440
  repair_summary:
    files:
      - web/frontend/src/views/artdeco-pages/analysis-tabs/KLineAnalysis.vue
      - web/frontend/src/views/artdeco-pages/analysis-tabs/__tests__/KLineAnalysis.spec.ts
      - web/frontend/tests/e2e/phase1-mainline-matrix.spec.ts
    notes:
      - "the route-owned K-line analysis page now tracks verified K-line and indicator state per detail symbol instead of globally"
      - "a new symbol first-load failure now clears the old primary K-line snapshot instead of leaking the previous symbol trend points and request metadata"
      - "a new symbol enrichment failure now keeps only the new symbol K-line snapshot visible and clears the previous symbol indicators"
      - "this batch reuses existing `myweb-audit v1.66` selector-scoped provenance guidance and does not introduce a new skill version"
  verification_surface: code-review-plus-targeted-live-verification
