- finding_id: strategy-opt-data-state-003
  batch_id: strategy-batch-22
  page:
    route: /strategy/opt
    page_key: strategy-opt
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/artdeco-pages/strategy-tabs/ArtDecoStrategyOptimization.vue
  source_role: data-state-audit
  severity: High
  issue_type: data-state
  title: Strategy optimization leaked the previous strategy snapshot after the route query switched to a new strategy without its own verified optimization context
  trigger:
    steps:
      - "Open `/strategy/opt?strategyId=101` with a controlled successful strategies payload that verifies strategy `101`."
      - "Confirm the route shows `FOCUS: ID 101`, `REQ_ID: req-live-strategy-opt-success`, `PROCESS: 42.00`, and one visible `Momentum Alpha` optimization row."
      - "Switch the same routed page instance to `/strategy/opt?strategyId=202` before strategy `202` has any verified optimization snapshot."
      - "Inspect the hero meta, summary tallies, content-shell focus meta, and visible optimization table without remounting the owner route."
  expected: "Query-scoped optimization rows, summary tallies, and request provenance should belong only to the current `strategyId`. If the new selector has no verified optimization snapshot, the route should degrade to `REQ_ID: N/A`, `PROCESS: N/A`, `VISIBLE: -- / TOTAL: --`, `-- / -- / -- / ID 202`, and zero visible optimization rows until the new selector verifies."
  actual: "Before repair, `/strategy/opt` used one global verified-snapshot flag for every selector on the mounted route. After switching to `strategyId=202`, the route could still show the previous strategy's verified `REQ_ID / PROCESS`, `VISIBLE / TOTAL`, and optimization row truth even though the new selector had no verified optimization snapshot of its own."
  evidence:
    kind: live-observation
    note: "The owner red-green regression first reproduced `FOCUS: ID 202` together with leaked `REQ_ID: req-strategy-opt`. After repair, targeted system-`google-chrome` verification with browser-context interception confirmed `FOCUS: ID 202`, `REQ_ID: N/A`, `PROCESS: N/A`, `-- / -- / -- / ID 202`, zero visible optimization rows, and no leaked `Momentum Alpha`."
  repair_target:
    files:
      - web/frontend/src/views/artdeco-pages/strategy-tabs/ArtDecoStrategyOptimization.vue
      - web/frontend/src/views/artdeco-pages/strategy-tabs/__tests__/ArtDecoStrategyOptimization.spec.ts
      - web/frontend/tests/e2e/phase3-mainline-matrix.spec.ts
    primary_owner: web/frontend/src/views/artdeco-pages/strategy-tabs/ArtDecoStrategyOptimization.vue
  can_fix_frontend: true
  shared_impact_candidate: true
  cross_page_impact:
    - /strategy/opt
  status: open
  dependency: null
  dedupe_key: /strategy/opt:data-state:selectorScopedVerifiedSnapshotTruth
  verification_surface: live-audit
  verification:
    required: true
    complete: false
    notes: "Re-check that the same mounted `/strategy/opt` instance degrades to selector-local unavailable truth after switching from `strategyId=101` to `202`, and confirm the old `Momentum Alpha` row and request provenance no longer leak into the new selector shell."
