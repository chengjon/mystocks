  primary_owner: web/frontend/src/views/artdeco-pages/analysis-tabs/KLineAnalysis.vue
  repair_bucket: fix-now
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: false
  cross_page_impact:
    - /market/technical
  dedupe_keys:
    - /detail/graphics/:symbol:data-state:primarySnapshotProvenanceTruth
  verification_scope:
    routes:
      - /detail/graphics/:symbol
    states:
      - unresolved-first-load
      - first-load-failure
      - stale-refresh-failure
      - default
    breakpoints:
      - 1440
  repair_summary:
    files:
      - web/frontend/src/views/artdeco-pages/analysis-tabs/KLineAnalysis.vue
      - web/frontend/src/views/artdeco-pages/analysis-tabs/__tests__/KLineAnalysis.spec.ts
      - web/frontend/tests/e2e/phase1-mainline-matrix.spec.ts
      - .claude/skills/myweb-audit/SKILL.md
