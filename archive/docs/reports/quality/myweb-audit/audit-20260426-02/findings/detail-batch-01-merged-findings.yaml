    notes:
      - "the canonical detail graphics route now derives hero `REQ_ID` from a page-local verified primary K-line snapshot instead of directly mirroring the latest `useArtDecoApi.lastRequestId` transport attempt"
      - "before any verified primary K-line snapshot exists, the route now renders `POINTS: --` and suppresses `REQ_ID` rather than leaking unresolved or failed first-load provenance as `POINTS: 0` or failed request ids"
      - "a later failed `开始分析` refresh now preserves the last verified request id and visible K-line sample while showing stale-refresh copy"
      - "the routed component regression and Phase 1 matrix now pin unresolved first-load, first-load failure, and stale-refresh failure on the real canonical detail route"
      - "this batch introduces `myweb-audit v1.45` detail-primary snapshot provenance guidance for canonical detail routes that mix a primary snapshot request with secondary enrichment requests"
