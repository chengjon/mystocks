- consolidated_issue_id: strategy-opt-issue-01
  severity: High
  title: Strategy optimization summary surfaces now render honest count-only cards and unresolved first-load placeholders instead of faux delta metrics, inherited zero tallies, or false missing-state copy
  pages:
    - /strategy/opt
  source_roles:
    - data-state-audit
  why_consolidated: "The top strategy-opt tally strip and adjacent `VISIBLE / TOTAL` meta leaked the same route-truth defect across neighboring states: verified count-only tallies, natural empty-state zeros, and unresolved first-load candidate state were all delegated into shared numeric presentation before the canonical page distinguished them."
  primary_owner: web/frontend/src/views/artdeco-pages/strategy-tabs/ArtDecoStrategyOptimization.vue
  repair_bucket: fix-now
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: true
  cross_page_impact:
    - /strategy/opt
  dedupe_keys:
    - /strategy/opt:data-state:summaryCountAndFirstLoadTruth
  verification_scope:
    routes:
      - /strategy/opt
    states:
      - default
      - empty
      - loading
      - error
    breakpoints:
      - 1440
  repair_summary:
    files:
      - web/frontend/src/views/artdeco-pages/strategy-tabs/ArtDecoStrategyOptimization.vue
      - web/frontend/src/views/artdeco-pages/strategy-tabs/__tests__/ArtDecoStrategyOptimization.spec.ts
      - web/frontend/tests/e2e/phase3-mainline-matrix.spec.ts
    notes:
      - "the routed strategy-opt surface now derives `showSummaryPlaceholders` and `showPendingOptimizationPlaceholders` from first-load and unavailable-state evidence, so unresolved or failed first loads degrade the count-only tally strip to `-- / -- / -- / ID 101` and sibling `VISIBLE / TOTAL` meta to `--`"
      - "the same route now passes plain string values and `show-change=false` to every top tally card, so verified count-only states and natural empty-state zeros no longer inherit shared `+0%` chrome or decimal pseudo precision"
      - "the pending first-load path no longer mislabels unresolved inventory as `未找到策略 101 的优化候选`; it now shows explicit synchronization copy until real candidate evidence arrives"
      - "this batch reuses existing `myweb-audit v1.32 + v1.37 + v1.38 + v1.39` rules rather than introducing a new skill version, because the defect was a direct combination of count-kpi delta truth, numeric-cluster review, unresolved first-load truth, and browser-context verification practice"
  verification_surface: code-review-plus-targeted-live-verification
