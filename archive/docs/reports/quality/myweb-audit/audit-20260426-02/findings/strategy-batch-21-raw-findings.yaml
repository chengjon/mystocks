- finding_id: strategy-parameters-data-state-003
  batch_id: strategy-batch-21
  page:
    route: /strategy/parameters
    page_key: strategy-parameters
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/artdeco-pages/strategy-tabs/StrategyParametersTab.vue
  source_role: data-state-audit
  severity: High
  issue_type: data-state
  title: Strategy parameters leaked the previous strategy snapshot after the route query switched to a new strategy without its own verified parameter context
  trigger:
    steps:
      - "Open `/strategy/parameters?strategyId=101` with a controlled successful strategies payload that verifies strategy `101`."
      - "Confirm the route shows `FOCUS: 101`, `REQ_ID: req-live-strategy-parameters-success`, `PROCESS: 36.00 ms`, and the visible `Momentum Alpha` parameter card."
      - "Switch the same routed page instance to `/strategy/parameters?strategyId=202` before strategy `202` has any verified parameter snapshot."
      - "Inspect the hero meta, top-strip tallies, and visible parameter cards without remounting the owner route."
  expected: "Query-scoped parameter rows, summary tallies, and request provenance should belong only to the current `strategyId`. If the new selector has no verified parameter snapshot, the route should degrade to `REQ_ID: N/A`, `PROCESS: N/A ms`, `-- / -- / -- / 202`, and zero visible cards until the new selector verifies."
  actual: "Before repair, `/strategy/parameters` used one global verified-snapshot flag for every selector on the mounted route. After switching to `strategyId=202`, the route could still show the previous strategy's verified `REQ_ID / PROCESS` and summary truth even though the new selector had no verified parameter snapshot of its own."
  evidence:
    kind: live-observation
    note: "The owner red-green regression first reproduced `FOCUS: 202` together with leaked `REQ_ID: req-strategy-parameters-success`. After repair, targeted system-`google-chrome` verification with browser-context interception confirmed `FOCUS: 202`, `REQ_ID: N/A`, `PROCESS: N/A ms`, `-- / -- / -- / 202`, and zero visible cards without leaking `Momentum Alpha`."
  repair_target:
    files:
      - web/frontend/src/views/artdeco-pages/strategy-tabs/StrategyParametersTab.vue
      - web/frontend/src/views/artdeco-pages/strategy-tabs/__tests__/StrategyParametersTab.spec.ts
      - web/frontend/tests/e2e/phase3-mainline-matrix.spec.ts
    primary_owner: web/frontend/src/views/artdeco-pages/strategy-tabs/StrategyParametersTab.vue
  can_fix_frontend: true
  shared_impact_candidate: true
  cross_page_impact:
    - /strategy/parameters
  status: open
  dependency: null
  dedupe_key: /strategy/parameters:data-state:selectorScopedVerifiedSnapshotTruth
  verification_surface: live-audit
  verification:
    required: true
    complete: false
    notes: "Re-check that the same mounted `/strategy/parameters` instance degrades to selector-local unavailable truth after switching from `strategyId=101` to `202`, and confirm the old `Momentum Alpha` snapshot no longer leaks into the new selector shell."
