    route_class: canonical-page
    canonical_entry: web/frontend/src/views/artdeco-pages/strategy-tabs/ArtDecoBacktestAnalysis.vue
  source_role: data-state-audit
  severity: High
  issue_type: data-state
  title: Strategy backtest leaked the previous strategy report row after the route query switched to a new strategy without its own verified report context
  trigger:
    steps:
      - "Open `/strategy/backtest?strategyId=101` with a controlled successful strategies payload for strategy `101`."
      - "Start a controlled completed backtest run so the route syncs one verified report row for `101` into `报告中心`."
      - "Switch the same mounted route instance to `/strategy/backtest?strategyId=202` before strategy `202` has any verified backtest report context."
      - "Inspect the `报告中心` table without remounting the routed owner."
  expected: "Selector-owned backtest report rows should belong only to the current `strategyId` query. If the new selector has no verified report context, the mounted `/strategy/backtest` route should keep `ID 202` in the context strip while the visible report table drops back to zero rows."
  actual: "Before repair, `syncBacktestResultReport()` wrote verified report rows into one route-local array and the same mounted `/strategy/backtest` instance kept showing the earlier `Momentum Alpha` report row after switching from `strategyId=101` to `strategyId=202`, even though the new selector had never verified its own backtest report context."
  evidence:
    kind: live-observation
    note: "Owner red-green regression reproduced the leak with `ID 202` plus one lingering report row. After repair, targeted Playwright-library verification with system `google-chrome` confirmed the same mounted route first had one report row for `101`, then dropped to zero report rows after the `101 -> 202` selector switch."
  repair_target:
    files:
      - web/frontend/src/views/artdeco-pages/strategy-tabs/backtestAnalysisViewModel.ts
      - web/frontend/src/views/artdeco-pages/strategy-tabs/__tests__/ArtDecoBacktestAnalysis.spec.ts
      - web/frontend/tests/e2e/phase3-mainline-matrix.spec.ts
    primary_owner: web/frontend/src/views/artdeco-pages/strategy-tabs/backtestAnalysisViewModel.ts
  can_fix_frontend: true
  shared_impact_candidate: true
  cross_page_impact:
    - /strategy/backtest
  status: open
  dependency: null
  dedupe_key: /strategy/backtest:data-state:selectorScopedReportRowsTruth
  verification_surface: live-audit
  verification:
    required: true
    complete: false
    notes: "Re-check that the same mounted `/strategy/backtest` instance drops from one report row to zero rows after switching from `strategyId=101` to `202`, and confirm the old `Momentum Alpha` report row no longer remains visible under the new selector shell."
