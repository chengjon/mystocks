  title: Blank-layout 404 recovery action used root redirect instead of canonical home-route truth
  trigger:
    steps:
      - "Open an unmatched route such as `/__blank-layout-missing-route__`"
      - "Confirm the blank-layout 404 shell is visible"
      - "Click `返回首页`"
