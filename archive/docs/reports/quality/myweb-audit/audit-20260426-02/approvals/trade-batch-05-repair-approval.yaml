- consolidated_issue_id: trade-signals-issue-02
  severity: High
  affected_routes:
    - /trade/signals
  source_roles:
    - data-state-audit
  primary_repair_target: web/frontend/src/views/trade/Signals.vue
  page_scope: page-local
  frontend_fixable: true
  repair_bucket: fix-now
  changes_truth_sources:
    route_truth: true
    page_config: false
    shared_composable: false
    shared_component: false
    generated_artifact: false
  summary: Count or label-only stat cards on `/trade/signals` should not inherit shared stat-card delta chrome or exact-decimal precision when the routed surface only proves tallies, latency, and pending-analysis labels.
  dependency: null
  shared_impact:
    candidate: true
    basis: The defect pattern came from shared stat-card defaults and was also reproduced on `/trade/history` plus earlier risk and watchlist routes, but the current batch intentionally repairs the route locally because `ArtDecoStatCard.vue` still has a HIGH upstream blast radius.
    related_routes:
      - /trade/history
      - /risk/overview
      - /risk/stop-loss
      - /risk/alerts
      - /risk/news
      - /watchlist/manage
  approval_status: approved

