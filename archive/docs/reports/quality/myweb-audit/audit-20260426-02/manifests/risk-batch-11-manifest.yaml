    - "the route exposes visible `REQ_ID`, `TODAY`, `ANNOUNCEMENTS`, `LINKED`, and top-strip counts, so these surfaces must follow a page-local verified snapshot boundary rather than the latest request attempt"
    - "controlled browser-context fulfillment is acceptable for first-load failure and refresh-after-success proof on this route because it lets the batch pin stale-refresh truth without depending on backend timing"
