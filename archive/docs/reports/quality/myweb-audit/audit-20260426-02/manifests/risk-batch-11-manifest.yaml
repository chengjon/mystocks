    - "controlled headless verification reproduced both the first-load failure path and the success-then-refresh-fail path, while natural PM2 browser reuse additionally confirmed a healthy live empty-state shell with a real request id"
verification_plan:
  verification_strategy: code-review-plus-targeted-live-verification
  browser_project: chromium
  breakpoints: [1440]
  required_states: [loading, error, default]
  notes:
    - "verify a resolved first-load failure now renders `REQ_ID: N/A`, `TODAY: --`, `ANNOUNCEMENTS: --`, `LINKED: --`, and top-strip `-- / -- / -- / --` without leaking failed request ids"
    - "verify a later manual refresh failure keeps the last verified request id and visible announcements instead of clearing the route shell"
    - "verify first-load failure does not fall through to `暂无公告数据` or `当前没有可展示的公告记录。` before any verified snapshot exists"
    - "verify the natural PM2 route still remains reachable and, if it does, record the real request id plus live empty-state summary"
