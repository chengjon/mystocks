batch_rationale: Close the canonical `/watchlist/screener` stock-universe request-provenance and resolved-failure-envelope truth defect so `success:false` payloads cannot be swallowed as empty-universe success and failed request ids cannot leak into visible hero metadata before or after a verified stock-universe snapshot exists, while reusing existing `myweb-audit v1.40`, `v1.41`, and `v1.39` rules.
