    - "canonical route truth for `/watchlist/screener` remains `web/frontend/src/views/watchlist/Screener.vue`, while the routed surface owner lives in `web/frontend/src/views/stocks/Screener.vue`"
    - "the stock-universe transport can resolve failures as ordinary `success: false` payload envelopes, so the route must classify resolved failure truth before mapping rows, summary counts, or empty-state copy"
    - "hero request provenance must reflect the currently visible verified stock-universe snapshot rather than the latest failed retry"
    - "controlled browser-context fulfillment is required for the resolved-envelope and stale-refresh proofs even when the natural PM2 route is healthy, because those exact failure shapes are not reproducible on demand through the live backend"
    - "the approved repair should stay page-local in `web/frontend/src/views/stocks/Screener.vue` and the Phase 2 routed regression matrix rather than altering shared ArtDeco defaults or a shared request wrapper"
  fallback_log:
    - "the default local Playwright chromium bundle is still unavailable on this machine, so targeted live verification used Playwright-library control of system `google-chrome`"
    - "the routed stock-universe request had to be intercepted at the browser-context level on `**/v1/data/stocks/basic**`, because page-scoped `/api/v1/data/stocks/basic` interception did not match the backend absolute-url transport used by the route"
verification_plan:
  verification_strategy: code-review-plus-targeted-live-verification
  browser_project: chromium
  breakpoints: [1440]
  required_states: [error, default, loading]
  notes:
    - "verify resolved `success:false` first-load `/watchlist/screener` now renders `REQ: N/A`, `UNIVERSE: --`, top-strip `-- / -- / -- / --`, and blocking failure copy instead of fake empty-universe success"
    - "verify the same first-load failure route does not leak the failed request id anywhere in the visible page shell"
    - "verify a success-then-fail refresh path keeps the last verified request id visible, preserves previous stock rows, and surfaces the stale-refresh warning banner"
    - "verify the natural PM2 success path still renders a real request id and live stock-universe summary values from `/api/v1/data/stocks/basic?limit=200`"
