batch_rationale: Close the routed stop-loss threshold-policy truth gap so watchlist and quote data cannot be mislabeled as active stop-loss monitoring when the current payload lacks real threshold inputs such as `stop_loss_price`, and fold that pattern back into myweb-audit.
audit_roles:
  - route-inventory
  - functional-audit
  - data-state-audit
environment:
  frontend_url: http://localhost:3020
  backend_url: http://localhost:8020
  browser_tool: playwright
  execution_surface: code-review-plus-targeted-live-verification
  frontend_runtime_mode: reuse-existing
  assumptions:
    - "canonical route truth for `/risk/stop-loss` remains `web/frontend/src/views/risk/StopLoss.vue`"
    - "the routed page continues to load watchlist inventory and stop-loss candidates from `/api/v1/monitoring/watchlists`, `/api/v1/monitoring/watchlists/:watchlistId/stocks`, and `/api/v1/market/quotes`"
    - "when a live or intercepted watchlist stock row lacks `stop_loss_price`, the routed page must degrade to pending-policy wording instead of presenting active stop-loss monitoring semantics"
  fallback_log:
    - "the default local Playwright chromium bundle is still unavailable on this machine, so targeted live verification used Playwright-library control of system `google-chrome`"
    - "the current live backend route naturally exercised the honest empty state but not the missing-threshold state, so targeted browser verification fulfilled watchlist and quote endpoints directly to isolate the threshold-policy truth path"
verification_plan:
  verification_strategy: code-review-plus-targeted-live-verification
  browser_project: chromium
  breakpoints: [1440]
  required_states: [default, empty]
  notes:
    - "verify `/risk/stop-loss` no longer shows `止损观察中`, `STOP LOSS --`, or `Distance to Stop --%` when the watchlist stocks payload has quotes but no `stop_loss_price`"
    - "verify the routed page degrades to `策略待接入` and `当前仅同步观察标的与行情，止损参数待接入。` while keeping the actual watchlist symbol and quote visible"
