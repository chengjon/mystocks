batch_rationale: Close the canonical `/market/lhb` leaderboard request-provenance defect so first-load failures and stale-refresh failures cannot leak failed `REQ` ids into visible hero metadata when the rendered leaderboard snapshot was never verified or still belongs to an earlier successful sync, while reusing existing `myweb-audit v1.41` route-truth and `v1.39` verification-method rules.
