  frontend_url: http://localhost:3020
  backend_url: http://localhost:8020
  browser_tool: playwright
  execution_surface: code-review-plus-targeted-live-verification
  frontend_runtime_mode: reuse-existing
  assumptions:
    - "canonical route truth for `/market/lhb` remains `web/frontend/src/views/market/LHB.vue`"
    - "the approved repair should stay page-local inside `LHB.vue` and the Phase 1 routed regression matrix rather than altering shared ArtDeco defaults or the shared request wrapper"
    - "before any verified leaderboard snapshot exists, routed hero request metadata must degrade to explicit placeholders such as `REQ: N/A / ROWS: --` instead of leaking failed request ids or faux zero-row truth"
    - "if a refresh fails after a successful sync, the route should continue to expose the request id that produced the currently visible verified board rather than the failed retry request id"
    - "the routed request-provenance truth rule already exists in `myweb-audit v1.41`, and browser verification should reuse `v1.39` context-level interception when failure-state proof depends on controlled requests"
  fallback_log:
    - "the default local Playwright chromium bundle is still unavailable on this machine, so targeted live verification used Playwright-library control of system `google-chrome`"
verification_plan:
  verification_strategy: code-review-plus-targeted-live-verification
  browser_project: chromium
  breakpoints: [1440]
  required_states: [error, default, loading]
  notes:
