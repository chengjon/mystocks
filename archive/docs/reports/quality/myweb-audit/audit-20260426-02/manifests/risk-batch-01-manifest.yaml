    - canonical route truth for `/risk/overview` remains `web/frontend/src/views/risk/Overview.vue`
    - live rules continue to load from `/api/v1/monitoring/alert-rules` and live alert records continue to load from `/api/v1/monitoring/alerts?page=1&page_size=50`
