    - "the approved repair should stay page-local in `Overview.vue` instead of widening into shared `useArtDecoApi` behavior"
    - "the route aggregates multiple primary slices (`alert-rules` plus `alerts`), so visible `REQ_ID`, `ALERTS`, `RULES`, and top-strip counts must follow a page-local verified snapshot boundary rather than the latest individual request attempt"
    - "controlled browser-context fulfillment is acceptable for first-load failure proof on this route because the same failure shape is not reliably reproducible on demand through the live backend"
    - "the success-then-refresh-fail browser path may be sensitive to auth/reload timing in this environment, so any unstable browser-only result must be recorded as observation-only instead of being promoted to product verdict"
