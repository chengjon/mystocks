  frontend_url: http://localhost:3020
  backend_url: http://localhost:8020
  browser_tool: playwright
  execution_surface: code-review-plus-targeted-live-verification
  frontend_runtime_mode: reuse-existing
  assumptions:
    - "canonical route truth for `/trade/signals` remains `web/frontend/src/views/trade/Signals.vue`"
    - "the current live `/api/v1/trade/signals` surface may return only current signal rows and may omit `signal_id`, `reason`, `confidence`, `strength`, or execution-outcome analytics"
    - "`HOLD` rows must remain observational when the current live payload does not expose executable order intent"
  fallback_log:
    - "the default local Playwright chromium bundle is still unavailable on this machine, so targeted live verification used Playwright-library control of system `google-chrome`"
    - "targeted routed verification used two passes: a real PM2 page load to confirm route health and a controlled `/api/v1/trade/signals` fulfillment to isolate the old signals-only truth defect path"
verification_plan:
  verification_strategy: code-review-plus-targeted-live-verification
  browser_project: chromium
  breakpoints: [1920, 1440, 1280]
  required_states: [default, empty, error]
  notes:
    - "verify `/trade/signals` no longer fabricates `88%`, `76%`, `${strategy} 信号触发`, synthetic signal IDs, or win-loss history when the current payload only contains signal rows"
    - "verify `HOLD` rows render as observational and non-executable instead of being relabeled as `卖出`"
    - "the signals-only controlled verification path is tracked as a targeted live-check note rather than a manifest enum state because the schema only accepts default/loading/empty/error/disabled/extreme-data"
