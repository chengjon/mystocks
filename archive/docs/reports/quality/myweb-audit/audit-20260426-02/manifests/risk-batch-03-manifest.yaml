batch_rationale: Close the routed risk-management alert-policy truth gap so live positions or exposure data cannot be mislabeled as true alerts, stop-loss states, or action recommendations when no alert-policy inputs exist, and fold that pattern back into myweb-audit.
audit_roles:
  - route-inventory
  - functional-audit
  - data-state-audit
environment:
  frontend_url: http://localhost:3020
  backend_url: http://localhost:8020
  browser_tool: playwright
  execution_surface: code-review-plus-targeted-live-verification
  frontend_runtime_mode: reuse-existing
  assumptions:
    - "canonical route truth for `/risk/management` remains `web/frontend/src/views/risk/Center.vue`"
    - "the routed page continues to load holdings exposure from `/api/v1/trade/positions` rather than a dedicated risk-alert or stop-loss policy contract"
    - "when the live payload lacks alert-policy inputs, stop-loss states and action buttons must degrade to observation or review mode instead of presenting inferred heuristics as true alerts"
  fallback_log:
    - "the default local Playwright chromium bundle is still unavailable on this machine, so targeted live verification used Playwright-library control of system `google-chrome`"
    - "targeted live verification blocked service workers and fulfilled `/api/v1/trade/positions` directly so the routed alert-policy truth path could be isolated from unrelated browser-runtime noise"
verification_plan:
  verification_strategy: code-review-plus-targeted-live-verification
  browser_project: chromium
  breakpoints: [1920, 1440, 1280]
  required_states: [default, empty]
  notes:
    - "verify `/risk/management` no longer labels holdings-derived rows as `风险预警列表`, `止损状态`, or `操作建议` when the current payload only contains positions exposure truth"
    - "verify the routed page degrades to observation or review language such as `风险观察列表`, `策略状态`, `复核状态`, `未校验`, and `待复核`"
