batch_rationale: "Close the canonical `/detail/news/:symbol` sibling-stats contract truth gap so a routed page that already requests a dedicated live announcement stats slice no longer shows one live total beside label-only sibling cards or unresolved `0` fallbacks. This batch also codifies the new sibling-stats contract guidance as `myweb-audit v1.50`."
audit_roles:
  - route-inventory
  - functional-audit
  - data-state-audit
environment:
  frontend_url: http://localhost:3020
  backend_url: http://localhost:8020
  browser_tool: playwright
  execution_surface: code-review-plus-targeted-live-verification
  frontend_runtime_mode: reuse-existing
  assumptions:
    - "canonical route truth for `/detail/news/:symbol` remains `web/frontend/src/views/announcement/AnnouncementMonitor.vue`"
    - "the approved repair should stay page-local in `AnnouncementMonitor.vue` and routed regressions instead of widening into shared `useAnnouncementMonitor` behavior"
    - "the route already requests a dedicated live stats slice that exposes sibling fields `total_count`, `today_count`, `important_count`, and `triggered_count`, so the visible stat strip must either render those verified counts or degrade every sibling card to placeholder truth"
    - "before the stats slice has verified, the route must not present one live count beside label-only siblings or unresolved `0` fallbacks"
    - "controlled browser-context fulfillment is acceptable for proving both the verified-stats path and the stats-slice-failure path because it isolates the announcement stats contract from the announcement list contract"
    - "natural PM2 browser reuse is healthy enough to provide a live zero-count observation for this route, but controlled browser-context proof remains the primary evidence for the repaired sibling-stats contract behavior"
  fallback_log:
    - "the default local Playwright chromium bundle is still unavailable on this machine, so targeted live verification used Playwright-library control of system `google-chrome`"
verification_plan:
  verification_strategy: code-review-plus-targeted-live-verification
  browser_project: chromium
  breakpoints: [1440]
  required_states: [loading, error, default]
  notes:
    - "verify unresolved or failed stats slices now render `-- / -- / -- / --` instead of one `0` plus label-only siblings"
    - "verify a verified stats payload now renders all four sibling counts instead of only `公告总数`"
    - "verify the announcements list can still succeed while the stats slice fails, and the route keeps the list content visible while degrading the stat cards honestly"
