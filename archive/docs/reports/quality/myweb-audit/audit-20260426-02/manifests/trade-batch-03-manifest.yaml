  backend_url: http://localhost:8020
  browser_tool: playwright
  execution_surface: code-review-plus-targeted-live-verification
  frontend_runtime_mode: reuse-existing
  assumptions:
    - "canonical route truth for `/trade/history` remains `web/frontend/src/views/trade/History.vue`"
    - "a failed manual refresh after a successful history load must preserve the last-known-good ledger and show explicit stale-data messaging instead of collapsing into a first-load failure panel"
    - "the current PM2 frontend may route `/trade/history` through env-level mock transport, so browser request interception may be inapplicable for the controlled stale-refresh verification path"
  fallback_log:
    - "the default local Playwright chromium bundle is still unavailable on this machine, so targeted live verification used Playwright-library control of system `google-chrome`"
    - "the actual PM2 `/trade/history` route was first checked for route health as loaded, then the stale-refresh path was verified on the same routed page via an in-page `apiClient.get` override because the current runtime short-circuits this surface through `mockApiClient` generic fallback rather than browser-observable network transport"
verification_plan:
  verification_strategy: code-review-plus-targeted-live-verification
  browser_project: chromium
  breakpoints: [1920, 1440, 1280]
  required_states: [default, empty, error]
  notes:
    - "verify the actual PM2 `/trade/history` route loads successfully and reports a real `REQ_ID` even when the current runtime shows no real trade ledger rows"
    - "verify the routed stale-refresh path retains the last successful `600519` ledger row, labels the page `刷新异常`, and shows `当前仍展示上次成功同步的交易历史记录。` after a controlled failed manual refresh"
    - "the controlled stale-refresh proof for this route uses a documented in-page `apiClient.get` override on the live routed page because env-level mock transport bypasses normal browser request interception here"
