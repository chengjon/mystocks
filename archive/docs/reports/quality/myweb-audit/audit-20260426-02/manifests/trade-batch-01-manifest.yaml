    - "`/risk/pnl` remains a thin routed wrapper over the same canonical portfolio page family via `PortfolioOverviewTab.vue`"
    - "the live `/api/v1/trade/positions` payload may omit `target_weight` or portfolio-policy inputs, so rebalance surfaces must degrade honestly instead of synthesizing equal-weight advice"
  fallback_log:
    - "the default local Playwright chromium bundle is still unavailable on this machine, so targeted live verification used Playwright-library control of system `google-chrome`"
    - "targeted live verification blocked service workers and fulfilled `/api/v1/trade/positions` directly so the routed policy-truth path could be isolated from unrelated browser-runtime noise"
