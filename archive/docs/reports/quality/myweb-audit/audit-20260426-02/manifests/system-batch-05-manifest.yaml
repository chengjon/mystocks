  required_states: [default, loading, error]
  notes:
    - verify that system KPI strips render plain counts and labels without fabricated `+0%`, flat dots, arrows, or `2.00`-style pseudo precision
    - verify that `/system/health` and `/system/api` accept successful plain `/api/health` payloads and no longer collapse the routed cards into `UNKNOWN / N/A / N/A`
    - verify that `/system/config` can still fall back to a health-summary surface when detailed metrics are unavailable instead of collapsing the monitor tab to `UNAVAILABLE`
