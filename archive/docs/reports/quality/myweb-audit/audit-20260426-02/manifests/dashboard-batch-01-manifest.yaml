batch_rationale: "Apply the new `v1.40` aggregate-provenance and resolved-error-envelope truth rules, together with the existing `v1.39` browser-context interception rule, so the canonical dashboard request-meta bar stops hardcoding optimistic `REAL / READY` semantics and core-slice `success: false` envelopes no longer collapse into empty-success rendering on `/dashboard`."
