  - route-inventory
  - data-state-audit
environment:
  frontend_url: http://localhost:3020
  backend_url: http://localhost:8020
  browser_tool: playwright
  execution_surface: code-review-plus-targeted-live-verification
  frontend_runtime_mode: reuse-existing
  assumptions:
    - "canonical route truth for `/dashboard` remains `web/frontend/src/views/artdeco-pages/ArtDecoDashboard.vue`, with aggregate state owned by `web/frontend/src/views/artdeco-pages/composables/useArtDecoDashboard.ts`"
    - "the approved repair should stay dashboard-family local in `useArtDecoDashboard.ts` and `dashboardService.ts` instead of widening into shared transport wrappers such as `apiClient.ts` or shared trace helpers"
    - "the natural PM2 `/dashboard` route is not a stable success-proof source on this machine because live AkShare fund-flow endpoints currently return `401` and trigger auth redirection to `/login`"
  fallback_log:
    - "the default local Playwright chromium bundle is still unavailable on this machine, so targeted live verification used Playwright-library control of system `google-chrome`"
    - "browser-context interception with `serviceWorkers: block` was required to isolate the dashboard's pending, success, and partial-failure aggregate provenance states"
verification_plan:
  verification_strategy: code-review-plus-targeted-live-verification
  browser_project: chromium
  breakpoints: [1440]
  required_states: [default, loading, empty, error]
  notes:
    - "verify `/dashboard` no longer hardcodes `DATA: REAL` or `SYNC: READY` while primary core slices are still unresolved or degraded"
    - "verify a hanging first-load on quotes, fund-flow, and industry keeps the same route at `DATA: PENDING` and `SYNC: PENDING` without fabricated alerts"
    - "verify a fully satisfied browser-context core slice set resolves to `DATA: REAL` and `SYNC: READY`"
    - "verify a failed industry or fund-flow core slice now renders `DATA: MIXED`, `SYNC: DEGRADED`, and the matching localized alert instead of silently treating `success: false` envelopes as empty success"
    - "record the natural PM2 `/dashboard` auth redirect as environment evidence, not as success-proof or route-local defect evidence"
