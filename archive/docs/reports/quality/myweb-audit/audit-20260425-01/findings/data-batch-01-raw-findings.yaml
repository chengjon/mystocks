- finding_id: data-indicator-functional-001
  batch_id: data-batch-01
  page:
    route: /data/indicator
    page_key: data-indicator
    route_class: canonical-page
    canonical_entry: web/frontend/src/views/data/Advanced.vue
  source_role: functional-audit
  severity: High
  issue_type: interaction
  title: Indicator-condition controls do not affect screening results
  trigger:
    steps:
      - Open Advanced.vue and follow the smart screener flow.
      - Add one or more indicator conditions in AnalysisScreener.
      - Run screening through useDataAnalysis.runScreening.
  expected: Added indicator conditions should participate in the screening path and influence the result set.
  actual: useDataAnalysis.applyScreening ignores screeningFilters.indicators entirely, so the UI exposes a non-functional control path.
  evidence:
    kind: code-path-review
    note: web/frontend/src/composables/market/useDataAnalysis.ts applyScreening only forwards scalar filters and omits indicators.
  repair_target:
    files:
      - web/frontend/src/composables/market/useDataAnalysis.ts
      - web/frontend/src/views/artdeco-pages/components/AnalysisScreener.vue
    primary_owner: web/frontend/src/composables/market/useDataAnalysis.ts
  can_fix_frontend: true
  shared_impact_candidate: true
  cross_page_impact:
    - /data/indicator
  status: open
  dependency: null
  dedupe_key: /data/indicator:interaction:useDataAnalysis
  verification_surface: code-review-only
  verification:
    required: true
    complete: false
    notes: Browser interaction was unavailable; conclusion is based on the disconnected code path.

