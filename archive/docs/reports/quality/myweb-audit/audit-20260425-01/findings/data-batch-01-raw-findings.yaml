  source_role: data-state-audit
  severity: High
  issue_type: data-state
  title: Partial API failure clears unrelated successful fund-flow surfaces
  trigger:
    steps:
      - Inspect fetchFundFlowData in FundFlow.vue.
      - Follow the branch where either summary or bigDeal resolves to null.
  expected: The page should preserve any successfully loaded data surface and degrade only the missing subsection.
  actual: If either request fails, fund summary, trend data, and ranking are all reset to empty defaults.
