- consolidated_issue_id: data-indicator-issue-01
  severity: High
  title: data-indicator now disables unsupported indicator-condition screening and replaces inert click paths with real context flows
  pages:
    - /data/indicator
  source_roles:
    - functional-audit
  why_consolidated: The misleading indicator-condition path and inert click affordances were both rooted in the same data-analysis page family and shared composable ownership.
  primary_owner: web/frontend/src/composables/market/useDataAnalysis.ts
  repair_bucket: fix-with-shared-impact-review
  repair_decision: fixed
  deferred_reason: null
  shared_impact_candidate: true
  cross_page_impact:
    - /data/indicator
    - wrapper consumers of Advanced.vue
  dedupe_keys:
    - /data/indicator:interaction:useDataAnalysis
    - /data/indicator:interaction:Advanced
  verification_scope:
    routes:
      - /data/indicator
    states:
      - default
      - empty
      - error
    breakpoints:
      - 1920
      - 1440
      - 1280
  repair_summary:
    files:
      - web/frontend/src/composables/market/useDataAnalysis.ts
      - web/frontend/src/views/data/Advanced.vue
      - web/frontend/src/views/artdeco-pages/components/AnalysisIndicators.vue
      - web/frontend/src/views/artdeco-pages/components/AnalysisScreener.vue
    notes:
      - indicator-condition controls are now explicitly unsupported instead of silently ignored
      - indicator-card and results-row clicks now set visible indicator/stock context
      - indicator cards now opt into `ArtDecoCard` clickable behavior so the selected-indicator flow is actually reachable
  verification_surface: code-review-plus-targeted-live-verification

