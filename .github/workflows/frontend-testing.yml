name: Frontend Testing

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web/frontend/**'
      - 'scripts/run_frontend_runtime_baseline.sh'
      - 'scripts/run_api_performance_baseline.sh'
      - 'scripts/run_monitoring_auth_performance_baseline.sh'
      - 'scripts/run_runtime_quality_summary.sh'
      - 'scripts/run_containerized_runtime_smoke.sh'
      - 'scripts/dev/quality_gate/build_runtime_ci_bundle.py'
      - 'scripts/dev/quality_gate/build_runtime_quality_summary.py'
      - 'scripts/run_pm2_integration_workflow.sh'
      - 'scripts/run_e2e_pm2.sh'
      - 'tests/performance/benchmark.py'
      - 'tests/performance/api_smoke_endpoints.json'
      - 'tests/performance/monitoring_auth_endpoints.json'
      - 'tests/performance/test_build_runtime_ci_bundle.py'
      - 'tests/performance/test_container_runtime_smoke_script.py'
      - 'tests/unit/core/test_web_container_assets.py'
      - 'tests/performance/test_build_runtime_quality_summary.py'
      - 'web/backend/Dockerfile'
      - 'web/backend/requirements.txt'
      - 'web/docker-compose.yml'
      - 'web/frontend/Dockerfile'
      - 'web/frontend/Dockerfile.dev'
      - 'web/frontend/config/nginx/**'
      - 'docs/guides/pm2/PM2_INTEGRATION_TEST_WORKFLOW.md'
      - 'docs/testing/e2e/README.md'
      - 'docs/guides/web/ARTDECO_MASTER_INDEX.md'
      - 'docs/api/ArtDeco_System_Architecture_Summary.md'
      - 'docs/guides/web/ARTDECO_GRID_QUICK_REFERENCE.md'
      - 'docs/guides/web/ARTDECO_UI_UX_FUNCTIONALITY_GUIDE.md'
      - 'docs/guides/web/ART_DECO_QUICK_REFERENCE.md'
      - 'docs/plans/frontend-page-optimization-list.md'
      - 'scripts/dev/frontend_optimization_audit.py'
      - '.github/workflows/frontend-testing.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'web/frontend/**'
      - 'scripts/run_frontend_runtime_baseline.sh'
      - 'scripts/run_api_performance_baseline.sh'
      - 'scripts/run_monitoring_auth_performance_baseline.sh'
      - 'scripts/run_runtime_quality_summary.sh'
      - 'scripts/run_containerized_runtime_smoke.sh'
      - 'scripts/dev/quality_gate/build_runtime_ci_bundle.py'
      - 'scripts/dev/quality_gate/build_runtime_quality_summary.py'
      - 'scripts/run_pm2_integration_workflow.sh'
      - 'scripts/run_e2e_pm2.sh'
      - 'tests/performance/benchmark.py'
      - 'tests/performance/api_smoke_endpoints.json'
      - 'tests/performance/monitoring_auth_endpoints.json'
      - 'tests/performance/test_build_runtime_ci_bundle.py'
      - 'tests/performance/test_container_runtime_smoke_script.py'
      - 'tests/unit/core/test_web_container_assets.py'
      - 'tests/performance/test_build_runtime_quality_summary.py'
      - 'web/backend/Dockerfile'
      - 'web/backend/requirements.txt'
      - 'web/docker-compose.yml'
      - 'web/frontend/Dockerfile'
      - 'web/frontend/Dockerfile.dev'
      - 'web/frontend/config/nginx/**'
      - 'docs/guides/pm2/PM2_INTEGRATION_TEST_WORKFLOW.md'
      - 'docs/testing/e2e/README.md'
      - 'docs/guides/web/ARTDECO_MASTER_INDEX.md'
      - 'docs/api/ArtDeco_System_Architecture_Summary.md'
      - 'docs/guides/web/ARTDECO_GRID_QUICK_REFERENCE.md'
      - 'docs/guides/web/ARTDECO_UI_UX_FUNCTIONALITY_GUIDE.md'
      - 'docs/guides/web/ART_DECO_QUICK_REFERENCE.md'
      - 'docs/plans/frontend-page-optimization-list.md'
      - 'scripts/dev/frontend_optimization_audit.py'
      - '.github/workflows/frontend-testing.yml'

jobs:
  frontend-gate-scope-detect:
    runs-on: ubuntu-latest
    outputs:
      artdeco_scope_changed: ${{ steps.detect.outputs.artdeco_scope_changed }}
      container_runtime_required: ${{ steps.detect.outputs.container_runtime_required }}
      dependency_audit_required: ${{ steps.detect.outputs.dependency_audit_required }}
      frontend_source_changed: ${{ steps.detect.outputs.frontend_source_changed }}
      optimization_audit_required: ${{ steps.detect.outputs.optimization_audit_required }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run frontend optimization scope detection
      id: detect
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            mapfile -t changed_files < <(git diff --name-only HEAD^ HEAD)
          else
            mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
          fi
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA...$HEAD_SHA")
        fi

        artdeco_scope_changed=false
        container_runtime_required=false
        dependency_audit_required=false
        frontend_source_changed=false
        optimization_audit_required=false

        for changed_file in "${changed_files[@]}"; do
          case "$changed_file" in
            web/frontend/src/views/artdeco-pages/*|web/frontend/src/views/artdeco-pages/**|web/frontend/src/components/artdeco/*|web/frontend/src/components/artdeco/**|web/frontend/src/layouts/*|web/frontend/src/layouts/**|web/frontend/src/components/layout/*|web/frontend/src/components/layout/**|web/frontend/src/components/menu/*|web/frontend/src/components/menu/**|web/frontend/src/components/common/*|web/frontend/src/components/common/**|web/frontend/src/components/shared/ui/*|web/frontend/src/components/shared/ui/**|web/frontend/src/views/stock-analysis/*|web/frontend/src/views/stock-analysis/**|web/frontend/src/views/styles/*|web/frontend/src/views/styles/**|web/frontend/src/views/SkeletonUsage.vue|web/frontend/src/views/Stocks.vue|web/frontend/src/components/market/styles/SmartRecommendation.css|web/frontend/src/components/Market/styles/SmartRecommendation.css|web/frontend/src/styles/*|web/frontend/src/styles/**|web/frontend/scripts/check-artdeco-tokens.js|docs/guides/web/ARTDECO_MASTER_INDEX.md|docs/api/ArtDeco_System_Architecture_Summary.md|docs/guides/web/ARTDECO_GRID_QUICK_REFERENCE.md|docs/guides/web/ARTDECO_UI_UX_FUNCTIONALITY_GUIDE.md|docs/guides/web/ART_DECO_QUICK_REFERENCE.md)
              artdeco_scope_changed=true
              ;;
          esac

          case "$changed_file" in
            web/backend/Dockerfile|web/backend/requirements.txt|web/docker-compose.yml|web/frontend/Dockerfile|web/frontend/Dockerfile.dev|web/frontend/config/nginx/*|web/frontend/config/nginx/**|scripts/run_containerized_runtime_smoke.sh|tests/performance/test_container_runtime_smoke_script.py|tests/unit/core/test_web_container_assets.py|scripts/dev/quality_gate/build_runtime_ci_bundle.py|.github/workflows/frontend-testing.yml)
              container_runtime_required=true
              ;;
          esac

          case "$changed_file" in
            web/frontend/package.json|web/frontend/package-lock.json|web/frontend/audit-ci.json)
              dependency_audit_required=true
              ;;
          esac

          case "$changed_file" in
            web/frontend/src/*|web/frontend/src/**|web/frontend/index.html|web/frontend/vite.config.*|web/frontend/tsconfig.json|web/frontend/tsconfig.*.json|web/frontend/package.json|web/frontend/package-lock.json)
              frontend_source_changed=true
              ;;
          esac

          case "$changed_file" in
            docs/plans/frontend-page-optimization-list.md|scripts/dev/frontend_optimization_audit.py|web/frontend/src/views/artdeco-pages/*|web/frontend/src/views/artdeco-pages/**)
              optimization_audit_required=true
              ;;
          esac
        done

        echo "artdeco_scope_changed=$artdeco_scope_changed" >> "$GITHUB_OUTPUT"
        echo "container_runtime_required=$container_runtime_required" >> "$GITHUB_OUTPUT"
        echo "dependency_audit_required=$dependency_audit_required" >> "$GITHUB_OUTPUT"
        echo "frontend_source_changed=$frontend_source_changed" >> "$GITHUB_OUTPUT"
        echo "optimization_audit_required=$optimization_audit_required" >> "$GITHUB_OUTPUT"

  frontend-optimization-audit:
    runs-on: ubuntu-latest
    needs: frontend-gate-scope-detect
    if: needs.frontend-gate-scope-detect.outputs.optimization_audit_required == 'true'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run strict frontend optimization audit
      continue-on-error: true
      run: |
        python scripts/dev/frontend_optimization_audit.py \
          --repo-root . \
          --strict \
          --report-file reports/analysis/frontend-page-optimization-audit-report.md

    - name: Upload frontend optimization audit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-optimization-audit-report
        path: reports/analysis/frontend-page-optimization-audit-report.md

  route-layout-pm2-detect:
    runs-on: ubuntu-latest
    outputs:
      gate_required: ${{ steps.detect.outputs.gate_required }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Detect route/layout PM2 gate scope
      id: detect
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          mapfile -t changed_files < <(git ls-files)
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA...$HEAD_SHA")
        fi

        cmd=(python scripts/compliance/route_layout_pm2_gate.py --format json)
        for changed_file in "${changed_files[@]}"; do
          cmd+=(--path "$changed_file")
        done

        "${cmd[@]}" > route-layout-pm2-gate-report.json

        python - <<'PY'
        import json
        import os
        from pathlib import Path

        report = json.loads(Path("route-layout-pm2-gate-report.json").read_text(encoding="utf-8"))
        gate_required = "true" if report["gate_required"] else "false"

        with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
            handle.write(f"gate_required={gate_required}\n")

        print(f"Route/Layout PM2 gate required: {gate_required}")
        if report["matched_paths"]:
            for item in report["matched_paths"]:
                print(f"- {item['path']}: {', '.join(item['rules'])}")
        PY

    - name: Upload route/layout PM2 gate report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: route-layout-pm2-gate-report
        path: route-layout-pm2-gate-report.json

  route-layout-runtime-baseline:
    name: Route/Layout Runtime Baseline
    runs-on: ubuntu-latest
    needs: route-layout-pm2-detect
    if: needs.route-layout-pm2-detect.outputs.gate_required == 'true'
    timeout-minutes: 45
    env:
      BACKEND_PORT: '8020'
      BACKEND_BACKUP_PORT: '8021'
      FRONTEND_PORT: '3020'
      FRONTEND_BACKUP_PORT: '3021'
      USE_MOCK_DATA: 'true'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          web/frontend/package-lock.json

    - name: Install root dependencies
      run: npm ci

    - name: Install frontend dependencies
      run: npm ci
      working-directory: web/frontend

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install PM2 and Playwright browser
      run: |
        npm install -g pm2
        npx playwright install --with-deps chromium

    - name: Run route/layout runtime baseline
      run: bash scripts/run_frontend_runtime_baseline.sh

    - name: Resolve runtime baseline artifact directory
      if: always()
      run: |
        REPORT_DIR="$(find reports/analysis/frontend-runtime-gate -mindepth 1 -maxdepth 1 -type d 2>/dev/null | sort -r | head -n 1 || true)"
        echo "REPORT_DIR=${REPORT_DIR}" >> "$GITHUB_ENV"
        echo "Resolved runtime baseline artifact: ${REPORT_DIR}"

    - name: Resolve API performance artifact directory
      if: always()
      run: |
        API_REPORT_DIR="$(find reports/analysis/api-performance-gate -mindepth 1 -maxdepth 1 -type d 2>/dev/null | sort -r | head -n 1 || true)"
        echo "API_REPORT_DIR=${API_REPORT_DIR}" >> "$GITHUB_ENV"
        echo "Resolved API performance artifact: ${API_REPORT_DIR}"

    - name: Resolve monitoring auth performance artifact directory
      if: always()
      run: |
        MONITORING_API_REPORT_DIR="$(find reports/analysis/api-monitoring-auth-gate -mindepth 1 -maxdepth 1 -type d 2>/dev/null | sort -r | head -n 1 || true)"
        echo "MONITORING_API_REPORT_DIR=${MONITORING_API_REPORT_DIR}" >> "$GITHUB_ENV"
        echo "Resolved monitoring auth performance artifact: ${MONITORING_API_REPORT_DIR}"

    - name: Resolve unified runtime quality summary artifact directory
      if: always()
      run: |
        RUNTIME_QUALITY_REPORT_DIR="$(find reports/analysis/runtime-quality-summary -mindepth 1 -maxdepth 1 -type d 2>/dev/null | sort -r | head -n 1 || true)"
        echo "RUNTIME_QUALITY_REPORT_DIR=${RUNTIME_QUALITY_REPORT_DIR}" >> "$GITHUB_ENV"
        echo "Resolved runtime quality summary artifact: ${RUNTIME_QUALITY_REPORT_DIR}"

    - name: Build consolidated runtime artifact manifest
      if: always() && env.REPORT_DIR != '' && env.API_REPORT_DIR != '' && env.MONITORING_API_REPORT_DIR != '' && env.RUNTIME_QUALITY_REPORT_DIR != ''
      run: |
        mkdir -p reports/analysis/runtime-ci-bundle
        python scripts/dev/quality_gate/build_runtime_ci_bundle.py \
          --frontend-dir "${REPORT_DIR}" \
          --api-dir "${API_REPORT_DIR}" \
          --monitoring-dir "${MONITORING_API_REPORT_DIR}" \
          --runtime-quality-dir "${RUNTIME_QUALITY_REPORT_DIR}" \
          --output-manifest reports/analysis/runtime-ci-bundle/runtime-artifact-manifest.json \
          --output-index reports/analysis/runtime-ci-bundle/runtime-artifact-index.md

    - name: Publish runtime artifact summary to GitHub Actions job summary
      if: always() && env.REPORT_DIR != '' && env.API_REPORT_DIR != '' && env.MONITORING_API_REPORT_DIR != '' && env.RUNTIME_QUALITY_REPORT_DIR != ''
      run: |
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f reports/analysis/runtime-ci-bundle/runtime-artifact-index.md ]; then
          cat reports/analysis/runtime-ci-bundle/runtime-artifact-index.md >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload route/layout runtime baseline artifacts
      if: always() && env.REPORT_DIR != ''
      uses: actions/upload-artifact@v4
      with:
        name: route-layout-runtime-baseline
        path: ${{ env.REPORT_DIR }}
        if-no-files-found: error

    - name: Upload API performance baseline artifacts
      if: always() && env.API_REPORT_DIR != ''
      uses: actions/upload-artifact@v4
      with:
        name: route-layout-api-performance-baseline
        path: ${{ env.API_REPORT_DIR }}
        if-no-files-found: error

    - name: Upload monitoring auth performance baseline artifacts
      if: always() && env.MONITORING_API_REPORT_DIR != ''
      uses: actions/upload-artifact@v4
      with:
        name: route-layout-monitoring-auth-performance-baseline
        path: ${{ env.MONITORING_API_REPORT_DIR }}
        if-no-files-found: error

    - name: Upload unified runtime quality summary artifacts
      if: always() && env.RUNTIME_QUALITY_REPORT_DIR != ''
      uses: actions/upload-artifact@v4
      with:
        name: route-layout-runtime-quality-summary
        path: ${{ env.RUNTIME_QUALITY_REPORT_DIR }}
        if-no-files-found: error

    - name: Upload consolidated runtime artifact bundle
      if: always() && env.REPORT_DIR != '' && env.API_REPORT_DIR != '' && env.MONITORING_API_REPORT_DIR != '' && env.RUNTIME_QUALITY_REPORT_DIR != ''
      uses: actions/upload-artifact@v4
      with:
        name: route-layout-runtime-bundle
        path: |
          reports/analysis/runtime-ci-bundle/runtime-artifact-manifest.json
          reports/analysis/runtime-ci-bundle/runtime-artifact-index.md
          ${{ env.REPORT_DIR }}
          ${{ env.API_REPORT_DIR }}
          ${{ env.MONITORING_API_REPORT_DIR }}
          ${{ env.RUNTIME_QUALITY_REPORT_DIR }}
        if-no-files-found: error

  containerized-runtime-smoke:
    name: Containerized Runtime Smoke
    runs-on: ubuntu-latest
    needs: frontend-gate-scope-detect
    if: needs.frontend-gate-scope-detect.outputs.container_runtime_required == 'true'
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Run containerized runtime smoke
      run: bash scripts/run_containerized_runtime_smoke.sh

    - name: Resolve docker runtime smoke artifact directory
      if: always()
      run: |
        DOCKER_REPORT_DIR="$(find reports/analysis/docker-runtime-smoke -mindepth 1 -maxdepth 1 -type d 2>/dev/null | sort -r | head -n 1 || true)"
        echo "DOCKER_REPORT_DIR=${DOCKER_REPORT_DIR}" >> "$GITHUB_ENV"
        echo "Resolved docker runtime smoke artifact: ${DOCKER_REPORT_DIR}"

    - name: Build consolidated runtime artifact manifest
      if: always() && env.DOCKER_REPORT_DIR != ''
      run: |
        mkdir -p reports/analysis/runtime-ci-bundle
        python scripts/dev/quality_gate/build_runtime_ci_bundle.py \
          --frontend-dir "${DOCKER_REPORT_DIR}" \
          --api-dir "${DOCKER_REPORT_DIR}" \
          --monitoring-dir "${DOCKER_REPORT_DIR}" \
          --runtime-quality-dir "${DOCKER_REPORT_DIR}" \
          --docker-dir "${DOCKER_REPORT_DIR}" \
          --output-manifest reports/analysis/runtime-ci-bundle/runtime-artifact-manifest.json \
          --output-index reports/analysis/runtime-ci-bundle/runtime-artifact-index.md

    - name: Publish docker runtime artifact summary to GitHub Actions job summary
      if: always() && env.DOCKER_REPORT_DIR != ''
      run: |
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f reports/analysis/runtime-ci-bundle/runtime-artifact-index.md ]; then
          cat reports/analysis/runtime-ci-bundle/runtime-artifact-index.md >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload docker runtime smoke artifacts
      if: always() && env.DOCKER_REPORT_DIR != ''
      uses: actions/upload-artifact@v4
      with:
        name: containerized-runtime-smoke
        path: ${{ env.DOCKER_REPORT_DIR }}
        if-no-files-found: error

    - name: Upload docker runtime artifact bundle
      if: always() && env.DOCKER_REPORT_DIR != ''
      uses: actions/upload-artifact@v4
      with:
        name: containerized-runtime-bundle
        path: |
          reports/analysis/runtime-ci-bundle/runtime-artifact-manifest.json
          reports/analysis/runtime-ci-bundle/runtime-artifact-index.md
          ${{ env.DOCKER_REPORT_DIR }}
        if-no-files-found: error

  runtime-delivery-summary:
    name: Runtime Delivery Summary
    runs-on: ubuntu-latest
    needs:
      - frontend-gate-scope-detect
      - route-layout-pm2-detect
      - route-layout-runtime-baseline
      - containerized-runtime-smoke
    if: always() && (needs.route-layout-pm2-detect.outputs.gate_required == 'true' || needs.frontend-gate-scope-detect.outputs.container_runtime_required == 'true')

    steps:
    - uses: actions/checkout@v4

    - name: Validate runtime delivery prerequisites
      run: |
        if [ "${{ needs.route-layout-pm2-detect.outputs.gate_required }}" = "true" ] && [ "${{ needs.route-layout-runtime-baseline.result }}" != "success" ]; then
          echo "Route/layout runtime baseline artifacts are required but job result was ${{ needs.route-layout-runtime-baseline.result }}"
          exit 1
        fi

        if [ "${{ needs.frontend-gate-scope-detect.outputs.container_runtime_required }}" = "true" ] && [ "${{ needs.containerized-runtime-smoke.result }}" != "success" ]; then
          echo "Container runtime smoke artifacts are required but job result was ${{ needs.containerized-runtime-smoke.result }}"
          exit 1
        fi

    - name: Download route/layout frontend runtime baseline artifact
      if: needs.route-layout-pm2-detect.outputs.gate_required == 'true'
      uses: actions/download-artifact@v4
      with:
        name: route-layout-runtime-baseline
        path: reports/ci-downloads/frontend-runtime

    - name: Download route/layout API performance artifact
      if: needs.route-layout-pm2-detect.outputs.gate_required == 'true'
      uses: actions/download-artifact@v4
      with:
        name: route-layout-api-performance-baseline
        path: reports/ci-downloads/api-performance

    - name: Download route/layout monitoring auth artifact
      if: needs.route-layout-pm2-detect.outputs.gate_required == 'true'
      uses: actions/download-artifact@v4
      with:
        name: route-layout-monitoring-auth-performance-baseline
        path: reports/ci-downloads/monitoring-auth

    - name: Download container runtime smoke artifact
      if: needs.frontend-gate-scope-detect.outputs.container_runtime_required == 'true'
      uses: actions/download-artifact@v4
      with:
        name: containerized-runtime-smoke
        path: reports/ci-downloads/docker-runtime

    - name: Resolve downloaded artifact directories
      run: |
        FRONTEND_RUNTIME_DIR=""
        API_PERFORMANCE_DIR=""
        MONITORING_AUTH_DIR=""
        DOCKER_RUNTIME_DIR=""

        if [ "${{ needs.route-layout-pm2-detect.outputs.gate_required }}" = "true" ]; then
          FRONTEND_RUNTIME_DIR="$(find reports/ci-downloads/frontend-runtime -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          API_PERFORMANCE_DIR="$(find reports/ci-downloads/api-performance -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          MONITORING_AUTH_DIR="$(find reports/ci-downloads/monitoring-auth -mindepth 1 -maxdepth 1 -type d | head -n 1)"
        fi

        if [ "${{ needs.frontend-gate-scope-detect.outputs.container_runtime_required }}" = "true" ]; then
          DOCKER_RUNTIME_DIR="$(find reports/ci-downloads/docker-runtime -mindepth 1 -maxdepth 1 -type d | head -n 1)"
        fi

        echo "FRONTEND_RUNTIME_DIR=${FRONTEND_RUNTIME_DIR}" >> "$GITHUB_ENV"
        echo "API_PERFORMANCE_DIR=${API_PERFORMANCE_DIR}" >> "$GITHUB_ENV"
        echo "MONITORING_AUTH_DIR=${MONITORING_AUTH_DIR}" >> "$GITHUB_ENV"
        echo "DOCKER_RUNTIME_DIR=${DOCKER_RUNTIME_DIR}" >> "$GITHUB_ENV"

    - name: Build combined runtime quality summary
      run: |
        mkdir -p reports/analysis/runtime-quality-summary-ci
        cmd=(
          python scripts/dev/quality_gate/build_runtime_quality_summary.py
          --runtime-observability-drift-report reports/analysis/runtime-quality-summary-ci/runtime-observability-drift-report.json
          --output-markdown reports/analysis/runtime-quality-summary-ci/SUMMARY.md
          --output-json reports/analysis/runtime-quality-summary-ci/summary.json
        )

        if [ -n "${FRONTEND_RUNTIME_DIR}" ]; then
          cmd+=(--frontend-dir "${FRONTEND_RUNTIME_DIR}")
          cmd+=(--api-dir "${API_PERFORMANCE_DIR}")
          cmd+=(--monitoring-dir "${MONITORING_AUTH_DIR}")
        fi

        if [ -n "${DOCKER_RUNTIME_DIR}" ]; then
          cmd+=(--docker-dir "${DOCKER_RUNTIME_DIR}")
        fi

        "${cmd[@]}"

    - name: Validate runtime observability drift
      run: |
        python scripts/dev/quality_gate/validate_runtime_observability_drift.py \
          --baseline reports/analysis/runtime-observability-baseline.json \
          --current-summary-json reports/analysis/runtime-quality-summary-ci/summary.json \
          --output reports/analysis/runtime-quality-summary-ci/runtime-observability-drift-report.json

    - name: Build combined runtime artifact manifest
      run: |
        mkdir -p reports/analysis/runtime-ci-bundle-combined
        cmd=(
          python scripts/dev/quality_gate/build_runtime_ci_bundle.py
          --runtime-quality-dir reports/analysis/runtime-quality-summary-ci
          --runtime-observability-drift-report reports/analysis/runtime-quality-summary-ci/runtime-observability-drift-report.json
          --output-manifest reports/analysis/runtime-ci-bundle-combined/runtime-artifact-manifest.json
          --output-index reports/analysis/runtime-ci-bundle-combined/runtime-artifact-index.md
        )

        if [ -n "${FRONTEND_RUNTIME_DIR}" ]; then
          cmd+=(--frontend-dir "${FRONTEND_RUNTIME_DIR}")
          cmd+=(--api-dir "${API_PERFORMANCE_DIR}")
          cmd+=(--monitoring-dir "${MONITORING_AUTH_DIR}")
        fi

        if [ -n "${DOCKER_RUNTIME_DIR}" ]; then
          cmd+=(--docker-dir "${DOCKER_RUNTIME_DIR}")
        fi

        "${cmd[@]}"

    - name: Publish combined runtime delivery summary to GitHub Actions job summary
      if: always()
      run: |
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          cat reports/analysis/runtime-quality-summary-ci/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n\n---\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat reports/analysis/runtime-ci-bundle-combined/runtime-artifact-index.md >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload combined runtime quality summary artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: runtime-delivery-summary
        path: reports/analysis/runtime-quality-summary-ci
        if-no-files-found: error

    - name: Upload combined runtime delivery bundle
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: runtime-delivery-bundle
        path: |
          reports/analysis/runtime-quality-summary-ci
          reports/analysis/runtime-ci-bundle-combined/runtime-artifact-manifest.json
          reports/analysis/runtime-ci-bundle-combined/runtime-artifact-index.md
        if-no-files-found: error

  frontend-test:
    runs-on: ubuntu-latest
    needs: frontend-gate-scope-detect
    if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true' || needs.frontend-gate-scope-detect.outputs.artdeco_scope_changed == 'true'
    env:
      FRONTEND_PORT: '3020'
      FRONTEND_BACKUP_PORT: '3021'
      BACKEND_PORT: '8020'
      BACKEND_BACKUP_PORT: '8021'
      PLAYWRIGHT_EXTERNAL_FRONTEND: '0'
      TYPE_ERROR_CEILING: '0'
    defaults:
      run:
        working-directory: web/frontend

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: web/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint code
      run: npm run lint

    - name: App Route Purity Gate
      run: |
        python ../../scripts/compliance/app_route_purity_gate.py --format json > app-route-purity-gate-report.json
        cat app-route-purity-gate-report.json

    - name: Request ID Visibility Gate
      continue-on-error: true
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            mapfile -t changed_files < <(git diff --name-only HEAD^ HEAD)
          else
            changed_files=()
          fi
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA...$HEAD_SHA")
        fi

        cmd=(python ../../scripts/compliance/request_id_visibility_gate.py --format json)
        for changed_file in "${changed_files[@]}"; do
          cmd+=(--path "$changed_file")
        done

        "${cmd[@]}" > request-id-visibility-gate-report.json
        cat request-id-visibility-gate-report.json

    - name: Run ArtDeco token changed-file gate
      if: needs.frontend-gate-scope-detect.outputs.artdeco_scope_changed == 'true'
      continue-on-error: true
      run: npm run lint:artdeco:changed

    - name: Run ArtDeco guidance changed-file gate
      if: needs.frontend-gate-scope-detect.outputs.artdeco_scope_changed == 'true'
      continue-on-error: true
      run: npm run lint:artdeco:guidance:changed

    - name: Enforce E2E user-facing locator policy
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run test:e2e:selectors

    - name: Enforce zero type error ceiling
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run test:type-ceiling

    - name: Frontend contract smoke
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npx vitest run tests/unit/port-config-consistency.spec.ts --reporter=verbose

    - name: Run stable unit tests
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run test:unit:stable

    - name: Run full unit tests
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run test

    - name: Install Playwright browser
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npx playwright install --with-deps chromium

    - name: Validate e2e setup
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run test:e2e:validate

    - name: Run business smoke e2e tests
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: |
        if [ "${PLAYWRIGHT_EXTERNAL_FRONTEND:-0}" = "1" ]; then
          export FRONTEND_BASE_URL="${FRONTEND_BASE_URL:-http://127.0.0.1:${FRONTEND_PORT}}"
          export E2E_FRONTEND_URL="${E2E_FRONTEND_URL:-$FRONTEND_BASE_URL}"
          echo "Using external frontend server: ${FRONTEND_BASE_URL}"
        else
          echo "Using Playwright-managed frontend server"
        fi

        npm run test:e2e:stable

    - name: Run axe accessibility smoke
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run test:e2e:axe

    - name: Run Lighthouse CI smoke
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      env:
        LIGHTHOUSE_BASE_URL: http://127.0.0.1:4273
      run: npm run test:e2e:lighthouse

    - name: Build for production
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run build:no-types

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: web/frontend/dist/

  frontend-security:
    runs-on: ubuntu-latest
    needs: frontend-gate-scope-detect
    if: needs.frontend-gate-scope-detect.outputs.dependency_audit_required == 'true'
    defaults:
      run:
        working-directory: web/frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: web/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      continue-on-error: true
      run: npm audit --audit-level moderate

    - name: Run security scan
      run: |
        if [ -f audit-ci.json ]; then
          npm install -g audit-ci
          audit-ci --config audit-ci.json
        else
          echo "audit-ci.json not present; skipping audit-ci enforcement"
        fi
