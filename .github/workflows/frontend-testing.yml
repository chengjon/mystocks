name: Frontend Testing

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web/frontend/**'
      - 'docs/plans/frontend-page-optimization-list.md'
      - 'scripts/dev/frontend_optimization_audit.py'
      - '.github/workflows/frontend-testing.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'web/frontend/**'
      - 'docs/plans/frontend-page-optimization-list.md'
      - 'scripts/dev/frontend_optimization_audit.py'

jobs:
  frontend-optimization-audit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Run strict frontend optimization audit
      run: |
        python scripts/dev/frontend_optimization_audit.py \
          --repo-root . \
          --strict \
          --report-file reports/analysis/frontend-page-optimization-audit-report.md

    - name: Upload frontend optimization audit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-optimization-audit-report
        path: reports/analysis/frontend-page-optimization-audit-report.md

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: web/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint code
      run: npm run lint

    - name: Type check
      run: npm run type-check

    - name: Run unit tests
      run: npm run test:unit

    - name: Run e2e tests
      run: npm run test:e2e

    - name: Build for production
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: web/frontend/dist/

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: web/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level moderate

    - name: Run security scan
      run: |
        npm install -g audit-ci
        audit-ci --config audit-ci.json
