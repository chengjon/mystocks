name: Frontend Testing

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web/frontend/**'
      - 'docs/guides/web/ARTDECO_MASTER_INDEX.md'
      - 'docs/api/ArtDeco_System_Architecture_Summary.md'
      - 'docs/guides/web/ARTDECO_GRID_QUICK_REFERENCE.md'
      - 'docs/guides/web/ARTDECO_UI_UX_FUNCTIONALITY_GUIDE.md'
      - 'docs/guides/web/ART_DECO_QUICK_REFERENCE.md'
      - 'docs/plans/frontend-page-optimization-list.md'
      - 'scripts/dev/frontend_optimization_audit.py'
      - '.github/workflows/frontend-testing.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'web/frontend/**'
      - 'docs/guides/web/ARTDECO_MASTER_INDEX.md'
      - 'docs/api/ArtDeco_System_Architecture_Summary.md'
      - 'docs/guides/web/ARTDECO_GRID_QUICK_REFERENCE.md'
      - 'docs/guides/web/ARTDECO_UI_UX_FUNCTIONALITY_GUIDE.md'
      - 'docs/guides/web/ART_DECO_QUICK_REFERENCE.md'
      - 'docs/plans/frontend-page-optimization-list.md'
      - 'scripts/dev/frontend_optimization_audit.py'
      - '.github/workflows/frontend-testing.yml'

jobs:
  frontend-gate-scope-detect:
    runs-on: ubuntu-latest
    outputs:
      artdeco_scope_changed: ${{ steps.detect.outputs.artdeco_scope_changed }}
      dependency_audit_required: ${{ steps.detect.outputs.dependency_audit_required }}
      frontend_source_changed: ${{ steps.detect.outputs.frontend_source_changed }}
      optimization_audit_required: ${{ steps.detect.outputs.optimization_audit_required }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run frontend optimization scope detection
      id: detect
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            mapfile -t changed_files < <(git diff --name-only HEAD^ HEAD)
          else
            mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
          fi
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA...$HEAD_SHA")
        fi

        artdeco_scope_changed=false
        dependency_audit_required=false
        frontend_source_changed=false
        optimization_audit_required=false

        for changed_file in "${changed_files[@]}"; do
          case "$changed_file" in
            web/frontend/src/views/artdeco-pages/*|web/frontend/src/views/artdeco-pages/**|web/frontend/src/components/artdeco/*|web/frontend/src/components/artdeco/**|web/frontend/src/layouts/*|web/frontend/src/layouts/**|web/frontend/src/components/layout/*|web/frontend/src/components/layout/**|web/frontend/src/components/menu/*|web/frontend/src/components/menu/**|web/frontend/src/components/common/*|web/frontend/src/components/common/**|web/frontend/src/components/shared/ui/*|web/frontend/src/components/shared/ui/**|web/frontend/src/views/stock-analysis/*|web/frontend/src/views/stock-analysis/**|web/frontend/src/views/styles/*|web/frontend/src/views/styles/**|web/frontend/src/views/SkeletonUsage.vue|web/frontend/src/views/Stocks.vue|web/frontend/src/components/market/styles/SmartRecommendation.css|web/frontend/src/components/Market/styles/SmartRecommendation.css|web/frontend/src/styles/*|web/frontend/src/styles/**|web/frontend/scripts/check-artdeco-tokens.js|docs/guides/web/ARTDECO_MASTER_INDEX.md|docs/api/ArtDeco_System_Architecture_Summary.md|docs/guides/web/ARTDECO_GRID_QUICK_REFERENCE.md|docs/guides/web/ARTDECO_UI_UX_FUNCTIONALITY_GUIDE.md|docs/guides/web/ART_DECO_QUICK_REFERENCE.md)
              artdeco_scope_changed=true
              ;;
          esac

          case "$changed_file" in
            web/frontend/package.json|web/frontend/package-lock.json|web/frontend/audit-ci.json)
              dependency_audit_required=true
              ;;
          esac

          case "$changed_file" in
            web/frontend/src/*|web/frontend/src/**|web/frontend/index.html|web/frontend/vite.config.*|web/frontend/tsconfig.json|web/frontend/tsconfig.*.json|web/frontend/package.json|web/frontend/package-lock.json)
              frontend_source_changed=true
              ;;
          esac

          case "$changed_file" in
            docs/plans/frontend-page-optimization-list.md|scripts/dev/frontend_optimization_audit.py|web/frontend/src/views/artdeco-pages/*|web/frontend/src/views/artdeco-pages/**)
              optimization_audit_required=true
              ;;
          esac
        done

        echo "artdeco_scope_changed=$artdeco_scope_changed" >> "$GITHUB_OUTPUT"
        echo "dependency_audit_required=$dependency_audit_required" >> "$GITHUB_OUTPUT"
        echo "frontend_source_changed=$frontend_source_changed" >> "$GITHUB_OUTPUT"
        echo "optimization_audit_required=$optimization_audit_required" >> "$GITHUB_OUTPUT"

  frontend-optimization-audit:
    runs-on: ubuntu-latest
    needs: frontend-gate-scope-detect
    if: needs.frontend-gate-scope-detect.outputs.optimization_audit_required == 'true'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run strict frontend optimization audit
      continue-on-error: true
      run: |
        python scripts/dev/frontend_optimization_audit.py \
          --repo-root . \
          --strict \
          --report-file reports/analysis/frontend-page-optimization-audit-report.md

    - name: Upload frontend optimization audit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-optimization-audit-report
        path: reports/analysis/frontend-page-optimization-audit-report.md

  route-layout-pm2-detect:
    runs-on: ubuntu-latest
    outputs:
      gate_required: ${{ steps.detect.outputs.gate_required }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Detect route/layout PM2 gate scope
      id: detect
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          mapfile -t changed_files < <(git ls-files)
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA...$HEAD_SHA")
        fi

        cmd=(python scripts/compliance/route_layout_pm2_gate.py --format json)
        for changed_file in "${changed_files[@]}"; do
          cmd+=(--path "$changed_file")
        done

        "${cmd[@]}" > route-layout-pm2-gate-report.json

        python - <<'PY'
        import json
        import os
        from pathlib import Path

        report = json.loads(Path("route-layout-pm2-gate-report.json").read_text(encoding="utf-8"))
        gate_required = "true" if report["gate_required"] else "false"

        with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
            handle.write(f"gate_required={gate_required}\n")

        print(f"Route/Layout PM2 gate required: {gate_required}")
        if report["matched_paths"]:
            for item in report["matched_paths"]:
                print(f"- {item['path']}: {', '.join(item['rules'])}")
        PY

    - name: Upload route/layout PM2 gate report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: route-layout-pm2-gate-report
        path: route-layout-pm2-gate-report.json

  route-layout-pm2-gate:
    name: Route/Layout PM2 Gate
    runs-on: ubuntu-latest
    needs: route-layout-pm2-detect
    if: needs.route-layout-pm2-detect.outputs.gate_required == 'true'
    timeout-minutes: 45
    env:
      BACKEND_PORT: '8020'
      BACKEND_BACKUP_PORT: '8021'
      FRONTEND_PORT: '3020'
      FRONTEND_BACKUP_PORT: '3021'
      USE_MOCK_DATA: 'true'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          web/frontend/package-lock.json

    - name: Install root dependencies
      run: npm ci

    - name: Install frontend dependencies
      run: npm ci
      working-directory: web/frontend

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install PM2 and Playwright browser
      run: |
        npm install -g pm2
        npx playwright install --with-deps chromium

    - name: Run route/layout PM2 E2E gate
      run: bash scripts/run_e2e_pm2.sh

  frontend-test:
    runs-on: ubuntu-latest
    needs: frontend-gate-scope-detect
    if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true' || needs.frontend-gate-scope-detect.outputs.artdeco_scope_changed == 'true'
    env:
      FRONTEND_PORT: '3020'
      FRONTEND_BACKUP_PORT: '3021'
      BACKEND_PORT: '8020'
      BACKEND_BACKUP_PORT: '8021'
      PLAYWRIGHT_EXTERNAL_FRONTEND: '0'
      TYPE_ERROR_CEILING: '0'
    defaults:
      run:
        working-directory: web/frontend

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: web/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint code
      run: npm run lint

    - name: App Route Purity Gate
      run: |
        python ../../scripts/compliance/app_route_purity_gate.py --format json > app-route-purity-gate-report.json
        cat app-route-purity-gate-report.json

    - name: Request ID Visibility Gate
      continue-on-error: true
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            mapfile -t changed_files < <(git diff --name-only HEAD^ HEAD)
          else
            changed_files=()
          fi
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA...$HEAD_SHA")
        fi

        cmd=(python ../../scripts/compliance/request_id_visibility_gate.py --format json)
        for changed_file in "${changed_files[@]}"; do
          cmd+=(--path "$changed_file")
        done

        "${cmd[@]}" > request-id-visibility-gate-report.json
        cat request-id-visibility-gate-report.json

    - name: Run ArtDeco token changed-file gate
      if: needs.frontend-gate-scope-detect.outputs.artdeco_scope_changed == 'true'
      continue-on-error: true
      run: npm run lint:artdeco:changed

    - name: Run ArtDeco guidance changed-file gate
      if: needs.frontend-gate-scope-detect.outputs.artdeco_scope_changed == 'true'
      continue-on-error: true
      run: npm run lint:artdeco:guidance:changed

    - name: Enforce E2E user-facing locator policy
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run test:e2e:selectors

    - name: Enforce zero type error ceiling
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run test:type-ceiling

    - name: Frontend contract smoke
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npx vitest run tests/unit/port-config-consistency.spec.ts --reporter=verbose

    - name: Run stable unit tests
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run test:unit:stable

    - name: Run full unit tests
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run test

    - name: Install Playwright browser
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npx playwright install --with-deps chromium

    - name: Validate e2e setup
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run test:e2e:validate

    - name: Run business smoke e2e tests
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: |
        if [ "${PLAYWRIGHT_EXTERNAL_FRONTEND:-0}" = "1" ]; then
          export FRONTEND_BASE_URL="${FRONTEND_BASE_URL:-http://127.0.0.1:${FRONTEND_PORT}}"
          export E2E_FRONTEND_URL="${E2E_FRONTEND_URL:-$FRONTEND_BASE_URL}"
          echo "Using external frontend server: ${FRONTEND_BASE_URL}"
        else
          echo "Using Playwright-managed frontend server"
        fi

        npm run test:e2e:stable

    - name: Run axe accessibility smoke
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run test:e2e:axe

    - name: Run Lighthouse CI smoke
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      env:
        LIGHTHOUSE_BASE_URL: http://127.0.0.1:4273
      run: npm run test:e2e:lighthouse

    - name: Build for production
      if: needs.frontend-gate-scope-detect.outputs.frontend_source_changed == 'true'
      run: npm run build:no-types

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: web/frontend/dist/

  frontend-security:
    runs-on: ubuntu-latest
    needs: frontend-gate-scope-detect
    if: needs.frontend-gate-scope-detect.outputs.dependency_audit_required == 'true'
    defaults:
      run:
        working-directory: web/frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: web/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      continue-on-error: true
      run: npm audit --audit-level moderate

    - name: Run security scan
      run: |
        if [ -f audit-ci.json ]; then
          npm install -g audit-ci
          audit-ci --config audit-ci.json
        else
          echo "audit-ci.json not present; skipping audit-ci enforcement"
        fi
