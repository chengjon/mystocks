# GitHub Actions CI/CD Code Quality Pipeline
# 集成代码质量和安全检查到CI/CD流程

name: Code Quality Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  issues: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  # 代码质量检查阶段
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint pytest pytest-cov black isort flake8 bandit safety pyyaml

    - name: Directory Governance Check
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          mapfile -t changed_files < <(git ls-files)
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")
        fi

        if [ "${#changed_files[@]}" -eq 0 ]; then
          echo "No changed files detected for directory governance."
          printf '{"project_root": "%s", "errors": [], "warnings": [], "infos": [], "summary": {"errors": 0, "warnings": 0, "infos": 0}}' "$PWD" > directory-governance-report.json
          exit 0
        fi

        cmd=(python scripts/maintenance/check_structure.py --format json)
        for changed_file in "${changed_files[@]}"; do
          cmd+=(--path "$changed_file")
        done

        "${cmd[@]}" > directory-governance-report.json

        python - <<'PY'
        import json
        from pathlib import Path

        report = json.loads(Path("directory-governance-report.json").read_text())
        summary = report["summary"]
        print(f"Directory governance summary: {summary}")
        if report["errors"]:
            print("Blocking findings:")
            for item in report["errors"][:10]:
                print(f"- {item['path']}: {item['message']}")
        PY

    - name: Governance Report Fields Guard
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          mapfile -t changed_files < <(git ls-files 'reports/governance/*.TASK.md' 'reports/governance/*.TASK-REPORT.md')
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}" | grep -E '^reports/governance/.*\.TASK(-REPORT)?\.md$' || true)
        fi

        if [ "${#changed_files[@]}" -eq 0 ]; then
          printf '{"checked_files":0,"structural_files":0,"errors":[],"summary":{"checked_files":0,"structural_files":0,"errors":0}}' > governance-report-fields-guard.json
          echo "No changed governance task markdown files detected."
          exit 0
        fi

        cmd=(python scripts/dev/quality_gate/governance_report_fields_guard.py --format json)
        for changed_file in "${changed_files[@]}"; do
          cmd+=(--path "$changed_file")
        done

        set +e
        "${cmd[@]}" > governance-report-fields-guard.json
        status=$?
        set -e

        python - <<'PY'
        import json
        from pathlib import Path

        report = json.loads(Path("governance-report-fields-guard.json").read_text(encoding="utf-8"))
        summary = report["summary"]
        print(f"Governance report fields summary: {summary}")

        if report["errors"]:
            print("Blocking findings:")
            for item in report["errors"][:10]:
                print(f"- {item['path']}: {item['message']}")
        PY

        exit "$status"

    - name: Production Python Guardrails
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          mapfile -t changed_files < <(git ls-files)
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")
        fi

        cmd=(python scripts/compliance/production_python_guardrails.py --format json)
        production_changed=0

        for changed_file in "${changed_files[@]}"; do
          if [[ "$changed_file" =~ ^(src|web/backend/app)/.*\.py$ ]]; then
            cmd+=(--path "$changed_file")
            production_changed=1
          fi
        done

        if [ "$production_changed" -eq 0 ]; then
          printf '{"project_root":"%s","scope_roots":["src","web/backend/app"],"paths":[],"checked_files":0,"errors":[],"warnings":[],"summary":{"errors":0,"warnings":0,"checked_files":0},"policy":{"warning_lines":650,"failure_lines":700}}' "$PWD" > production-python-guardrails-report.json
          echo "No changed production Python files detected."
          exit 0
        fi

        "${cmd[@]}" > production-python-guardrails-report.json

        python - <<'PY'
        import json
        from pathlib import Path

        report = json.loads(Path("production-python-guardrails-report.json").read_text(encoding="utf-8"))
        summary = report["summary"]
        print(f"Production Python guardrails summary: {summary}")

        if report["warnings"]:
            print("Warnings:")
            for item in report["warnings"][:10]:
                print(f"- {item['path']}: {item['message']}")

        if report["errors"]:
            print("Blocking findings:")
            for item in report["errors"][:10]:
                print(f"- {item['path']}: {item['message']}")
        PY

    - name: Observability Readiness Gate
      run: |
        python scripts/compliance/readiness_contract_gate.py --format json > readiness-contract-gate-report.json

        python - <<'PY'
        import json
        from pathlib import Path

        report = json.loads(Path("readiness-contract-gate-report.json").read_text(encoding="utf-8"))
        print(f"Readiness contract summary: {report['summary']}")

        if report["errors"]:
            print("Blocking findings:")
            for item in report["errors"]:
                print(f"- {item['check']}: {item['detail']}")
        PY

    - name: Backend Singleton None Guard
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          mapfile -t changed_files < <(git ls-files)
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")
        fi

        cmd=(python scripts/compliance/backend_singleton_none_guard.py --format json --root-dir "$PWD")
        backend_changed=0

        for changed_file in "${changed_files[@]}"; do
          if [[ "$changed_file" =~ ^(src|web/backend/app)/.*\.py$ ]]; then
            cmd+=(--path "$changed_file")
            backend_changed=1
          fi
        done

        if [ "$backend_changed" -eq 0 ]; then
          printf '{"project_root":"%s","scope_roots":["src","web/backend/app"],"paths":[],"checked_files":0,"errors":[],"summary":{"errors":0,"checked_files":0}}' "$PWD" > backend-singleton-none-guard-report.json
          echo "No changed backend Python files detected for singleton None guard."
          exit 0
        fi

        "${cmd[@]}" > backend-singleton-none-guard-report.json

        python - <<'PY'
        import json
        from pathlib import Path

        report = json.loads(Path("backend-singleton-none-guard-report.json").read_text(encoding="utf-8"))
        print(f"Backend singleton None guard summary: {report['summary']}")

        if report["errors"]:
            print("Blocking findings:")
            for item in report["errors"]:
                suffix = f" ({', '.join(item['names'])})" if item.get("names") else ""
                print(f"- {item['path']}: {item['message']}{suffix}")
        PY

    - name: UnifiedResponse Contract Guard
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")
        fi

        cmd=(python scripts/compliance/unified_response_contract_guard.py --format json --root-dir "$PWD")
        api_changed=0

        for changed_file in "${changed_files[@]}"; do
          if [[ "$changed_file" =~ ^web/backend/app/api/.*\.py$ ]]; then
            cmd+=(--path "$changed_file")
            api_changed=1
          fi
        done

        if [ "$api_changed" -eq 0 ]; then
          printf '{"project_root":"%s","scope_root":"web/backend/app/api","paths":[],"checked_files":0,"checked_routes":0,"results":[],"errors":[],"summary":{"errors":0,"checked_files":0,"checked_routes":0}}' "$PWD" > unified-response-contract-guard-report.json
          echo "No changed backend API Python files detected for UnifiedResponse contract guard."
          exit 0
        fi

        "${cmd[@]}" > unified-response-contract-guard-report.json

        python - <<'PY'
        import json
        from pathlib import Path

        report = json.loads(Path("unified-response-contract-guard-report.json").read_text(encoding="utf-8"))
        print(f"UnifiedResponse contract summary: {report['summary']}")

        if report["errors"]:
            print("Blocking findings:")
            for item in report["errors"]:
                endpoint = f"{item['path']}::{item['endpoint']}"
                print(f"- {endpoint}: {item['message']}")
        PY

    - name: Frontend/Test File Size Guard
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")
        fi

        cmd=(python scripts/compliance/file_size_guardrail.py --format json --root-dir "$PWD" --scope-root web/frontend --scope-root tests)
        gated_changed=0

        for changed_file in "${changed_files[@]}"; do
          if [[ "$changed_file" =~ ^((web/frontend/.*\.(vue|ts|js))|(tests/.*\.(ts|js)))$ ]]; then
            cmd+=(--path "$changed_file")
            gated_changed=1
          fi
        done

        if [ "$gated_changed" -eq 0 ]; then
          printf '{"root_dir":"%s","scope_roots":["web/frontend","tests"],"paths":[],"checked_files":0,"oversized_count":0,"violations":[],"limits":{".py":800,".ts":500,".vue":500,".spec.ts":1000,".spec.js":1000},"summary":{"checked_files":0,"oversized_count":0}}' "$PWD" > frontend-test-file-size-gate-report.json
          echo "No changed frontend/test files detected for file size guard."
          exit 0
        fi

        "${cmd[@]}" > frontend-test-file-size-gate-report.json

        python - <<'PY'
        import json
        from pathlib import Path

        report = json.loads(Path("frontend-test-file-size-gate-report.json").read_text(encoding="utf-8"))
        print(f"Frontend/test file size summary: {report['summary']}")

        if report["violations"]:
            print("Blocking findings:")
            for item in report["violations"]:
                print(f"- {item['path']}: {item['lines']} lines (limit: {item['limit']}, type: {item['type']})")
        PY

    - name: PM2 First-Class Gate
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")
        fi

        cmd=(python scripts/compliance/pm2_first_class_gate.py --format json --root-dir "$PWD")
        orchestration_changed=0

        for changed_file in "${changed_files[@]}"; do
          if [[ "$changed_file" =~ ^((\.github/workflows/.*\.(yml|yaml))|(scripts/.*\.(sh|py))|(config/.*\.(js|json))|(ecosystem\.test\.config\.js)|(web/backend/ecosystem\.config\.js)|(web/frontend/ecosystem\.config\.js)|(web/backend/pm2\.config\.json))$ ]]; then
            cmd+=(--path "$changed_file")
            orchestration_changed=1
          fi
        done

        if [ "$orchestration_changed" -eq 0 ]; then
          printf '{"project_root":"%s","paths":[],"checked_files":0,"results":[],"errors":[],"summary":{"errors":0,"checked_files":0},"scope_patterns":[".github/workflows/*.yml",".github/workflows/*.yaml","scripts/*.sh","scripts/*.py","scripts/**/*.sh","scripts/**/*.py","config/**/*.js","config/**/*.json","ecosystem.test.config.js","web/backend/ecosystem.config.js","web/frontend/ecosystem.config.js","web/backend/pm2.config.json"]}' "$PWD" > pm2-first-class-gate-report.json
          echo "No changed orchestration files detected for PM2 first-class gate."
          exit 0
        fi

        "${cmd[@]}" > pm2-first-class-gate-report.json

        python - <<'PY'
        import json
        from pathlib import Path

        report = json.loads(Path("pm2-first-class-gate-report.json").read_text(encoding="utf-8"))
        print(f"PM2 first-class summary: {report['summary']}")

        if report["errors"]:
            print("Blocking findings:")
            for item in report["errors"]:
                suffix = ""
                if item.get("raw_startup_markers"):
                    suffix = f" raw={','.join(item['raw_startup_markers'])}"
                print(f"- {item['path']}: {item['message']}{suffix}")
        PY

    - name: Run Pylint with security profile
      run: |
        pylint src/ --rcfile=.pylintrc -j 0 --disable=import-error --output-format=json > pylint-report.json || true
      continue-on-error: true

    - name: Run Flake8 with security checks
      run: |
        flake8 src/ --format=json --exit-zero > flake8-report.json || true
      continue-on-error: true

    - name: Run Black formatting check
      run: |
        black --check --diff src/ > black-diff.txt || true
      continue-on-error: true

    - name: Run isort import sorting check
      run: |
        isort --check-only --diff src/ > isort-diff.txt || true
      continue-on-error: true

    - name: Upload code quality results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-quality-results
        path: |
          directory-governance-report.json
          production-python-guardrails-report.json
          pylint-report.json
          flake8-report.json
          black-diff.txt
          isort-diff.txt

  # 测试覆盖率分析
  test-coverage:
    name: Test Coverage Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov coverage[toml]

    - name: Run tests with coverage
      run: |
        python -m pytest -o addopts='' scripts/tests/ -v --cov=src --cov-report=xml --cov-report=html --cov-fail-under=80 || true
      continue-on-error: true

    - name: Generate coverage report
      run: |
        if [ -f coverage.xml ]; then
          coverage report --show-missing || true
          coverage html || true
        else
          echo "::warning::coverage.xml not generated; skipping coverage post-processing"
        fi

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-coverage-results
        path: |
          coverage.xml
          htmlcov/

  # 性能基准测试阶段
  performance-benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-benchmark memory-profiler

    - name: Run performance benchmarks
      run: |
        python -m pytest scripts/tests/ --benchmark-only --benchmark-json=benchmark-results.json || true
      continue-on-error: true

    - name: Analyze memory usage
      run: |
        python - << 'PY'
        import os
        import psutil
        import sys

        sys.path.insert(0, '.')

        print('=== 内存使用分析 ===')
        process = psutil.Process(os.getpid())
        memory_info = process.memory_info()
        print(f'进程内存使用: {memory_info.rss / 1024 / 1024:.2f} MB')
        print(f'虚拟内存: {memory_info.vms / 1024 / 1024:.2f} MB')
        print(f'CPU 使用率: {process.cpu_percent()}%')

        try:
            from src.core.memory_manager import MemoryManager
            manager = MemoryManager()
            stats = manager.get_memory_stats()
            print(f'管理内存统计: {stats}')
        except Exception as e:
            print(f'内存管理器初始化失败: {e}')
        PY

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-results
        path: |
          benchmark-results.json

  # 代码复杂度分析
  complexity-analysis:
    name: Code Complexity Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install radon mccabe lizard

    - name: Run Radon complexity analysis
      run: |
        radon cc src/ -nb -a -nb > radon-cc.txt
        radon cc src/ -nb -nb | grep -E "(A\+|A|B|C|F)" > complexity-summary.txt
      continue-on-error: true

    - name: Run McCabe complexity
      run: |
        radon cc src/ -nb -nb > mccabe-complexity.txt || true
      continue-on-error: true

    - name: Run Lizard complexity
      run: |
        lizard src/ --language Python --CCN 10 --NLOC 50 > lizard-report.txt || true
      continue-on-error: true

    - name: Upload complexity results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: complexity-results
        path: |
          radon-cc.txt
          complexity-summary.txt
          mccabe-complexity.txt
          lizard-report.txt

  # 安全编码规范检查
  security-compliance:
    name: Security Compliance Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit semgrep safety

    - name: Check security coding standards compliance
      run: |
        # 检查SQL注入防护
        echo "=== SQL注入防护检查 ==="
        grep -r "execute.*\+.*SELECT" src/ || echo "✅ 未发现SQL注入风险"
        grep -r "cursor.execute.*format" src/ || echo "✅ 未发现格式化字符串SQL风险"

        # 检查密码处理
        echo -e "\n=== 密码处理检查 ==="
        grep -r "password.*encode.*md5" src/ || echo "✅ 未发现MD5密码"
        grep -r "hashlib.md5" src/ || echo "✅ 未发现弱哈希算法"

        # 检查文件操作安全
        echo -e "\n=== 文件操作安全检查 ==="
        grep -r "open.*\+" src/ | head -5 || echo "✅ 未发现危险的文件操作"

        # 检查输入验证
        echo -e "\n=== 输入验证检查 ==="
        missing_validation=0
        for file in $(find src/ -name "*.py" -type f | head -10); do
          if grep -q "request\." $file && ! grep -q "validate\|check" $file; then
            echo "⚠️  $file 可能缺少输入验证"
            missing_validation=$((missing_validation + 1))
          fi
        done
        if [ $missing_validation -eq 0 ]; then
          echo "✅ 输入验证检查通过"
        fi

    - name: Run comprehensive security scan
      run: |
        bandit -r src/ -f json -o bandit-compliance.json || true
        semgrep --config=p/ci --json -o semgrep-compliance.json src/ || true

    - name: Upload compliance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: compliance-results
        path: |
          bandit-compliance.json
          semgrep-compliance.json

  # 质量报告生成
  quality-report:
    name: Quality Report Generation
    runs-on: ubuntu-latest
    needs: [code-quality, test-coverage, performance-benchmark, complexity-analysis, security-compliance]

    steps:
    - name: Download all quality artifacts
      uses: actions/download-artifact@v4
      with:
        path: .
        merge-multiple: true

    - name: Generate consolidated quality report
      run: |
        mkdir -p quality-reports

        # 生成总体质量报告
        cat > quality-reports/quality-summary.md << EOF
        # MyStocks 代码质量报告

        ## 执行时间
        $(date)

        ## 质量检查覆盖范围

        ### 执行的质量检查
        - ✅ Pylint 静态代码分析
        - ✅ Flake8 代码风格检查
        - ✅ Black 代码格式检查
        - ✅ isort 导入排序检查
        - ✅ 测试覆盖率分析
        - ✅ 性能基准测试
        - ✅ 代码复杂度分析
        - ✅ 安全合规检查

        ## 代码质量指标
        EOF

        # 添加Pylint结果
        if [ -f pylint-report.json ]; then
          echo "### Pylint 分析结果" >> quality-reports/quality-summary.md
          python - << 'PY' >> quality-reports/quality-summary.md
        import json

        try:
            with open('pylint-report.json') as f:
                data = json.load(f)
            if isinstance(data, list) and data:
                errors = sum(1 for msg in data if msg.get('type') in {'error', 'fatal'})
                warnings = sum(1 for msg in data if msg.get('type') == 'warning')
                refactors = sum(1 for msg in data if msg.get('type') == 'refactor')
                conventions = sum(1 for msg in data if msg.get('type') == 'convention')
                print(f'- 错误: {errors}')
                print(f'- 警告: {warnings}')
                print(f'- 重构建议: {refactors}')
                print(f'- 规范提示: {conventions}')
            else:
                print('- 解析Pylint报告时出错')
        except Exception:
            print('- 无法解析Pylint报告')
        PY
        fi

        # 添加覆盖率结果
        if [ -f coverage.xml ]; then
          echo -e "\n### 测试覆盖率" >> quality-reports/quality-summary.md
          python - << 'PY' >> quality-reports/quality-summary.md
        import xml.etree.ElementTree as ET

        try:
            tree = ET.parse('coverage.xml')
            root = tree.getroot()
            coverage = float(root.get('line-rate', '0')) * 100
            print(f'- 代码覆盖率: {coverage:.1f}%')
            if coverage < 80:
                print('- ⚠️  覆盖率低于80%目标')
            else:
                print('- ✅ 覆盖率达到目标')
        except Exception:
            print('- 无法解析覆盖率报告')
        PY
        fi

        # 添加复杂度结果
        if [ -f complexity-summary.txt ]; then
          echo -e "\n### 代码复杂度" >> quality-reports/quality-summary.md
          cat complexity-summary.txt >> quality-reports/quality-summary.md
        fi

        # 生成JSON格式报告
        cat > quality-reports/quality-results.json << JSON_EOF
        {
          "timestamp": "$(date -Iseconds)",
          "quality_metrics": {
            "pylint_score": 0,
            "test_coverage": 0,
            "complexity_issues": 0,
            "security_issues": 0
          },
          "recommendations": []
        }
        JSON_EOF

        echo "质量报告已生成: quality-reports/"

    - name: Upload quality reports
      uses: actions/upload-artifact@v4
      with:
        name: quality-reports
        path: quality-reports/

  # 质量门禁
  quality-gate:
    name: Quality Gate Check
    runs-on: ubuntu-latest
    needs: [quality-report]

    outputs:
      quality-pass: ${{ steps.gate.outputs.quality-pass }}

    steps:
    - name: Download quality reports
      uses: actions/download-artifact@v4
      with:
        path: .
        merge-multiple: true

    - name: Quality Gate Evaluation
      id: gate
      run: |
        QUALITY_PASS=true
        QUALITY_ISSUES=""

        # 检查Pylint错误
        if [ -f pylint-report.json ]; then
          ERROR_COUNT=$(python - << 'PY'
        import json

        try:
            with open('pylint-report.json') as f:
                data = json.load(f)
            if isinstance(data, list):
                error_count = len([msg for msg in data if msg.get('type') == 'error'])
                print(error_count)
            else:
                print('10')
        except Exception:
            print('10')
        PY
          )
          if [ "$ERROR_COUNT" -gt 20 ]; then
            QUALITY_PASS=false
            QUALITY_ISSUES="$QUALITY_ISSUES Pylint错误过多: $ERROR_COUNT 个"
          fi
        fi

        # 检查测试覆盖率
        if [ -f coverage.xml ]; then
          COVERAGE=$(python - << 'PY'
        import xml.etree.ElementTree as ET

        try:
            tree = ET.parse('coverage.xml')
            root = tree.getroot()
            coverage = float(root.get('line-rate', '0')) * 100
            print(f'{coverage:.1f}')
        except Exception:
            print('0.0')
        PY
          )
          COVERAGE_NUM=$(echo $COVERAGE | cut -d. -f1)
          if [ "$COVERAGE_NUM" -lt 80 ]; then
            QUALITY_PASS=false
            QUALITY_ISSUES="$QUALITY_ISSUES 测试覆盖率不足: ${COVERAGE_NUM}%"
          fi
        fi

        # 检查代码复杂度
        if [ -f complexity-summary.txt ]; then
          HIGH_COMPLEXITY=$(grep -c "F\|C" complexity-summary.txt 2>/dev/null || echo "0")
          if [ "$HIGH_COMPLEXITY" -gt 5 ]; then
            QUALITY_PASS=false
            QUALITY_ISSUES="$QUALITY_ISSUES 高复杂度函数过多: $HIGH_COMPLEXITY 个"
          fi
        fi

        # 输出结果
        if [ "$QUALITY_PASS" = "true" ]; then
          echo "✅ 代码质量门禁通过 - 所有质量指标正常"
          echo "quality-pass=true" >> $GITHUB_OUTPUT
        else
          echo "❌ 代码质量门禁失败 - $QUALITY_ISSUES"
          echo "quality-pass=false" >> $GITHUB_OUTPUT
        fi

    - name: Comment on PR
      if: github.event_name == 'pull_request' && steps.gate.outputs.quality-pass == 'false'
      uses: actions/github-script@v7
      with:
        script: |
          try {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ 代码质量门禁失败！请修复以下质量问题后再合并：\n- 检查代码质量报告\n- 修复Pylint错误\n- 提高测试覆盖率\n- 重构高复杂度函数\n\n详细信息请查看质量测试报告。'
            });
          } catch (error) {
            core.warning(`Skipping PR comment: ${error.message}`);
          }

  # 最终整合报告
  hardcoding-governance:
    name: Hardcoding Governance Gate
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install governance dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml detect-secrets bandit

    - name: Run detect-secrets scan
      run: |
        detect-secrets scan --all-files --exclude-files "(^docs/|^tests/|\\.md$)" > detect-secrets-report.json

    - name: Run gitleaks scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run bandit runtime scan
      run: |
        bandit -r src/ web/backend/app/ -q -f json -o bandit-hardcoding-gate.json || true

    - name: Validate hardcoding exceptions
      run: |
        python scripts/security/validate_hardcoding_exceptions.py --file config/security/hardcoding_exceptions.yml

    - name: Generate hardcoding gate report
      run: |
        python scripts/security/hardcoding_scan.py --scope runtime --format json --out reports/security/hardcoding/ci-latest.json
        python scripts/security/hardcoding_scan.py --scope runtime --format md --out reports/security/hardcoding/ci-latest.md

    - name: Enforce hardcoding threshold
      run: |
        python - << 'PY'
        import json
        from pathlib import Path
        current = json.loads(Path("reports/security/hardcoding/ci-latest.json").read_text(encoding="utf-8"))
        baseline_path = Path("reports/security/hardcoding/baseline-2026-02-15.json")
        baseline = json.loads(baseline_path.read_text(encoding="utf-8")) if baseline_path.exists() else {"hits": []}

        def p0_keys(report):
            keys = set()
            for item in report.get("hits", []):
                if item.get("severity") == "P0":
                    keys.add((item.get("rule_id"), item.get("file"), int(item.get("line", 0))))
            return keys

        baseline_p0 = p0_keys(baseline)
        current_p0 = p0_keys(current)
        new_p0 = sorted(current_p0 - baseline_p0)
        expired = int(current["stats"].get("expired_exceptions", 0))

        print(f"Baseline P0 findings: {len(baseline_p0)}")
        print(f"Current P0 findings: {len(current_p0)}")
        print(f"New P0 findings: {len(new_p0)}")
        print(f"Expired exceptions: {expired}")

        if new_p0:
            for rule_id, file_path, line_no in new_p0[:20]:
                print(f"- NEW P0 {rule_id} {file_path}:{line_no}")
            raise SystemExit("Hardcoding gate failed: new P0 findings detected.")
        if expired > 0:
            raise SystemExit("Hardcoding gate failed: expired exceptions must be 0.")
        print("Hardcoding gate passed.")
        PY

    - name: Upload hardcoding artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: hardcoding-governance-results
        path: |
          detect-secrets-report.json
          bandit-hardcoding-gate.json
          reports/security/hardcoding/ci-latest.json
          reports/security/hardcoding/ci-latest.md

  final-report:
    name: Final Integration Report
    runs-on: ubuntu-latest
    needs: [security-compliance, hardcoding-governance, quality-gate]
    if: always()

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: .
        merge-multiple: true

    - name: Generate final CI/CD report
      run: |
        OVERALL_STATUS="❌ 部分测试失败 - 需要修复"
        if [ "${{ needs.security-compliance.result }}" = "success" ] && [ "${{ needs.hardcoding-governance.result }}" = "success" ] && [ "${{ needs.quality-gate.outputs.quality-pass }}" = "true" ]; then
          OVERALL_STATUS="✅ 所有测试通过 - 可以部署"
        fi

        cat > ci-cd-final-report.md << EOF
        # MyStocks CI/CD 最终汇总

        - 执行时间: $(date)
        - 提交: ${{ github.sha }}
        - 分支: ${{ github.ref_name }}

        ## 安全结果

        - Security Compliance Check: ${{ needs.security-compliance.result }}
        - Hardcoding Governance Gate: ${{ needs.hardcoding-governance.result }}

        ## 质量结果

        - Quality Gate: ${{ needs.quality-gate.outputs.quality-pass == 'true' && 'success' || 'failure' }}

        ## 总体状态

        - ${OVERALL_STATUS}
        EOF

        if [ -f reports/security/hardcoding/ci-latest.md ]; then
          {
            echo
            echo "## Hardcoding Gate 摘要"
            grep -E "(passed|failed|P0|Expired|Baseline|Current|New)" reports/security/hardcoding/ci-latest.md | head -10 || true
          } >> ci-cd-final-report.md
        else
          {
            echo
            echo "## Hardcoding Gate 摘要"
            echo "- ⚠️ Hardcoding gate markdown report not found in downloaded artifacts"
          } >> ci-cd-final-report.md
        fi

        if [ -f quality-reports/quality-summary.md ]; then
          {
            echo
            echo "## 质量摘要"
            grep -E "(✅|❌|⚠️)" quality-reports/quality-summary.md | head -5 || true
          } >> ci-cd-final-report.md
        else
          {
            echo
            echo "## 质量摘要"
            echo "- ❌ 质量测试报告未找到"
          } >> ci-cd-final-report.md
        fi

        cat ci-cd-final-report.md

    - name: Upload final report
      uses: actions/upload-artifact@v4
      with:
        name: ci-cd-final-report
        path: ci-cd-final-report.md
