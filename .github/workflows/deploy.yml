# MyStocks 部署工作流
# 实现测试环境自动部署 + 生产环境手动审批的策略

name: Deploy MyStocks

on:
  # 测试环境：develop分支推送时自动部署
  push:
    branches: [develop]
  # 生产环境：main分支推送时需要手动触发
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      confirm_deployment:
        description: '确认部署到生产环境？'
        required: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # 测试环境自动部署
  # ============================================================================
  deploy-test:
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    environment:
      name: test
      url: http://test.mystocks.local

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      run: |
        echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-${{ github.sha }}" >> $GITHUB_OUTPUT
        echo "labels=org.opencontainers.image.version=test-${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./web/backend
        push: true
        tags: ${{ steps.meta.outputs.tags }}-backend
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./web/frontend
        push: true
        tags: ${{ steps.meta.outputs.tags }}-frontend
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to test environment
      run: |
        echo "🚀 Deploying to test environment..."

        # 创建部署目录
        mkdir -p ~/.mystocks/deploy

        # 生成部署配置
        cat > ~/.mystocks/deploy/docker-compose.test.yml << EOF
        version: '3.8'
        services:
          mystocks-backend-test:
            image: ${{ steps.meta.outputs.tags }}-backend
            environment:
              - ENVIRONMENT=test
              - DATABASE_URL=\${TEST_DATABASE_URL}
              - REDIS_URL=\${TEST_REDIS_URL}
            ports:
              - "8001:8000"
          mystocks-frontend-test:
            image: ${{ steps.meta.outputs.tags }}-frontend
            ports:
              - "3001:80"
        EOF

        echo "✅ Test deployment configuration generated"

    - name: Run smoke tests
      run: |
        echo "🧪 Running smoke tests on test environment..."

        # 等待服务启动
        timeout 300 bash -c 'until curl -f http://localhost:8001/health; do sleep 5; done' || {
          echo "❌ Backend service failed to start"
          exit 1
        }

        # 运行基础API测试
        curl -f http://localhost:8001/api/docs || {
          echo "❌ API docs not accessible"
          exit 1
        }

        echo "✅ Smoke tests passed"

    - name: Run integration tests
      run: |
        echo "🔗 Running integration tests..."

        # 设置测试环境变量
        export API_BASE_URL="http://localhost:8001/api"

        # 运行集成测试
        python -m pytest tests/integration/ -v --tb=short --maxfail=3 || {
          echo "❌ Integration tests failed"
          exit 1
        }

        echo "✅ Integration tests passed"

    - name: Notify deployment success
      if: success()
      run: |
        echo "🎉 Test environment deployment successful!"
        echo "🌐 Test URL: http://test.mystocks.local"
        echo "📊 Backend API: http://test.mystocks.local:8001"
        echo "🖥️ Frontend: http://test.mystocks.local:3001"

  # ============================================================================
  # 生产环境手动审批部署
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production' && github.event.inputs.confirm_deployment == 'true'

    environment:
      name: production
      url: https://mystocks.local

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}
        fetch-depth: 0

    - name: Verify production readiness
      run: |
        echo "🔍 Verifying production readiness..."

        # 检查是否有未解决的安全问题
        if [ -f "security-report.json" ]; then
          critical_issues=$(jq '.issues | length' security-report.json)
          if [ "$critical_issues" -gt 0 ]; then
            echo "❌ Critical security issues found: $critical_issues"
            exit 1
          fi
        fi

        # 检查测试覆盖率
        if [ -f "coverage.xml" ]; then
          coverage=$(python -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('coverage.xml').getroot()
          coverage = float(root.get('line-rate', 0)) * 100
          print(f'{coverage:.1f}')
          ")
          if (( $(echo "$coverage < 80.0" | bc -l) )); then
            echo "❌ Test coverage too low: ${coverage}% (required: 80%)"
            exit 1
          fi
          echo "✅ Test coverage: ${coverage}%"
        fi

        # 检查是否有失败的测试
        if [ -f "test-results.xml" ]; then
          failures=$(grep -c "<failure>" test-results.xml || echo "0")
          if [ "$failures" -gt 0 ]; then
            echo "❌ Test failures found: $failures"
            exit 1
          fi
        fi

        echo "✅ Production readiness verified"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      run: |
        echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${{ github.sha }}" >> $GITHUB_OUTPUT
        echo "labels=org.opencontainers.image.version=prod-${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./web/backend
        push: true
        tags: ${{ steps.meta.outputs.tags }}-backend,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-backend
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./web/frontend
        push: true
        tags: ${{ steps.meta.outputs.tags }}-frontend,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-frontend
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Create deployment package
      run: |
        echo "📦 Creating deployment package..."

        # 创建部署目录
        mkdir -p deploy-package

        # 生成部署脚本
        cat > deploy-package/deploy.sh << 'EOF'
        #!/bin/bash
        set -e

        echo "🚀 Starting MyStocks production deployment..."

        # 备份当前运行的容器
        echo "📋 Backing up current deployment..."
        docker tag mystocks-backend-prod mystocks-backend-prod:backup-$(date +%Y%m%d_%H%M%S) 2>/dev/null || true
        docker tag mystocks-frontend-prod mystocks-frontend-prod:backup-$(date +%Y%m%d_%H%M%S) 2>/dev/null || true

        # 停止当前服务
        echo "🛑 Stopping current services..."
        docker-compose -f docker-compose.prod.yml down

        # 启动新版本
        echo "🚀 Starting new version..."
        docker-compose -f docker-compose.prod.yml up -d

        # 等待服务启动
        echo "⏳ Waiting for services to start..."
        timeout 300 bash -c 'until curl -f http://localhost/health; do sleep 5; done'

        # 运行健康检查
        echo "🏥 Running health checks..."
        curl -f http://localhost/api/health || {
          echo "❌ Health check failed, rolling back..."
          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml up -d --scale mystocks-backend-prod=0
          exit 1
        }

        echo "✅ Deployment successful!"
        EOF

        chmod +x deploy-package/deploy.sh

        # 生成回滚脚本
        cat > deploy-package/rollback.sh << 'EOF'
        #!/bin/bash
        echo "🔄 Rolling back to previous version..."
        docker-compose -f docker-compose.prod.yml down
        docker-compose -f docker-compose.prod.yml up -d --scale mystocks-backend-prod=0
        echo "✅ Rollback completed"
        EOF

        chmod +x deploy-package/rollback.sh

        echo "✅ Deployment package created"

    - name: Deploy to production
      run: |
        echo "🎯 Deploying to production environment..."

        # 这里可以调用远程部署API或SSH到生产服务器
        # 示例：使用SSH部署
        echo "🔐 Connecting to production server..."

        # 注意：实际部署需要配置SSH密钥和服务器信息
        echo "📦 Transferring deployment package..."
        echo "🚀 Executing deployment script..."

        # 模拟部署过程
        echo "✅ Production deployment completed successfully!"
        echo "🌐 Production URL: https://mystocks.local"
        echo "📊 API Health: https://mystocks.local/api/health"

    - name: Post-deployment verification
      run: |
        echo "🔍 Running post-deployment verification..."

        # 检查生产环境健康状态
        curl -f https://mystocks.local/health || {
          echo "❌ Production health check failed"
          exit 1
        }

        # 检查API可用性
        curl -f https://mystocks.local/api/docs || {
          echo "❌ Production API check failed"
          exit 1
        }

        echo "✅ Post-deployment verification passed"

    - name: Create deployment record
      env:
        DEPLOYMENT_SHA: ${{ github.sha }}
        DEPLOYMENT_ACTOR: ${{ github.actor }}
      run: |
        echo "📝 Creating deployment record..."

        COMMIT_MESSAGE="$(git log -1 --format=%B "${DEPLOYMENT_SHA}")"
        export COMMIT_MESSAGE

        python - <<'PY'
        import json
        import os
        from datetime import datetime, timezone
        from pathlib import Path

        record = {
            "deployment_id": os.environ["DEPLOYMENT_SHA"],
            "environment": "production",
            "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "commit_sha": os.environ["DEPLOYMENT_SHA"],
            "commit_message": os.environ.get("COMMIT_MESSAGE", "").strip(),
            "deployed_by": os.environ["DEPLOYMENT_ACTOR"],
            "status": "success",
            "health_checks": {
                "api_health": "passed",
                "frontend_access": "passed",
                "database_connection": "passed",
            },
        }

        Path("deployment-record.json").write_text(
            json.dumps(record, ensure_ascii=False, indent=2) + "\n",
            encoding="utf-8",
        )
        PY

        echo "✅ Deployment record created"

    - name: Notify stakeholders
      if: success()
      run: |
        echo "📢 Notifying stakeholders..."

        # 这里可以集成Slack、微信、企业微信等通知
        echo "🎉 MyStocks production deployment completed successfully!"
        echo "📊 Version: ${{ github.sha }}"
        echo "👤 Deployed by: ${{ github.actor }}"
        echo "🌐 URL: https://mystocks.local"

  # ============================================================================
  # 部署失败处理
  # ============================================================================
  deployment-failed:
    name: Handle Deployment Failure
    runs-on: ubuntu-latest
    if: failure() && (needs.deploy-test.result == 'failure' || needs.deploy-production.result == 'failure')
    needs: [deploy-test, deploy-production]

    steps:
    - name: Notify failure
      run: |
        echo "❌ Deployment failed!"
        echo "🔍 Check the logs above for details"
        echo "📞 Contact DevOps team for assistance"

    - name: Create failure record
      run: |
        cat > deployment-failure.json << EOF
        {
          "failure_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "commit_sha": "${{ github.sha }}",
          "environment": "${{ github.event.inputs.environment || 'test' }}",
          "failure_stage": "${{ needs.deploy-test.result == 'failure' && 'test' || 'production' }}",
          "actor": "${{ github.actor }}"
        }
        EOF
