name: Data Synchronization Testing

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web/backend/**'
      - 'web/frontend/**'
      - 'tests/**'
      - 'scripts/ci_data_sync_tests.sh'
      - 'scripts/ci_type_check.sh'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'web/backend/**'
      - 'web/frontend/**'
      - 'tests/**'
      - 'scripts/ci_data_sync_tests.sh'
      - 'scripts/ci_type_check.sh'

jobs:
  data-sync-testing:
    runs-on: ubuntu-latest
    services:
      # PostgreSQL service
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # TDengine service
      tdengine:
        image: tdengine/tdengine:3.0.5.0
        ports:
          - 6041:6041
        options: >-
          --health-cmd "taos -h localhost -s 'show databases;'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          web/frontend/package-lock.json
          requirements.txt

    - name: Install Python dependencies
      run: |
        python -m pip install -r requirements.txt
        python -m pip install -r web/backend/requirements.txt
        python -m pip install pytest pytest-asyncio pytest-cov pytest-mock schemathesis locust

    - name: Install frontend dependencies
      run: |
        cd web/frontend
        npm ci

    - name: Set up test databases
      run: |
        # Wait for databases to be ready
        sleep 10

        # Configure PostgreSQL
        export PGPASSWORD=test_password
        psql -h localhost -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'mystocks_test'" | grep -q 1 \
          || psql -h localhost -U postgres -d postgres -c "CREATE DATABASE mystocks_test;"

        # Configure TDengine
        # Note: TDengine setup would require additional configuration

    - name: Start backend for API Contract Tests
      run: |
        echo "🚀 Starting backend for API Contract Tests..."
        cd web/backend
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        CONTRACT_BACKEND_PID=$!
        cd ../..

        echo $CONTRACT_BACKEND_PID > /tmp/contract_backend_pid

        for _ in $(seq 1 30); do
          if curl -fsS http://localhost:8000/api/announcement/health >/dev/null 2>&1 || \
             curl -fsS http://localhost:8000/health/ready >/dev/null 2>&1; then
            echo "✅ Backend is ready for API Contract Tests"
            exit 0
          fi

          if ! kill -0 "$CONTRACT_BACKEND_PID" >/dev/null 2>&1; then
            echo "❌ Backend exited before becoming ready"
            exit 1
          fi

          sleep 2
        done

        echo "❌ Backend did not become ready in time"
        exit 1

    - name: Run API Contract Tests
      run: |
        echo "🔍 Running API Contract Tests..."
        BASE_URL=http://localhost:8000 python -m pytest -o addopts='' tests/real_data_synchronization_test.py::test_market_data_real_availability -v
        BASE_URL=http://localhost:8000 python -m pytest -o addopts='' tests/real_data_synchronization_test.py::test_strategy_api_real_availability -v
        BASE_URL=http://localhost:8000 python -m pytest -o addopts='' tests/real_data_synchronization_test.py::test_data_routing_real_correctness -v

    - name: Run Data Mapping Tests
      run: |
        echo "🔄 Running Data Mapping Tests..."
        python -m pytest -o addopts='' tests/data_mapping_tests.py -v

    - name: Run Type Generation Validation
      run: |
        echo "📝 Running Type Generation Validation..."
        ./scripts/ci_type_check.sh

    - name: Stop backend after API Contract Tests
      if: always()
      run: |
        if [ -f /tmp/contract_backend_pid ]; then
          kill $(cat /tmp/contract_backend_pid) 2>/dev/null || true
          rm -f /tmp/contract_backend_pid
        fi

    - name: Build Backend
      run: |
        echo "🔧 Building Backend..."
        cd web/backend
        # Add backend build/test commands here
        echo "Backend build completed"

    - name: Build Frontend
      run: |
        echo "🎨 Building Frontend..."
        cd web/frontend
        npm run build

    - name: Run UI Binding Tests
      run: |
        echo "🎯 Running UI Binding Tests..."
        cd web/frontend
        npm run test:unit -- --run tests/ui_binding_tests.spec.ts --reporter=verbose

    - name: Start Services for E2E Tests
      run: |
        echo "🚀 Starting Services for E2E Tests..."
        # Start backend in background
        cd web/backend
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload &
        BACKEND_PID=$!

        # Start frontend in background
        cd ../frontend
        npm run dev -- --port 3001 --host 0.0.0.0 &
        FRONTEND_PID=$!

        # Wait for services to be ready
        sleep 30

        # Store PIDs for cleanup
        echo $BACKEND_PID > /tmp/backend_pid
        echo $FRONTEND_PID > /tmp/frontend_pid

    - name: Run E2E Data Flow Tests
      run: |
        echo "🌐 Running E2E Data Flow Tests..."
        npx playwright install
        npx playwright test tests/e2e_data_flow.spec.ts --headed=false

    - name: Run Real Data Synchronization Tests
      run: |
        echo "🔬 Running Real Data Synchronization Tests..."
        BASE_URL=http://localhost:8000 python tests/real_data_synchronization_test.py

    - name: Generate Test Reports
      run: |
        echo "📊 Generating Test Reports..."
        mkdir -p test-results

        # Collect coverage reports
        if [ -d "htmlcov" ]; then
          cp -r htmlcov test-results/
        fi

        # Collect Playwright reports
        if [ -d "playwright-report" ]; then
          cp -r playwright-report test-results/
        fi

        # Generate summary report
        cat > test-results/test-summary.json << EOF
        {
          "timestamp": "$(date -Iseconds)",
          "workflow": "data-sync-testing",
          "status": "completed",
          "reports": [
            "test-results/htmlcov/index.html",
            "test-results/playwright-report/index.html"
          ]
        }
        EOF

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.run_number }}
        path: test-results/

    - name: Cleanup Services
      if: always()
      run: |
        # Stop background services
        if [ -f /tmp/backend_pid ]; then
          kill $(cat /tmp/backend_pid) 2>/dev/null || true
        fi
        if [ -f /tmp/frontend_pid ]; then
          kill $(cat /tmp/frontend_pid) 2>/dev/null || true
        fi
        if [ -f /tmp/contract_backend_pid ]; then
          kill $(cat /tmp/contract_backend_pid) 2>/dev/null || true
        fi

  # Quality Gate Check
  quality-gate:
    runs-on: ubuntu-latest
    needs: data-sync-testing
    if: always()

    steps:
    - name: Download Test Results
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: test-results-${{ github.run_number }}
        path: test-results

    - name: Quality Gate Check
      run: |
        echo "🔍 Performing Quality Gate Check..."

        # Check if all required tests passed
        # This would be enhanced with actual test result parsing

        if [ "${{ needs.data-sync-testing.result }}" = "success" ]; then
          echo "✅ All Data Synchronization Tests Passed"
          echo "🚀 Ready for deployment"
          exit 0
        else
          echo "❌ Data Synchronization Tests Failed"
          echo "🛑 Blocking deployment"
          exit 1
        fi

  # Data Source Health Check
  data-source-health:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check Data Source Health
      run: |
        echo "🏥 Checking Data Source Health..."

        # Check external data source availability
        # This would include checks for:
        # - TDX API connectivity
        # - Financial data providers
        # - Database connections
        # - External service dependencies

        echo "✅ Data Source Health Check Completed"

  # Performance Regression Test
  performance-regression:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Performance Tests
      run: |
        echo "⚡ Running Performance Regression Tests..."

        # Run performance benchmarks
        # Compare against baseline performance metrics
