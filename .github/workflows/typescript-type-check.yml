# GitHub Actions TypeScript Type Checking Pipeline
# 使用 vue-tsc 进行 Vue 3 + TypeScript 类型检查

name: TypeScript Type Check (vue-tsc)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web/frontend/src/**/*.ts'
      - 'web/frontend/src/**/*.tsx'
      - 'web/frontend/src/**/*.vue'
      - 'web/frontend/tsconfig.json'
      - 'web/frontend/vite.config.ts'
      - 'web/frontend/package.json'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'web/frontend/src/**/*.ts'
      - 'web/frontend/src/**/*.tsx'
      - 'web/frontend/src/**/*.vue'
      - 'web/frontend/tsconfig.json'
      - 'web/frontend/vite.config.ts'
      - 'web/frontend/package.json'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: 'web/frontend'
  TECH_DEBT_BASELINE_FILE: 'reports/analysis/tech-debt-baseline.json'
  TYPE_ERROR_CEILING: '0'

jobs:
  # ============================================================
  # 阶段1: 快速类型检查（仅 .ts/.tsx 文件）
  # ============================================================
  type-check-typescript:
    name: Type Check (TypeScript only)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate TypeScript types
        run: npm run generate-types

      - name: Run TypeScript compiler (tsc)
        run: |
          npx tsc --noEmit \
            --pretty \
            --incremental \
            --tsBuildInfoFile .tsbuildinfo | tee tsc-output.txt
        continue-on-error: true

      - name: Count TypeScript errors
        id: tsc-errors
        run: |
          if [ -f tsc-output.txt ]; then
            ERROR_COUNT=$(grep -c "error TS" tsc-output.txt 2>/dev/null || true)
            if [ -z "$ERROR_COUNT" ]; then ERROR_COUNT=0; fi
            echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
            echo "TypeScript 错误数: $ERROR_COUNT"
          else
            echo "error_count=0" >> $GITHUB_OUTPUT
            echo "TypeScript 错误数: 0"
          fi

      - name: Prepare tsc artifacts
        if: always()
        run: |
          ARTIFACT_DIR="${{ github.workspace }}/type-check-artifacts/tsc-results"
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"
          cp tsc-output.txt "$ARTIFACT_DIR/"
          if [ -f .tsbuildinfo ]; then
            cp .tsbuildinfo "$ARTIFACT_DIR/"
          fi

      - name: Upload tsc results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tsc-results
          path: ${{ github.workspace }}/type-check-artifacts/tsc-results
          retention-days: 7

  # ============================================================
  # 阶段2: 完整 Vue 类型检查（包含 .vue 文件）
  # ============================================================
  type-check-vue:
    name: Type Check (Vue + TypeScript)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate TypeScript types
        run: npm run generate-types

      - name: Run vue-tsc (full check)
        run: |
          npx vue-tsc --noEmit \
            --pretty \
            2>&1 | tee vue-tsc-output.txt
        continue-on-error: true

      - name: Generate type error report
        if: always()
        run: |
          cat > type-check-report.md << EOF
          # Vue + TypeScript 类型检查报告

          **执行时间**: $(date)
          **提交**: ${{ github.sha }}
          **分支**: ${{ github.ref_name }}

          ## 错误统计

          ### 原始错误数
          \`\`\`
          $(grep -c "error TS" vue-tsc-output.txt 2>/dev/null || echo 0) 个错误
          \`\`\`

          ### 当前门禁口径
          \`\`\`
          原始 vue-tsc 输出，零错误硬门禁；最终由 type-check-gate 结合 `TYPE_ERROR_CEILING=0` 与 `reports/analysis/tech-debt-baseline.json` 判定
          \`\`\`

          ### 质量门禁状态
          由 `type-check-gate` 阶段按基线文件 `reports/analysis/tech-debt-baseline.json` 判定

          ## 主要错误（前20个）

          \`\`\`
          $(grep "error TS" vue-tsc-output.txt | head -20 || true)
          \`\`\`

          EOF

          cat type-check-report.md

      - name: Prepare vue-tsc artifacts
        if: always()
        run: |
          ARTIFACT_DIR="${{ github.workspace }}/type-check-artifacts/vue-tsc-results"
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"
          cp vue-tsc-output.txt "$ARTIFACT_DIR/"
          cp type-check-report.md "$ARTIFACT_DIR/"

      - name: Upload vue-tsc results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vue-tsc-results
          path: ${{ github.workspace }}/type-check-artifacts/vue-tsc-results
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'web/frontend/type-check-report.md';
            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }

  # ============================================================
  # 阶段3: ESLint TypeScript 检查
  # ============================================================
  eslint-typescript:
    name: ESLint TypeScript Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (TypeScript files only)
        run: |
          npx eslint src --ext .ts,.tsx,.vue \
            --format json \
            --output-file eslint-report.json \
            || true

      - name: Generate ESLint summary
        run: |
          if [ -f eslint-report.json ]; then
            ERROR_COUNT=$(node -e "
              const fs = require('fs');
              const report = JSON.parse(fs.readFileSync('eslint-report.json', 'utf8'));
              let errors = 0;
              let warnings = 0;
              report.forEach(file => {
                file.messages.forEach(msg => {
                  if (msg.severity === 2) errors++;
                  if (msg.severity === 1) warnings++;
                });
              });
              console.log(errors + warnings);
            ")

            echo "ESLint 问题总数: $ERROR_COUNT"
            echo $ERROR_COUNT > eslint-count.txt
          else
            echo "0" > eslint-count.txt
          fi

      - name: Prepare ESLint artifacts
        if: always()
        run: |
          ARTIFACT_DIR="${{ github.workspace }}/type-check-artifacts/eslint-results"
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"
          cp eslint-count.txt "$ARTIFACT_DIR/"
          if [ -f eslint-report.json ]; then
            cp eslint-report.json "$ARTIFACT_DIR/"
          fi

      - name: Upload ESLint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-results
          path: ${{ github.workspace }}/type-check-artifacts/eslint-results
          retention-days: 7

  # ============================================================
  # 阶段4: 类型覆盖率分析
  # ============================================================
  type-coverage:
    name: Type Coverage Analysis
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Analyze type coverage
        run: |
          # 统计 TypeScript 文件和类型注解覆盖率
          python - <<'PY'
          import json
          import re
          from datetime import datetime
          from pathlib import Path

          def analyze_ts_coverage(directory: str) -> None:
              total_files = 0
              total_interfaces = 0
              total_types = 0

              for ts_file in Path(directory).rglob("*.ts"):
                  if "node_modules" in str(ts_file) or ".test." in str(ts_file):
                      continue
                  total_files += 1

                  try:
                      content = ts_file.read_text(encoding="utf-8")
                      total_interfaces += len(re.findall(r"interface\s+\w+", content))
                      total_types += len(re.findall(r"type\s+\w+", content))
                  except Exception as exc:
                      print(f"Error processing {ts_file}: {exc}")

              print(f"TypeScript 文件数: {total_files}")
              print(f"接口定义数: {total_interfaces}")
              print(f"类型别名数: {total_types}")

              report = {
                  "timestamp": datetime.utcnow().isoformat(),
                  "total_files": total_files,
                  "total_interfaces": total_interfaces,
                  "total_types": total_types,
              }

              Path("type-coverage.json").write_text(json.dumps(report, indent=2), encoding="utf-8")

          analyze_ts_coverage(".")
          PY
        working-directory: src/

      - name: Upload type coverage results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ts-type-coverage-results
          path: src/type-coverage.json
          retention-days: 30

  # ============================================================
  # 阶段5: no-new-debt 门禁（新增抑制/裸 TODO 阻断）
  # ============================================================
  no-new-debt:
    name: No New Debt Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base revision
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA=$(git rev-parse HEAD~1)
          fi

          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "基线提交: $BASE_SHA"

      - name: Check suppressions and bare TODO markers
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BASE_SHA="${{ steps.base.outputs.base_sha }}"
          DIFF_FILE="added-lines.diff"

          git diff --unified=0 "$BASE_SHA"...HEAD -- web/frontend/src web/backend/app src tests \
            | grep '^+' \
            | grep -v '^+++' > "$DIFF_FILE" || true

          echo "检查新增行总数: $(wc -l < "$DIFF_FILE" | tr -d ' ')"

          SUPPRESSION_CANDIDATES=$(grep -nE '@ts-ignore|@ts-expect-error|@ts-nocheck|[[:space:]]as any\b|#\s*type:\s*ignore' "$DIFF_FILE" || true)
          TODO_CANDIDATES=$(grep -nE 'TODO|FIXME|HACK' "$DIFF_FILE" || true)
          BARE_TODO_VIOLATIONS=$(printf "%s\n" "$TODO_CANDIDATES" | grep -Evi 'owner|ttl|issue' || true)

          EXCEPTION_PATTERN='\[debt-exception\].*owner=.*issue=.*ttl=.*reason=.*remediation='
          SUPPRESSION_VIOLATIONS=$(printf "%s\n" "$SUPPRESSION_CANDIDATES" | grep -Ev "$EXCEPTION_PATTERN" || true)
          SUPPRESSION_EXCEPTIONS=$(printf "%s\n" "$SUPPRESSION_CANDIDATES" | grep -E "$EXCEPTION_PATTERN" || true)

          FAILED=0

          if [ -n "$SUPPRESSION_VIOLATIONS" ]; then
            echo "❌ 检测到新增抑制注释或 as any："
            echo "$SUPPRESSION_VIOLATIONS"
            FAILED=1
          fi

          if [ -n "$SUPPRESSION_EXCEPTIONS" ]; then
            if [ "${{ github.event_name }}" != "pull_request" ]; then
              echo "❌ debt-exception 仅允许在 PR 流程中使用"
              FAILED=1
            else
              if ! printf "%s" "${PR_BODY:-}" | grep -Eqi 'debt-exception-tech-lead-approved:\s*yes'; then
                echo "❌ 缺少 Tech Lead 双签标记: debt-exception-tech-lead-approved: yes"
                FAILED=1
              fi
              if ! printf "%s" "${PR_BODY:-}" | grep -Eqi 'debt-exception-module-owner-approved:\s*yes'; then
                echo "❌ 缺少模块负责人双签标记: debt-exception-module-owner-approved: yes"
                FAILED=1
              fi
            fi
          fi

          if [ -n "$BARE_TODO_VIOLATIONS" ]; then
            echo "❌ 检测到裸 TODO/FIXME/HACK（缺少 owner/ttl/issue 元数据）："
            echo "$BARE_TODO_VIOLATIONS"
            FAILED=1
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo "No-new-debt 门禁失败"
            exit 1
          fi

          echo "✅ No-new-debt 门禁通过"

  # ============================================================
  # 阶段6: 类型检查质量门禁
  # ============================================================
  type-check-gate:
    name: Type Check Quality Gate
    runs-on: ubuntu-latest
    needs: [type-check-typescript, type-check-vue, eslint-typescript, no-new-debt]

    outputs:
      type-check-pass: ${{ steps.gate.outputs.pass }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download type check artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-results'
          path: type-check-artifacts

      - name: Enforce zero type error ceiling
        env:
          TYPE_ERROR_CEILING: ${{ env.TYPE_ERROR_CEILING }}
        run: |
          cd "${{ env.WORKING_DIRECTORY }}"
          node scripts/check-type-error-ceiling.js --input-file "${{ github.workspace }}/type-check-artifacts/vue-tsc-results/vue-tsc-output.txt"

      - name: Evaluate quality gate
        id: gate
        run: |
          QUALITY_PASS=true
          GATE_ISSUES=""

          BASELINE_FILE="${{ github.workspace }}/${{ env.TECH_DEBT_BASELINE_FILE }}"
          BASELINE_FRONTEND_ERRORS=""
          if [ -f "$BASELINE_FILE" ]; then
            BASELINE_FRONTEND_ERRORS=$(python - <<'PY'
          import json
          from pathlib import Path

          baseline_path = Path("reports/analysis/tech-debt-baseline.json")
          try:
              data = json.loads(baseline_path.read_text(encoding="utf-8"))
              value = data.get("frontend_type_errors", "")
              print(value if isinstance(value, int) and value >= 0 else "")
          except Exception:
              print("")
          PY
            )
          fi

          if [ -z "$BASELINE_FRONTEND_ERRORS" ]; then
            echo "❌ 未找到有效 frontend_type_errors 基线: $BASELINE_FILE"
            QUALITY_PASS=false
            GATE_ISSUES="$GATE_ISSUES 缺少有效技术债基线(frontend_type_errors)"
          fi

          # 检查 tsc 错误
          if [ -f type-check-artifacts/tsc-results/tsc-output.txt ]; then
            TSC_ERROR_COUNT=$(grep -c "error TS" type-check-artifacts/tsc-results/tsc-output.txt 2>/dev/null || true)
            if [ -z "$TSC_ERROR_COUNT" ]; then TSC_ERROR_COUNT=0; fi
            echo "TSC 错误数: $TSC_ERROR_COUNT (当前上限: ${TYPE_ERROR_CEILING:-N/A})"

            if [ -n "${TYPE_ERROR_CEILING:-}" ] && [ "$TSC_ERROR_COUNT" -gt "${TYPE_ERROR_CEILING}" ]; then
              QUALITY_PASS=false
              GATE_ISSUES="$GATE_ISSUES TSC 错误高于当前上限: $TSC_ERROR_COUNT > ${TYPE_ERROR_CEILING}"
            fi
          else
            echo "❌ 缺少 tsc 结果工件"
            QUALITY_PASS=false
            GATE_ISSUES="$GATE_ISSUES 缺少 tsc 结果工件"
          fi

          # 检查 vue-tsc 错误（对比技术债基线文件）
          if [ -f type-check-artifacts/vue-tsc-results/vue-tsc-output.txt ]; then
            ERROR_COUNT=$(grep -c "error TS" type-check-artifacts/vue-tsc-results/vue-tsc-output.txt 2>/dev/null || true)
            if [ -z "$ERROR_COUNT" ]; then ERROR_COUNT=0; fi
            echo "Vue-tsc 错误数: $ERROR_COUNT (长期基线: ${BASELINE_FRONTEND_ERRORS:-N/A}, 当前上限: ${TYPE_ERROR_CEILING:-N/A})"

            if [ -n "${TYPE_ERROR_CEILING:-}" ] && [ "$ERROR_COUNT" -gt "${TYPE_ERROR_CEILING}" ]; then
              QUALITY_PASS=false
              GATE_ISSUES="$GATE_ISSUES Vue-tsc 错误高于当前上限: $ERROR_COUNT > ${TYPE_ERROR_CEILING}"
            elif [ -n "$BASELINE_FRONTEND_ERRORS" ] && [ "$ERROR_COUNT" -gt "$BASELINE_FRONTEND_ERRORS" ]; then
              echo "::warning::Vue-tsc 错误仍高于长期基线: $ERROR_COUNT > $BASELINE_FRONTEND_ERRORS，但未超过当前上限 ${TYPE_ERROR_CEILING}"
            fi
          else
            echo "❌ 缺少 vue-tsc 结果工件"
            QUALITY_PASS=false
            GATE_ISSUES="$GATE_ISSUES 缺少 vue-tsc 结果工件"
          fi

          # 检查 ESLint 错误
          if [ -f type-check-artifacts/eslint-results/eslint-count.txt ]; then
            ESLINT_COUNT=$(cat type-check-artifacts/eslint-results/eslint-count.txt)
            echo "ESLint 问题数: $ESLINT_COUNT"

            if [ "$ESLINT_COUNT" -gt 0 ]; then
              QUALITY_PASS=false
              GATE_ISSUES="$GATE_ISSUES ESLint 问题必须为 0: $ESLINT_COUNT"
            fi
          else
            echo "❌ 缺少 ESLint 结果工件"
            QUALITY_PASS=false
            GATE_ISSUES="$GATE_ISSUES 缺少 ESLint 结果工件"
          fi

          # 输出结果
          if [ "$QUALITY_PASS" = "true" ]; then
            echo "✅ TypeScript 类型检查质量门禁通过"
            echo "pass=true" >> $GITHUB_OUTPUT
          else
            echo "❌ TypeScript 类型检查质量门禁失败: $GATE_ISSUES"
            echo "pass=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  # ============================================================
  # 阶段7: 最终报告汇总
  # ============================================================
  final-report:
    name: Final Type Check Report
    runs-on: ubuntu-latest
    needs: [type-check-typescript, type-check-vue, eslint-typescript, type-coverage, no-new-debt, type-check-gate]
    if: always()

    steps:
      - name: Download all type check artifacts
        uses: actions/download-artifact@v4
        with:
          path: type-check-artifacts

      - name: Generate consolidated report
        run: |
          cat > type-check-summary.md << EOF
          # TypeScript 类型检查总结

          **执行时间**: $(date)
          **提交**: ${{ github.sha }}
          **分支**: ${{ github.ref_name }}

          ## 检查项目

          - ✅ TypeScript 编译器检查 (tsc)
          - ✅ Vue 类型检查 (vue-tsc)
          - ✅ ESLint TypeScript 检查
          - ✅ 类型覆盖率分析
          - ✅ 质量门禁评估

          ## 质量门禁状态

          **类型检查**: ${{ needs.type-check-gate.outputs.type-check-pass == 'true' && '✅ 通过' || '❌ 失败' }}

          ## 详细报告

          ### TypeScript 错误
          \`\`\`
          $(cat type-check-artifacts/tsc-results/tsc-output.txt 2>/dev/null || echo "无错误")
          \`\`\`

          ### Vue + TypeScript 错误
          \`\`\`
          $(grep "error TS" type-check-artifacts/vue-tsc-results/vue-tsc-output.txt 2>/dev/null | head -20 || echo "无错误")
          \`\`\`

          EOF

          cat type-check-summary.md

      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: ts-type-check-final-report
          path: type-check-summary.md
          retention-days: 90
