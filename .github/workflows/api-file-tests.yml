# API File-Level Testing CI/CD Pipeline

name: API File-Level Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web/backend/app/api/**'
      - 'tests/api/file_tests/**'
      - 'openspec/changes/implement-api-file-level-testing/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'web/backend/app/api/**'
      - 'tests/api/file_tests/**'

permissions:
  contents: read
  issues: write

jobs:
  api-file-tests-readiness:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Check file-test framework readiness
      id: check
      run: |
        if grep -Eq "placeholder for real test execution|Mock test results based on file type" tests/api/file_tests/__init__.py; then
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Skipping API file-level tests because the current framework is still placeholder/mock-based."
        else
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "API file-level test framework is ready."
        fi

  api-file-tests:
    runs-on: ubuntu-latest
    needs: api-file-tests-readiness
    if: needs.api-file-tests-readiness.outputs.ready == 'true'
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mystocks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        pip uninstall -y taospy || true
        python -m pip install \
          structlog \
          email-validator \
          sqlalchemy \
          PyJWT \
          python-jose[cryptography] \
          passlib[bcrypt] \
          openpyxl \
          prometheus-client \
          pydantic-settings \
          psutil
        python -m pip install pytest pytest-asyncio pytest-cov pytest-xdist

    - name: Install test dependencies
      run: |
        pip install fastapi uvicorn httpx pydantic

    - name: Set up test database
      run: |
        PGPASSWORD=test psql -h localhost -U postgres -d mystocks_test -f scripts/sql/create_test_schema.sql || true

    - name: Start FastAPI server
      run: |
        python -m uvicorn web.backend.app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10

    - name: Run P0 Contract File Tests
      run: |
        python tests/api/file_tests/run_file_tests.py --priority P0 --report json
      timeout-minutes: 15

    - name: Run P1 Core File Tests
      run: |
        python tests/api/file_tests/run_file_tests.py --priority P1 --report json
      timeout-minutes: 20

    - name: Run P2 Utility File Tests
      run: |
        python tests/api/file_tests/run_file_tests.py --priority P2 --report json
      timeout-minutes: 25

    - name: Generate coverage report
      run: |
        python tests/api/file_tests/run_file_tests.py --report json
        python -m pytest tests/api/file_tests -q -o addopts='' --cov=web/backend/app/api --cov-report=xml --cov-report=html

    - name: Enforce file test coverage threshold
      run: |
        python - <<'PY'
        import json
        from pathlib import Path

        report = Path("reports/api_file_tests.json")
        if not report.exists():
            raise SystemExit("reports/api_file_tests.json was not generated")

        payload = json.loads(report.read_text(encoding="utf-8"))
        coverage = payload["summary"]["overall_coverage_rate"]
        print(f"overall_coverage_rate={coverage:.1f}%")
        if coverage < 70:
            raise SystemExit(1)
        PY

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          reports/
          htmlcov/

    - name: Comment PR with test results
      if: github.event_name == 'pull_request'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('reports/api_file_tests.json', 'utf8'));

          const comment = `
          ## 🧪 API File-Level Test Results

          **Summary:**
          - 📁 Files: ${results.summary.tested_files}/${results.summary.total_files}
          - ✅ Passed: ${results.summary.passed_files}
          - ❌ Failed: ${results.summary.failed_files}
          - 📊 Success Rate: ${results.summary.overall_success_rate.toFixed(1)}%
          - 🎯 Coverage: ${results.summary.overall_coverage_rate.toFixed(1)}%

          **Details:** [View Report](${{github.server_url}}/${{github.repository}}/actions/runs/${{github.run_id}})
          `;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  quality-gate:
    runs-on: ubuntu-latest
    needs: [api-file-tests-readiness, api-file-tests]
    if: always() && needs.api-file-tests-readiness.outputs.ready == 'true'

    steps:
    - name: Quality Gate Check
      run: |
        # Check if all required tests passed
        if [ ${{ needs.api-file-tests.result }} != 'success' ]; then
          echo "❌ API file tests failed - blocking deployment"
          exit 1
        fi

        echo "✅ Quality gate passed - allowing deployment"
