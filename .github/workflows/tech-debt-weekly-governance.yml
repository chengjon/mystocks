name: Tech Debt Weekly Governance

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '18'

jobs:
  weekly-governance:
    name: Generate Weekly Governance Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix web/frontend ci

      - name: Run full runtime delivery gate
        run: |
          mkdir -p reports/analysis/runtime-delivery-gate-weekly
          RUNTIME_DELIVERY_GATE_DIR="${PWD}/reports/analysis/runtime-delivery-gate-weekly" \
          POSTGRES_PASSWORD=postgres \
          TDENGINE_PASSWORD=taosdata \
          bash scripts/run_full_runtime_delivery_gate.sh

      - name: Generate weekly governance report
        run: |
          mkdir -p reports/analysis/tech-debt-weekly-report-ci
          TECH_DEBT_WEEKLY_REPORT_DIR="${PWD}/reports/analysis/tech-debt-weekly-report-ci" \
          TECH_DEBT_WEEKLY_REPORT_OUTPUT="${PWD}/reports/analysis/tech-debt-weekly-report-ci/weekly-report.md" \
          TECH_DEBT_CURRENT_JSON="${PWD}/reports/analysis/tech-debt-weekly-report-ci/tech-debt-current.json" \
          RUNTIME_DELIVERY_GATE_DIR="${PWD}/reports/analysis/runtime-delivery-gate-weekly" \
          TECH_DEBT_WEEKLY_REQUIRE_VALID_CLOSEOUTS=1 \
          MPLCONFIGDIR="${PWD}/.tmp/matplotlib" \
          bash scripts/run_tech_debt_weekly_report.sh

      - name: Upload weekly governance artifact
        uses: actions/upload-artifact@v4
        with:
          name: tech-debt-weekly-governance-report
          path: |
            reports/analysis/tech-debt-weekly-report-ci
            reports/analysis/runtime-delivery-gate-weekly
          if-no-files-found: error

      - name: Publish weekly governance summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("reports/analysis/tech-debt-weekly-report-ci/weekly-report.md")
          runtime_manifest_path = Path("reports/analysis/runtime-delivery-gate-weekly/runtime-delivery-gate-manifest.json")
          lines = report_path.read_text(encoding="utf-8").splitlines()
          runtime_manifest = json.loads(runtime_manifest_path.read_text(encoding="utf-8"))
          container_contract_path = Path(runtime_manifest["paths"]["container_deployment_contract_report"])
          deployment_env_contract_path = Path(runtime_manifest["paths"]["deployment_env_contract_report"])
          container_contract = json.loads(container_contract_path.read_text(encoding="utf-8"))
          deployment_env_contract = json.loads(deployment_env_contract_path.read_text(encoding="utf-8"))
          keep = [
              "# Tech Debt Weekly Governance",
              "",
          ]

          for line in lines:
              if line.startswith("- generated_at:"):
                  keep.append(line)
                  break

          keep.extend(["", "## Debt KPI"])
          for prefix in (
              "- new_debt_violations:",
              "- no-new-debt:",
              "- baseline-non-increase:",
              "- exception-compliance-rate:",
              "- ttl-cleanup-rate:",
          ):
              for line in lines:
                  if line.startswith(prefix):
                      keep.append(line)
                      break

          keep.extend(["", "## Runtime KPI"])
          runtime_prefixes = (
              "- PM2 runtime overall gate status:",
              "- Anonymous API overall P95 (ms):",
              "- Monitoring auth alert-rules P95 (ms):",
              "- Docker runtime smoke status:",
              "- Docker metrics http_requests_total delta:",
              "- Runtime drift gate:",
              "- Graphiti closeout coverage:",
              "- Graphiti closeout validity gate:",
          )
          for prefix in runtime_prefixes:
              for line in lines:
                  if line.startswith(prefix):
                      keep.append(line)
                      break

          keep.extend(
              [
                  f"- Runtime delivery gate overall status: `{runtime_manifest.get('overall_gate_status', 'N/A')}`",
                  f"- Runtime delivery gate drift pass: `{runtime_manifest.get('runtime_observability_drift_pass', 'N/A')}`",
                  f"- Runtime delivery gate drift violations: `{runtime_manifest.get('runtime_observability_drift_violations', 'N/A')}`",
                  f"- Runtime delivery gate drift not_measured: `{runtime_manifest.get('runtime_observability_drift_not_measured', 'N/A')}`",
                  f"- Container deployment contract pass: `{runtime_manifest.get('container_deployment_contract_pass', 'N/A')}`",
                  f"- Container deployment contract violations: `{runtime_manifest.get('container_deployment_contract_violations', 'N/A')}`",
                  f"- Deployment env contract pass: `{runtime_manifest.get('deployment_env_contract_pass', 'N/A')}`",
                  f"- Deployment env contract violations: `{runtime_manifest.get('deployment_env_contract_violations', 'N/A')}`",
                  f"- Docker runtime service role: `{runtime_manifest.get('docker_runtime_service_role', 'N/A')}`",
                  f"- Canonical PM2 ports: `{container_contract.get('canonical_ports', {})}`",
                  f"- Backup smoke ports: `{container_contract.get('backup_smoke_ports', {})}`",
                  f"- Backend PM2 required env keys: `{deployment_env_contract.get('backend_required_env_keys', [])}`",
                  f"- Frontend PM2 required env keys: `{deployment_env_contract.get('frontend_required_env_keys', [])}`",
              ]
          )

          keep.extend(["", "## Current Batch"])
          current_batch_lines = [line for line in lines if line.startswith("- Current batch issue:") or line.startswith("- Current batch introduced issues:")]
          if current_batch_lines:
              keep.extend(current_batch_lines[:5])
          else:
              keep.append("- Current batch introduced issues: `none`")

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(keep) + "\n")
          PY
