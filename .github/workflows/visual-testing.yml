name: Visual Testing Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/frontend/src/**'
      - 'web/frontend/**/*.vue'
      - 'web/frontend/**/*.ts'
      - 'web/frontend/**/*.scss'
      - 'web/frontend/**/*.css'
      - '.github/workflows/visual-testing.yml'
      - 'web/frontend/tests/visual/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web/frontend/src/**'
      - 'web/frontend/**/*.vue'
      - 'web/frontend/**/*.ts'
      - 'web/frontend/**/*.scss'
      - 'web/frontend/**/*.css'
      - '.github/workflows/visual-testing.yml'
      - 'web/frontend/tests/visual/**'
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Update visual baselines after test'
        required: false
        type: boolean
        default: false
      test_scope:
        description: 'Test scope (all, pages, components)'
        required: false
        type: string
        default: 'all'

env:
  NODE_VERSION: '18'
  PLAYWRIGHT_VERSION: '1.48.1'

jobs:
  visual-scope-detect:
    name: Visual Scope Detect
    runs-on: ubuntu-latest
    outputs:
      visual_test_required: ${{ steps.detect.outputs.visual_test_required }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run visual scope detection
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              mapfile -t changed_files < <(git diff --name-only HEAD^ HEAD)
            else
              mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
            fi
          else
            mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")
          fi

          visual_test_required=false
          for changed_file in "${changed_files[@]}"; do
            case "$changed_file" in
              web/frontend/src/*|web/frontend/src/**|web/frontend/tests/visual/*|web/frontend/tests/visual/**|tests/visual/*|tests/visual/**)
                visual_test_required=true
                break
                ;;
            esac
          done

          echo "visual_test_required=$visual_test_required" >> "$GITHUB_OUTPUT"

  visual-test-setup:
    name: Visual Test Setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: visual-scope-detect
    if: needs.visual-scope-detect.outputs.visual_test_required == 'true'

    outputs:
      cache_key: ${{ steps.cache_key.outputs.cache_key }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Cache Key
        id: cache_key
        run: |
          echo "cache_key=visual-${{ hashFiles('web/frontend/package-lock.json', 'web/frontend/package.json', 'web/frontend/tests/visual/**') }}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            web/frontend/node_modules
            ~/.cache/ms-playwright
          key: ${{ steps.cache_key.outputs.cache_key }}
          restore-keys: |
            visual-

      - name: Install Dependencies
        run: |
          cd web/frontend
          npm ci
          npx playwright install --with-deps chromium

      - name: Verify Setup
        run: |
          echo "Node.js version: $(node --version)"
          echo "Playwright version: $(npx playwright --version)"

  visual-tests:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [visual-scope-detect, visual-test-setup]
    if: needs.visual-scope-detect.outputs.visual_test_required == 'true'
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
        shard: ['1/1']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Restore Dependencies Cache
        uses: actions/cache@v4
        with:
          path: |
            web/frontend/node_modules
            ~/.cache/ms-playwright
          key: ${{ needs.visual-test-setup.outputs.cache_key }}
          restore-keys: |
            visual-

      - name: Install Playwright
        run: |
          cd web/frontend
          npm ci
          npx playwright install --with-deps chromium

      - name: Setup Test Environment
        run: |
          cd web/frontend
          echo "VITE_API_BASE_URL=http://localhost:8000" >> $GITHUB_ENV
          echo "USE_MOCK_DATA=true" >> $GITHUB_ENV
          echo "FRONTEND_PORT=5173" >> $GITHUB_ENV
          echo "FRONTEND_BACKUP_PORT=5174" >> $GITHUB_ENV
          echo "BACKEND_PORT=8000" >> $GITHUB_ENV
          echo "BACKEND_BACKUP_PORT=8001" >> $GITHUB_ENV

      - name: Run Visual Tests
        if: inputs.update_baselines != true
        run: |
          cd web/frontend
          VISUAL_HTML_REPORT_DIR=playwright-report/dashboard \
          VISUAL_JSON_REPORT_FILE=test-results/visual/dashboard/results.json \
          VISUAL_JUNIT_REPORT_FILE=test-results/visual/dashboard/junit.xml \
          npm run test:visual:dashboard -- \
            --trace=on
          VISUAL_HTML_REPORT_DIR=playwright-report/charts \
          VISUAL_JSON_REPORT_FILE=test-results/visual/charts/results.json \
          VISUAL_JUNIT_REPORT_FILE=test-results/visual/charts/junit.xml \
          npm run test:visual:charts -- \
            --trace=on

      - name: Update Visual Baselines
        if: inputs.update_baselines == true
        run: |
          cd web/frontend
          echo "Updating visual baselines"
          npm run test:visual:dashboard:update
          npm run test:visual:charts:update

      - name: Upload Visual Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-dashboard-results-${{ matrix.browser }}
          path: |
            web/frontend/test-results/visual/dashboard/
            !web/frontend/test-results/visual/dashboard/**/*.zip
          retention-days: 30

      - name: Upload Dashboard Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-dashboard-playwright-report-${{ matrix.browser }}
          path: web/frontend/playwright-report/dashboard/
          retention-days: 30

      - name: Upload Chart Visual Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-chart-results-${{ matrix.browser }}
          path: |
            web/frontend/test-results/visual/charts/
            !web/frontend/test-results/visual/charts/**/*.zip
          retention-days: 30

      - name: Upload Chart Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-chart-playwright-report-${{ matrix.browser }}
          path: web/frontend/playwright-report/charts/
          retention-days: 30

  visual-test-results:
    name: Visual Test Results Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: visual-tests
    if: always()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-results/

      - name: Collect Results
        run: |
          echo "Collecting Visual Test Results"
          total_tests=0
          passed_tests=0
          failed_tests=0
          dashboard_tests=0
          dashboard_passed=0
          dashboard_failed=0
          chart_tests=0
          chart_passed=0
          chart_failed=0

          collect_counts() {
            local result_file="$1"
            local tests=0
            local passed=0
            local failed=0

            if [ -f "$result_file" ]; then
              tests=$(jq '[.. | objects | select(has("outcome"))] | length' "$result_file" 2>/dev/null || echo "0")
              passed=$(jq '[.. | objects | select(.outcome? == "expected" and (.status? == "passed" or .status? == "flaky"))] | length' "$result_file" 2>/dev/null || echo "0")
              failed=$(jq '[.. | objects | select(.outcome? == "unexpected" or .status? == "failed")] | length' "$result_file" 2>/dev/null || echo "0")
            fi

            printf '%s %s %s\n' "$tests" "$passed" "$failed"
          }

          for result_dir in test-results/*/; do
            if [ -f "${result_dir}results.json" ]; then
              read -r local_tests local_passed local_failed < <(collect_counts "${result_dir}results.json")

              total_tests=$((total_tests + local_tests))
              passed_tests=$((passed_tests + local_passed))
              failed_tests=$((failed_tests + local_failed))

              case "${result_dir}" in
                *visual-dashboard-results-*)
                  dashboard_tests=$((dashboard_tests + local_tests))
                  dashboard_passed=$((dashboard_passed + local_passed))
                  dashboard_failed=$((dashboard_failed + local_failed))
                  ;;
                *visual-chart-results-*)
                  chart_tests=$((chart_tests + local_tests))
                  chart_passed=$((chart_passed + local_passed))
                  chart_failed=$((chart_failed + local_failed))
                  ;;
              esac
            fi
          done

          echo "Total Tests: $total_tests"
          echo "Passed: $passed_tests"
          echo "Failed: $failed_tests"
          echo "Dashboard Tests: $dashboard_tests"
          echo "Dashboard Passed: $dashboard_passed"
          echo "Dashboard Failed: $dashboard_failed"
          echo "Chart Tests: $chart_tests"
          echo "Chart Passed: $chart_passed"
          echo "Chart Failed: $chart_failed"

          cat > visual-test-summary.json <<EOF
          {
            "total_tests": $total_tests,
            "passed_tests": $passed_tests,
            "failed_tests": $failed_tests,
            "dashboard_tests": $dashboard_tests,
            "dashboard_passed": $dashboard_passed,
            "dashboard_failed": $dashboard_failed,
            "chart_tests": $chart_tests,
            "chart_passed": $chart_passed,
            "chart_failed": $chart_failed
          }
          EOF

      - name: Upload Test Summary
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-summary
          path: visual-test-summary.json
