name: Runtime Delivery Gate

on:
  schedule:
    - cron: '30 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '18'

jobs:
  runtime-delivery-gate:
    name: Run Full Runtime Delivery Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix web/frontend ci

      - name: Run full runtime delivery gate
        run: |
          mkdir -p reports/analysis/runtime-delivery-gate-ci
          RUNTIME_DELIVERY_GATE_DIR="${PWD}/reports/analysis/runtime-delivery-gate-ci" \
          POSTGRES_PASSWORD=postgres \
          TDENGINE_PASSWORD=taosdata \
          bash scripts/run_full_runtime_delivery_gate.sh

      - name: Upload runtime delivery gate artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-delivery-gate
          path: reports/analysis/runtime-delivery-gate-ci
          if-no-files-found: error

      - name: Publish runtime delivery gate summary
        run: |
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat reports/analysis/runtime-delivery-gate-ci/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
            printf '\n\n---\n\n' >> "$GITHUB_STEP_SUMMARY"
            cat reports/analysis/runtime-delivery-gate-ci/runtime-quality-summary/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
            printf '\n\n---\n\n## Child Gate Closeouts\n' >> "$GITHUB_STEP_SUMMARY"
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
            import json
            from pathlib import Path

            report_path = Path("reports/analysis/runtime-delivery-gate-ci/runtime-child-gate-closeout-validation.json")
            report = json.loads(report_path.read_text(encoding="utf-8"))

            print(f"- pass: `{report.get('pass', 'N/A')}`")
            print(f"- valid_count: `{report.get('valid_count', 'N/A')}`")
            print(f"- invalid_count: `{report.get('invalid_count', 'N/A')}`")

            for item in report.get("items", []):
                print(
                    f"- {item.get('label', item.get('key', 'unknown'))}: "
                    f"valid=`{item.get('valid', 'N/A')}` reason=`{item.get('reason', 'N/A')}`"
                )
            PY
          fi
