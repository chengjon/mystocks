name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  E2E_BASE_URL: http://localhost:8000
  E2E_HEADLESS: "true"
  BACKEND_PORT: "8000"
  BACKEND_BACKUP_PORT: "8001"
  POSTGRESQL_HOST: "localhost"
  POSTGRESQL_PORT: "5432"
  POSTGRESQL_USER: "postgres"
  POSTGRESQL_PASSWORD: "postgres"
  POSTGRESQL_DATABASE: "mystocks_test"

jobs:
  e2e-tests:
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mystocks_test
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          grep -Ev '^(TA-Lib|xlwings)==|^(TA-Lib|xlwings)>=' web/backend/requirements.txt > /tmp/backend-requirements-ci.txt
          pip install -r /tmp/backend-requirements-ci.txt
          pip install playwright
          playwright install --with-deps chromium

      - name: Start application
        run: |
          export POSTGRESQL_HOST=${POSTGRESQL_HOST}
          export POSTGRESQL_PORT=${POSTGRESQL_PORT}
          export POSTGRESQL_USER=${POSTGRESQL_USER}
          export POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
          export POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE}
          export BACKEND_PORT=${BACKEND_PORT}
          export BACKEND_BACKUP_PORT=${BACKEND_BACKUP_PORT}
          export JWT_SECRET_KEY=$(openssl rand -hex 32)
          PYTHONPATH=$PWD:$PWD/web/backend python -m uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT} &
          sleep 10
          curl -f http://localhost:${BACKEND_PORT}/api/announcement/health || curl -f http://localhost:${BACKEND_PORT}/health/ready

      - name: Run E2E tests
        run: |
          mkdir -p test-results
          pytest tests/e2e/test_login.py tests/e2e/test_market.py tests/e2e/test_fund_flow.py tests/e2e/test_risk.py tests/e2e/test_charts.py tests/e2e/test_export.py -v --html=test-results/e2e-report.html --json=test-results/e2e-results.json 2>&1 || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: test-results/

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: test-results/screenshots/

  performance-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locust
        run: pip install locust

      - name: Run performance tests
        run: |
          locust -f tests/performance/locustfile.py --host=http://localhost:8000 --headless --users=50 --spawn-rate=10 --run-time=5m --html=/tmp/performance-report.html 2>&1 || true

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-report
          path: /tmp/performance-report.html

  quality-gate:
    runs-on: ubuntu-latest
    needs: [e2e-tests, performance-tests]
    if: always()
    steps:
      - name: Download e2e results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results
          path: test-results
      - name: Check results
        run: |
          E2E_PASSED=$(cat test-results/e2e-results.json | python -c "import sys, json; data=json.load(sys.stdin); print('pass' if data.get('summary',{}).get('passed',0) > 0 else 'fail')" 2>/dev/null || echo "fail")
          echo "E2E Tests: $E2E_PASSED"
          if [ "$E2E_PASSED" != "pass" ]; then
            echo "E2E tests failed quality gate"
            exit 1
          fi
