name: Comprehensive Testing Solution

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday at 2 AM

jobs:
  comprehensive-scope-detect:
    runs-on: ubuntu-latest
    outputs:
      run_ai_tests: ${{ steps.detect.outputs.run_ai_tests }}
      run_contract_tests: ${{ steps.detect.outputs.run_contract_tests }}
      run_performance_tests: ${{ steps.detect.outputs.run_performance_tests }}
      run_security_tests: ${{ steps.detect.outputs.run_security_tests }}
      run_chaos_tests: ${{ steps.detect.outputs.run_chaos_tests }}
      run_data_tests: ${{ steps.detect.outputs.run_data_tests }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run comprehensive scope detection
      id: detect
      run: |
        if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "run_ai_tests=true" >> "$GITHUB_OUTPUT"
          echo "run_contract_tests=true" >> "$GITHUB_OUTPUT"
          echo "run_performance_tests=true" >> "$GITHUB_OUTPUT"
          echo "run_security_tests=true" >> "$GITHUB_OUTPUT"
          echo "run_chaos_tests=true" >> "$GITHUB_OUTPUT"
          echo "run_data_tests=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
        fi

        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            mapfile -t changed_files < <(git diff --name-only HEAD^ HEAD)
          else
            mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
          fi
        else
          mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")
        fi

        run_ai_tests=false
        run_contract_tests=false
        run_performance_tests=false
        run_security_tests=false
        run_chaos_tests=false
        run_data_tests=false

        for changed_file in "${changed_files[@]}"; do
          case "$changed_file" in
            tests/ai/*|tests/ai/**)
              run_ai_tests=true
              ;;
            tests/contract/*|tests/contract/**)
              run_contract_tests=true
              ;;
            tests/performance/*|tests/performance/**)
              run_performance_tests=true
              ;;
            tests/security/*|tests/security/**|requirements-security.txt)
              run_security_tests=true
              ;;
            tests/chaos/*|tests/chaos/**)
              run_chaos_tests=true
              ;;
            tests/data/*|tests/data/**)
              run_data_tests=true
              ;;
          esac
        done

        echo "run_ai_tests=$run_ai_tests" >> "$GITHUB_OUTPUT"
        echo "run_contract_tests=$run_contract_tests" >> "$GITHUB_OUTPUT"
        echo "run_performance_tests=$run_performance_tests" >> "$GITHUB_OUTPUT"
        echo "run_security_tests=$run_security_tests" >> "$GITHUB_OUTPUT"
        echo "run_chaos_tests=$run_chaos_tests" >> "$GITHUB_OUTPUT"
        echo "run_data_tests=$run_data_tests" >> "$GITHUB_OUTPUT"

  # AI-Assisted Tests
  ai-tests:
    runs-on: ubuntu-latest
    needs: comprehensive-scope-detect
    if: needs.comprehensive-scope-detect.outputs.run_ai_tests == 'true'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        if [ -f requirements-dev.txt ]; then
          pip install -r requirements-dev.txt
        fi

    - name: Run AI-Assisted Tests
      run: |
        echo "🧪 Running AI-Assisted Tests..."
        python -m pytest tests/ai/ -v --tb=short -x

    - name: Upload AI Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ai-test-results
        path: |
          reports/ai/
          *.log

  # Contract Tests
  contract-tests:
    runs-on: ubuntu-latest
    needs: comprehensive-scope-detect
    if: needs.comprehensive-scope-detect.outputs.run_contract_tests == 'true'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        if [ -f requirements-dev.txt ]; then
          pip install -r requirements-dev.txt
        fi

    - name: Run Contract Tests
      run: |
        echo "📋 Running Contract Tests..."
        python -m pytest tests/contract/ -v --tb=short -x

    - name: Upload Contract Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: contract-test-results
        path: |
          reports/contract/
          *.log

  # Performance Tests
  performance-tests:
    runs-on: ubuntu-latest
    needs: comprehensive-scope-detect
    if: needs.comprehensive-scope-detect.outputs.run_performance_tests == 'true'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        if [ -f requirements-dev.txt ]; then
          pip install -r requirements-dev.txt
        fi
        pip install psutil

    - name: Run Performance Tests
      run: |
        echo "⚡ Running Performance Tests..."
        python -m pytest tests/performance/ -v --tb=short -x

    - name: Run Benchmark
      run: |
        echo "🎯 Running Benchmarks..."
        python tests/performance/benchmark.py

    - name: Run Profiling Analysis
      run: |
        echo "📊 Running Profiling Analysis..."
        python tests/performance/profiling.py

    - name: Upload Performance Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-test-results
        path: |
          reports/performance/
          benchmark_*.json
          profile_*.json
          *.log

  # Security Tests
  security-tests:
    runs-on: ubuntu-latest
    needs: comprehensive-scope-detect
    if: needs.comprehensive-scope-detect.outputs.run_security_tests == 'true'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -r requirements-security.txt

    - name: Run Security Tests
      run: |
        echo "🔐 Running Security Tests..."
        python -m pytest tests/security/ -v --tb=short -x

    - name: Security Scan with Bandit
      run: |
        bandit -r tests/ -f json -o reports/security/bandit_report.json || true

    - name: Security Scan with Safety
      run: |
        safety check -r requirements.txt --output=json -o reports/security/safety_report.json || true

    - name: Upload Security Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-test-results
        path: |
          reports/security/
          *.log

  # Chaos Engineering Tests
  chaos-tests:
    runs-on: ubuntu-latest
    needs: comprehensive-scope-detect
    if: needs.comprehensive-scope-detect.outputs.run_chaos_tests == 'true'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        if [ -f requirements-dev.txt ]; then
          pip install -r requirements-dev.txt
        fi

    - name: Run Chaos Tests
      run: |
        echo "🌪️ Running Chaos Engineering Tests..."
        python -m pytest tests/chaos/ -v --tb=short -x

    - name: Upload Chaos Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: chaos-test-results
        path: |
          reports/chaos/
          *.log

  # Data Quality Tests
  data-quality-tests:
    runs-on: ubuntu-latest
    needs: comprehensive-scope-detect
    if: needs.comprehensive-scope-detect.outputs.run_data_tests == 'true'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        if [ -f requirements-dev.txt ]; then
          pip install -r requirements-dev.txt
        fi

    - name: Run Data Quality Tests
      run: |
        echo "📊 Running Data Quality Tests..."
        python -m pytest tests/data/ -v --tb=short -x

    - name: Generate Quality Report
      run: |
        echo "📈 Generating Quality Report..."
        python tests/data/quality_metrics.py > reports/data/quality_report.json

    - name: Upload Data Quality Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: data-quality-results
        path: |
          reports/data/
          *.log

  # Quality Gate
  quality-gate:
    needs: [ai-tests, contract-tests, performance-tests, security-tests, chaos-tests, data-quality-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check All Tests Passed
      run: |
        echo "🔍 Quality Gate Check..."

        JOBS=("ai-tests" "contract-tests" "performance-tests" "security-tests" "chaos-tests" "data-quality-tests")
        STATUSES=(
          "${{ needs.ai-tests.result }}"
          "${{ needs.contract-tests.result }}"
          "${{ needs.performance-tests.result }}"
          "${{ needs.security-tests.result }}"
          "${{ needs.chaos-tests.result }}"
          "${{ needs.data-quality-tests.result }}"
        )
        ALL_PASSED=true

        for i in "${!JOBS[@]}"; do
          job="${JOBS[$i]}"
          status="${STATUSES[$i]}"
          echo "  $job: $status"
          if [ "$status" != "success" ] && [ "$status" != "skipped" ]; then
            ALL_PASSED=false
          fi
        done

        if [ "$ALL_PASSED" = true ]; then
          echo "✅ All tests passed quality gate!"
          exit 0
        else
          echo "❌ Quality gate failed!"
          exit 1
        fi

    - name: Send Notification on Failure
      if: failure()
      run: |
        echo "⚠️  Tests failed! Sending notification..."
        # Add notification logic here (Slack, Discord, Email, etc.)

    - name: Generate Summary Report
      run: |
        echo "📊 Generating Summary Report..."

        cat > test-summary.md << EOF
          # Test Summary Report

          **Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Branch**: ${{ github.ref_name }}
          **Commit**: ${{ github.sha }}

          ## Test Results

          | Test Category | Status |
          |---------------|--------|
          | AI Tests | ${{ needs.ai-tests.result }} |
          | Contract Tests | ${{ needs.contract-tests.result }} |
          | Performance Tests | ${{ needs.performance-tests.result }} |
          | Security Tests | ${{ needs.security-tests.result }} |
          | Chaos Tests | ${{ needs.chaos-tests.result }} |
          | Data Quality Tests | ${{ needs.data-quality-tests.result }} |

          ## Overall Status: ${{ job.status }}

          ---
          Generated by Comprehensive Testing Solution
          EOF

        echo "✅ Summary report generated"

  # Full Test Suite (Optional - for scheduled runs)
  full-test-suite:
    needs: [ai-tests, contract-tests, performance-tests, security-tests, chaos-tests, data-quality-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install all dependencies
      run: |
        pip install -r requirements.txt
        if [ -f requirements-dev.txt ]; then
          pip install -r requirements-dev.txt
        fi
        pip install -r requirements-security.txt

    - name: Run Full Test Suite
      run: |
        echo "🧪 Running Full Test Suite..."
        python -m pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=html --cov-fail-under=50

    - name: Generate Full Coverage Report
      run: |
        coverage combine
        coverage xml
        coverage html
        coverage report --show-missing

    - name: Upload Full Coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: full-tests
        fail_ci_if_error: false

    - name: Archive Full Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: full-test-results
        path: |
          coverage.xml
          htmlcov/
          reports/
          test-summary.md
