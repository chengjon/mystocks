# MyStocks 量化策略验证工作流
# 针对量化交易平台的特殊需求，提供策略验证和数据安全检查

name: Quantum Strategy Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/strategies/**'
      - 'src/backtesting/**'
      - 'src/trading/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/strategies/**'
      - 'src/backtesting/**'
      - 'src/trading/**'

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================================================
  # 量化策略验证
  # ============================================================================
  quant-strategy-validation:
    name: Quantum Strategy Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pandas numpy pytest pytest-cov

    - name: 策略语法验证
      run: |
        echo "🔍 验证量化策略语法..."
        python -c "
        import sys
        import os
        import ast

        sys.path.insert(0, 'src')
        syntax_errors = []

        # 检查策略目录
        if os.path.exists('src/strategies'):
            for root, dirs, files in os.walk('src/strategies'):
                for file in files:
                    if file.endswith('.py') and not file.startswith('__'):
                        filepath = os.path.join(root, file)
                        try:
                            with open(filepath, 'r', encoding='utf-8') as f:
                                ast.parse(f.read())
                            print(f'✅ {filepath}')
                        except SyntaxError as e:
                            syntax_errors.append(f'{filepath}: {e}')
                            print(f'❌ {filepath}: {e}')

        if syntax_errors:
            print('::error::量化策略语法错误')
            for error in syntax_errors:
                print(f'::error::{error}')
            sys.exit(1)
        else:
            print('✅ 所有量化策略语法检查通过')
        "

    - name: 策略导入测试
      run: |
        echo "🔍 测试策略模块导入..."
        python -c "
        import sys
        sys.path.insert(0, 'src')

        import_errors = []

        # 尝试导入策略模块
        try:
            from src.strategies import *
            print('✅ 策略模块导入成功')
        except ImportError as e:
            import_errors.append(f'Import error: {e}')
        except Exception as e:
            import_errors.append(f'其他错误: {e}')

        if import_errors:
            print('::error::策略模块导入失败')
            for error in import_errors:
                print(f'::error::{error}')
            sys.exit(1)
        "

    - name: 策略基本功能测试
      run: |
        echo "🔍 执行策略基本功能测试..."
        python -c "
        import sys
        sys.path.insert(0, 'src')

        test_results = []

        try:
            # 测试策略工厂
            from src.strategies.strategy_factory import StrategyFactory
            factory = StrategyFactory()
            print('✅ 策略工厂初始化成功')

            # 测试基础策略
            if hasattr(factory, 'get_available_strategies'):
                strategies = factory.get_available_strategies()
                print(f'✅ 发现 {len(strategies)} 个可用策略')

            test_results.append(('strategy_factory', True))

        except Exception as e:
            print(f'❌ 策略工厂测试失败: {e}')
            test_results.append(('strategy_factory', False))

        # 检查是否有失败的测试
        failed_tests = [name for name, passed in test_results if not passed]
        if failed_tests:
            print(f'::error::策略功能测试失败: {failed_tests}')
            sys.exit(1)
        else:
            print('✅ 策略基本功能测试通过')
        "

    - name: 回测引擎验证
      run: |
        echo "🔍 验证回测引擎..."
        python -c "
        import sys
        sys.path.insert(0, 'src')

        try:
            from src.backtesting.engine import BacktestingEngine
            engine = BacktestingEngine()
            print('✅ 回测引擎初始化成功')

            # 测试基本配置
            if hasattr(engine, 'validate_config'):
                config = {'strategy': 'test', 'data_source': 'mock'}
                is_valid = engine.validate_config(config)
                if is_valid:
                    print('✅ 回测配置验证通过')
                else:
                    print('❌ 回测配置验证失败')
                    sys.exit(1)

        except Exception as e:
            print(f'❌ 回测引擎验证失败: {e}')
            sys.exit(1)
        "

    - name: 性能基准测试
      run: |
        echo "🔍 执行策略性能基准测试..."
        python -c "
        import sys
        import time
        sys.path.insert(0, 'src')

        try:
            # 简单的性能测试
            start_time = time.time()

            # 测试数据处理性能
            import pandas as pd
            import numpy as np

            # 生成测试数据
            dates = pd.date_range('2023-01-01', periods=1000, freq='D')
            data = pd.DataFrame({
                'close': np.random.randn(1000).cumsum() + 100,
                'volume': np.random.randint(1000, 10000, 1000)
            }, index=dates)

            # 测试基本指标计算
            data['returns'] = data['close'].pct_change()
            data['ma5'] = data['close'].rolling(5).mean()
            data['ma20'] = data['close'].rolling(20).mean()

            end_time = time.time()
            duration = end_time - start_time

            print(f'✅ 性能测试完成，耗时: {duration:.2f}秒')
            print(f'✅ 数据处理: {len(data)} 条记录')

            # 性能阈值检查
            if duration > 5.0:
                print(f'::warning::性能测试耗时较长: {duration:.2f}秒')
            if len(data) < 900:
                print('::error::数据处理不完整')
                sys.exit(1)

        except Exception as e:
            print(f'❌ 性能基准测试失败: {e}')
            sys.exit(1)
        "

  # ============================================================================
  # 数据安全检查
  # ============================================================================
  data-security-validation:
    name: Data Security Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 敏感信息扫描
      run: |
        echo "🔒 扫描敏感信息泄露..."

        # 检查硬编码的敏感信息
        sensitive_patterns=(
          'password.*=.*[^$]'
          'secret.*=.*[^$]'
          'key.*=.*[^$]'
          'token.*=.*[^$]'
          'api_key.*=.*[^$]'
        )

        found_sensitive=()

        for pattern in "${sensitive_patterns[@]}"; do
          # 排除测试文件和配置模板
          matches=$(grep -r -i "$pattern" --include="*.py" --exclude-dir="tests" --exclude-dir=".git" . | grep -v ".env.example" | grep -v "test_" | wc -l)
          if [ "$matches" -gt 0 ]; then
            found_sensitive+=("$pattern: $matches 处")
          fi
        done

        if [ ${#found_sensitive[@]} -gt 0 ]; then
          echo "::error::发现潜在的敏感信息泄露"
          for item in "${found_sensitive[@]}"; do
            echo "::error::$item"
          done
          exit 1
        else
          echo "✅ 敏感信息扫描通过"
        fi

    - name: SQL注入风险检查
      run: |
        echo "🔒 检查SQL注入风险..."

        # 检查字符串拼接的SQL查询
        sql_injection_patterns=(
          'SELECT.*%s'
          'INSERT.*%s'
          'UPDATE.*%s'
          'DELETE.*%s'
          '\.format\(.*sql'
          'f".*SELECT'
          'f".*INSERT'
          'f".*UPDATE'
          'f".*DELETE'
        )

        risky_files=()

        for pattern in "${sql_injection_patterns[@]}"; do
          files=$(grep -r -l "$pattern" --include="*.py" --exclude-dir="tests" . 2>/dev/null || true)
          if [ -n "$files" ]; then
            risky_files+=("$files")
          fi
        done

        if [ ${#risky_files[@]} -gt 0 ]; then
          echo "::warning::发现可能的SQL注入风险文件:"
          for file in "${risky_files[@]}"; do
            echo "::warning::$file"
          done
          # 不阻断CI，但发出警告
        else
          echo "✅ SQL注入风险检查通过"
        fi

    - name: 数据加密验证
      run: |
        echo "🔒 验证数据加密配置..."

        python -c "
        import sys
        sys.path.insert(0, 'src')

        try:
            # 检查加密配置
            from src.core.config import settings

            # 检查是否有加密相关的配置
            encryption_configured = False

            if hasattr(settings, 'encryption'):
                encryption_configured = True
                print('✅ 加密配置已启用')
            else:
                print('⚠️ 未发现加密配置，请检查配置文件')

            # 检查敏感数据处理
            if hasattr(settings, 'database'):
                db_config = settings.database
                if hasattr(db_config, 'password') and db_config.password:
                    # 检查密码是否是环境变量引用
                    if not db_config.password.startswith('$'):
                        print('::warning::数据库密码可能明文存储')
                    else:
                        print('✅ 数据库密码使用环境变量')

        except Exception as e:
            print(f'⚠️ 数据加密验证失败: {e}')
        "

    - name: 访问控制验证
      run: |
        echo "🔒 验证访问控制配置..."

        python -c "
        import sys
        sys.path.insert(0, 'src')

        try:
            # 检查认证和授权配置
            from src.core.config import settings

            auth_configured = False

            if hasattr(settings, 'auth'):
                auth_config = settings.auth
                if hasattr(auth_config, 'jwt_secret') and auth_config.jwt_secret:
                    if not auth_config.jwt_secret.startswith('$'):
                        print('::warning::JWT密钥可能明文存储')
                    else:
                        print('✅ JWT密钥使用环境变量')
                    auth_configured = True

            if hasattr(settings, 'security'):
                security_config = settings.security
                if hasattr(security_config, 'cors_origins'):
                    print('✅ CORS配置已设置')
                    auth_configured = True

            if not auth_configured:
                print('⚠️ 未发现完整的认证配置')

        except Exception as e:
            print(f'⚠️ 访问控制验证失败: {e}')
        "

  # ============================================================================
  # 策略性能回归测试
  # ============================================================================
  strategy-performance-regression:
    name: Strategy Performance Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-benchmark

    - name: 下载基准性能数据
      run: |
        echo "📊 下载基准性能数据..."
        # 这里可以从GitHub releases或artifact下载基准数据
        # 暂时创建简单的基准

    - name: 执行性能回归测试
      run: |
        echo "📊 执行策略性能回归测试..."

        python -c "
        import sys
        import time
        import json
        sys.path.insert(0, 'src')

        results = {}

        try:
            # 测试策略初始化性能
            start_time = time.time()
            from src.strategies.strategy_factory import StrategyFactory
            factory = StrategyFactory()
            init_time = time.time() - start_time
            results['strategy_init_time'] = init_time

            # 测试数据处理性能
            import pandas as pd
            import numpy as np

            # 生成测试数据集
            np.random.seed(42)  # 确保可重复性
            dates = pd.date_range('2023-01-01', periods=1000, freq='D')
            data = pd.DataFrame({
                'close': np.random.randn(1000).cumsum() + 100,
                'volume': np.random.randint(1000, 10000, 1000),
                'high': np.random.randn(1000).cumsum() + 102,
                'low': np.random.randn(1000).cumsum() + 98
            }, index=dates)

            # 测试技术指标计算性能
            start_time = time.time()
            data['ma5'] = data['close'].rolling(5).mean()
            data['ma20'] = data['close'].rolling(20).mean()
            data['rsi'] = 100 - (100 / (1 + data['close'].pct_change().rolling(14).mean() / data['close'].pct_change().rolling(14).std()))
            indicator_time = time.time() - start_time
            results['indicator_calc_time'] = indicator_time

            # 保存结果用于比较
            with open('performance_results.json', 'w') as f:
                json.dump(results, f, indent=2)

            print(f'✅ 性能测试完成')
            print(f'策略初始化时间: {init_time:.3f}秒')
            print(f'指标计算时间: {indicator_time:.3f}秒')

            # 简单的回归检查（可以根据历史数据调整阈值）
            if init_time > 5.0:
                print(f'::warning::策略初始化时间过长: {init_time:.3f}秒')
            if indicator_time > 2.0:
                print(f'::warning::指标计算时间过长: {indicator_time:.3f}秒')

        except Exception as e:
            print(f'❌ 性能回归测试失败: {e}')
            sys.exit(1)
        "

    - name: 上传性能结果
      uses: actions/upload-artifact@v4
      with:
        name: performance-results
        path: performance_results.json

  # ============================================================================
  # 结果汇总
  # ============================================================================
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [quant-strategy-validation, data-security-validation, strategy-performance-regression]
    if: always()

    steps:
    - name: Generate summary
      run: |
        echo "## 🔍 量化策略验证结果" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # 检查各个任务状态
        jobs_status() {
          local job_name=$1
          local status=$2

          if [ "$status" = "success" ]; then
            echo "✅ $job_name" >> $GITHUB_STEP_SUMMARY
          elif [ "$status" = "failure" ]; then
            echo "❌ $job_name" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ $job_name ($status)" >> $GITHUB_STEP_SUMMARY
          fi
        }

        jobs_status "策略语法验证" "${{ needs.quant-strategy-validation.result }}"
        jobs_status "数据安全检查" "${{ needs.data-security-validation.result }}"
        jobs_status "性能回归测试" "${{ needs.strategy-performance-regression.result }}"

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 检查清单" >> $GITHUB_STEP_SUMMARY
        echo "- [x] 量化策略语法正确" >> $GITHUB_STEP_SUMMARY
        echo "- [x] 策略模块可正常导入" >> $GITHUB_STEP_SUMMARY
        echo "- [x] 回测引擎功能正常" >> $GITHUB_STEP_SUMMARY
        echo "- [x] 无敏感信息泄露" >> $GITHUB_STEP_SUMMARY
        echo "- [x] SQL注入风险可控" >> $GITHUB_STEP_SUMMARY
        echo "- [x] 性能回归在可接受范围内" >> $GITHUB_STEP_SUMMARY
