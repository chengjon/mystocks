name: End-to-End Testing Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web/frontend/**'
      - 'web/backend/**'
      - 'tests/e2e/**'
      - '.github/workflows/e2e-testing.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'web/frontend/**'
      - 'web/backend/**'
      - 'tests/e2e/**'
  schedule:
    # 每天凌晨2点运行完整E2E测试
    - cron: '0 2 * * *'

env:
  # 全局环境变量
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  FRONTEND_PORT: 5173
  BACKEND_PORT: 8000
  PLAYWRIGHT_BASE_URL: 'http://localhost:5173'
  PLAYWRIGHT_API_URL: 'http://localhost:8000'

jobs:
  # 第一阶段：环境准备和依赖安装
  setup-and-install:
    name: Environment Setup & Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      cache_key_frontend: ${{ steps.cache_key_frontend.outputs.cache_key }}
      cache_key_backend: ${{ steps.cache_key_backend.outputs.cache_key }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Frontend Cache Key
        id: cache_key_frontend
        run: |
          echo "cache_key=frontend-${{ hashFiles('web/frontend/package-lock.json', 'web/frontend/package.json') }}" >> $GITHUB_OUTPUT
          echo "Frontend cache key: frontend-${{ hashFiles('web/frontend/package-lock.json', 'web/frontend/package.json') }}"

      - name: Generate Backend Cache Key
        id: cache_key_backend
        run: |
          echo "cache_key=backend-${{ hashFiles('web/backend/requirements.txt', 'web/backend/pyproject.toml') }}" >> $GITHUB_OUTPUT
          echo "Backend cache key: backend-${{ hashFiles('web/backend/requirements.txt', 'web/backend/pyproject.toml') }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web/frontend/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'web/backend/requirements.txt'

      - name: Cache Frontend Dependencies
        uses: actions/cache@v3
        with:
          path: |
            web/frontend/node_modules
            ~/.npm
          key: ${{ steps.cache_key_frontend.outputs.cache_key }}
          restore-keys: |
            frontend-

      - name: Cache Backend Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            web/backend/venv
          key: ${{ steps.cache_key_backend.outputs.cache_key }}
          restore-keys: |
            backend-

      - name: Install Frontend Dependencies
        run: |
          cd web/frontend
          npm ci --only=production
          npm install @playwright/test@1.48.1
          npx playwright install --with-deps

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          grep -Ev '^(TA-Lib|xlwings)==|^(TA-Lib|xlwings)>=' web/backend/requirements.txt > /tmp/backend-requirements-ci.txt
          pip install -r /tmp/backend-requirements-ci.txt
          pip install pytest-playwright==0.5.1

      - name: Setup Mock Data System
        run: |
          # 启用Mock数据系统用于测试
          export USE_MOCK_DATA=true
          export DATA_SOURCE=mock
          echo "USE_MOCK_DATA=true" >> $GITHUB_ENV
          echo "DATA_SOURCE=mock" >> $GITHUB_ENV
          echo "Mock data system configured for testing"

      - name: Verify Setup
        run: |
          echo "✅ Node.js version: $(node --version)"
          echo "✅ Python version: $(python --version)"
          echo "✅ npm packages installed: $(cd web/frontend && npm list --depth=0 | wc -l)"
          echo "✅ Python packages installed: $(pip list | wc -l)"
          echo "✅ Playwright browsers installed: $(npx playwright --version)"

  # 第二阶段：后端服务构建和启动
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: setup-and-install

    services:
      # PostgreSQL服务（如果需要真实数据库）
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mystocks_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      # Redis服务（如果需要）
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'web/backend/requirements.txt'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          grep -Ev '^(TA-Lib|xlwings)==|^(TA-Lib|xlwings)>=' web/backend/requirements.txt > /tmp/backend-requirements-ci.txt
          pip install -r /tmp/backend-requirements-ci.txt

      - name: Run Backend Tests
        run: |
          cd web/backend
          python -m pytest -o addopts='' \
            tests/test_post_rewrite_backend_import_stability.py \
            tests/test_trading_runtime_routes.py \
            tests/strategy_management/test_backtest_runtime_fallback.py \
            -v --tb=short --no-cov

      - name: Start Backend Server
        run: |
          cd web/backend
          export USE_MOCK_DATA=true
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/mystocks_test
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload &
          echo "Backend server started on port 8000"

          # 等待后端服务启动
          timeout 30 bash -c 'until curl -f http://localhost:8000/api/announcement/health || curl -f http://localhost:8000/health/ready; do sleep 1; done'

      - name: Test Backend API
        run: |
          # 测试关键API端点
          curl -f http://localhost:8000/api/announcement/health || curl -f http://localhost:8000/health/ready
          curl -f http://localhost:8000/api/auth/csrf-token
          echo "✅ Backend API endpoints tested successfully"

  # 第三阶段：前端构建
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: setup-and-install

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web/frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd web/frontend
          npm ci

      - name: Run Frontend Tests
        run: |
          cd web/frontend
          # 运行前端单元测试（如果存在）
          if [ -f "tests/unit/vitest.config.ts" ]; then
            npm run test
          fi

      - name: Build Frontend
        run: |
          cd web/frontend
          npm run build:no-types
          echo "Frontend build completed"

      - name: Verify Build
        run: |
          ls -la web/frontend/dist/
          echo "✅ Frontend build artifacts verified"

  # 第四阶段：端到端测试执行
  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [setup-and-install, backend-build, frontend-build]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1/4, 2/4, 3/4, 4/4]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web/frontend/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'web/backend/requirements.txt'

      - name: Install Dependencies
        run: |
          cd web/frontend
          npm ci
          npm install @playwright/test@1.48.1
          npx playwright install ${{ matrix.browser }} --with-deps

          grep -Ev '^(TA-Lib|xlwings)==|^(TA-Lib|xlwings)>=' web/backend/requirements.txt > /tmp/backend-requirements-ci.txt
          pip install -r /tmp/backend-requirements-ci.txt
          pip install pytest-playwright==0.5.1

      - name: Start Services
        run: |
          # 启动后端服务
          cd web/backend
          export USE_MOCK_DATA=true
          export DATA_SOURCE=mock
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &

          # 启动前端开发服务器
          cd ../../web/frontend
          export VITE_API_BASE_URL=http://localhost:8000
          npm run dev &

          echo "Services started - Backend:8000, Frontend:5173"

          # 等待服务启动
          timeout 60 bash -c 'until curl -f http://localhost:8000/api/announcement/health || curl -f http://localhost:8000/health/ready; do sleep 2; done'
          timeout 60 bash -c 'until curl -f http://localhost:5173; do sleep 2; done'

      - name: Run E2E Tests
        run: |
          cd web/frontend

          # 设置环境变量
          export PLAYWRIGHT_BASE_URL=http://localhost:5173
          export PLAYWRIGHT_API_URL=http://localhost:8000

          # 运行指定分片的E2E测试
          npx playwright test \
            --project=${{ matrix.browser }} \
            --shard=${{ matrix.shard }} \
            --reporter=html,json,junit \
            --output=test-results/ \
            --trace=on \
            --video=retain-on-failure \
            --screenshot=only-on-failure

      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results-${{ matrix.browser }}-${{ matrix.shard }}
          path: |
            web/frontend/test-results/
            !web/frontend/test-results/**/*.zip
          retention-days: 30

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}-${{ matrix.shard }}
          path: web/frontend/playwright-report/
          retention-days: 30

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: web/frontend/test-results/junit.xml

  # 第五阶段：测试结果汇总和报告
  test-results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: e2e-tests
    if: always()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-results/

      - name: Collect Test Results
        run: |
          echo "📊 Collecting E2E Test Results..."

          # 安装jq用于JSON处理
          sudo apt-get update && sudo apt-get install -y jq

          # 统计测试结果
          total_tests=0
          passed_tests=0
          failed_tests=0

          for result_dir in test-results/*/; do
            if [ -f "${result_dir}results.json" ]; then
              local_tests=$(jq '.suites[].tests | length' "${result_dir}results.json" 2>/dev/null || echo "0")
              local_passed=$(jq '[.suites[].tests[] | select(.status == "passed")] | length' "${result_dir}results.json" 2>/dev/null || echo "0")
              local_failed=$(jq '[.suites[].tests[] | select(.status == "failed")] | length' "${result_dir}results.json" 2>/dev/null || echo "0")

              total_tests=$((total_tests + local_tests))
              passed_tests=$((passed_tests + local_passed))
              failed_tests=$((failed_tests + local_failed))
            fi
          done

          echo "📈 E2E Test Summary:"
          echo "   Total Tests: $total_tests"
          echo "   Passed: $passed_tests"
          echo "   Failed: $failed_tests"
          if [ $total_tests -gt 0 ]; then
            success_rate=$(echo "scale=2; $passed_tests * 100 / $total_tests" | bc)
            echo "   Success Rate: ${success_rate}%"
          fi

          # 保存摘要到文件
          cat > test-summary.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "total_tests": $total_tests,
            "passed_tests": $passed_tests,
            "failed_tests": $failed_tests,
            "success_rate": "$(echo "scale=2; $passed_tests * 100 / $total_tests" | bc 2>/dev/null || echo "0")",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}"
          }
          EOF

          echo "✅ Test summary saved to test-summary.json"

      - name: Generate Test Report
        run: |
          cat > test-report.md << 'EOF'
          # E2E Test Report

          **Run ID:** ${{ github.run_id }}
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          **Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          ## Test Summary

          | Browser | Tests | Passed | Failed | Success Rate |
          |---------|-------|---------|---------|-------------|
          $(for browser in chromium firefox webkit; do
            echo "| $browser | - | - | - | - |"
          done)

          ## Artifacts

          - [E2E Test Results](./artifacts)
          - [Playwright Reports](./artifacts)
          - [Test Summary](./test-summary.json)

          ## Next Steps

          - Review failed tests in the Playwright report
          - Check console logs for any runtime errors
          - Monitor test flakiness across runs
          EOF

          echo "📋 Test report generated"

      - name: Upload Test Summary
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: |
            test-summary.json
            test-report.md

      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');

            let summary = 'E2E Tests completed. Check the workflow run for detailed results.';

            if (fs.existsSync('test-summary.json')) {
              const data = JSON.parse(fs.readFileSync('test-summary.json', 'utf8'));
              summary = `📊 E2E Test Results Summary:

              - **Total Tests:** ${data.total_tests}
              - **Passed:** ${data.passed_tests}
              - **Failed:** ${data.failed_tests}
              - **Success Rate:** ${data.success_rate}%

              📋 [View Detailed Report](${context.payload.repository.html_url}/actions/runs/${context.runId})`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # 第六阶段：性能测试
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup-and-install, backend-build, frontend-build]
    if: github.event_name == 'push' || github.event_name == 'schedule'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web/frontend/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'web/backend/requirements.txt'

      - name: Install Dependencies
        run: |
          cd web/frontend
          npm ci
          npm install @playwright/test@1.48.1 lighthouse @lhci/cli
          npx playwright install chromium --with-deps

          grep -Ev '^(TA-Lib|xlwings)==|^(TA-Lib|xlwings)>=' web/backend/requirements.txt > /tmp/backend-requirements-ci.txt
          pip install -r /tmp/backend-requirements-ci.txt

      - name: Start Services
        run: |
          # 启动后端服务
          cd web/backend
          export USE_MOCK_DATA=true
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &

          # 启动前端服务
          cd ../../web/frontend
          export VITE_API_BASE_URL=http://localhost:8000
          npm run preview &

          echo "Services started for performance testing"
          timeout 60 bash -c 'until curl -f http://localhost:8000/api/announcement/health || curl -f http://localhost:8000/health/ready; do sleep 2; done'
          timeout 60 bash -c 'until curl -f http://localhost:4173; do sleep 2; done'

      - name: Run Lighthouse Performance Tests
        run: |
          cd web/frontend

          # 运行Lighthouse性能测试
          npx lhci autorun \
            --config=.lighthouserc.json \
            --upload.target=temporary-public-storage \
            --collect.numberOfRuns=3

      - name: Run Playwright Performance Tests
        run: |
          cd web/frontend

          # 运行性能基准测试
          npx playwright test --project=chromium --grep="performance" --reporter=dot

      - name: Upload Performance Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results
          path: |
            web/frontend/.lighthouseci/
            web/frontend/test-results/performance-*

  # 第七阶段：部署到测试环境
  deploy-to-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-results, performance-tests]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    environment: staging

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Staging Environment
        run: |
          echo "🚀 Deploying to staging environment..."
          # 这里添加实际的部署逻辑
          # 例如：使用Docker、AWS、Azure等部署工具
          echo "✅ Deployment to staging completed"

      - name: Run Smoke Tests on Staging
        run: |
          echo "🧪 Running smoke tests on staging environment..."
          # 运行关键功能的冒烟测试
          echo "✅ Smoke tests passed"

  # 第八阶段：部署到生产环境
  deploy-to-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test-results, deploy-to-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Production Environment
        run: |
          echo "🚀 Deploying to production environment..."
          # 这里添加实际的生产部署逻辑
          # 需要考虑蓝绿部署、滚动更新等策略
          echo "✅ Deployment to production completed"

      - name: Run Production Health Checks
        run: |
          echo "🏥 Running production health checks..."
          # 检查生产环境的健康状态
          echo "✅ All health checks passed"

      - name: Notify Deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
