name: Directory Compliance Check

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'docs/**'
      - '*.md'
      - '**/*.md'
  schedule:
    - cron: '0 2 * * 0'

jobs:
  check-compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install documentation governance dependencies
        run: |
          python -m pip install --quiet pyyaml

      - name: Prepare compliance report directory
        run: |
          mkdir -p reports/compliance
      
      - name: Check root directory count
        run: |
          MAX_ROOT_DIRS=15
          MAX_ROOT_FILES=32
          ROOT_DIRS=$(find . -maxdepth 1 -type d ! -name '.*' ! -name '.' ! -name 'node_modules' ! -name '__pycache__' | wc -l)
          ROOT_FILES=$(find . -maxdepth 1 -type f ! -name '.*' | wc -l)
          echo "Root directories: $ROOT_DIRS (max: $MAX_ROOT_DIRS)"
          echo "Root files: $ROOT_FILES (max: $MAX_ROOT_FILES)"
          if [ "$ROOT_DIRS" -gt "$MAX_ROOT_DIRS" ]; then
            echo "❌ FAIL: Too many root directories ($ROOT_DIRS > $MAX_ROOT_DIRS)"
            exit 1
          fi
          if [ "$ROOT_FILES" -gt "$MAX_ROOT_FILES" ]; then
            echo "❌ FAIL: Too many root files ($ROOT_FILES > $MAX_ROOT_FILES)"
            exit 1
          fi
          echo "✅ Root directory structure is compliant"

      - name: Check directory structure
        run: |
          python scripts/hooks/check_directory_structure.py || exit 1
      
      - name: Check file naming
        run: |
          python scripts/hooks/check_file_naming.py || exit 1
      
      - name: Check __init__.py
        run: |
          python scripts/hooks/check_init_py.py || exit 1

      - name: Check markdown governance boundaries
        run: |
          python scripts/compliance/markdown_governance_gate.py --root-dir . --format json > reports/compliance/markdown-governance-report.json

      - name: Audit documentation governance system
        run: |
          python scripts/governance/audit_documentation_system.py --format json > reports/compliance/documentation-governance-audit.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("reports/compliance/documentation-governance-audit.json").read_text(encoding="utf-8"))
          summary = report.get("summary", {})
          duplicate_truths = summary.get("duplicate_truths", 0)
          blocked_delete_candidates = summary.get("blocked_delete_candidates", 0)
          if duplicate_truths or blocked_delete_candidates:
              raise SystemExit(
                  f"Documentation governance audit failed: duplicate_truths={duplicate_truths}, "
                  f"blocked_delete_candidates={blocked_delete_candidates}"
              )
          print(
              "Documentation governance audit passed:",
              {
                  "duplicate_truths": duplicate_truths,
                  "blocked_delete_candidates": blocked_delete_candidates,
                  "unclassified": summary.get("unclassified", 0),
              },
          )
          PY

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: reports/compliance/
          if-no-files-found: ignore

  weekly-full-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install documentation governance dependencies
        run: |
          python -m pip install --quiet pyyaml

      - name: Prepare compliance report directory
        run: |
          mkdir -p reports/compliance
      
      - name: Full directory scan
        run: |
          python scripts/hooks/full_directory_scan.py

      - name: Check markdown governance boundaries
        run: |
          python scripts/compliance/markdown_governance_gate.py --root-dir . --format json > reports/compliance/markdown-governance-report.json

      - name: Audit documentation governance system
        run: |
          python scripts/governance/audit_documentation_system.py --format json > reports/compliance/documentation-governance-audit.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("reports/compliance/documentation-governance-audit.json").read_text(encoding="utf-8"))
          summary = report.get("summary", {})
          duplicate_truths = summary.get("duplicate_truths", 0)
          blocked_delete_candidates = summary.get("blocked_delete_candidates", 0)
          if duplicate_truths or blocked_delete_candidates:
              raise SystemExit(
                  f"Documentation governance audit failed: duplicate_truths={duplicate_truths}, "
                  f"blocked_delete_candidates={blocked_delete_candidates}"
              )
          print(
              "Documentation governance audit passed:",
              {
                  "duplicate_truths": duplicate_truths,
                  "blocked_delete_candidates": blocked_delete_candidates,
                  "unclassified": summary.get("unclassified", 0),
              },
          )
          PY

      - name: Upload full scan report
        uses: actions/upload-artifact@v4
        with:
          name: full-scan-report
          path: reports/compliance/
          if-no-files-found: ignore
