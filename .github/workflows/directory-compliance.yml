name: Directory Compliance Check

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'docs/**'
  schedule:
    - cron: '0 2 * * 0'

jobs:
  check-compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare compliance report directory
        run: |
          mkdir -p reports/compliance
      
      - name: Check root directory count
        run: |
          MAX_ROOT_DIRS=14
          MAX_ROOT_FILES=31
          ROOT_DIRS=$(find . -maxdepth 1 -type d ! -name '.*' ! -name '.' ! -name 'node_modules' ! -name '__pycache__' | wc -l)
          # Allow the approved root-level API test wrapper without relaxing the overall clutter budget.
          ROOT_FILES=$(find . -maxdepth 1 -type f ! -name '.*' ! -name 'run-api-tests.sh' | wc -l)
          echo "Root directories: $ROOT_DIRS (max: $MAX_ROOT_DIRS)"
          echo "Root files (excluding approved wrapper run-api-tests.sh): $ROOT_FILES (max: $MAX_ROOT_FILES)"
          if [ "$ROOT_DIRS" -gt "$MAX_ROOT_DIRS" ]; then
            echo "❌ FAIL: Too many root directories ($ROOT_DIRS > $MAX_ROOT_DIRS)"
            exit 1
          fi
          if [ "$ROOT_FILES" -gt "$MAX_ROOT_FILES" ]; then
            echo "❌ FAIL: Too many root files ($ROOT_FILES > $MAX_ROOT_FILES)"
            exit 1
          fi
          echo "✅ Root directory structure is compliant"

      - name: Check directory structure
        run: |
          python scripts/hooks/check_directory_structure.py || exit 1
      
      - name: Check file naming
        run: |
          python scripts/hooks/check_file_naming.py || exit 1
      
      - name: Check __init__.py
        run: |
          python scripts/hooks/check_init_py.py || exit 1
      
      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: reports/compliance/
          if-no-files-found: ignore

  weekly-full-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare compliance report directory
        run: |
          mkdir -p reports/compliance
      
      - name: Full directory scan
        run: |
          python scripts/hooks/full_directory_scan.py
      
      - name: Upload full scan report
        uses: actions/upload-artifact@v4
        with:
          name: full-scan-report
          path: reports/compliance/
          if-no-files-found: ignore
