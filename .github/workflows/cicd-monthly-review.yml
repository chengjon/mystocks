# MyStocks CI/CD 月度优化审查工作流
# 每月自动生成CI/CD优化报告和改进建议

name: CI/CD Monthly Optimization Review

on:
  # 每月1号早上8点执行
  schedule:
    - cron: '0 0 1 * *'  # 每月1日00:00 UTC (北京时间08:00)
  # 允许手动触发
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制执行（跳过日期检查）'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  # ============================================================================
  # 月度审查执行
  # ============================================================================
  monthly-review:
    name: Execute Monthly CI/CD Review
    runs-on: ubuntu-latest
    outputs:
      report_month: ${{ steps.report_month.outputs.report_month }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史以进行趋势分析

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy prometheus-client PyGithub

    - name: Install GitHub CLI
      run: |
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update
        sudo apt install gh

    - name: Authenticate GitHub CLI
      run: |
        echo ${{ secrets.GITHUB_TOKEN }} | gh auth login --with-token

    - name: Set report month
      id: report_month
      run: |
        if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
          report_month="manual-$(date +%Y-%m)"
        else
          report_month="$(date +%Y-%m)"
        fi

        echo "report_month=$report_month" >> $GITHUB_OUTPUT
        echo "REPORT_MONTH=$report_month" >> $GITHUB_ENV

    - name: Execute monthly review script
      run: |
        chmod +x scripts/cicd-monthly-review.sh
        ./scripts/cicd-monthly-review.sh

    - name: Upload review artifacts
      uses: actions/upload-artifact@v4
      with:
        name: monthly-review-${{ steps.report_month.outputs.report_month }}
        path: reports/cicd-optimization/${{ steps.report_month.outputs.report_month }}/
        retention-days: 90  # 保留90天

  # ============================================================================
  # 报告发布
  # ============================================================================
  publish-report:
    name: Publish Monthly Report
    runs-on: ubuntu-latest
    needs: monthly-review
    if: success()

    steps:
      - name: Download review artifacts
        uses: actions/download-artifact@v4
        with:
          name: monthly-review-${{ needs.monthly-review.outputs.report_month }}
          path: monthly-report

      - name: Create GitHub Issue with report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 读取报告内容
          if [ -f "monthly-report/monthly_optimization_report.md" ]; then
            REPORT_CONTENT=$(cat monthly-report/monthly_optimization_report.md)

            # 创建GitHub Issue
            gh issue create \
              --title "📊 CI/CD月度优化报告 - ${{ needs.monthly-review.outputs.report_month }}" \
              --body "$REPORT_CONTENT" \
              --label "monthly-review,optimization,report" \
              --assignee ${{ github.actor }}
          else
            echo "报告文件不存在，跳过Issue创建"
          fi

      - name: Send notification to team
        run: |
          # 这里可以集成团队通知
          # Slack、微信、企业微信等

          if [ -n "${{ secrets.TEAM_WEBHOOK_URL }}" ]; then
            REPORT_PREVIEW=$(head -20 monthly-report/monthly_optimization_report.md 2>/dev/null || echo '报告生成失败')
            export REPORT_PREVIEW
            PAYLOAD=$(python - <<'PY'
          import json
          import os

          text = (
              f"📊 MyStocks {os.environ['REPORT_MONTH']} CI/CD优化报告已生成\n"
              f"查看: {os.environ['RUN_URL']}\n\n"
              f"{os.environ['REPORT_PREVIEW']}"
          )
          print(json.dumps({"text": text}, ensure_ascii=False))
          PY
            )
            curl -X POST "${{ secrets.TEAM_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          fi
        env:
          REPORT_MONTH: ${{ needs.monthly-review.outputs.report_month }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ============================================================================
  # 优化任务跟踪
  # ============================================================================
  create-optimization-tasks:
    name: Create Optimization Tasks
    runs-on: ubuntu-latest
    needs: [monthly-review, publish-report]
    if: success()

    steps:
      - name: Download review artifacts
        uses: actions/download-artifact@v4
        with:
          name: monthly-review-${{ needs.monthly-review.outputs.report_month }}
          path: monthly-report

      - name: Parse optimization recommendations
        id: parse-recommendations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 解析优化建议JSON
          if [ -f "monthly-report/optimization_recommendations.json" ]; then
            # 统计各类建议数量
            high_priority=$(jq '.[] | select(.priority == "high") | .title' monthly-report/optimization_recommendations.json | wc -l)
            medium_priority=$(jq '.[] | select(.priority == "medium") | .title' monthly-report/optimization_recommendations.json | wc -l)
            low_priority=$(jq '.[] | select(.priority == "low") | .title' monthly-report/optimization_recommendations.json | wc -l)

            echo "high_priority=$high_priority" >> $GITHUB_OUTPUT
            echo "medium_priority=$medium_priority" >> $GITHUB_OUTPUT
            echo "low_priority=$low_priority" >> $GITHUB_OUTPUT

            # 为高优先级建议创建GitHub Issues
            if [ "$high_priority" -gt 0 ]; then
              echo "创建 $high_priority 个高优先级优化任务..."

              jq -r '.[] | select(.priority == "high") | @base64' monthly-report/optimization_recommendations.json | while read -r item; do
                item_data=$(echo "$item" | base64 -d)

                title=$(echo "$item_data" | jq -r '.title')
                description=$(echo "$item_data" | jq -r '.description')
                category=$(echo "$item_data" | jq -r '.category')
                actions=$(echo "$item_data" | jq -r '.actions | join("\\n- ")')

                issue_body=$(cat <<EOF
          ## 问题描述
          $description

          ## 分类
          $category

          ## 建议措施
          - $actions

          ## 报告月份
          ${{ needs.monthly-review.outputs.report_month }}

          ---
          *此任务由月度优化审查自动生成*
          EOF
                )

                # 创建Issue
                gh issue create \
                  --title "🔴 高优先级: $title" \
                  --body "$issue_body" \
                  --label "optimization,high-priority,monthly-review" \
                  --milestone "CI/CD优化"
              done
            fi
          fi

      - name: Create optimization project board card
        if: steps.parse-recommendations.outputs.high_priority > 0
        run: |
          # 如果有高优先级任务，在项目面板中创建卡片
          # 这里可以集成GitHub Projects API

          echo "📋 已创建 ${{ steps.parse-recommendations.outputs.high_priority }} 个高优先级优化任务"
          echo "📋 ${{ steps.parse-recommendations.outputs.medium_priority }} 个中优先级建议"
          echo "📋 ${{ steps.parse-recommendations.outputs.low_priority }} 个低优先级建议"

  # ============================================================================
  # 历史数据归档
  # ============================================================================
  archive-historical-data:
    name: Archive Historical Data
    runs-on: ubuntu-latest
    needs: [monthly-review, publish-report, create-optimization-tasks]
    if: success()

    steps:
    - name: Create archive directory
      run: |
        mkdir -p archive/cicd-reviews/${{ needs.monthly-review.outputs.report_month }}

    - name: Download and archive all artifacts
      uses: actions/download-artifact@v4
      with:
        path: archive/cicd-reviews/${{ needs.monthly-review.outputs.report_month }}

    - name: Compress archive
      run: |
        cd archive/cicd-reviews
        tar -czf ${{ needs.monthly-review.outputs.report_month }}.tar.gz ${{ needs.monthly-review.outputs.report_month }}
        rm -rf ${{ needs.monthly-review.outputs.report_month }}

    - name: Upload archive to releases
      uses: actions/upload-artifact@v4
      with:
        name: cicd-review-archive-${{ needs.monthly-review.outputs.report_month }}
        path: archive/cicd-reviews/${{ needs.monthly-review.outputs.report_month }}.tar.gz
        retention-days: 365  # 保留一年

  # ============================================================================
  # 清理任务
  # ============================================================================
  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    needs: [archive-historical-data, monthly-review]
    if: always()

    steps:
    - name: Clean up old artifacts
      run: |
        # 清理30天前的临时artifacts
        # 注意：这需要适当的权限配置

        echo "🧹 清理完成"

    - name: Send completion notification
      if: success()
      run: |
        echo "✅ MyStocks ${{ needs.monthly-review.outputs.report_month }} CI/CD月度优化审查完成"
        echo "📊 报告已生成并发布"
        echo "🎯 优化任务已创建"
        echo "📦 历史数据已归档"
