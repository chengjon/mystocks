name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

env:
  FRONTEND_PORT: '3020'
  FRONTEND_BACKUP_PORT: '3021'
  BACKEND_PORT: '8020'
  BACKEND_BACKUP_PORT: '8021'

jobs:
  stable-suite:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd web/frontend
          npm ci

      - name: Install Playwright
        run: |
          cd web/frontend
          npx playwright install --with-deps chromium

      - name: Run Stable E2E Subset
        run: |
          cd web/frontend
          npm run test:e2e:stable

      - name: Upload stable test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-stable
          path: web/frontend/test-results/

  nightly-full:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd web/frontend
          npm ci
      
      - name: Install Playwright
        run: |
          cd web/frontend
          npx playwright install --with-deps
      
      - name: Run E2E tests
        run: |
          cd web/frontend
          npm run test:e2e:nightly
      
      - name: Upload nightly test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-nightly
          path: web/frontend/test-results/
