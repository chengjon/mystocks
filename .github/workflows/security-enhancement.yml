name: Security Enhancement

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install security tools
      run: |
        pip install safety pip-audit

    - name: Scan Python dependencies
      run: |
        safety check --full-report --output json -o safety-report.json || true
        pip-audit --format json -o pip-audit-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          safety-report.json
          pip-audit-report.json

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Scan for secrets
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Bandit
      run: pip install bandit

    - name: Run Bandit security scan
      run: |
        bandit -r src/ web/backend/app/ -f json -o bandit-report.json -iii || true
        bandit -r src/ web/backend/app/ || true

    - name: Upload Bandit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-security-results
        path: bandit-report.json

  container-security:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4

    - name: Build test container
      run: |
        docker build -f web/backend/Dockerfile -t mystocks-test .

    - name: Scan container for vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        scan-ref: 'mystocks-test'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  compliance-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check license compliance
      run: |
        # Check for license files
        LICENSE_COUNT=$(find . -name "LICENSE*" -o -name "COPYING*" | wc -l)
        find . -name "LICENSE*" -o -name "COPYING*" | head -5
        echo "License file count: $LICENSE_COUNT"
        if [ "$LICENSE_COUNT" -eq 0 ]; then
          echo "❌ No license files found"
          exit 1
        fi

    - name: Check for sensitive data patterns
      run: |
        # Check for hardcoded secrets, passwords, API keys
        grep -r "password\|secret\|api_key\|token" --include="*.py" --include="*.js" --include="*.ts" --include="*.json" . | grep -v "test\|mock\|example\|template" | head -10 || true

  security-report:
    needs: [dependency-scan, secrets-scan, code-security-scan, compliance-check]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - uses: actions/checkout@v4

    - name: Download security reports
      uses: actions/download-artifact@v4
      with:
        name: security-reports
        path: .

    - name: Download code security reports
      uses: actions/download-artifact@v4
      with:
        name: code-security-results
        path: .

    - name: Generate security summary
      run: |
        python - <<'PY'
        import json
        from pathlib import Path

        safety_path = Path("safety-report.json")
        bandit_path = Path("bandit-report.json")

        lines = ["## Security Scan Results", ""]

        if safety_path.exists():
            try:
                data = json.loads(safety_path.read_text(encoding="utf-8"))
                vuln_count = len([item for item in data if item.get("vulnerable_spec")])
                lines.append(f"- Safety vulnerable dependencies: {vuln_count}")
            except Exception:
                lines.append("- Safety vulnerable dependencies: unavailable")
        else:
            lines.append("- Safety report: missing")

        if bandit_path.exists():
            try:
                data = json.loads(bandit_path.read_text(encoding="utf-8"))
                severities = {}
                for issue in data.get("results", []):
                    severity = issue.get("issue_severity", "UNSPECIFIED")
                    severities[severity] = severities.get(severity, 0) + 1
                lines.append(f"- Bandit HIGH: {severities.get('HIGH', 0)}")
                lines.append(f"- Bandit MEDIUM: {severities.get('MEDIUM', 0)}")
                lines.append(f"- Bandit LOW: {severities.get('LOW', 0)}")
            except Exception:
                lines.append("- Bandit report: unavailable")
        else:
            lines.append("- Bandit report: missing")

        Path("security-summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
        PY

    - name: Comment security summary on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      continue-on-error: true
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('security-summary.md', 'utf8');

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🔒 Security Scan Results\n\n${summary}`
          });

    - name: Fail on critical vulnerabilities
      run: |
        python - <<'PY'
        import json
        from pathlib import Path

        safety_path = Path("safety-report.json")
        bandit_path = Path("bandit-report.json")

        high_count = 0
        vulnerable_dependencies = 0

        if bandit_path.exists():
            data = json.loads(bandit_path.read_text(encoding="utf-8"))
            high_count = sum(1 for issue in data.get("results", []) if issue.get("issue_severity") == "HIGH")

        if safety_path.exists():
            data = json.loads(safety_path.read_text(encoding="utf-8"))
            vulnerable_dependencies = len([item for item in data if item.get("vulnerable_spec")])

        print(f"Bandit HIGH findings: {high_count}")
        print(f"Safety vulnerable dependencies: {vulnerable_dependencies}")

        if high_count > 0:
            raise SystemExit("Security enhancement gate failed: high severity Bandit findings detected.")
        PY
