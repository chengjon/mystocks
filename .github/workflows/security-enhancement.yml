name: Security Enhancement

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install security tools
      run: |
        pip install safety pip-audit

    - name: Scan Python dependencies
      run: |
        safety check --full-report --output json -o safety-report.json || true
        pip-audit --format json -o pip-audit-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          safety-report.json
          pip-audit-report.json

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Scan for secrets
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Bandit
      run: pip install bandit

    - name: Run Bandit security scan
      run: |
        bandit -r src/ web/backend/app/ -f json -o bandit-report.json -iii
        bandit -r src/ web/backend/app/

    - name: Upload bandit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bandit-security-report
        path: bandit-report.json
        if-no-files-found: ignore

  container-security:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4

    - name: Build test container
      run: |
        docker build -f web/backend/Dockerfile -t mystocks-test .

    - name: Scan container for vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        scan-ref: 'mystocks-test'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  compliance-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check license compliance
      run: |
        # Check for license files
        find . -name "LICENSE*" -o -name "COPYING*" | head -5

        # Fail if the repository no longer exposes any top-level license file
        python - <<'PY'
        from pathlib import Path

        license_hits = [
            path.name
            for path in sorted(Path(".").iterdir())
            if path.is_file() and (path.name.startswith("LICENSE") or path.name.startswith("COPYING"))
        ]

        if not license_hits:
            raise SystemExit("no top-level license file found")

        print("license files:", ", ".join(license_hits[:5]))
        PY

    - name: Check for sensitive data patterns
      run: |
        # Check for hardcoded secrets, passwords, API keys
        grep -r "password\|secret\|api_key\|token" --include="*.py" --include="*.js" --include="*.ts" --include="*.json" . | grep -v "test\|mock\|example\|template" | head -10 || true

  security-report:
    needs: [dependency-scan, secrets-scan, code-security-scan, compliance-check]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - uses: actions/checkout@v4

    - name: Download security reports
      uses: actions/download-artifact@v4
      with:
        path: .
        merge-multiple: true
        pattern: "*security-report*"

    - name: Download dependency reports
      uses: actions/download-artifact@v4
      with:
        name: security-reports
        path: .

    - name: Generate security summary
      run: |
        python - <<'PY'
        import json
        from pathlib import Path


        def load_report(path_str):
            path = Path(path_str)
            if not path.exists():
                return None
            try:
                return json.loads(path.read_text(encoding="utf-8"))
            except Exception as exc:  # pragma: no cover
                return {"_parse_error": str(exc)}


        def count_safety_issues(payload):
            if not payload:
                return 0
            if isinstance(payload, list):
                return len(payload)
            for key in ("vulnerabilities", "issues"):
                value = payload.get(key)
                if isinstance(value, list):
                    return len(value)
            return 0


        def count_bandit_high(payload):
            if not payload or not isinstance(payload, dict):
                return 0
            return sum(
                1
                for item in payload.get("results", [])
                if isinstance(item, dict) and item.get("issue_severity") == "HIGH"
            )


        safety_report = load_report("safety-report.json")
        bandit_report = load_report("bandit-report.json")
        pip_audit_report = load_report("pip-audit-report.json")

        lines = [
            "# Security Summary",
            "",
            f"- safety issues: {count_safety_issues(safety_report)}",
            f"- bandit high severity issues: {count_bandit_high(bandit_report)}",
            f"- pip-audit report present: {'yes' if pip_audit_report is not None else 'no'}",
        ]

        Path("security-summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
        print(Path("security-summary.md").read_text(encoding="utf-8"))
        PY

    - name: Comment security summary on PR
      if: github.event_name == 'pull_request'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('security-summary.md', 'utf8');

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🔒 Security Scan Results\n\n${summary}`
          });

    - name: Fail on critical vulnerabilities
      run: |
        python - <<'PY'
        import json
        from pathlib import Path


        def load_json(path_str):
            path = Path(path_str)
            if not path.exists():
                return None
            return json.loads(path.read_text(encoding="utf-8"))


        def count_safety_issues(payload):
            if payload is None:
                return 0
            if isinstance(payload, list):
                return len(payload)
            for key in ("vulnerabilities", "issues"):
                value = payload.get(key)
                if isinstance(value, list):
                    return len(value)
            return 0


        def count_bandit_high(payload):
            if not isinstance(payload, dict):
                return 0
            return sum(
                1
                for item in payload.get("results", [])
                if isinstance(item, dict) and item.get("issue_severity") == "HIGH"
            )


        safety_count = count_safety_issues(load_json("safety-report.json"))
        bandit_high = count_bandit_high(load_json("bandit-report.json"))

        print(f"safety issues: {safety_count}")
        print(f"bandit high severity issues: {bandit_high}")

        if safety_count > 0 or bandit_high > 0:
            raise SystemExit(1)
        PY
