name: Security Enhancement

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  issues: write

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install security tools
      run: |
        pip install safety pip-audit

    - name: Scan Python dependencies
      run: |
        safety check --full-report --output json -o safety-report.json || true
        pip-audit --format json -o pip-audit-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          safety-report.json
          pip-audit-report.json

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}
        fetch-depth: 0

    - name: Scan for secrets
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-scope-detect:
    runs-on: ubuntu-latest
    outputs:
      bandit_required: ${{ steps.detect.outputs.bandit_required }}
      bandit_args: ${{ steps.detect.outputs.bandit_args }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}
        fetch-depth: 0

    - name: Detect Bandit scope
      id: detect
      shell: bash
      run: |
        bandit_required=false
        bandit_args=""

        if [ "${{ github.event_name }}" != "pull_request" ]; then
          bandit_required=true
          bandit_args="-r src/ web/backend/app/"
        else
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              mapfile -t changed_files < <(git diff --name-only HEAD^ HEAD)
            else
              mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
            fi
          else
            mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")
          fi

          for changed_file in "${changed_files[@]}"; do
            case "$changed_file" in
              src/*.py|src/**/*.py|web/backend/app/*.py|web/backend/app/**/*.py)
                bandit_required=true
                bandit_args="$bandit_args $changed_file"
                ;;
            esac
          done
        fi

        echo "bandit_required=$bandit_required" >> "$GITHUB_OUTPUT"
        echo "bandit_args=$(echo "$bandit_args" | xargs)" >> "$GITHUB_OUTPUT"

  code-security-scan:
    runs-on: ubuntu-latest
    needs: security-scope-detect
    if: needs.security-scope-detect.outputs.bandit_required == 'true'
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Bandit
      run: pip install bandit

    - name: Generate Bandit JSON report
      continue-on-error: true
      run: |
        bandit ${{ needs.security-scope-detect.outputs.bandit_args }} -f json -o bandit-report.json -iii

    - name: Upload Bandit security report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bandit-security-report
        path: bandit-report.json
        if-no-files-found: ignore

    - name: Enforce Bandit security gate
      run: |
        bandit -ll ${{ needs.security-scope-detect.outputs.bandit_args }}

  container-security:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Build test container
      run: |
        docker build -f web/backend/Dockerfile -t mystocks-test .

    - name: Scan container for vulnerabilities
      uses: aquasecurity/trivy-action@v0.33.1
      with:
        scan-type: 'image'
        scan-ref: 'mystocks-test'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  compliance-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Check license compliance
      run: |
        # Check for license files
        find . -name "LICENSE*" -o -name "COPYING*" | head -5

        # Check for license headers in source files
        if [ -f "scripts/check_license_headers.py" ]; then
          python scripts/check_license_headers.py
        else
          echo "License header check script not present; skipping file header scan"
        fi

    - name: Check for sensitive data patterns
      run: |
        # Check for hardcoded secrets, passwords, API keys
        grep -r "password\|secret\|api_key\|token" --include="*.py" --include="*.js" --include="*.ts" --include="*.json" . | grep -v "test\|mock\|example\|template" | head -10 || true

  security-report:
    needs: [dependency-scan, secrets-scan, security-scope-detect, code-security-scan, compliance-check]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Download security reports
      uses: actions/download-artifact@v4
      with:
        name: security-reports
        path: .

    - name: Download Bandit security report
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: bandit-security-report
        path: .

    - name: Generate security summary
      run: |
        python - <<'PY'
        import json
        from pathlib import Path

        def load_json(path: str):
            file_path = Path(path)
            if not file_path.exists():
                return None
            try:
                return json.loads(file_path.read_text(encoding="utf-8"))
            except json.JSONDecodeError:
                return None

        def safety_count(report) -> int:
            if not isinstance(report, dict):
                return 0
            report_meta = report.get("report_meta") or {}
            if isinstance(report_meta, dict):
                return int(report_meta.get("vulnerabilities_found") or 0)
            vulnerabilities = report.get("vulnerabilities")
            if isinstance(vulnerabilities, list):
                return len(vulnerabilities)
            return 0

        def pip_audit_count(report) -> int:
            if isinstance(report, list):
                return len(report)
            if isinstance(report, dict):
                vulnerabilities = report.get("vulnerabilities")
                if isinstance(vulnerabilities, list):
                    return len(vulnerabilities)
            return 0

        def bandit_counts(report) -> tuple[int, int, int]:
            if not isinstance(report, dict):
                return (0, 0, 0)
            totals = ((report.get("metrics") or {}).get("_totals") or {})
            return (
                int(totals.get("SEVERITY.HIGH") or 0),
                int(totals.get("SEVERITY.MEDIUM") or 0),
                int(totals.get("SEVERITY.LOW") or 0),
            )

        safety_report = load_json("safety-report.json")
        pip_audit_report = load_json("pip-audit-report.json")
        bandit_report = load_json("bandit-report.json")

        safety_vulnerabilities = safety_count(safety_report)
        pip_audit_vulnerabilities = pip_audit_count(pip_audit_report)
        bandit_high, bandit_medium, bandit_low = bandit_counts(bandit_report)

        lines = [
            "# Security Summary",
            "",
            "## Findings",
            f"- Safety vulnerabilities: {safety_vulnerabilities}",
            f"- pip-audit findings: {pip_audit_vulnerabilities}",
            f"- Bandit high severity: {bandit_high}",
            f"- Bandit medium severity: {bandit_medium}",
            f"- Bandit low severity: {bandit_low}",
            "",
            "## Report Availability",
            f"- safety-report.json: {'present' if safety_report is not None else 'missing or unreadable'}",
            f"- pip-audit-report.json: {'present' if pip_audit_report is not None else 'missing or unreadable'}",
            f"- bandit-report.json: {'present' if bandit_report is not None else 'missing or unreadable'}",
        ]

        Path("security-summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
        PY

    - name: Comment security summary on PR
      if: github.event_name == 'pull_request'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('security-summary.md', 'utf8');

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🔒 Security Scan Results\n\n${summary}`
          });

    - name: Fail on critical vulnerabilities
      run: |
        python - <<'PY'
        import json
        import sys
        from pathlib import Path

        report_path = Path("bandit-report.json")
        if not report_path.exists():
            print("bandit-report.json unavailable; relying on code-security-scan result")
            sys.exit(0)

        report = json.loads(report_path.read_text(encoding="utf-8"))
        totals = ((report.get("metrics") or {}).get("_totals") or {})
        high_count = int(totals.get("SEVERITY.HIGH") or 0)

        print(f"Bandit high severity findings: {high_count}")
        if high_count > 0:
            print("High severity Bandit findings detected")
            sys.exit(1)

        print("No high severity Bandit findings detected")
        PY
