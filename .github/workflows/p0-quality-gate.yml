# P0优先级质量门禁 - 阻止低质量代码合并
# 执行严格的代码质量检查，失败则阻止PR合并
# 触发条件：所有PR和main分支的push

name: P0 Quality Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # Scope detection
  p0-scope-detect:
    runs-on: ubuntu-latest
    outputs:
      python_quality_required: ${{ steps.detect.outputs.python_quality_required }}
      dependency_check_required: ${{ steps.detect.outputs.dependency_check_required }}
      python_files: ${{ steps.detect.outputs.python_files }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect P0 gate scope
        id: detect
        shell: bash
        run: |
          python_quality_required=false
          dependency_check_required=false
          python_files=""

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            python_quality_required=true
            dependency_check_required=true
            python_files="$(git ls-files | grep '^src/.*\.py$' | xargs || true)"
          else
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              if git rev-parse HEAD^ >/dev/null 2>&1; then
                mapfile -t changed_files < <(git diff --name-only HEAD^ HEAD)
              else
                mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
              fi
            else
              mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}")
            fi

            for changed_file in "${changed_files[@]}"; do
              case "$changed_file" in
                src/*.py|src/**/*.py)
                  python_quality_required=true
                  python_files="$python_files $changed_file"
                  ;;
                requirements.txt|requirements-mock.txt|config/requirements.txt|pyproject.toml|web/backend/requirements.txt)
                  dependency_check_required=true
                  ;;
              esac
            done
          fi

          echo "python_quality_required=$python_quality_required" >> "$GITHUB_OUTPUT"
          echo "dependency_check_required=$dependency_check_required" >> "$GITHUB_OUTPUT"
          echo "python_files=$(echo "$python_files" | xargs)" >> "$GITHUB_OUTPUT"

  # P0-1: Pylint Error级别检查（必须通过）
  pylint-errors:
    name: Pylint Errors (Critical)
    runs-on: ubuntu-latest
    needs: p0-scope-detect
    if: needs.p0-scope-detect.outputs.python_quality_required == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Pylint
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run Pylint (Error级别 only)
        run: |
          echo "🔍 检查Pylint Error级别问题..."
          pylint ${{ needs.p0-scope-detect.outputs.python_files }} \
            --rcfile=.pylintrc \
            --errors-only \
            --disable=import-error,no-member \
            --output-format=colorized \
            --fail-on=I \
            || {
              echo "❌ P0质量门禁失败：存在Error级别问题"
              echo "💡 修复建议："
              echo "   1. 运行: pylint ${{ needs.p0-scope-detect.outputs.python_files }} --errors-only --disable=import-error,no-member"
              echo "   2. 修复所有Error级别问题后重新提交"
              exit 1
            }

          echo "✅ Pylint Error检查通过"

  # P0-2: 代码格式化检查（必须通过）
  formatting-check:
    name: Code Formatting Check
    runs-on: ubuntu-latest
    needs: p0-scope-detect
    if: needs.p0-scope-detect.outputs.python_quality_required == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install formatting tools
        run: |
          python -m pip install --upgrade pip
          pip install black==25.11.0 isort

      - name: Check Black formatting
        run: |
          echo "🔍 检查代码格式（Black）..."
          black --check --diff --line-length=120 ${{ needs.p0-scope-detect.outputs.python_files }} || {
            echo "❌ P0质量门禁失败：代码格式不符合规范"
            echo "💡 修复建议："
            echo "   运行: black ${{ needs.p0-scope-detect.outputs.python_files }} --line-length=120"
            exit 1
          }
          echo "✅ Black格式检查通过"

      - name: Check import sorting
        run: |
          echo "🔍 检查导入排序（isort）..."
          isort --check-only --diff ${{ needs.p0-scope-detect.outputs.python_files }} || {
            echo "❌ P0质量门禁失败：导入排序不符合规范"
            echo "💡 修复建议："
            echo "   运行: isort ${{ needs.p0-scope-detect.outputs.python_files }}"
            exit 1
          }
          echo "✅ isort检查通过"

  # P0-3: 安全检查（必须通过）
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: p0-scope-detect
    if: needs.p0-scope-detect.outputs.python_quality_required == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          echo "🔍 执行安全扫描..."
          bandit -c config/.security.yml -ll -f screen ${{ needs.p0-scope-detect.outputs.python_files }} || {
            echo "❌ P0质量门禁失败：发现安全问题"
            echo "💡 修复建议："
            echo "   1. 检查报告中的安全问题"
            echo "   2. 运行: bandit -c config/.security.yml -ll ${{ needs.p0-scope-detect.outputs.python_files }}"
            echo "   3. 修复所有High和Medium级别问题"
            exit 1
          }
          echo "✅ 安全扫描通过"

  # P0-4: 依赖安全检查
  dependency-check:
    name: Dependency Safety Check
    runs-on: ubuntu-latest
    needs: p0-scope-detect
    if: needs.p0-scope-detect.outputs.dependency_check_required == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Safety
        run: |
          python -m pip install --upgrade pip
          pip install safety

      - name: Check dependencies for vulnerabilities
        shell: bash
        run: |
          echo "🔍 检查依赖安全性..."
          SAFETY_ARGS=()
          for file in requirements.txt requirements-mock.txt config/requirements.txt web/backend/requirements.txt; do
            if [ -f "$file" ]; then
              SAFETY_ARGS+=("-r" "$file")
            fi
          done

          if [ "${#SAFETY_ARGS[@]}" -eq 0 ]; then
            echo "No requirements files found; skipping dependency vulnerability scan"
            exit 0
          fi

          safety check "${SAFETY_ARGS[@]}" || {
            echo "❌ P0质量门禁失败：发现依赖漏洞"
            echo "💡 修复建议："
            echo "   1. 查看上面的Safety输出了解漏洞详情"
            echo "   2. 更新有漏洞的依赖包"
            echo "   3. 运行: pip install --upgrade <package>"
            exit 1
          }
          echo "✅ 依赖安全检查通过"

  # P0-5: Python语法检查
  syntax-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    needs: p0-scope-detect
    if: needs.p0-scope-detect.outputs.python_quality_required == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check Python syntax
        shell: bash
        run: |
          echo "🔍 检查Python语法..."
          for file in ${{ needs.p0-scope-detect.outputs.python_files }}; do
            python -m py_compile "$file" || {
              echo "❌ P0质量门禁失败：存在Python语法错误"
              echo "💡 修复建议："
              echo "   运行: python -m py_compile ${file}"
              echo "   修复所有语法错误"
              exit 1
            }
          done
          echo "✅ Python语法检查通过"

  # P0-6: 敏感信息检测
  secrets-check:
    name: Secrets Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect secrets
        uses: trufflesecurity/trufflehog@v3.91.2
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: false

  # P0-7: 生成质量报告
  quality-report:
    name: Generate Quality Report
    runs-on: ubuntu-latest
    needs: [p0-scope-detect, pylint-errors, formatting-check, security-scan, dependency-check, syntax-check]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate summary
        shell: bash
        run: |
          normalize_result() {
            local result="$1"
            local required="$2"
            if [ "$required" != "true" ] && [ "$result" = "skipped" ]; then
              echo "success"
            else
              echo "$result"
            fi
          }

          status_icon() {
            local result="$1"
            if [ "$result" = "success" ]; then
              echo "✅ 通过"
            else
              echo "❌ 失败"
            fi
          }

          PYTHON_REQUIRED="${{ needs.p0-scope-detect.outputs.python_quality_required }}"
          DEP_REQUIRED="${{ needs.p0-scope-detect.outputs.dependency_check_required }}"

          PYLINT_STATUS="$(normalize_result "${{ needs.pylint-errors.result }}" "$PYTHON_REQUIRED")"
          FORMAT_STATUS="$(normalize_result "${{ needs.formatting-check.result }}" "$PYTHON_REQUIRED")"
          SECURITY_STATUS="$(normalize_result "${{ needs.security-scan.result }}" "$PYTHON_REQUIRED")"
          DEP_STATUS="$(normalize_result "${{ needs.dependency-check.result }}" "$DEP_REQUIRED")"
          SYNTAX_STATUS="$(normalize_result "${{ needs.syntax-check.result }}" "$PYTHON_REQUIRED")"

          {
            echo "# P0质量门禁报告"
            echo ""
            echo "**检查时间**: $(date)"
            echo ""
            echo "## 检查结果"
            echo ""
            echo "| 检查项 | 状态 |"
            echo "|--------|------|"
            echo "| Pylint Errors | $(status_icon "$PYLINT_STATUS") |"
            echo "| 代码格式化 | $(status_icon "$FORMAT_STATUS") |"
            echo "| 安全扫描 | $(status_icon "$SECURITY_STATUS") |"
            echo "| 依赖安全 | $(status_icon "$DEP_STATUS") |"
            echo "| Python语法 | $(status_icon "$SYNTAX_STATUS") |"
            echo ""
            echo "## 📊 总体评估"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$PYLINT_STATUS" = "success" ] && \
             [ "$FORMAT_STATUS" = "success" ] && \
             [ "$SECURITY_STATUS" = "success" ] && \
             [ "$DEP_STATUS" = "success" ] && \
             [ "$SYNTAX_STATUS" = "success" ]; then
            echo "✅ **所有检查通过，代码质量符合P0标准**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ **部分检查失败，请修复后重新提交**" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Final gate
        shell: bash
        run: |
          normalize_result() {
            local result="$1"
            local required="$2"
            if [ "$required" != "true" ] && [ "$result" = "skipped" ]; then
              echo "success"
            else
              echo "$result"
            fi
          }

          PYTHON_REQUIRED="${{ needs.p0-scope-detect.outputs.python_quality_required }}"
          DEP_REQUIRED="${{ needs.p0-scope-detect.outputs.dependency_check_required }}"

          PYLINT_STATUS="$(normalize_result "${{ needs.pylint-errors.result }}" "$PYTHON_REQUIRED")"
          FORMAT_STATUS="$(normalize_result "${{ needs.formatting-check.result }}" "$PYTHON_REQUIRED")"
          SECURITY_STATUS="$(normalize_result "${{ needs.security-scan.result }}" "$PYTHON_REQUIRED")"
          DEP_STATUS="$(normalize_result "${{ needs.dependency-check.result }}" "$DEP_REQUIRED")"
          SYNTAX_STATUS="$(normalize_result "${{ needs.syntax-check.result }}" "$PYTHON_REQUIRED")"

          if [ "$PYLINT_STATUS" != "success" ] || \
             [ "$FORMAT_STATUS" != "success" ] || \
             [ "$SECURITY_STATUS" != "success" ] || \
             [ "$DEP_STATUS" != "success" ] || \
             [ "$SYNTAX_STATUS" != "success" ]; then
            echo "❌ P0质量门禁：代码质量不达标"
            exit 1
          fi

          echo "✅ P0质量门禁：所有检查通过"
